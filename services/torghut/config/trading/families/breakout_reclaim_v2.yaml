schema_version: torghut.family-template.v1
family_id: breakout_reclaim_v2
economic_mechanism: Intraday breakout continuation after reclaim of session highs in liquid US equities.
supported_markets:
  - us_equities_intraday
required_features:
  - session_high_reclaim_bps
  - cross_section_continuation_rank
  - recent_microprice_bias_bps
  - quote_quality
allowed_normalizations:
  - price_scaled
  - trading_value_scaled
  - opening_window_scaled
entry_motifs:
  - breakout_reclaim
  - opening_range_continuation
exit_motifs:
  - trailing_stop
  - session_negative_exit
  - close_flatten
risk_controls:
  - max_session_negative_exit_bps
  - long_stop_loss_bps
  - quote_quality_veto
activity_model:
  min_active_day_ratio: '0.55'
  min_daily_notional: '300000'
liquidity_assumptions:
  max_spread_bps: '35'
  min_quote_valid_ratio: '0.90'
regime_activation_rules:
  - metric: market_breadth
    comparator: gte
    threshold: '0.45'
day_veto_rules:
  - rule: quote_quality
    action: block_day
  - rule: volatility_shock
    action: reduce_activity
default_hard_vetoes:
  required_min_active_day_ratio: '0.55'
  required_min_daily_notional: '300000'
  required_max_best_day_share: '0.50'
  required_max_worst_day_loss: '650'
  required_max_drawdown: '1500'
  required_min_regime_slice_pass_rate: '0.35'
default_selection_objectives:
  target_net_pnl_per_day: '300'
  require_positive_day_ratio: '0.50'

