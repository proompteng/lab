schema_version: torghut.family-template.v1
family_id: intraday_tsmom_v2
economic_mechanism: Volatility-targeted intraday trend persistence with conservative turnover and liquidity control.
supported_markets:
  - us_equities_intraday
required_features:
  - trend_strength
  - realized_volatility
  - turnover
allowed_normalizations:
  - price_scaled
  - trading_value_scaled
entry_motifs:
  - trend_continuation
exit_motifs:
  - trailing_stop
  - close_flatten
risk_controls:
  - gross_exposure_limit
  - stop_loss
activity_model:
  min_active_day_ratio: '0.60'
  min_daily_notional: '250000'
liquidity_assumptions:
  max_spread_bps: '30'
  min_quote_valid_ratio: '0.92'
regime_activation_rules:
  - metric: stable_volatility
    comparator: gte
    threshold: '0.50'
day_veto_rules:
  - rule: correlation_stress
    action: reduce_activity
default_hard_vetoes:
  required_min_active_day_ratio: '0.60'
  required_min_daily_notional: '250000'
  required_max_best_day_share: '0.45'
  required_max_worst_day_loss: '500'
  required_max_drawdown: '1100'
  required_min_regime_slice_pass_rate: '0.35'
default_selection_objectives:
  target_net_pnl_per_day: '200'
  require_positive_day_ratio: '0.50'

