schema_version: torghut.strategy-autoresearch.v1
program_id: portfolio_profit_autoresearch_500_v1
description: >
  Portfolio outer loop for a $500/day post-cost net profit target. This profile keeps
  the objective explicitly daily, not cumulative, allows ordinary down days, and uses
  worst-day, drawdown, cash, exposure, replay, and runtime-closure gates before any
  promotion beyond research-candidate artifacts.
snapshot_policy:
  bar_interval: PT1S
  feature_set_id: torghut.mlx-autoresearch.v1
  quote_quality_policy_id: scheduler_v3_default
  symbol_policy: args_or_sweep
  allow_prior_day_features: true
  allow_cross_sectional_features: true
forbidden_mutations:
  - runtime_code_path
  - evaluator_logic
  - live_strategy_config
proposal_model_policy:
  enabled: true
  mode: ranking_only
  backend_preference: mlx
  top_k: 4
  exploration_slots: 2
  minimum_history_rows: 2
replay_budget:
  max_candidates_per_round: 8
  exploration_slots: 2
  max_candidates_per_frontier_run: 96
  staged_train_screen_multiplier: 3
runtime_closure_policy:
  enabled: true
  execute_parity_replay: true
  execute_approval_replay: true
  parity_window: full_window
  approval_window: holdout
  shadow_validation_mode: require_live_evidence
  promotion_target: shadow
parity_requirements:
  - checked_in_runtime_family
  - scheduler_v3_parity_replay
  - scheduler_v3_approval_replay
  - live_shadow_validation
promotion_policy: research_only
ledger_policy:
  append_only: true
objective:
  target_net_pnl_per_day: '500'
  min_daily_net_pnl: '-999999999'
  min_active_day_ratio: '0.90'
  min_positive_day_ratio: '0.60'
  min_profit_factor: '1.50'
  min_daily_notional: '300000'
  min_observed_trading_days: 20
  max_best_day_share: '0.25'
  max_worst_day_loss: '999999999'
  max_drawdown: '999999999'
  default_start_equity: '31590.02'
  max_worst_day_loss_pct_equity: '0.05'
  max_drawdown_pct_equity: '0.08'
  extended_max_worst_day_loss_pct_equity: '0.08'
  extended_max_drawdown_pct_equity: '0.12'
  min_total_net_pnl_to_drawdown_ratio: '3.00'
  require_every_day_active: false
  min_regime_slice_pass_rate: '0.45'
  max_gross_exposure_pct_equity: '1.0'
  min_cash: '0'
  require_double_oos: true
  min_double_oos_independent_window_count: 2
  min_double_oos_pass_rate: '1.00'
  require_double_oos_cost_shock_above_target: true
  stop_when_objective_met: true
research_sources:
  - source_id: tradefm_market_microstructure_2026
    title: 'TradeFM: A Generative Foundation Model for Trade-flow and Market Microstructure'
    url: https://arxiv.org/abs/2602.23784
    published_at: '2026-02-27'
    claims:
      - claim_id: scale_invariant_trade_flow
        summary: Scale-invariant trade-flow representations can transfer across equities.
        implication: Prefer normalization sweeps that avoid asset-specific calibration.
      - claim_id: synthetic_rollout_stress
        summary: Generated trade-flow rollouts are useful for stress testing.
        implication: Treat model-generated signals as research evidence only until replay and shadow gates pass.
  - source_id: regime_weighted_conformal_var_2026
    title: 'Taming Tail Risk in Financial Markets: Conformal Risk Control for Nonstationary Portfolio VaR'
    url: https://arxiv.org/abs/2602.03903
    published_at: '2026-02-03'
    claims:
      - claim_id: regime_weighted_conformal_var_buffer
        claim_type: feature_recipe
        summary: Regime-weighted conformal risk control calibrates a VaR safety buffer from recent forecast errors and regime-similarity weights.
        implication: Rank candidates by post-cost edge after a regime-tail exceedance buffer instead of raw average replay PnL.
        data_requirements:
          - regime_state
          - regime_similarity_weights
          - conformal_tail_risk
          - regime_tail_exceedance
          - var_forecast_error
        asset_scope: us_equities_portfolio
        horizon_scope: portfolio_risk_control
        expected_direction: neutral
      - claim_id: breakeven_cost_buffer_validation
        claim_type: validation_requirement
        summary: A candidate should clear the $500 target after conformal tail-risk and breakeven transaction-cost buffers.
        implication: Keep conformal VaR evidence as replay-ranking and proof-capture input, not final promotion authority.
        data_requirements:
          - breakeven_transaction_cost_buffer
          - transaction_cost_buffer
          - transaction_cost_stress
          - post_cost_net_pnl
          - seed_robustness
          - model_family_robustness
        asset_scope: us_equities_portfolio
        horizon_scope: portfolio_risk_control
        expected_direction: neutral
  - source_id: ofi_response_ratio_2025
    title: 'Stochastic Price Dynamics in Response to Order Flow Imbalance: Evidence from CSI 300 Index Futures'
    url: https://arxiv.org/abs/2505.17388
    published_at: '2025-05-23'
    claims:
      - claim_id: ofi_memory_response
        summary: Order-flow imbalance can behave like a persistent shock with horizon-dependent response.
        implication: Test order-flow continuation and mean-reversion sleeves separately by replay horizon.
      - claim_id: regime_dependent_ofi_power
        summary: Forecasting power depends on market regime.
        implication: Keep regime-slice pass rate as a hard promotion criterion.
  - source_id: intraday_ofi_news_dynamics_2025
    title: 'Returns and Order Flow Imbalances: Intraday Dynamics and Macroeconomic News Effects'
    url: https://arxiv.org/abs/2508.06788
    published_at: '2025-10-08'
    claims:
      - claim_id: one_second_price_flow_decay
        claim_type: signal_mechanism
        summary: One-second price-flow shocks dissipate quickly and vary by interval.
        implication: Prefer bounded intraday windows and reject candidates that depend on one broad aggregate effect.
        data_requirements:
          - order_flow_imbalance
          - price_flow_impact
          - flow_impact_decay
          - forecast_horizon
        asset_scope: us_equities_intraday
        horizon_scope: subminute_microstructure
        expected_direction: positive
      - claim_id: news_liquidity_regime
        claim_type: market_regime
        summary: Macroeconomic announcements reshape price impact, order flow impact, and volatility.
        implication: Require held-out replay and live shadow evidence before promotion.
        data_requirements:
          - macro_announcement_window
          - realized_volatility
          - spread_bps
          - route_tca
        asset_scope: us_equities_intraday
        horizon_scope: macro_event_intraday
        expected_direction: neutral
  - source_id: intraday_order_transition_2025
    title: 'Intraday order transition dynamics in high, medium, and low market cap stocks: A Markov chain approach'
    url: https://arxiv.org/abs/2502.07625
    published_at: '2025-02-11'
    claims:
      - claim_id: opening_order_inertia
        summary: Limit-order inertia is stronger in the opening hour and order transitions vary intraday.
        implication: Separate opening-drive and mid-session sleeves instead of pooling all minutes.
      - claim_id: market_cap_order_transition
        summary: Intraday order transitions differ across stock market-cap buckets.
        implication: Keep symbol-universe and concentration constraints visible in candidate evidence.
  - source_id: order_flow_filtration_2025
    title: 'Order-Flow Filtration and Directional Association with Short-Horizon Returns'
    url: https://arxiv.org/abs/2507.22712
    published_at: '2025-12-08'
    claims:
      - claim_id: executed_trade_obi
        claim_type: feature_recipe
        summary: OBI built from executed-trade parent orders has stronger directional association than broad unfiltered order flow.
        implication: Prefer recent executed-flow and quote-quality confirmation over raw aggregate imbalance.
        data_requirements:
          - parent_order_trade_linkage
          - filtered_orderbook_imbalance
          - order_lifetime_filter
          - order_modification_count
        asset_scope: limit_order_book_intraday
        horizon_scope: short_horizon_returns
        expected_direction: positive
      - claim_id: causal_filtration_ladder
        claim_type: validation_requirement
        summary: Filtration can improve correlation without improving causal coherence.
        implication: Keep regime-sliced replay, excitation-like stress windows, and shadow validation as gates.
        data_requirements:
          - event_time_excitation
          - route_tca
          - walk_forward_replay
          - live_paper_parity
        asset_scope: limit_order_book_intraday
        horizon_scope: short_horizon_returns
        expected_direction: neutral
  - source_id: optimal_signal_extraction_order_flow_2026
    title: 'Optimal Signal Extraction from Order Flow'
    url: https://arxiv.org/abs/2512.18648
    published_at: '2026-02-20'
    claims:
      - claim_id: matched_filter_normalization
        claim_type: feature_recipe
        summary: Order-flow normalization should match the scaling behavior of the signal-generating process.
        implication: Prefer bounded mutation neighborhoods that explicitly compare market-cap, volume, and notional scaling.
        data_requirements:
          - order_flow_intensity
          - market_cap
          - turnover
          - short_horizon_returns
        asset_scope: us_equities_intraday
        horizon_scope: intraday_microstructure
        expected_direction: positive
      - claim_id: informed_executor_scaling
        claim_type: signal_mechanism
        summary: Different participant types can encode information through different order-flow scaling conventions.
        implication: Keep normalization choice visible in candidate evidence and replay survivors instead of pooling all flow transforms.
        data_requirements:
          - participant_flow_proxy
          - order_flow_intensity
          - volume_profile
          - market_cap
        asset_scope: us_equities_intraday
        horizon_scope: intraday_microstructure
        expected_direction: positive
  - source_id: volume_imbalance_secret_2026
    title: 'Understanding the worst-kept secret of high-frequency trading'
    url: https://link.springer.com/article/10.1007/s00780-026-00585-9
    published_at: '2026-01-13'
    claims:
      - claim_id: predictive_volume_imbalance
        summary: LOB volume imbalance is predictive of future mid-price moves through efficient-price and microprice interpretation.
        implication: Test weighted microprice and imbalance-confirmed continuation, but keep inventory and tick-size risk controls.
      - claim_id: market_maker_response
        summary: Predictive imbalance is endogenous to market-maker inventory and quote response.
        implication: Reject candidates that pass only by stale imbalance without spread, quote-quality, and cost controls.
  - source_id: weighted_microprice_momentum_2026
    title: 'A Novel Weighted Microprice Momentum for High-Frequency Trading: Integrating Order Book Dynamics with Execution Flow'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5806502
    published_at: '2026-01-05'
    claims:
      - claim_id: weighted_microprice_momentum
        summary: Multi-level order book state, execution volume, and decay weighting can improve short-term direction prediction.
        implication: Include microprice-confirmed continuation profiles and require multi-window confirmation.
      - claim_id: high_frequency_noise_filter
        summary: Multiple rolling windows are needed to filter noisy high-frequency microprice signals.
        implication: Penalize one-tick-only entries and favor persistent late-session continuation.
  - source_id: optimized_intraday_momentum_exits_2025
    title: 'Improvements to Intraday Momentum Strategies Using Parameter Optimization and Different Exit Strategies'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5095349
    published_at: '2025-01-27'
    claims:
      - claim_id: vwap_ladder_exits
        summary: VWAP and ladder-style exits improved noise-boundary intraday momentum results in the paper.
        implication: Sweep VWAP-close, trailing-stop, and close-flatten exits rather than only fixed time exits.
  - source_id: macro_announcement_intraday_momentum_2025
    title: "Stock's Macro Announcement Incremental Information and Intraday Momentum"
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5413265
    published_at: '2025-08-28'
    claims:
      - claim_id: macro_information_momentum
        summary: Intraday momentum is stronger around macro-announcement information windows.
        implication: Treat late-day continuation as regime conditional and require non-announcement held-out validation.
  - source_id: opening_range_breakout_stocks_in_play_2024
    title: 'A Profitable Day Trading Strategy For The U.S. Equity Market'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4729284
    published_at: '2024-02-19'
    claims:
      - claim_id: stocks_in_play_opening_range_breakout
        summary: A 5-minute opening range breakout applied to stocks with unusually high daily volume can produce systematic intraday momentum candidates.
        implication: Reaudit opening-drive and breakout-reclaim sleeves with relative-volume, VWAP, and no-overnight-hold controls.
      - claim_id: orb_risk_controls_required
        summary: Opening range breakout profits depend on strict intraday risk management rather than raw breakout direction alone.
        implication: Keep stop-loss, close-flatten, drawdown, concentration, and post-cost replay gates as blockers before promotion.
  - source_id: intraday_residual_reversal_2024
    title: 'Intraday Residual Reversal in the U.S. Stock Market'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4731947
    published_at: '2024-02-19'
    claims:
      - claim_id: residual_noise_reversal
        summary: Factor-unexplained intraday price moves can reverse as transitory liquidity pressure unwinds.
        implication: Add residual-style cross-sectional reversal sleeves that fade short-horizon losers/winners after costs.
      - claim_id: liquidity_provision_profit_source
        summary: The claimed return source is liquidity provision to transitory stock-return components.
        implication: Keep cost, notional, spread, active-day, and best-day concentration gates intact before promotion.
  - source_id: intraday_return_autocorrelation_term_structure_2025
    title: 'The Term Structure of Intraday Return Autocorrelations'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5227714
    published_at: '2025-04-23'
    claims:
      - claim_id: horizon_specific_reversal
        summary: Intraday autocorrelation direction depends on horizon, with reversals stronger around 15-minute horizons.
        implication: Sweep short, horizon-specific reversal entries instead of pooling open, mid-day, and close effects.
      - claim_id: subminute_large_stock_continuation
        summary: Sub-minute continuations can appear in larger stocks, market stress, and the first half-hour.
        implication: Keep continuation and reversal sleeves separated by horizon and require holdout proof for each sleeve.
  - source_id: intraday_time_series_reversal_2025
    title: 'Intraday Time Series Reversal'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5807282
    published_at: '2025-12-13'
    claims:
      - claim_id: volatility_conditioned_intraday_reversal
        summary: Intraday reversal effects can strengthen during high-volatility regimes.
        implication: Reaudit short-horizon reversal sleeves with explicit volatility and drawdown gates instead of broad all-day pooling.
      - claim_id: time_series_not_only_cross_section
        summary: Reversal can be framed as a time-series effect, not only a cross-sectional loser/winner sort.
        implication: Include recent-window reversal profiles that can trade serially while respecting simultaneous exposure caps.
  - source_id: end_of_day_reversal_2024
    title: 'End-of-Day Reversal'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5039009
    published_at: '2024-11-29'
    claims:
      - claim_id: final_half_hour_loser_reversal
        summary: Individual-stock intraday losers can reverse in the final 30 minutes of the trading day.
        implication: Reaudit end-of-day reversal sleeves on late-session losers, but cap best-day and symbol concentration.
      - claim_id: closing_pressure_unwind
        summary: The pattern is linked to intraday price pressure unwinding near the close.
        implication: Keep closing-window entry, short hold, cost, and no-overnight exposure controls explicit.
  - source_id: overnight_jump_intraday_reversal_2026
    title: 'Dark Side of the Day: Overnight Price Jumps and Short-Term Return Predictability'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4335622
    published_at: '2026-04-27'
    claims:
      - claim_id: overnight_jump_reversal
        summary: Overnight price jumps can negatively predict short-term returns as overreaction unwinds.
        implication: Reaudit overnight-gap and opening-window reversal sleeves using prior-close features and strict cost controls.
      - claim_id: transient_active_trading_window
        summary: The reversal pattern is transient and tied to active trading conditions.
        implication: Prefer opening-window exits and reject candidates that need stale or late-day-only evidence.
  - source_id: intraday_cross_section_patterns_2010
    title: 'Intraday Patterns in the Cross-section of Stock Returns'
    url: https://arxiv.org/abs/1005.3535
    published_at: '2010-05-19'
    claims:
      - claim_id: same_interval_daily_periodicity
        summary: Cross-sectional returns can continue at half-hour intervals matching prior trading-day timing.
        implication: Test interval-specific cross-sectional sleeves with timing controls instead of broad all-day ranks.
      - claim_id: subhour_liquidity_reversal
        summary: Short-term reversals can be driven by temporary liquidity imbalances lasting less than an hour.
        implication: Add sub-hour reversal sleeves with strict turnover, cost, and drawdown evidence.
  - source_id: attention_factors_stat_arb_2025
    title: 'Attention Factors for Statistical Arbitrage'
    url: https://arxiv.org/abs/2510.11616
    published_at: '2025-10-13'
    claims:
      - claim_id: attention_factor_residual_statarb
        claim_type: signal_mechanism
        summary: Conditional latent attention factors can identify similar-asset residual portfolios and mispricing signals for statistical arbitrage after trading costs.
        implication: Route H-PAIRS and cross-sectional pairs candidates through factor-neutral residual and attention-weighted similarity features instead of static pair-spread z-scores alone.
        data_requirements:
          - firm_characteristic_embeddings
          - attention_factor_exposures
          - cross_sectional_similarity_graph
          - residual_portfolio_returns
          - transaction_cost_model
        asset_scope: us_equities_cross_section
        horizon_scope: statistical_arbitrage
        expected_direction: positive
      - claim_id: residual_sequence_policy_features
        claim_type: feature_recipe
        summary: Residual-portfolio return sequences should feed candidate ranking and policy selection.
        implication: Add residual sequence, pair-relative return, and factor-neutral residual checks to the candidate compiler before promotion review.
        data_requirements:
          - residual_return_sequence
          - pair_relative_return
          - factor_neutral_residual
          - residual_spread_zscore
          - turnover
        asset_scope: us_equities_cross_section
        horizon_scope: statistical_arbitrage
        expected_direction: positive
      - claim_id: attention_factor_post_cost_validation
        claim_type: validation_requirement
        summary: Attention-factor statistical-arbitrage candidates remain research candidates until walk-forward replay, cost stress, and runtime-ledger or live-paper proof validate closed-position post-cost PnL.
        implication: Keep attention-factor outputs as search guidance only; promotion still requires real runtime-ledger proof with filled notional, costs, and closed round trips.
        data_requirements:
          - walk_forward_replay
          - transaction_cost_stress
          - runtime_ledger_profit_proof
          - post_cost_net_pnl
          - closed_round_trips
        asset_scope: us_equities_cross_section
        horizon_scope: statistical_arbitrage_validation
        expected_direction: neutral
  - source_id: alphacrafter_factor_execution_loop_2026
    title: 'AlphaCrafter: A Full-Stack Multi-Agent Framework for Cross-Sectional Quantitative Trading'
    url: https://arxiv.org/abs/2605.05580
    published_at: '2026-05-07'
    claims:
      - claim_id: adaptive_factor_to_execution_loop
        summary: A profitable cross-sectional trading system should continuously couple factor discovery, regime-conditioned selection, and risk-constrained execution.
        implication: 'Treat Torghut research candidates as a factor-to-execution loop: mine variants, screen by current regime, then route only bounded paper/live-paper probes with ledger proof.'
      - claim_id: role_noise_less_useful_than_rational_pipeline
        summary: The useful multi-agent split is systematic miner/screener/trader specialization, not noisy role-play committees.
        implication: Keep AgentRuns focused on factor discovery, proof audit, and execution-readiness lanes with explicit artifacts rather than unbounded discussion swarms.
  - source_id: financial_multi_agent_cost_awareness_2026
    title: 'Toward Reliable Evaluation of LLM-Based Financial Multi-Agent Systems: Taxonomy, Coordination Primacy, and Cost Awareness'
    url: https://arxiv.org/abs/2603.27539
    published_at: '2026-03-29'
    claims:
      - claim_id: coordination_breakeven_spread
        summary: Multi-agent coordination only adds value if it clears its own transaction-cost and coordination-overhead breakeven spread.
        implication: Rank agent-discovered candidates by post-cost runtime-ledger edge after explicit route/TCA and coordination overhead, not by raw replay alpha.
      - claim_id: evaluation_failures_reverse_returns
        summary: Look-ahead bias, survivorship bias, overfitting, transaction-cost neglect, and regime-shift blindness can reverse apparent trading returns.
        implication: Keep promotion blocked unless source data, replay split, transaction costs, regime stress, and runtime-ledger lineage are all present.
  - source_id: live_market_agent_arena_2025
    title: 'When Agents Trade: Live Multi-Market Trading Benchmark for LLM Agents'
    url: https://arxiv.org/abs/2510.11695
    published_at: '2025-10-13'
    claims:
      - claim_id: live_verified_agent_evaluation
        summary: Live agent behavior differs materially across frameworks, and verified real-time data is needed to judge trading performance.
        implication: Prefer live-paper route probes and runtime-ledger proof over static benchmark scores when deciding whether a candidate can advance.
      - claim_id: framework_risk_style_matters
        summary: Agent framework risk style can matter more than the model backbone for live trading behavior.
        implication: Treat Torghut sleeves as risk-policy variants with separate drawdown, concentration, and order-lifecycle evidence rather than one generic model output.
  - source_id: tradetrap_system_stress_2025
    title: 'TradeTrap: Are LLM-based Trading Agents Truly Reliable and Faithful?'
    url: https://arxiv.org/abs/2512.02261
    published_at: '2025-12-01'
    claims:
      - claim_id: component_perturbations_cause_drawdown
        summary: Small perturbations in market intelligence, strategy formulation, portfolio/ledger handling, or execution can cause concentration and runaway drawdowns.
        implication: Keep source-activity, ledger, and execution-lifecycle blockers visible per target so a single weak component cannot pass as portfolio readiness.
      - claim_id: ledger_handling_is_attack_surface
        summary: Portfolio and ledger handling are first-class reliability surfaces for autonomous trading agents.
        implication: Runtime-ledger materialization and post-cost proof must remain the promotion authority even for close paper-probation candidates.
  - source_id: agentic_trading_evidence_ledger_2026
    title: 'Agentic Trading: When LLM Agents Meet Financial Markets'
    url: https://arxiv.org/abs/2605.19337
    published_at: '2026-05-19'
    claims:
      - claim_id: evidence_ledger_required_for_reproducibility
        summary: Current agentic-trading papers have weak reproducibility, sparse cost modeling, and inconsistent execution semantics.
        implication: Require Torghut proof packets to preserve per-target source activity, runtime-ledger lineage, costs, and execution semantics before any promotion claim.
      - claim_id: closed_loop_action_output_boundary
        summary: Closed-loop action outputs and execution semantics are the minimum boundary for empirical trading-agent evidence.
        implication: Research claims should become bounded executable sleeves and live-paper decisions before they can influence allocation.
  - source_id: asymmetric_ofi_hmm_regime_2025
    title: 'Asymmetric Hidden Markov Modeling of Order Flow Imbalances for Microstructure-Aware Market Regime Detection'
    url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5315733
    published_at: '2025-06-23'
    claims:
      - claim_id: ofi_latent_regime_breakout
        summary: Hidden Markov regimes from order-flow imbalance can identify breakout and liquidity-dislocation states.
        implication: Route OFI regime claims into microstructure continuation and opening-drive sleeves with quote-quality gates.
      - claim_id: asymmetric_liquidity_transition
        summary: Directional asymmetry and regime persistence matter for intraday liquidity state transitions.
        implication: Keep continuation and reversal candidates separated by regime and require held-out shadow parity before promotion.
  - source_id: realistic_market_impact_rl_envs_2026
    title: 'Realistic Market Impact Modeling for Reinforcement Learning Trading Environments'
    url: https://arxiv.org/abs/2603.29086
    published_at: '2026-03-30'
    claims:
      - claim_id: nonlinear_market_impact_changes_strategy_ranking
        claim_type: feature_recipe
        summary: Nonlinear market-impact models materially change trading behavior and strategy ranking versus fixed-cost assumptions.
        implication: Rank candidate sleeves on realized route/TCA and stressed impact curves, not only fixed-bps replay costs.
        data_requirements:
          - route_tca
          - turnover
          - nonlinear_impact_curve
          - market_impact_stress
        asset_scope: us_equities_intraday
        horizon_scope: intraday_execution
        expected_direction: neutral
      - claim_id: turnover_penalty_prevents_pathological_trading
        claim_type: risk_constraint
        summary: Cost-model-aware optimization sharply reduces pathological turnover and total daily costs.
        implication: Add turnover and impact stress as first-class promotion blockers for high-activity candidates.
        data_requirements:
          - route_tca
          - turnover
          - realized_slippage_bps
          - market_impact_stress
        asset_scope: us_equities_intraday
        horizon_scope: intraday_execution
        expected_direction: neutral
  - source_id: overreaction_intraday_momentum_aapl_2026
    title: 'Overreaction as an Indicator for Momentum in Algorithmic Trading: A Case of AAPL Stocks'
    url: https://arxiv.org/abs/2602.18912
    published_at: '2026-02-21'
    claims:
      - claim_id: volatility_cost_normalized_overreaction
        summary: Intraday overreactions can be defined relative to contemporaneous volatility and transaction costs before modeling momentum.
        implication: Prefer volatility-and-cost-normalized overreaction features over raw return thresholds.
      - claim_id: sentiment_conditioned_momentum_requires_live_validation
        summary: Sentiment/emotion features may improve intraday momentum classification but are source- and symbol-dependent.
        implication: Treat sentiment-conditioned momentum as a research sleeve requiring strict out-of-sample and live-paper validation.
  - source_id: vwap_regime_classification_intraday_2026
