        minimum: '300'
        maximum: '1200'
      long_stop_loss_bps:
        mode: numeric_step
        deltas: ['-4', '0', '4']
        minimum: '12'
        maximum: '32'
      long_trailing_stop_activation_profit_bps:
        mode: numeric_step
