<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Creature stat board</title>
  <desc id="desc">Original diagram explaining how Olden Era creature stats feed combat decisions.</desc>
  <rect width="1200" height="520" rx="28" fill="#151515"/>
  <rect x="40" y="40" width="1120" height="440" rx="18" fill="#202020" stroke="#3f3f46"/>
  <text x="80" y="92" fill="#f4f4f5" font-family="Arial, sans-serif" font-size="30" font-weight="700">Creature decision board</text>
  <text x="80" y="126" fill="#a1a1aa" font-family="Arial, sans-serif" font-size="18">Read stats as fight cost, not trivia.</text>

  <g font-family="Arial, sans-serif" font-size="17">
    <rect x="80" y="170" width="190" height="96" rx="12" fill="#27272a" stroke="#52525b"/>
    <text x="106" y="206" fill="#fafafa" font-weight="700">Act first</text>
    <text x="106" y="235" fill="#d4d4d8">Speed + initiative</text>

    <rect x="320" y="170" width="190" height="96" rx="12" fill="#27272a" stroke="#52525b"/>
    <text x="346" y="206" fill="#fafafa" font-weight="700">Kill target</text>
    <text x="346" y="235" fill="#d4d4d8">Attack + damage</text>

    <rect x="560" y="170" width="190" height="96" rx="12" fill="#27272a" stroke="#52525b"/>
    <text x="586" y="206" fill="#fafafa" font-weight="700">Survive trade</text>
    <text x="586" y="235" fill="#d4d4d8">Health + defense</text>

    <rect x="800" y="170" width="280" height="96" rx="12" fill="#27272a" stroke="#52525b"/>
    <text x="826" y="206" fill="#fafafa" font-weight="700">Value the loss</text>
    <text x="826" y="235" fill="#d4d4d8">Growth + cost + experience</text>
  </g>

  <path d="M270 218 H316" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <path d="M510 218 H556" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <path d="M750 218 H796" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>

  <rect x="135" y="332" width="930" height="74" rx="14" fill="#111827" stroke="#334155"/>
  <text x="170" y="363" fill="#f4f4f5" font-family="Arial, sans-serif" font-size="20" font-weight="700">Gameplay question</text>
  <text x="170" y="390" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="18">Can this stack win the next fight without delaying the route or sacrificing irreplaceable growth?</text>
</svg>
