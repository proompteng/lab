replicaCount: 1

image:
  repository: jangar-local
  tag: kind

resources:
  requests:
    cpu: 100m
    memory: 256Mi

rbac:
  clusterScoped: true

readinessProbe:
  path: /health

env:
  vars:
    OTEL_METRICS_EXPORTER: none

database:
  secretRef:
    name: jangar-db-app
    key: uri

controller:
  namespaces:
    - agents
  vcsProviders:
    enabled: false

agentComms:
  enabled: false

grpc:
  enabled: true
  port: 50051
  servicePort: 50051
  serviceType: ClusterIP
