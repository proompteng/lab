nameOverride: ''
fullnameOverride: ''

replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

image:
  repository: ghcr.io/proompteng/agents-control-plane
  tag: latest
  digest: ''
  pullPolicy: IfNotPresent
  pullSecrets: []

imagePolicy:
  requireDigest: false

controlPlane:
  image:
    repository: ghcr.io/proompteng/agents-control-plane
    tag: ''
    digest: ''
    pullPolicy: ''
    pullSecrets: []
  env:
    vars: {}
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}
  lifecycle: {}
  deploymentLifecycle: {}

controllers:
  enabled: false
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: null
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
    maxUnavailable: ''
    annotations: {}
  service:
    enabled: false
    type: ClusterIP
    port: 50051
    annotations: {}
    labels: {}
  deploymentStrategy: {}
  image:
    repository: ghcr.io/proompteng/agents-controller
    tag: ''
    digest: ''
    pullPolicy: ''
    pullSecrets: []
  resources: {}
  env:
    vars: {}
  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}
  lifecycle: {}
  deploymentLifecycle: {}

runner:
  image:
    repository: ghcr.io/proompteng/agents-codex-runner
    tag: latest
    digest: ''
    pullPolicy: IfNotPresent
    pullSecrets: []

linearMcpGateway:
  enabled: false
  replicaCount: 2
  image: {}
  imagePullSecrets: []
  oauthSecretName: linear-mcp-oauth
  databaseSecret:
    name: ''
    key: uri
  serviceAccount:
    name: agents-linear-mcp-gateway
  runnerServiceAccount:
    name: codex-linear-runner
  config:
    port: 8080
    namespace: agents
    audience: agents.proompteng.ai/linear-mcp
    runnerServiceAccount: codex-linear-runner
    agentName: codex-linear-agent
    providerName: codex-linear
    triggerLabel: agentrun
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
  networkPolicy:
    enabled: true

agentsShell:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/proompteng/agents-shell
    tag: latest
    digest: ''
    pullPolicy: IfNotPresent
    pullSecrets: []
  serviceAccount:
    create: true
    name: ''
    annotations: {}
  rbac:
    create: true
    clusterAdmin: false
    extraRules: []
    extraReadNamespaces: []
  env:
    vars:
      AGENTS_SHELL_RESOURCE: https://agents-shell.proompteng.ai
      AGENTS_SHELL_OAUTH_ISSUER: https://auth.proompteng.ai/realms/master
      AGENTS_SHELL_LISTEN_PORT: '8080'
      AGENTS_SHELL_ALLOWED_K8S_NAMESPACES: agents
      AGENTS_SHELL_WORKSPACE_ROOT: /workspace
      AGENTS_SHELL_AUDIT_LOG_PATH: /workspace/.agents-shell/audit.jsonl
      AGENTS_SHELL_ENABLE_K8S_APPLY: 'false'
      HOME: /workspace/.agents-shell/home
      AGENTS_SHELL_GIT_USER_NAME: Greg Konush
      AGENTS_SHELL_GIT_USER_EMAIL: greg@proompteng.ai
      AGENTS_SHELL_AGENT_NAMESPACE: agents
      AGENTS_SHELL_AGENT_NAME: codex-agent
      AGENTS_SHELL_AGENT_REPOSITORY: proompteng/lab
      AGENTS_SHELL_AGENT_BASE_BRANCH: main
      AGENTS_SHELL_AGENT_VCS_REF: github
      AGENTS_SHELL_AGENT_RUNTIME_SERVICE_ACCOUNT: agents-sa
      AGENTS_SHELL_AGENT_SECRETS: github-token,codex-auth
    secrets: []
    config: []
    extra: []
  workspace:
    enabled: true
    volumeMode: persistentVolumeClaim
    existingClaim: ''
    claimName: ''
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    storageClassName: ''
    annotations: {}
    labels: {}
    bootstrap:
      enabled: false
      repository: https://github.com/proompteng/lab.git
      branch: main
      targetPath: /workspace/lab
      depth: 0
      tokenSecret:
        name: ''
        key: token
  service:
    enabled: true
    type: ClusterIP
    port: 80
    annotations: {}
    labels: {}
  ingressRoute:
    enabled: false
    name: ''
    host: agents-shell.proompteng.ai
    entryPoints:
      - web
      - websecure
    priority: 10
    middlewares: []
    tls: {}
  networkPolicy:
    enabled: false
    ingressNamespaces:
      - traefik
    egress: []
    annotations: {}
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits: {}
  podAnnotations: {}
  podLabels: {}
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  nodeSelector: {}
  affinity: {}
  tolerations: []
  deploymentStrategy:
    type: Recreate
  terminationGracePeriodSeconds: 30
  livenessProbe:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  readinessProbe:
    enabled: true
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6

serviceAccount:
  create: true
  name: ''
  annotations: {}

runnerServiceAccount:
  create: false
  name: ''
  annotations: {}
  setAsDefault: true
  rbac:
    create: false
    extraRules: []

rbac:
  create: true
  clusterScoped: false
  extraRules: []

service:
  type: ClusterIP
  port: 80
  annotations: {}
  labels: {}

grpc:
  enabled: true
  manageEnvVar: true
  port: 50051
  servicePort: 50051
  serviceType: ClusterIP

swarm:
  enabled: false

validation:
  reservedEnvKeysEnforced: true

audit:
  sink:
    # none | stdout | http
    type: none
    http:
      url: ''
      headers: {}
      timeoutMs: 2000

metrics:
  enabled: true
  path: /metrics
  service:
    enabled: true
    type: ClusterIP
    port: 9090
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: false
    namespace: ''
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: false
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []
  dashboards:
    enabled: true
    annotations: {}
    labels:
      grafana_dashboard: '1'

cors:
  allowedOrigins: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits: {}

resourceQuota:
  enabled: false
  name: ''
  hard: {}
  scopes: []
  scopeSelector: {}
  annotations: {}
  labels: {}

limitRange:
  enabled: false
  name: ''
  limits: []
  annotations: {}
  labels: {}

podAnnotations: {}
podLabels: {}

rolloutChecksums:
  enabled: false
  # When enabled, pod template annotations include deterministic checksum keys.
  # For chart-owned resources:
  # - database secret checksum is derived automatically from values.database.url.
  # For externally-managed resources:
  # - provide explicit entries with 64-char sha256 hex checksums.
  # - include every externally-managed Secret/ConfigMap that affects pod env or volume inputs.
  #   Required sources include (when configured):
  #   - database.secretRef / database.caSecret
  #   - envFromSecretRefs / env.secrets
  #   - envFromConfigMapRefs / env.config
  #   - agentComms.nats.userSecret
  # Optional namespace lets you track cross-namespace resources.
  secrets: []
  configMaps: []

securityContext: {}
containerSecurityContext: {}

nodeSelector: {}
affinity: {}
tolerations: []

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 6

readinessProbe:
  enabled: true
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 6

startupProbe:
  enabled: false
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 30

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

deploymentLifecycle:
  minReadySeconds: 0
  progressDeadlineSeconds: 600
  revisionHistoryLimit: 10

lifecycle: {}

terminationGracePeriodSeconds: 30

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ''
  annotations: {}

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
  annotations: {}

env:
  extra: []
  secrets: []
  config: []
  vars:
    NODE_ENV: production
    PORT: '8080'
    AGENTS_MIGRATIONS: 'auto'

agentRuntime:
  native:
    rerunOrchestration: ''
    rerunOrchestrationNamespace: ''
    systemImprovementOrchestration: ''
    systemImprovementOrchestrationNamespace: ''

envFromSecretRefs: []
envFromConfigMapRefs: []

controller:
  enabled: true
  leaderElection:
    enabled: true
    leaseName: agents-controller-leader
    leaseNamespace: ''
    leaseDurationSeconds: 30
    renewDeadlineSeconds: 20
    retryPeriodSeconds: 5
  concurrency:
    perNamespace: 10
    perAgent: 5
    cluster: 100
  repoConcurrency:
    enabled: false
    default: 0
    overrides: {}
  queue:
    perNamespace: 200
    perRepo: 50
    cluster: 1000
  rate:
    windowSeconds: 60
    perNamespace: 120
    perRepo: 30
    cluster: 600
  webhook:
    queueSize: 1000
    retry:
      baseDelaySeconds: 1
      maxDelaySeconds: 60
      maxAttempts: 5
  # Default AgentRun retention window (seconds). 30 days when unset.
  agentRunRetentionSeconds: 2592000
  # Maximum terminal AgentRuns to delete per namespace during each resync.
  agentRunRetentionMaxDeletesPerNamespace: 100
  # Safety cap for terminal runs that set ttlSecondsAfterFinished: 0.
  # 0 preserves historical "disable retention" behavior unless the deployment overrides it.
  agentRunRetentionZeroTtlMaxSeconds: 0
  agentRunArtifacts:
    max: 50
    strict: false
  logRetentionSeconds: 604800
  jobTtlSeconds: 600
  jobTtlSecondsAfterFinished: 600
  runtimeDebrisCleanup:
    mode: disabled
    orphanPodRetentionSeconds: 86400
    maxDeletesPerNamespace: 25
  authSecret:
    name: ''
    key: auth.json
    mountPath: /root/.codex
  admissionPolicy:
    labels:
      required: []
      allowed: []
      denied: []
    images:
      allowed: []
      denied: []
    secrets:
      blocked: []
  vcsProviders:
    enabled: true
    deprecatedTokenTypes:
      github:
        - pat
    prRateLimits: {}
  defaultWorkload:
    serviceAccountName: ''
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints: []
    podSecurityContext: {}
    resources: {}
    imagePullSecrets: []
    priorityClassName: ''
    schedulerName: ''

versionControlProvider:
  enabled: false
  name: github
  namespace: ''
  provider: github
  apiBaseUrl: https://api.github.com
  cloneBaseUrl: https://github.com
  webBaseUrl: https://github.com
  cloneProtocol: ''
  sshHost: ''
  sshUser: ''
  auth:
    method: token
    username: ''
    token:
      secretRef:
        name: ''
        key: token
      type: ''
    app:
      appId: ''
      installationId: ''
      privateKeySecretRef:
        name: ''
        key: privateKey
      tokenTtlSeconds: 0
    ssh:
      privateKeySecretRef:
        name: ''
        key: privateKey
      knownHostsConfigMapRef:
        name: ''
        key: known_hosts
  repositoryPolicy:
    allow: []
    deny: []
  capabilities:
    read: true
    write: true
    pullRequests: true
  defaults:
    baseBranch: main
    branchTemplate: codex/{{agentRun.name}}
    commitAuthorName: codex
    commitAuthorEmail: codex@proompt.com
    pullRequest:
      enabled: true
      draft: false
      titleTemplate: 'Codex: {{repository}}'
      bodyTemplate: 'AgentRun: {{agentRun.name}}'

orchestrationController:
  enabled: true
  # Omit namespaces to target the release namespace.

supportingController:
  enabled: true
  # Omit namespaces to target the release namespace.

agentComms:
  enabled: false
  subjects: []
  nats:
    url: ''
    user: ''
    password: ''
    userSecret:
      name: ''
      usernameKey: username
      passwordKey: password

database:
  url: ''
  secretRef:
    name: ''
    key: url
  createSecret:
    enabled: false
    name: ''
    annotations: {}
  caSecret:
    name: ''
    key: ca.crt

extraVolumes: []
extraVolumeMounts: []

logging:
  level: info

podSecurityAdmission:
  enabled: false
  createNamespace: false
  labels: {}

kubernetesApi:
  host: ''
  port: ''

argocdHooks:
  enabled: false
  serviceAccountName: ''
  ttlSecondsAfterFinished: 300
  syncWaves:
    preSync: '-1'
    postSync: '1'
  image:
    repository: alpine/k8s
    tag: 1.30.11
    digest: ''
    pullPolicy: IfNotPresent
  preSync:
    enabled: true
  postSync:
    enabled: true
    waitTimeout: 10m
    cleanup: true
  smoke:
    labelSelector: ''
    agentRun: {}

tests:
  enabled: false
  image:
    repository: curlimages/curl
    tag: 8.11.1
    digest: ''
    pullPolicy: IfNotPresent
  timeoutSeconds: 30
  resources: {}
