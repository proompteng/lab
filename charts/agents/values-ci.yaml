replicaCount: 1

image:
  repository: registry.ide-newton.ts.net/lab/jangar-control-plane
  tag: latest
  digest: ''
  pullPolicy: IfNotPresent

namespaceOverride: agents-ci

grpc:
  enabled: false

# The CI control-plane image should stay on the published registry.ide-newton release image for reliable
# hosted fallback pulls and uses `/health` for readiness to avoid a rollout stall during smoke tests.
readinessProbe:
  path: /health

env:
  vars:
    # CI runs with a fresh Postgres, so we must run migrations to create schema
    # (otherwise controllers will fail to reconcile AgentRuns).
    JANGAR_MIGRATIONS: 'auto'

resources:
  requests:
    cpu: 100m
    memory: 256Mi

controller:
  namespaces:
    - agents-ci
  vcsProviders:
    enabled: false

orchestrationController:
  namespaces:
    - agents-ci

supportingController:
  namespaces:
    - agents-ci

agentComms:
  enabled: false
