replicaCount: 1

image:
  repository: ghcr.io/proompteng/jangar
  tag: latest
  digest: ''
  pullPolicy: IfNotPresent

namespaceOverride: agents-ci

grpc:
  enabled: false

# The CI image should stay on a public registry for reliable pull in hosted CI environments and uses
# `/health` for readiness to avoid a rollout stall during smoke tests.
readinessProbe:
  path: /health

env:
  vars:
    # CI runs with a fresh Postgres, so we must run migrations to create schema
    # (otherwise controllers will fail to reconcile AgentRuns).
    JANGAR_MIGRATIONS: 'auto'

resources:
  requests:
    cpu: 100m
    memory: 256Mi

controller:
  namespaces:
    - agents-ci
  vcsProviders:
    enabled: false

orchestrationController:
  namespaces:
    - agents-ci

supportingController:
  namespaces:
    - agents-ci

agentComms:
  enabled: false
