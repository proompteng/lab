{{- if .Values.linearMcpGateway.enabled -}}
{{- $config := .Values.linearMcpGateway.config -}}
{{- $image := .Values.linearMcpGateway.image | default dict -}}
{{- $controllersImage := .Values.controllers.image | default dict -}}
{{- $repository := $image.repository | default $controllersImage.repository | default .Values.image.repository -}}
{{- $tag := $image.tag | default $controllersImage.tag | default .Values.image.tag -}}
{{- $digest := $image.digest | default $controllersImage.digest | default .Values.image.digest -}}
{{- $pullPolicy := $image.pullPolicy | default $controllersImage.pullPolicy | default .Values.image.pullPolicy -}}
{{- $namespace := .Values.namespaceOverride | default .Release.Namespace -}}
{{- if not .Values.linearMcpGateway.databaseSecret.name -}}
{{- fail "linearMcpGateway.databaseSecret.name is required when the Linear MCP gateway is enabled" -}}
{{- end -}}
{{- if ne $config.namespace $namespace -}}
{{- fail "linearMcpGateway.config.namespace must match the release namespace" -}}
{{- end -}}
{{- if ne $config.runnerServiceAccount .Values.linearMcpGateway.runnerServiceAccount.name -}}
{{- fail "linearMcpGateway.config.runnerServiceAccount must match runnerServiceAccount.name" -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.linearMcpGateway.serviceAccount.name }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.linearMcpGateway.runnerServiceAccount.name }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: codex-linear-runner
    app.kubernetes.io/instance: {{ .Release.Name }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get"]
  - apiGroups: ["agents.proompteng.ai"]
    resources: ["agentruns", "agents", "agentproviders"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
subjects:
  - kind: ServiceAccount
    name: {{ .Values.linearMcpGateway.serviceAccount.name }}
    namespace: {{ $namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
subjects:
  - kind: ServiceAccount
    name: {{ .Values.linearMcpGateway.serviceAccount.name }}
    namespace: {{ $namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.linearMcpGateway.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-linear-mcp-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agents-linear-mcp-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.linearMcpGateway.serviceAccount.name }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      {{- with (.Values.linearMcpGateway.imagePullSecrets | default $controllersImage.pullSecrets) }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: agents-linear-mcp-gateway
              app.kubernetes.io/instance: {{ .Release.Name }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      containers:
        - name: gateway
          image: "{{ $repository }}:{{ $tag }}{{- if $digest }}@{{ $digest }}{{ end }}"
          imagePullPolicy: {{ $pullPolicy }}
          command: ["bun", "run", "src/linear-mcp/index.ts"]
          ports:
            - name: http
              containerPort: {{ $config.port }}
              protocol: TCP
          env:
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
            - name: BUN_INSTALL_CACHE_DIR
              value: /tmp/bun-cache
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.linearMcpGateway.databaseSecret.name }}
                  key: {{ .Values.linearMcpGateway.databaseSecret.key }}
            - name: LINEAR_MCP_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.linearMcpGateway.oauthSecretName }}
                  key: client-id
            - name: LINEAR_MCP_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.linearMcpGateway.oauthSecretName }}
                  key: client-secret
            - name: LINEAR_MCP_ACTOR_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.linearMcpGateway.oauthSecretName }}
                  key: actor-id
            - name: LINEAR_MCP_GATEWAY_PORT
              value: {{ $config.port | quote }}
            - name: LINEAR_MCP_NAMESPACE
              value: {{ $config.namespace | quote }}
            - name: LINEAR_MCP_TOKEN_AUDIENCE
              value: {{ $config.audience | quote }}
            - name: LINEAR_MCP_RUNNER_SERVICE_ACCOUNT
              value: {{ $config.runnerServiceAccount | quote }}
            - name: LINEAR_MCP_AGENT_NAME
              value: {{ $config.agentName | quote }}
            - name: LINEAR_MCP_PROVIDER_NAME
              value: {{ $config.providerName | quote }}
            - name: LINEAR_MCP_TRIGGER_LABEL
              value: {{ $config.triggerLabel | quote }}
            - name: AGENTS_MIGRATIONS
              value: auto
            - name: NODE_ENV
              value: production
          resources:
            {{- toYaml .Values.linearMcpGateway.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agents-linear-mcp-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ $config.port }}
      targetPort: http
      protocol: TCP
{{- if .Values.linearMcpGateway.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
spec:
  minAvailable: {{ .Values.linearMcpGateway.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-linear-mcp-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
{{- if .Values.linearMcpGateway.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: agents-linear-mcp-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              agents.proompteng.ai/provider: codex-linear
      ports:
        - protocol: TCP
          port: {{ $config.port }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: {{ $config.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: agents-db-next
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
{{- if .Values.linearMcpGateway.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "agents.fullname" . }}-linear-mcp-gateway
  namespace: {{ $namespace }}
spec:
  namespaceSelector:
    matchNames: [{{ $namespace | quote }}]
  selector:
    matchLabels:
      app.kubernetes.io/name: agents-linear-mcp-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.linearMcpGateway.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.linearMcpGateway.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
{{- end }}
