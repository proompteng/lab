{{- if and .Values.agentsShell.enabled .Values.agentsShell.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agents.agentsShellName" . }}
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: agents-shell
  {{- with .Values.agentsShell.networkPolicy.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "agents.agentsShellSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.agentsShell.networkPolicy.egress }}
    - Egress
    {{- end }}
  ingress:
    - from:
        {{- range .Values.agentsShell.networkPolicy.ingressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: http
  {{- with .Values.agentsShell.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
