{{- if .Values.tests.enabled }}
{{- $namespace := .Values.namespaceOverride | default .Release.Namespace -}}
{{- $testImage := .Values.tests.image | default dict -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "agents.fullname" . }}-test-connection
  namespace: {{ $namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: "{{ $testImage.repository | default "curlimages/curl" }}:{{ $testImage.tag | default "8.11.1" }}{{- if $testImage.digest }}@{{ $testImage.digest }}{{ end }}"
      imagePullPolicy: {{ $testImage.pullPolicy | default "IfNotPresent" }}
      command:
        - curl
      args:
        - --fail
        - --show-error
        - --silent
        - --connect-timeout
        - {{ .Values.tests.timeoutSeconds | default 30 | quote }}
        - http://{{ include "agents.fullname" . }}.{{ $namespace }}.svc:{{ .Values.service.port }}/health
      {{- with .Values.tests.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
