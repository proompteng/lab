{{- if and .Values.agentsShell.enabled .Values.agentsShell.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.agentsShellName" . }}
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: agents-shell
    {{- with .Values.agentsShell.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.agentsShell.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agentsShell.service.type }}
  ports:
    - port: {{ .Values.agentsShell.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agents.agentsShellSelectorLabels" . | nindent 4 }}
{{- end }}
