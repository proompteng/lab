apiVersion: batch/v1
kind: Job
metadata:
  name: rook-ceph-block-benchmark
  namespace: rook-ceph-benchmarks
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: benchmark
          image: debian:bookworm-slim
          command:
            - /bin/bash
            - -lc
            - |
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends fio python3 ca-certificates
              /scripts/run-rbd-canary.sh /mnt/rbd /results rook-ceph-block
          env:
            - name: DEBIAN_FRONTEND
              value: noninteractive
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
          volumeMounts:
            - name: benchmark-volume
              mountPath: /mnt/rbd
            - name: benchmark-results
              mountPath: /results
            - name: benchmark-scripts
              mountPath: /scripts
      volumes:
        - name: benchmark-volume
          persistentVolumeClaim:
            claimName: rook-ceph-block-bench
        - name: benchmark-results
          emptyDir: {}
        - name: benchmark-scripts
          configMap:
            name: rook-ceph-rbd-canary-scripts
            defaultMode: 0755
