apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: product
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - list:
              elements: &clusters_default
                - cluster: in-cluster
                  suffix: ""
                  destinationServer: https://kubernetes.default.svc
          - list:
              elements: &product_elements
              - name: proompteng
                path: argocd/applications/proompteng
                namespace: proompteng
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "true"
              - name: app
                path: argocd/applications/app
                namespace: app
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "true"
              - name: synthesis
                path: argocd/applications/synthesis
                namespace: synthesis
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: cms
                path: argocd/applications/cms
                namespace: cms
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "false"
              - name: docs
                path: argocd/applications/docs
                namespace: docs
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "true"
              - name: olden
                path: argocd/applications/olden
                namespace: olden
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "true"
              - name: analysis
                path: argocd/applications/analysis
                namespace: analysis
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "true"
              - name: homepage
                path: argocd/applications/homepage
                namespace: homepage
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "false"
              - name: discourse
                path: argocd/applications/discourse
                namespace: discourse
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: manual
                enabled: "false"
              - name: forgejo
                path: argocd/applications/forgejo
                namespace: forgejo
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: manual
                enabled: "true"
              - name: kitty-krew
                path: argocd/applications/kitty-krew
                namespace: kitty-krew
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "false"
                managedNamespaceMetadata:
                  annotations:
                    # Prevent accidental namespace deletion when an app stops managing the Namespace object.
                    argocd.argoproj.io/sync-options: Prune=false
              - name: reviseur
                path: argocd/applications/reviseur
                namespace: reviseur
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "false"
              - name: prt
                path: argocd/applications/prt
                namespace: prt
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "5"
                automation: auto
                enabled: "false"
              - name: ecran
                path: argocd/applications/ecran
                namespace: ecran
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "false"
              - name: eclair
                path: argocd/applications/eclair
                namespace: eclair
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "false"
              - name: jangar
                path: argocd/applications/jangar
                namespace: jangar
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: agents
                path: argocd/applications/agents
                namespace: agents
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: agents-ci
                path: argocd/applications/agents-ci
                namespace: agents-ci
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: bumba
                path: argocd/applications/bumba
                namespace: jangar
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: symphony
                path: argocd/applications/symphony
                namespace: jangar
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: symphony-jangar
                path: argocd/applications/symphony-jangar
                namespace: jangar
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: symphony-torghut
                path: argocd/applications/symphony-torghut
                namespace: torghut
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: oirat
                path: argocd/applications/oirat
                namespace: oirat
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: manual
                enabled: "true"
              - name: khoshut
                path: argocd/applications/khoshut
                namespace: khoshut
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "false"
              - name: galette
                path: argocd/applications/galette
                namespace: galette
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "false"
              - name: facteur
                path: argocd/applications/facteur
                namespace: facteur
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                ignoreDifferences:
                  - group: serving.knative.dev
                    kind: Service
                    jsonPointers:
                      - /metadata/annotations
                      - /metadata/labels
                      - /spec/traffic
                      - /spec/template/metadata/annotations
                      - /spec/template/metadata/creationTimestamp
                      - /spec/template/metadata/labels
                      - /spec/template/spec/containers/0/ports/0/protocol
                      - /spec/template/spec/containers/0/readinessProbe
                      - /spec/template/spec/enableServiceLinks
                automation: manual
                enabled: "false"
              - name: golink
                path: argocd/applications/golink
                namespace: golink
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                ignoreDifferences:
                  - group: serving.knative.dev
                    kind: Service
                    jsonPointers:
                      - /metadata/annotations
                      - /metadata/labels
                      - /spec/traffic
                      - /spec/template/metadata/annotations
                      - /spec/template/metadata/creationTimestamp
                      - /spec/template/metadata/labels
                      - /spec/template/spec/containers/0/ports/0/protocol
                      - /spec/template/spec/containers/0/readinessProbe
                      - /spec/template/spec/enableServiceLinks
                automation: manual
                enabled: "false"
              - name: sag
                path: argocd/sag
                namespace: sag
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: manual
                enabled: "true"
              - name: torghut
                path: argocd/applications/torghut
                namespace: torghut
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                # Torghut needs a custom sync policy because RespectIgnoreDifferences can block
                # nested Knative Service env updates from applying. Keep the app on SSA so Argo
                # does not rely on brittle client-side apply metadata for large Knative and
                # WorkflowTemplate updates.
                syncOptions:
                  - CreateNamespace=true
                  - ServerSideApply=true
                  - ApplyOutOfSyncOnly=true
                  - PruneLast=true
                  - ClientSideApplyMigration=false
                managedNamespaceMetadata:
                  labels:
                    pod-security.kubernetes.io/enforce: privileged
                    pod-security.kubernetes.io/audit: privileged
                    pod-security.kubernetes.io/warn: privileged
                  annotations:
                    argocd.argoproj.io/sync-options: Prune=false
                ignoreDifferences:
                  - group: serving.knative.dev
                    kind: Service
                    jsonPointers:
                      # Keep metadata ignores granular; ignoring /spec/template/metadata can block SSA reconciliation.
                      - /metadata/annotations
                      - /metadata/labels
                      - /spec/traffic
                      - /spec/template/metadata/annotations
                      - /spec/template/metadata/creationTimestamp
                      - /spec/template/metadata/labels
                      - /spec/template/spec/containers/0/ports/0/protocol
                      - /spec/template/spec/containers/0/readinessProbe
                      - /spec/template/spec/enableServiceLinks
                  - group: serving.knative.dev
                    kind: Service
                    namespace: torghut
                    name: torghut-sim
                    # Historical simulations patch run-scoped DB/topic/clock env on torghut-sim.
                    # Keep those isolated, but let Git-tracked service env changes reconcile normally.
                    jqPathExpressions:
                      - >-
                        .spec.template.spec.containers[0].env[] | select(
                        .name == "DB_DSN" or
                        .name == "TA_CLICKHOUSE_PASSWORD" or
                        .name == "TA_CLICKHOUSE_URL" or
                        .name == "TA_CLICKHOUSE_USERNAME" or
                        .name == "TRADING_ACCOUNT_LABEL" or
                        .name == "TRADING_ENABLED" or
                        .name == "TRADING_FEATURE_FLAGS_ENABLED" or
                        .name == "TRADING_FEATURE_MAX_DUPLICATE_RATIO" or
                        .name == "TRADING_FEATURE_MAX_REQUIRED_NULL_RATE" or
                        .name == "TRADING_FEATURE_MAX_STALENESS_MS" or
                        .name == "TRADING_FEATURE_QUALITY_ENABLED" or
                        .name == "TRADING_MODE" or
                        .name == "TRADING_ORDER_FEED_BOOTSTRAP_SERVERS" or
                        .name == "TRADING_ORDER_FEED_ENABLED" or
                        .name == "TRADING_ORDER_FEED_GROUP_ID" or
                        .name == "TRADING_ORDER_FEED_SASL_MECHANISM" or
                        .name == "TRADING_ORDER_FEED_SASL_PASSWORD" or
                        .name == "TRADING_ORDER_FEED_SASL_USERNAME" or
                        .name == "TRADING_ORDER_FEED_SECURITY_PROTOCOL" or
                        .name == "TRADING_ORDER_FEED_TOPIC" or
                        .name == "TRADING_ORDER_FEED_TOPIC_V2" or
                        .name == "TRADING_ORDER_FEED_AUTO_OFFSET_RESET" or
                        .name == "TRADING_PRICE_TABLE" or
                        .name == "TRADING_SIGNAL_ALLOWED_SOURCES" or
                        .name == "TRADING_SIGNAL_LOOKBACK_MINUTES" or
                        .name == "TRADING_SIGNAL_TABLE" or
                        .name == "TRADING_SIMULATION_CLOCK_MODE" or
                        .name == "TRADING_SIMULATION_DATASET_ID" or
                        .name == "TRADING_SIMULATION_ENABLED" or
                        .name == "TRADING_SIMULATION_FETCH_WINDOW_SECONDS" or
                        .name == "TRADING_SIMULATION_ORDER_UPDATES_BOOTSTRAP_SERVERS" or
                        .name == "TRADING_SIMULATION_ORDER_UPDATES_SASL_MECHANISM" or
                        .name == "TRADING_SIMULATION_ORDER_UPDATES_SASL_PASSWORD" or
                        .name == "TRADING_SIMULATION_ORDER_UPDATES_SASL_USERNAME" or
                        .name == "TRADING_SIMULATION_ORDER_UPDATES_SECURITY_PROTOCOL" or
                        .name == "TRADING_SIMULATION_ORDER_UPDATES_TOPIC" or
                        .name == "TRADING_SIMULATION_RUN_ID" or
                        .name == "TRADING_SIMULATION_WINDOW_END" or
                        .name == "TRADING_SIMULATION_WINDOW_START" or
                        .name == "TRADING_STRATEGY_RUNTIME_MODE" or
                        .name == "TRADING_STRATEGY_SCHEDULER_ENABLED")
                  - group: ""
                    kind: ConfigMap
                    namespace: torghut
                    name: torghut-ta-sim-config
                    jsonPointers:
                      - /data
                  - group: flink.apache.org
                    kind: FlinkDeployment
                    namespace: torghut
                    name: torghut-ta-sim
                    jsonPointers:
                      - /spec/job/state
                      - /spec/job/upgradeMode
                automation: auto
                enabled: "true"
              - name: torghut-options
                path: argocd/applications/torghut-options
                namespace: torghut
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "7"
                automation: auto
                enabled: "true"
              - name: bilig
                path: argocd/applications/bilig
                namespace: bilig
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "true"
              - name: posthog
                path: argocd/applications/posthog
                namespace: posthog
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: manual
                enabled: "true"
              - name: miel
                path: argocd/applications/miel
                namespace: miel
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: auto
                enabled: "false"
              - name: dernier
                path: argocd/applications/dernier
                namespace: dernier
                renderWithLovely: false
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                automation: manual
                enabled: "false"
              - name: froussard
                path: argocd/applications/froussard
                namespace: froussard
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                ignoreDifferences:
                  - group: serving.knative.dev
                    kind: Service
                    jsonPointers:
                      - /metadata/annotations
                      - /metadata/labels
                      - /spec/traffic
                      - /spec/template/metadata/annotations
                      - /spec/template/metadata/creationTimestamp
                      - /spec/template/metadata/labels
                      - /spec/template/spec/containers/0/ports/0/protocol
                      - /spec/template/spec/containers/0/resources
                automation: manual
                enabled: "true"
              - name: reestr
                path: argocd/applications/reestr
                namespace: registry
                annotations:
                  argocd.argoproj.io/sync-wave: "6"
                ignoreDifferences:
                  - group: serving.knative.dev
                    kind: Service
                    jsonPointers:
                      - /metadata/annotations
                      - /metadata/labels
                      - /spec/traffic
                      - /spec/template/metadata/annotations
                      - /spec/template/metadata/creationTimestamp
                      - /spec/template/metadata/labels
                      - /spec/template/spec/containers/0/ports/0/protocol
                      - /spec/template/spec/containers/0/readinessProbe
                      - /spec/template/spec/containers/0/resources
                      - /spec/template/spec/enableServiceLinks
                automation: manual
                enabled: "false"
            selector:
              matchExpressions:
                - key: enabled
                  operator: NotIn
                  values: ["false", "False", "0"]
  template:
    metadata:
      name: "{{ .name }}{{ .suffix }}"
    spec:
      project: '{{ if hasKey . "project" }}{{ .project }}{{ else }}default{{ end }}'
      destination:
        namespace: '{{ if hasKey . "namespace" }}{{ .namespace }}{{ else }}{{ .name }}{{ end }}'
      source:
        repoURL: https://github.com/proompteng/lab.git
        targetRevision: main
        path: "{{ .path }}"
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - ApplyOutOfSyncOnly=true
          - PruneLast=true
          - ClientSideApplyMigration=false
  templatePatch: |
    {{- if .annotations }}
    metadata:
      annotations:
    {{- range $key, $value := .annotations }}
        {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- $hasDestServer := hasKey . "destinationServer" -}}
    {{- $hasDestName := hasKey . "destinationName" -}}
    {{- $useLovely := or (not (hasKey . "renderWithLovely")) .renderWithLovely -}}
    {{- $auto := eq .automation "auto" -}}
    {{- $hasSyncOptions := hasKey . "syncOptions" -}}
    {{- $hasManagedNS := hasKey . "managedNamespaceMetadata" -}}
    {{- $needsSpec := or $hasDestServer $hasDestName $useLovely $auto $hasSyncOptions $hasManagedNS (hasKey . "ignoreDifferences") -}}
    {{- if $needsSpec }}
    spec:
    {{- if or $hasDestServer $hasDestName }}
      destination:
        namespace: '{{ if hasKey . "namespace" }}{{ .namespace }}{{ else }}{{ .name }}{{ end }}'
      {{- if $hasDestServer }}
        server: '{{ .destinationServer }}'
      {{- end }}
      {{- if $hasDestName }}
        name: '{{ .destinationName }}'
      {{- end }}
    {{- end }}
    {{- if $useLovely }}
      source:
        plugin:
          name: lovely
    {{- end }}
    {{- if or $auto $hasSyncOptions $hasManagedNS }}
      syncPolicy:
      {{- if $hasSyncOptions }}
        syncOptions: {{ toJson .syncOptions }}
      {{- end }}
      {{- if $auto }}
        automated:
          enabled: true
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
          refresh: true
      {{- end }}
      {{- if $hasManagedNS }}
        managedNamespaceMetadata:
        {{- if hasKey .managedNamespaceMetadata "labels" }}
          labels:
          {{- range $key, $value := .managedNamespaceMetadata.labels }}
            {{ $key }}: {{ $value | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey .managedNamespaceMetadata "annotations" }}
          annotations:
          {{- range $key, $value := .managedNamespaceMetadata.annotations }}
            {{ $key }}: {{ $value | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- if hasKey . "ignoreDifferences" }}
      ignoreDifferences: {{ toJson .ignoreDifferences }}
    {{- end }}
    {{- end }}
