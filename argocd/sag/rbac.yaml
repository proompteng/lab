apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sag-agentrun-operator
  labels:
    app.kubernetes.io/name: sag
    app.kubernetes.io/part-of: lab
rules:
  - apiGroups:
      - agents.proompteng.ai
    resources:
      - agents
      - agentruns
    verbs:
      - get
      - list
      - watch
      - create
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sag-agentrun-operator
  labels:
    app.kubernetes.io/name: sag
    app.kubernetes.io/part-of: lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sag-agentrun-operator
subjects:
  - kind: ServiceAccount
    name: sag
    namespace: sag
