apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headlamp-auth-bridge-private
  namespace: headlamp
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`headlamp.k8s.proompteng.ai`) && PathPrefix(`/auth`)
      priority: 20
      services:
        - name: headlamp-auth-bridge
          port: 8080
    - kind: Rule
      match: Host(`headlamp.k8s.proompteng.ai`) && PathPrefix(`/clusters`)
      priority: 19
      services:
        - name: headlamp-auth-bridge
          port: 8080
  tls:
    secretName: wildcard-k8s-proompteng-ai-tls
