apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: headlamp
resources:
  - headlamp-auth-bridge-configmap.yaml
  - headlamp-auth-bridge-deployment.yaml
  - headlamp-auth-bridge-service.yaml
  - headlamp-oidc-rbac.yaml
  - headlamp-oidc-sealedsecret.yaml
  - ingressroute-headlamp-auth-bridge-k8s-private.yaml
  - ingressroute-headlamp-k8s-private.yaml
patches:
  - path: patch-headlamp-tailscale-ingress-auth-bridge.yaml
helmCharts:
  - name: headlamp
    repo: https://kubernetes-sigs.github.io/headlamp
    version: 0.40.0
    releaseName: headlamp
    namespace: headlamp
    valuesFile: values.yaml
