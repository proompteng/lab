apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp-auth-bridge
  namespace: headlamp
  labels:
    app.kubernetes.io/name: headlamp-auth-bridge
    app.kubernetes.io/part-of: headlamp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headlamp-auth-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headlamp-auth-bridge
        app.kubernetes.io/part-of: headlamp
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: auth-bridge
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -B
            - /app/server.py
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: app
              mountPath: /app/auth.html
              subPath: auth.html
              readOnly: true
            - name: app
              mountPath: /app/server.py
              subPath: server.py
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: headlamp-auth-bridge
            items:
              - key: auth.html
                path: auth.html
              - key: server.py
                path: server.py
