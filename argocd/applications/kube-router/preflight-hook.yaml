apiVersion: batch/v1
kind: Job
metadata:
  name: kube-router-policy-preflight
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-2"
spec:
  activeDeadlineSeconds: 120
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-router
        app.kubernetes.io/component: policy-preflight
    spec:
      serviceAccountName: kube-router-policy-preflight
      automountServiceAccountToken: true
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: verify-policy-safety
          image: docker.io/bitnami/kubectl@sha256:a67b11e95e953f550f020a41970185ccc5f83d78b86b8c575d02c904aa0f9cd7
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
          command:
            - /bin/bash
            - -ec
          args:
            - |
              set -o pipefail
              expected_namespaces=$(
                printf '%s\n' agents argocd bayn bilig hermes kafka media pgadmin synthesis torghut | sort -u
              )
              actual_namespaces=$(
                kubectl get networkpolicies.networking.k8s.io --all-namespaces -o json |
                  jq -r '.items[].metadata.namespace' |
                  sort -u
              )

              if [[ "$actual_namespaces" != "$expected_namespaces" ]]; then
                echo 'NetworkPolicy namespace coverage changed; refusing to activate kube-router.' >&2
                diff -u <(printf '%s\n' "$expected_namespaces") <(printf '%s\n' "$actual_namespaces") >&2 || true
                exit 1
              fi

              while IFS= read -r namespace; do
                case "$namespace" in
                bayn)
                  kubectl -n "$namespace" get networkpolicy kube-router-rollout-allow-all -o json |
                    jq -e '
                      .spec.podSelector.matchLabels == {
                        "network-policy.proompteng.ai/retired-rollout-policy": "bayn"
                      } and
                      (.spec.policyTypes | sort) == ["Egress", "Ingress"] and
                      (.spec | has("ingress") | not) and
                      (.spec | has("egress") | not)
                    ' >/dev/null
                  ;;
                hermes)
                  expected_hermes_policy_hash=c2379b52d6bc1982f8f11650fed320afe30c3bdcbd7afb4a844cca5059812d1c
                  actual_hermes_policy_hash=$(
                    kubectl -n "$namespace" get networkpolicies.networking.k8s.io -o json |
                      jq -cS '[.items[] | {name: .metadata.name, spec: .spec}] | sort_by(.name)' |
                      sha256sum |
                      cut -d ' ' -f1
                  )
                  if [[ "$actual_hermes_policy_hash" != "$expected_hermes_policy_hash" ]]; then
                    echo 'Hermes NetworkPolicies differ from the exact reviewed policy set.' >&2
                    exit 1
                  fi
                  ;;
                *)
                  kubectl -n "$namespace" get networkpolicy kube-router-rollout-allow-all -o json |
                    jq -e '
                      .spec.podSelector == {} and
                      (.spec.policyTypes | sort) == ["Egress", "Ingress"] and
                      .spec.ingress == [{}] and
                      .spec.egress == [{}]
                    ' >/dev/null
                  ;;
                esac
              done <<< "$expected_namespaces"

              kubectl -n bayn get pods -l 'network-policy.proompteng.ai/retired-rollout-policy=bayn' -o json |
                jq -e '.items | length == 0' >/dev/null

              echo 'All existing NetworkPolicy namespaces have an approved rollout policy state.'
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
