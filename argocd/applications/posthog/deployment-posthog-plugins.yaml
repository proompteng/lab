# Keep this in sync with `plugins-async-deployment.yaml`
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-plugins
  labels:
    "app.kubernetes.io/name": "posthog"
    "app.kubernetes.io/instance": "posthog"
  annotations:
spec:
  selector:
    matchLabels:
        app: posthog
        release: "posthog"
        role: plugins
  replicas: 1
  template:
    metadata:
      annotations:
        checksum/secrets.yaml: 3867c1c42636d72f5b521cd41f6720e8534295c03d52d638e50772be1b0c30a3
      labels:
        app: posthog
        release: "posthog"
        role: plugins
    spec:
      serviceAccountName: posthog
      containers:
      - name: posthog-plugins
        image: "posthog/posthog:release-1.43.1"
        imagePullPolicy: IfNotPresent
        command:
          - ./bin/plugin-server
          - --no-restart-loop
        ports:
        # Expose the port on which the healtchheck endpoint listens
        - containerPort: 6738
        env:
        # Kafka env variables
        
        # Used by PostHog/plugin-server. There is no specific reason for the difference. Expected format: comma-separated list of "host:port"
        - name: KAFKA_HOSTS
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"
        # Used by PostHog/web. There is no specific reason for the difference. Expected format: comma-separated list of "kafka://host:port"
        - name: KAFKA_URL
          value: "kafka://kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"

        # Object Storage env variables
        
        
        

        # Redis env variables
        
        
        - name: POSTHOG_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        
        - name: POSTHOG_REDIS_PORT
          value: "6379"

        # statsd env variables
        

        - name: SITE_URL
          value: "http://127.0.0.1:8000"
        - name: SENTRY_DSN
          value: 
        - name: DEPLOYMENT
          value: self_managed        
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog
              key: posthog-secret
        
        - name: POSTHOG_POSTGRES_HOST
          value: posthog-db-pooler
        - name: POSTHOG_POSTGRES_PORT
          value: "5432"
        - name: POSTHOG_DB_USER
          value: "posthog"
        - name: POSTHOG_DB_NAME
          value: "posthog"
        - name: POSTHOG_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-db-app"
              key: "postgresql-password"
        - name: USING_PGBOUNCER
          value: 'true'
        - name: CLICKHOUSE_HOST
          value: "posthog-clickhouse.posthog.svc.cluster.local"
        - name: CLICKHOUSE_CLUSTER
          value: "default"
        - name: CLICKHOUSE_DATABASE
          value: "default"
        - name: CLICKHOUSE_USER
          value: "posthog"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-clickhouse-auth"
              key: "password"
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        - name: CAPTURE_INTERNAL_METRICS
          value: "true"
        livenessProbe:
          exec:
            command:
              # Just check that we can at least exec to the container
              - "true"
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /_health
            port: 6738
            scheme: HTTP
          initialDelaySeconds: 50
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        resources:
            {}
      initContainers:        
        - name: wait-for-service-dependencies
          image: busybox:1.34
          env:
            - name: CLICKHOUSE_HOST
              value: "posthog-clickhouse.posthog.svc.cluster.local"
            - name: CLICKHOUSE_CLUSTER
              value: "default"
            - name: CLICKHOUSE_DATABASE
              value: "default"
            - name: CLICKHOUSE_USER
              value: "posthog"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "posthog-clickhouse-auth"
                  key: "password"
            - name: CLICKHOUSE_SECURE
              value: "false"
            - name: CLICKHOUSE_VERIFY
              value: "false"
          command:
            - /bin/sh
            - -c
            - >
                
        
                until (nc -vz "posthog-db-pooler.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local" 5432);
                do
                    echo "waiting for Postgres pooler"; sleep 1;
                done
        
                
        
                
        
                        
        - name: wait-for-migrations
          image: "posthog/posthog:release-1.43.1"
          command:
            - /bin/sh
            - -c
            - >
                until (python manage.py migrate --check);
                do
                    echo "Waiting for database migrations to be completed"; sleep 1;
                done
          env:
        
          # PostgreSQL configuration
          
          - name: POSTHOG_POSTGRES_HOST
            value: posthog-db-pooler
          - name: POSTHOG_POSTGRES_PORT
            value: "5432"
          - name: POSTHOG_DB_USER
            value: "posthog"
          - name: POSTHOG_DB_NAME
            value: "posthog"
          - name: POSTHOG_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "posthog-db-app"
                key: "postgresql-password"
          - name: USING_PGBOUNCER
            value: 'true'
        
          # Redis env variables  
          
          - name: POSTHOG_REDIS_HOST
            value: posthog-redis.posthog.svc.cluster.local
          
          - name: POSTHOG_REDIS_PORT
            value: "6379"
        
          # ClickHouse env variables
          - name: CLICKHOUSE_HOST
            value: "posthog-clickhouse.posthog.svc.cluster.local"
          - name: CLICKHOUSE_CLUSTER
            value: "default"
          - name: CLICKHOUSE_DATABASE
            value: "default"
          - name: CLICKHOUSE_USER
            value: "posthog"
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "posthog-clickhouse-auth"
                key: "password"
          - name: CLICKHOUSE_SECURE
            value: "false"
          - name: CLICKHOUSE_VERIFY
            value: "false"
        
          # PostHog app settings
          
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: posthog
                key: posthog-secret
