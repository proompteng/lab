# Keep this in sync with `plugins-async-deployment.yaml`
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-plugins
  labels:
    "app.kubernetes.io/name": "posthog"
    "app.kubernetes.io/instance": "posthog"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    matchLabels:
        app: posthog
        release: "posthog"
        role: plugins
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
      maxSurge: 0
  template:
    metadata:
      annotations:
        checksum/secrets.yaml: 3867c1c42636d72f5b521cd41f6720e8534295c03d52d638e50772be1b0c30a3
      labels:
        app: posthog
        release: "posthog"
        role: plugins
    spec:
      serviceAccountName: posthog
      containers:
      - name: posthog-plugins
        image: "posthog/posthog-node:bf60774b71961a8674ca24ed1bd42bed4d670f72"
        imagePullPolicy: IfNotPresent
        command:
          - node
          - nodejs/dist/index.js
        ports:
        # Expose the port on which the healtchheck endpoint listens
        - containerPort: 6738
        env:
        # Kafka env variables
        
        # Used by PostHog/plugin-server. There is no specific reason for the difference. Expected format: comma-separated list of "host:port"
        - name: KAFKA_HOSTS
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_PRODUCER_METADATA_BROKER_LIST
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_CONSUMER_METADATA_BROKER_LIST
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_CDP_PRODUCER_METADATA_BROKER_LIST
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_WARPSTREAM_PRODUCER_METADATA_BROKER_LIST
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_METRICS_PRODUCER_METADATA_BROKER_LIST
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_WAREHOUSE_PRODUCER_METADATA_BROKER_LIST
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        # Used by PostHog/web. There is no specific reason for the difference. Expected format: comma-separated list of "kafka://host:port"
        - name: KAFKA_URL
          value: "kafka://kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_SECURITY_PROTOCOL
          value: "SASL_PLAINTEXT"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_SASL_USER
          value: "posthog-kafka"
        - name: KAFKA_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: KAFKA_PRODUCER_SECURITY_PROTOCOL
          value: "sasl_plaintext"
        - name: KAFKA_PRODUCER_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_PRODUCER_SASL_USERNAME
          value: "posthog-kafka"
        - name: KAFKA_PRODUCER_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: KAFKA_CONSUMER_SECURITY_PROTOCOL
          value: "sasl_plaintext"
        - name: KAFKA_CONSUMER_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_CONSUMER_SASL_USERNAME
          value: "posthog-kafka"
        - name: KAFKA_CONSUMER_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: KAFKA_CDP_PRODUCER_SECURITY_PROTOCOL
          value: "sasl_plaintext"
        - name: KAFKA_CDP_PRODUCER_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_CDP_PRODUCER_SASL_USERNAME
          value: "posthog-kafka"
        - name: KAFKA_CDP_PRODUCER_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: KAFKA_METRICS_PRODUCER_SECURITY_PROTOCOL
          value: "sasl_plaintext"
        - name: KAFKA_METRICS_PRODUCER_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_METRICS_PRODUCER_SASL_USERNAME
          value: "posthog-kafka"
        - name: KAFKA_METRICS_PRODUCER_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: KAFKA_WAREHOUSE_PRODUCER_SECURITY_PROTOCOL
          value: "sasl_plaintext"
        - name: KAFKA_WAREHOUSE_PRODUCER_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_WAREHOUSE_PRODUCER_SASL_USERNAME
          value: "posthog-kafka"
        - name: KAFKA_WAREHOUSE_PRODUCER_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: KAFKA_WARPSTREAM_PRODUCER_SECURITY_PROTOCOL
          value: "sasl_plaintext"
        - name: KAFKA_WARPSTREAM_PRODUCER_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_WARPSTREAM_PRODUCER_SASL_USERNAME
          value: "posthog-kafka"
        - name: KAFKA_WARPSTREAM_PRODUCER_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password
        - name: CONSUMER_AUTO_CREATE_TOPICS
          value: "false"

        # Object Storage env variables
        
        
        

        # Redis env variables
        
        
        - name: POSTHOG_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        
        - name: POSTHOG_REDIS_PORT
          value: "6379"
        - name: REDIS_URL
          value: "redis://posthog-redis.posthog.svc.cluster.local:6379/"
        - name: CDP_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        - name: CDP_REDIS_PORT
          value: "6379"
        - name: LOGS_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        - name: LOGS_REDIS_PORT
          value: "6379"
        - name: LOGS_REDIS_TLS
          value: "false"
        - name: COOKIELESS_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        - name: COOKIELESS_REDIS_PORT
          value: "6379"
        - name: SESSION_RECORDING_API_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        - name: SESSION_RECORDING_API_REDIS_PORT
          value: "6379"

        # statsd env variables
        

        - name: SITE_URL
          value: "https://posthog.proompteng.ai"
        - name: SENTRY_DSN
          value: 
        - name: DEPLOYMENT
          value: self_managed
        - name: PLUGIN_SERVER_MODE
          value: ingestion-v2
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog
              key: posthog-secret
        - name: ENCRYPTION_SALT_KEYS
          valueFrom:
            secretKeyRef:
              name: posthog
              key: encryption-salt-keys
        
        - name: POSTHOG_POSTGRES_HOST
          value: posthog-db-pooler
        - name: POSTHOG_POSTGRES_PORT
          value: "5432"
        - name: POSTHOG_DB_USER
          value: "posthog"
        - name: POSTHOG_DB_NAME
          value: "posthog"
        - name: POSTHOG_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-db-app"
              key: "password"
        - name: USING_PGBOUNCER
          value: 'true'
        - name: SKIP_SERVICE_VERSION_REQUIREMENTS
          value: '1'
        - name: CLICKHOUSE_HOST
          value: "posthog-clickhouse.posthog.svc.cluster.local"
        - name: CLICKHOUSE_CLUSTER
          value: "default"
        - name: CLICKHOUSE_DATABASE
          value: "default"
        - name: CLICKHOUSE_USER
          value: "posthog"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-clickhouse-auth"
              key: "password"
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        - name: CAPTURE_INTERNAL_METRICS
          value: "true"
        livenessProbe:
          exec:
            command:
              # Just check that we can at least exec to the container
              - "true"
          failureThreshold: 3
          initialDelaySeconds: 10
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 2
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /_health
            port: 6738
            scheme: HTTP
          initialDelaySeconds: 50
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 5
        resources:
            {}
      initContainers:        
        - name: wait-for-service-dependencies
          image: "posthog/posthog:7a6ab0d30c88a981a45491ac35f2b02d09d56c0f"
          env:
            - name: POSTHOG_POSTGRES_HOST
              value: posthog-db-pooler
            - name: POSTHOG_POSTGRES_PORT
              value: "5432"
            - name: CLICKHOUSE_HOST
              value: "posthog-clickhouse.posthog.svc.cluster.local"
            - name: CLICKHOUSE_PORT
              value: "8123"
          command:
            - /bin/sh
            - -c
            - |
                until python -c 'import os, socket, sys; s=socket.socket(); s.settimeout(2); c=s.connect_ex((os.environ["POSTHOG_POSTGRES_HOST"], int(os.environ["POSTHOG_POSTGRES_PORT"]))); s.close(); sys.exit(c)';
                do
                  echo "waiting for Postgres pooler";
                  sleep 1;
                done
                until python -c 'import os, socket, sys; s=socket.socket(); s.settimeout(2); c=s.connect_ex((os.environ["CLICKHOUSE_HOST"], int(os.environ["CLICKHOUSE_PORT"]))); s.close(); sys.exit(c)';
                do
                  echo "waiting for ClickHouse";
                  sleep 1;
                done
        
                        
        - name: wait-for-migrations
          image: "posthog/posthog:7a6ab0d30c88a981a45491ac35f2b02d09d56c0f"
          command:
            - /bin/sh
            - -c
            - |
                until python -c 'import os, socket, sys; s=socket.socket(); s.settimeout(2); c=s.connect_ex((os.environ["CLICKHOUSE_HOST"], 8123)); s.close(); sys.exit(c)';
                do
                    echo "Waiting for clickhouse service readiness"; sleep 1;
                done

                until (python manage.py migrate --check);
                do
                    echo "Waiting for database migrations to be completed"; sleep 1;
                done

                until (python manage.py migrate_clickhouse --check);
                do
                    echo "Waiting for clickhouse migrations to be completed"; sleep 1;
                done
          env:
        
          # PostgreSQL configuration
          
          - name: POSTHOG_POSTGRES_HOST
            value: posthog-db-pooler
          - name: POSTHOG_POSTGRES_PORT
            value: "5432"
          - name: POSTHOG_DB_USER
            value: "posthog"
          - name: POSTHOG_DB_NAME
            value: "posthog"
          - name: POSTHOG_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "posthog-db-app"
                key: "password"
          - name: USING_PGBOUNCER
            value: 'true'
          - name: SKIP_SERVICE_VERSION_REQUIREMENTS
            value: '1'
        
          # Redis env variables  
          
          - name: POSTHOG_REDIS_HOST
            value: posthog-redis.posthog.svc.cluster.local
          
          - name: POSTHOG_REDIS_PORT
            value: "6379"
        
          # ClickHouse env variables
          - name: CLICKHOUSE_HOST
            value: "posthog-clickhouse.posthog.svc.cluster.local"
          - name: CLICKHOUSE_CLUSTER
            value: "default"
          - name: CLICKHOUSE_DATABASE
            value: "default"
          - name: CLICKHOUSE_USER
            value: "posthog"
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "posthog-clickhouse-auth"
                key: "password"
          - name: CLICKHOUSE_SECURE
            value: "false"
          - name: CLICKHOUSE_VERIFY
            value: "false"
        
          # PostHog app settings
          
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: posthog
                key: posthog-secret
