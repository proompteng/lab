apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: posthog-db-pooler
  namespace: posthog
spec:
  cluster:
    name: posthog-db
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
    pg_hba:
      - "host all all 0.0.0.0/0 scram-sha-256"
      - "host all all ::/0 scram-sha-256"
    parameters:
      default_pool_size: "20"
      max_client_conn: "1000"
