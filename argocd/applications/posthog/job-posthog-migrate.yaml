apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-migrate
  generateName: posthog-migrate-
  labels:
    "app.kubernetes.io/name": "posthog"
    "app.kubernetes.io/instance": "posthog"
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 5
  template:
    metadata:
      annotations:
        checksum/secrets.yaml: f419c0eca4937c746dd2c8a35e325c8a1f4558fc3956e8b05c1984e982e2f58c
      labels:
        app: posthog
        release: "posthog"
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      restartPolicy: Never
      containers:
      - name: migrate-job
        image: "posthog/posthog:7a6ab0d30c88a981a45491ac35f2b02d09d56c0f"
        command:
          - /bin/sh
          - -c
          - |
              set -e
              python manage.py notify_helm_install || true
              python - <<'PY'
              import os
              from clickhouse_driver import Client

              client = Client(
                  host=os.environ['CLICKHOUSE_HOST'],
                  user=os.environ['CLICKHOUSE_USER'],
                  password=os.environ['CLICKHOUSE_PASSWORD'],
              )
              client.execute(
                  'CREATE VIEW IF NOT EXISTS system.crash_log AS '
                  'SELECT event_date FROM system.error_log'
              )
              PY
              ./bin/migrate

        env:
        # Kafka env variables        
        # Used by PostHog/plugin-server. There is no specific reason for the difference. Expected format: comma-separated list of "host:port"
        - name: KAFKA_HOSTS
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        # Used by PostHog/web. There is no specific reason for the difference. Expected format: comma-separated list of "kafka://host:port"
        - name: KAFKA_URL
          value: "kafka://kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: KAFKA_SECURITY_PROTOCOL
          value: "SASL_PLAINTEXT"
        - name: KAFKA_SASL_MECHANISM
          value: "SCRAM-SHA-512"
        - name: KAFKA_SASL_USER
          value: "posthog-kafka"
        - name: KAFKA_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog-kafka
              key: password

        # Object Storage env variables        
        
        

        # Redis env variables        
        
        - name: POSTHOG_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        
        - name: POSTHOG_REDIS_PORT
          value: "6379"

        - name: SENTRY_DSN
          value: 
        - name: SITE_URL
          value: "https://posthog.proompteng.ai"
        - name: DEPLOYMENT
          value: self_managed
        # PostHog app settings        
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog
              key: posthog-secret
        - name: PRIMARY_DB
          value: clickhouse
        
        # Connect directly to postgres (without pgbouncer) to avoid statement_timeout for longer-running queries
        - name: POSTHOG_POSTGRES_HOST
          value: "posthog-db-rw.posthog.svc.cluster.local"
        - name: POSTHOG_POSTGRES_PORT
          value: "5432"
        - name: POSTHOG_DB_USER
          value: "posthog"
        - name: POSTHOG_DB_NAME
          value: "posthog"
        - name: POSTHOG_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-db-app"
              key: "password"
        - name: USING_PGBOUNCER
          value: 'false'
        - name: SKIP_SERVICE_VERSION_REQUIREMENTS
          value: '1'
        - name: CLICKHOUSE_HOST
          value: "posthog-clickhouse.posthog.svc.cluster.local"
        - name: CLICKHOUSE_CLUSTER
          value: "default"
        - name: CLICKHOUSE_MIGRATIONS_CLUSTER
          value: "default"
        - name: CLICKHOUSE_DATABASE
          value: "default"
        - name: CLICKHOUSE_USER
          value: "posthog"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-clickhouse-auth"
              key: "password"
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        
        - name: EMAIL_HOST
          value: ""
        - name: EMAIL_PORT
          value: ""
        - name: EMAIL_HOST_USER
          value: ""
        - name: EMAIL_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog
              key: "smtp-password"
        - name: EMAIL_USE_TLS
          value: "true"
        - name: EMAIL_USE_SSL
          value: "false"
        - name: DEFAULT_FROM_EMAIL
          value: 
        - name: CAPTURE_INTERNAL_METRICS
          value: "true"
        resources:
          {}
      initContainers:
        - name: wait-for-service-dependencies
          image: "posthog/posthog:7a6ab0d30c88a981a45491ac35f2b02d09d56c0f"
          env:
            - name: POSTHOG_POSTGRES_HOST
              value: "posthog-db-rw.posthog.svc.cluster.local"
            - name: POSTHOG_POSTGRES_PORT
              value: "5432"
            - name: CLICKHOUSE_HOST
              value: "posthog-clickhouse.posthog.svc.cluster.local"
          command:
            - /bin/sh
            - -c
            - |
                until python -c 'import os, socket, sys; s=socket.socket(); s.settimeout(2); c=s.connect_ex((os.environ["POSTHOG_POSTGRES_HOST"], int(os.environ["POSTHOG_POSTGRES_PORT"]))); s.close(); sys.exit(c)';
                do
                  echo "waiting for Postgres";
                  sleep 1;
                done
                until python -c 'import os, socket, sys; s=socket.socket(); s.settimeout(2); c=s.connect_ex((os.environ["CLICKHOUSE_HOST"], 8123)); s.close(); sys.exit(c)';
                do
                  echo "waiting for ClickHouse HTTP";
                  sleep 1;
                done
