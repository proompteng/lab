apiVersion: batch/v1
kind: Job
metadata:
  name: posthog-migrate
  labels:
    "app.kubernetes.io/name": "posthog"
    "app.kubernetes.io/instance": "posthog"
  annotations:
spec:
  template:
    metadata:
      name: posthog-migrate
      annotations:
        checksum/secrets.yaml: f419c0eca4937c746dd2c8a35e325c8a1f4558fc3956e8b05c1984e982e2f58c
      labels:
        app: posthog
        release: "posthog"
    spec:
      restartPolicy: Never
      containers:
      - name: migrate-job
        image: "posthog/posthog:release-1.43.1"
        command:
          - /bin/sh
          - -c
          - |
            set -e
            python manage.py notify_helm_install || true
            ./bin/migrate

        env:
        # Kafka env variables        
        # Used by PostHog/plugin-server. There is no specific reason for the difference. Expected format: comma-separated list of "host:port"
        - name: KAFKA_HOSTS
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"
        # Used by PostHog/web. There is no specific reason for the difference. Expected format: comma-separated list of "kafka://host:port"
        - name: KAFKA_URL
          value: "kafka://kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"

        # Object Storage env variables        
        
        

        # Redis env variables        
        
        - name: POSTHOG_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        
        - name: POSTHOG_REDIS_PORT
          value: "6379"

        - name: SENTRY_DSN
          value: 
        - name: SITE_URL
          value: "http://127.0.0.1:8000"
        - name: DEPLOYMENT
          value: self_managed
        # PostHog app settings        
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog
              key: posthog-secret
        - name: PRIMARY_DB
          value: clickhouse
        
        # Connect directly to postgres (without pgbouncer) to avoid statement_timeout for longer-running queries
        - name: POSTHOG_POSTGRES_HOST
          value: "posthog-db-rw.posthog.svc.cluster.local"
        - name: POSTHOG_POSTGRES_PORT
          value: "5432"
        - name: POSTHOG_DB_USER
          value: "posthog"
        - name: POSTHOG_DB_NAME
          value: "posthog"
        - name: POSTHOG_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-db-app"
              key: "postgresql-password"
        - name: USING_PGBOUNCER
          value: 'false'
        - name: CLICKHOUSE_HOST
          value: "posthog-clickhouse.posthog.svc.cluster.local"
        - name: CLICKHOUSE_CLUSTER
          value: "default"
        - name: CLICKHOUSE_DATABASE
          value: "default"
        - name: CLICKHOUSE_USER
          value: "posthog"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-clickhouse-auth"
              key: "password"
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        
        - name: EMAIL_HOST
          value: ""
        - name: EMAIL_PORT
          value: ""
        - name: EMAIL_HOST_USER
          value: ""
        - name: EMAIL_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog
              key: "smtp-password"
        - name: EMAIL_USE_TLS
          value: "true"
        - name: EMAIL_USE_SSL
          value: "false"
        - name: DEFAULT_FROM_EMAIL
          value: 
        - name: CAPTURE_INTERNAL_METRICS
          value: "true"
        resources:
          {}
      initContainers:        
        - name: wait-for-service-dependencies
          image: busybox:1.34
          env:
            - name: CLICKHOUSE_HOST
              value: "posthog-clickhouse.posthog.svc.cluster.local"
            - name: CLICKHOUSE_CLUSTER
              value: "default"
            - name: CLICKHOUSE_DATABASE
              value: "default"
            - name: CLICKHOUSE_USER
              value: "posthog"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "posthog-clickhouse-auth"
                  key: "password"
            - name: CLICKHOUSE_SECURE
              value: "false"
            - name: CLICKHOUSE_VERIFY
              value: "false"
          command:
            - /bin/sh
            - -c
            - >
                
        
                until (nc -vz "posthog-db-rw.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local" 5432);
                do
                    echo "waiting for Postgres"; sleep 1;
                done
