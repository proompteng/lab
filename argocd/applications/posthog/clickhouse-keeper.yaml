apiVersion: clickhouse-keeper.altinity.com/v1
kind: ClickHouseKeeperInstallation
metadata:
  name: posthog-keeper
  namespace: posthog
  labels:
    app.kubernetes.io/name: posthog-clickhouse
    app.kubernetes.io/part-of: posthog
spec:
  configuration:
    clusters:
      - name: default
        layout:
          replicasCount: 1
        templates:
          podTemplate: chk-default
          volumeClaimTemplate: chk-data
  templates:
    podTemplates:
      - name: chk-default
        spec:
          containers:
            - name: clickhouse-keeper
              image: clickhouse/clickhouse-keeper:22.8.21.38
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
    volumeClaimTemplates:
      - name: chk-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
          storageClassName: rook-ceph-block
  defaults:
    templates:
      podTemplate: chk-default
      volumeClaimTemplate: chk-data
