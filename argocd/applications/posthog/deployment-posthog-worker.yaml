apiVersion: apps/v1
kind: Deployment
metadata:
  name: posthog-worker
  labels:
    "app.kubernetes.io/name": "posthog"
    "app.kubernetes.io/instance": "posthog"
  annotations:
spec:
  selector:
    matchLabels:
        app: posthog
        release: "posthog"
        role: worker
  replicas: 1
  template:
    metadata:
      annotations:
        checksum/secrets.yaml: 9c57de570ed022c4f60e15da943de7fd6d99410d6b4634b7f207aa16d46b9a9a
      labels:
        app: posthog
        release: "posthog"
        role: worker
    spec:
      serviceAccountName: posthog
      containers:
      - name: posthog-workers
        image: "posthog/posthog:release-1.43.1"
        imagePullPolicy: IfNotPresent
        command:
          - ./bin/docker-worker-celery
          - --with-scheduler
        ports:
        - containerPort: 8000
        env:
        # Kafka env variables        
        # Used by PostHog/plugin-server. There is no specific reason for the difference. Expected format: comma-separated list of "host:port"
        - name: KAFKA_HOSTS
          value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"
        # Used by PostHog/web. There is no specific reason for the difference. Expected format: comma-separated list of "kafka://host:port"
        - name: KAFKA_URL
          value: "kafka://kafka-kafka-bootstrap.kafka.svc.cluster.local:9093"

        # Object Storage env variables        
        
        

        # Redis env variables        
        
        - name: POSTHOG_REDIS_HOST
          value: posthog-redis.posthog.svc.cluster.local
        
        - name: POSTHOG_REDIS_PORT
          value: "6379"

        # statsd env variables        

        - name: SITE_URL
          value: "http://127.0.0.1:8000"
        - name: DEPLOYMENT
          value: self_managed
        - name: SENTRY_DSN
          value: 
        - name: PRIMARY_DB
          value: clickhouse        
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog
              key: posthog-secret
        
        - name: POSTHOG_POSTGRES_HOST
          value: posthog-db-pooler
        - name: POSTHOG_POSTGRES_PORT
          value: "5432"
        - name: POSTHOG_DB_USER
          value: "posthog"
        - name: POSTHOG_DB_NAME
          value: "posthog"
        - name: POSTHOG_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-db-app"
              key: "postgresql-password"
        - name: USING_PGBOUNCER
          value: 'true'
        - name: CLICKHOUSE_HOST
          value: "posthog-clickhouse.posthog.svc.cluster.local"
        - name: CLICKHOUSE_CLUSTER
          value: "default"
        - name: CLICKHOUSE_DATABASE
          value: "default"
        - name: CLICKHOUSE_USER
          value: "posthog"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "posthog-clickhouse-auth"
              key: "password"
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        
        - name: EMAIL_HOST
          value: ""
        - name: EMAIL_PORT
          value: ""
        - name: EMAIL_HOST_USER
          value: ""
        - name: EMAIL_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: posthog
              key: "smtp-password"
        - name: EMAIL_USE_TLS
          value: "true"
        - name: EMAIL_USE_SSL
          value: "false"
        - name: DEFAULT_FROM_EMAIL
          value: 
        - name: CAPTURE_INTERNAL_METRICS
          value: "true"
        resources:
            {}
      initContainers:        
        - name: wait-for-service-dependencies
          image: busybox:1.34
          env:
            - name: CLICKHOUSE_HOST
              value: "posthog-clickhouse.posthog.svc.cluster.local"
            - name: CLICKHOUSE_CLUSTER
              value: "default"
            - name: CLICKHOUSE_DATABASE
              value: "default"
            - name: CLICKHOUSE_USER
              value: "posthog"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "posthog-clickhouse-auth"
                  key: "password"
            - name: CLICKHOUSE_SECURE
              value: "false"
            - name: CLICKHOUSE_VERIFY
              value: "false"
          command:
            - /bin/sh
            - -c
            - >
                
        
                until (nc -vz "posthog-db-pooler.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local" 5432);
                do
                    echo "waiting for Postgres pooler"; sleep 1;
                done
        
                
        
                
        
                        
        - name: wait-for-migrations
          image: "posthog/posthog:release-1.43.1"
          command:
            - /bin/sh
            - -c
            - >
                until (python manage.py migrate --check);
                do
                    echo "Waiting for database migrations to be completed"; sleep 1;
                done
          env:
        
          # PostgreSQL configuration
          
          - name: POSTHOG_POSTGRES_HOST
            value: posthog-db-pooler
          - name: POSTHOG_POSTGRES_PORT
            value: "5432"
          - name: POSTHOG_DB_USER
            value: "posthog"
          - name: POSTHOG_DB_NAME
            value: "posthog"
          - name: POSTHOG_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "posthog-db-app"
                key: "postgresql-password"
          - name: USING_PGBOUNCER
            value: 'true'
        
          # Redis env variables  
          
          - name: POSTHOG_REDIS_HOST
            value: posthog-redis.posthog.svc.cluster.local
          
          - name: POSTHOG_REDIS_PORT
            value: "6379"
        
          # ClickHouse env variables
          - name: CLICKHOUSE_HOST
            value: "posthog-clickhouse.posthog.svc.cluster.local"
          - name: CLICKHOUSE_CLUSTER
            value: "default"
          - name: CLICKHOUSE_DATABASE
            value: "default"
          - name: CLICKHOUSE_USER
            value: "posthog"
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "posthog-clickhouse-auth"
                key: "password"
          - name: CLICKHOUSE_SECURE
            value: "false"
          - name: CLICKHOUSE_VERIFY
            value: "false"
        
          # PostHog app settings
          
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: posthog
                key: posthog-secret
