apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sealed-secrets

resources:
  - ingressroute-sealed-secrets-k8s-private.yaml

helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: 2.18.5
    releaseName: sealed-secrets
    namespace: sealed-secrets
    includeCRDs: true
  - name: sealed-secrets-web
    repo: https://charts.bakito.net
    version: 3.3.1
    releaseName: sealed-secrets-web
    namespace: sealed-secrets
    valuesInline:
      sealedSecrets:
        namespace: sealed-secrets
        serviceName: sealed-secrets
      ingress:
        enabled: true
        className: traefik
        hosts:
          - host: sealed-secrets.lan
            paths:
              - path: /
                pathType: Prefix
