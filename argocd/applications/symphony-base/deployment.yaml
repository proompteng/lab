apiVersion: apps/v1
kind: Deployment
metadata:
  name: symphony
  labels:
    app.kubernetes.io/name: symphony
    app.kubernetes.io/part-of: lab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: symphony
  template:
    metadata:
      labels:
        app.kubernetes.io/name: symphony
        app.kubernetes.io/part-of: lab
    spec:
      serviceAccountName: symphony
      containers:
        - name: symphony
          image: registry.ide-newton.ts.net/lab/symphony
          imagePullPolicy: Always
          command:
            - sh
            - -lc
            - |
              export HOME="${HOME:-/workspace/.codex-home}"
              mkdir -p "$HOME/.codex"
              if [ ! -f "$HOME/.codex/auth.json" ] || ! cmp -s /var/run/codex-auth/auth.json "$HOME/.codex/auth.json"; then
                cp /var/run/codex-auth/auth.json "$HOME/.codex/auth.json"
                chmod 600 "$HOME/.codex/auth.json"
              fi
              exec bun src/index.ts /etc/symphony/WORKFLOW.md
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HOME
              value: /workspace/.codex-home
            - name: NODE_ENV
              value: production
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-linear-api-key
                  key: LINEAR_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
                  optional: true
            - name: POSTHOG_ENABLED
              value: "true"
            - name: POSTHOG_HOST
              value: http://posthog-capture.posthog.svc.cluster.local:3000
            - name: POSTHOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-posthog
                  key: POSTHOG_API_KEY
            - name: POSTHOG_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: symphony-posthog
                  key: POSTHOG_PROJECT_ID
            - name: POSTHOG_REQUEST_TIMEOUT_MS
              value: "1000"
            - name: POSTHOG_FLUSH_AT
              value: "1"
            - name: POSTHOG_FLUSH_INTERVAL_MS
              value: "1000"
            - name: SYMPHONY_LEADER_ELECTION_ENABLED
              value: "true"
            - name: SYMPHONY_LEADER_ELECTION_LEASE_NAME
              value: symphony-leader
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/name']
            - name: OTEL_SERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_SERVICE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: http://observability-tempo-distributor.observability.svc.cluster.local:4318/v1/traces
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: http://observability-mimir-nginx.observability.svc.cluster.local/otlp/v1/metrics
            - name: OTEL_EXPORTER_OTLP_TRACES_TIMEOUT
              value: "20000"
            - name: OTEL_EXPORTER_OTLP_METRICS_TIMEOUT
              value: "20000"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "15000"
            - name: OTEL_METRIC_EXPORT_TIMEOUT
              value: "20000"
            - name: OTEL_LOGS_EXPORTER
              value: none
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: workflow
              mountPath: /etc/symphony/WORKFLOW.md
              subPath: WORKFLOW.md
              readOnly: true
            - name: codex-auth
              mountPath: /var/run/codex-auth/auth.json
              subPath: auth.json
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: symphony-workspace
        - name: workflow
          configMap:
            name: symphony-workflow
        - name: codex-auth
          secret:
            secretName: codex-auth
