apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: coder-private
  namespace: coder
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`coder.k8s.proompteng.ai`)
      services:
        - name: coder
          port: 80
  tls:
    secretName: wildcard-k8s-proompteng-ai-tls
