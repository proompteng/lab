apiVersion: v1
kind: ConfigMap
metadata:
  name: attic-config
  namespace: attic
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
data:
  server.toml: |
    listen = "[::]:8080"
    allowed-hosts = [
      "attic.attic.svc.cluster.local",
      "attic.ide-newton.ts.net"
    ]
    api-endpoint = "https://attic.ide-newton.ts.net/"
    substituter-endpoint = "https://attic.ide-newton.ts.net/"
    soft-delete-caches = true
    require-proof-of-possession = true

    [database]
    heartbeat = true

    [storage]
    type = "s3"
    region = "us-east-1"
    bucket = "attic-cache"
    endpoint = "http://rook-ceph-rgw-objectstore.rook-ceph.svc.cluster.local:80"

    [chunking]
    nar-size-threshold = 65536
    min-size = 16384
    avg-size = 65536
    max-size = 262144

    [compression]
    type = "zstd"

    [garbage-collection]
    interval = "0s"
    default-retention-period = "6 months"
