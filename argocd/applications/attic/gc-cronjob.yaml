apiVersion: batch/v1
kind: CronJob
metadata:
  name: attic-gc
  namespace: attic
  labels:
    app.kubernetes.io/name: attic
    app.kubernetes.io/component: garbage-collector
spec:
  schedule: "17 9 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: attic
            app.kubernetes.io/component: garbage-collector
        spec:
          restartPolicy: Never
          securityContext:
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: attic-gc
              image: registry.ide-newton.ts.net/lab/attic@sha256:061938ea73b005333d3138d3940347a80ddde7d82e456d5914c001233a0f6747
              imagePullPolicy: Always
              command:
                - atticd
              args:
                - --config
                - /etc/attic/server.toml
                - --mode
                - garbage-collector-once
              env:
                - name: RUST_LOG
                  value: info
                - name: ATTIC_SERVER_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: attic-db-app
                      key: uri
                - name: ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64
                  valueFrom:
                    secretKeyRef:
                      name: attic-secrets
                      key: token-rs256-secret-base64
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: attic-cache
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: attic-cache
                      key: AWS_SECRET_ACCESS_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 65532
                runAsGroup: 65532
              volumeMounts:
                - name: attic-config
                  mountPath: /etc/attic
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: attic-config
              configMap:
                name: attic-config
            - name: tmp
              emptyDir: {}
