apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-vm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-vm-argocd-applications
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-vm-argocd-applications
subjects:
  - kind: ServiceAccount
    name: openclaw-vm
    namespace: openclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-vm-argocd-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-vm-agentruns
rules:
  - apiGroups: ["agents.proompteng.ai"]
    resources: ["agentruns"]
    verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-vm-agentruns
subjects:
  - kind: ServiceAccount
    name: openclaw-vm
    namespace: openclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-vm-agentruns
