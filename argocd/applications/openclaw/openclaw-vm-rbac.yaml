apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-vm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-vm-argocd-applications
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-vm-argocd-applications
subjects:
  - kind: ServiceAccount
    name: openclaw-vm
    namespace: openclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-vm-argocd-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-vm-agentruns
rules:
  - apiGroups: ["agents.proompteng.ai"]
    resources: ["agentruns"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: ["agents.proompteng.ai"]
    resources: ["agents", "implementationspecs", "versioncontrolproviders"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["codex-github-token", "codex-openai-key"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-vm-agentruns
subjects:
  - kind: ServiceAccount
    name: openclaw-vm
    namespace: openclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openclaw-vm-agentruns
