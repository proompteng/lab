apiVersion: apps/v1
kind: Deployment
metadata:
  name: symphony
spec:
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-16T04:37:22Z"
    spec:
      serviceAccountName: symphony-jangar
      containers:
        - name: symphony
          env:
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-linear-api-key-jangar
                  key: LINEAR_API_KEY
            - name: SYMPHONY_LEADER_ELECTION_LEASE_NAME
              value: symphony-jangar-leader
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: symphony-workspace-jangar
        - name: workflow
          configMap:
            name: symphony-workflow-jangar
        - name: codex-auth
          secret:
            secretName: codex-auth-symphony-jangar
