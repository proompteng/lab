apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jangar
nameSuffix: -jangar
labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: symphony-jangar
      app.kubernetes.io/part-of: lab
configMapGenerator:
  - name: symphony-workflow
    files:
      - WORKFLOW.md
    options:
      disableNameSuffixHash: true
resources:
  - ../symphony-base
  - linear-api-key-sealedsecret.yaml
  - target-argocd-role.yaml
  - target-argocd-rolebinding.yaml
patches:
  - path: deployment.patch.yaml
images:
  - name: registry.ide-newton.ts.net/lab/symphony
    newName: registry.ide-newton.ts.net/lab/symphony
    newTag: "sha-b3511a1"
    digest: sha256:53218facc729108e2ca8d515d08f9c364886487c5335f2771d9fabfa2b3df590
