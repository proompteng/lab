apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flamingo-model-cache
  namespace: flamingo
  labels:
    app.kubernetes.io/name: flamingo
    app.kubernetes.io/component: model-cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: rook-ceph-block
  resources:
    requests:
      storage: 256Gi
