apiVersion: apps/v1
kind: Deployment
metadata:
  name: flamingo
  namespace: flamingo
  labels:
    app.kubernetes.io/name: flamingo
    app.kubernetes.io/component: model-server
spec:
  replicas: 1
  progressDeadlineSeconds: 14400
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: flamingo
      app.kubernetes.io/component: model-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flamingo
        app.kubernetes.io/component: model-server
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.io/hostname: turin
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 120
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.23.0-x86_64-cu129@sha256:871762282db5bc464b5a3f0a59e41207ef25c2d95edf5f701e57a6bfc27b9496
          imagePullPolicy: IfNotPresent
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --model
            - unsloth/Qwen3.6-35B-A3B-NVFP4
            - --served-model-name
            - qwen36-flamingo
            - --trust-remote-code
            - --dtype
            - bfloat16
            - --max-model-len
            - "262144"
            - --gpu-memory-utilization
            - "0.85"
            - --kv-cache-dtype
            - fp8
            - --safetensors-load-strategy
            - eager
            - --max-num-seqs
            - "16"
            - --max-num-batched-tokens
            - "16384"
            - --max-num-partial-prefills
            - "2"
            - --max-long-partial-prefills
            - "1"
            - --long-prefill-token-threshold
            - "8192"
            - --enable-dbo
            - --dbo-decode-token-threshold
            - "32"
            - --dbo-prefill-token-threshold
            - "512"
            - --enable-prefix-caching
            - --reasoning-parser
            - qwen3
            - --enable-auto-tool-choice
            - --tool-call-parser
            - qwen3_coder
            - --optimization-level
            - "2"
          env:
            - name: HF_HOME
              value: /models/huggingface
            - name: VLLM_CACHE_ROOT
              value: /models/vllm
            - name: VLLM_LOGGING_LEVEL
              value: INFO
          ports:
            - name: http
              containerPort: 8000
          startupProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "16"
              memory: 128Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "64"
              memory: 256Gi
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: flamingo-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
