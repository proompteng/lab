apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: linear-mcp-oauth
  namespace: agents
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshPolicy: Periodic
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-infra
  target:
    name: linear-mcp-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: linear-mcp-oauth/client-id
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: client-secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: linear-mcp-oauth/client-secret
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: actor-id
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: linear-mcp-oauth/actor-id
        metadataPolicy: None
        nullBytePolicy: Ignore
