apiVersion: sources.knative.dev/v1
kind: KafkaSource
metadata:
  name: agents-codex-github-events
  namespace: agents
spec:
  bootstrapServers:
    - kafka-kafka-bootstrap.kafka:9092
  topics:
    - github.webhook.events
  consumerGroup: agents-codex-github-events
  initialOffset: earliest
  net:
    sasl:
      enable: true
      type:
        secretKeyRef:
          name: kafka-codex-username
          key: saslType
      user:
        secretKeyRef:
          name: kafka-codex-username
          key: username
      password:
        secretKeyRef:
          name: kafka-codex-credentials
          key: password
  sink:
    ref:
      apiVersion: v1
      kind: Service
      name: agents
      namespace: agents
    uri: /v1/codex/github-events
