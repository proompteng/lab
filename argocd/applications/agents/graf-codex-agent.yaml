apiVersion: agents.proompteng.ai/v1alpha1
kind: Agent
metadata:
  name: graf-codex-agent
spec:
  providerRef:
    name: graf-codex
  defaults:
    systemPromptRef:
      kind: ConfigMap
      name: codex-agent-system-prompt
      key: system-prompt.md
  security:
    allowedSecrets:
      - codex-auth
      - github-token
