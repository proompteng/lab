apiVersion: agents.proompteng.ai/v1alpha1
kind: Agent
metadata:
  name: anypi-eval-agent
spec:
  providerRef:
    name: anypi-eval
  defaults:
    systemPrompt: |
      Controller-required placeholder. Anypi ignores this by default and uses ANYPI_PROMPT_VARIANT.
  vcsRef:
    name: github
  security:
    allowedSecrets:
      - github-token
      - codex-auth
