apiVersion: agents.proompteng.ai/v1alpha1
kind: ImplementationSpec
metadata:
  name: codex-spark-smoke-implspec
  namespace: agents
spec:
  contract:
    requiredKeys:
      - repository
      - base
      - head
      - objective
  summary: 'Deterministic Codex app-server runtime smoke check.'
  text: |
    Run a deterministic Codex app-server protocol smoke for ${repository} on ${head} from ${base}.

    Goal:
    - verify the Agents controller, app-server runner image, runner spec, stream handling, status writer, and artifact declaration path.

    Constraints:
    - Do not change files.
    - Do not commit, push, open a PR, or post external updates.
    - Do not call external model providers.
    - Keep the run short and deterministic.

    Deliverables:
    - `/workspace/.agentrun/smoke/result.md` containing:
      - startup status
      - resolved repository/base/head
      - resolved stage
      - one-line confirmation that no repo or external side effects were performed
