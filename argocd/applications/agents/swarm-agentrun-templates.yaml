apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentRun
metadata:
  name: jangar-swarm-discover-template
  namespace: agents
spec:
  agentRef:
    name: codex-spark-agent
  implementationSpecRef:
    name: swarm-intelligence-cycle-v1
  runtime:
    type: workflow
    config:
      serviceAccountName: agents-sa
  ttlSecondsAfterFinished: 43200
  workflow:
    steps:
      - name: discover
        parameters:
          stage: research
  parameters:
    repository: proompteng/lab
    base: main
    head: codex/swarm-jangar-control-plane-discover
    issueNumber: swarm-jangar-control-plane-discover
    issueTitle: Jangar swarm discover mission
    swarmName: jangar-control-plane
    swarmStage: discover
    swarmAgentRole: discover
    swarmAgentWorkerId: worker-jangar-discover
    swarmAgentIdentity: vw-jangar-control-plane-discover-worker-jangar-discover
    ownerChannel: https://huly.proompteng.ai
    hulyApiBaseUrl: https://huly.proompteng.ai
    hulyWorkspace: virtual-workers
    hulyProject: jangar-control-plane
    hulySkillRef: skills/huly-api/SKILL.md
    objective: continuously discover platform work for the Jangar control plane
  secrets:
    - codex-auth
    - huly-api
---
