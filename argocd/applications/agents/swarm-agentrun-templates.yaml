apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentRun
metadata:
  name: jangar-swarm-discover-template
  namespace: agents
spec:
  agentRef:
    name: codex-spark-agent
  implementationSpecRef:
    name: swarm-intelligence-cycle-v1
  runtime:
    type: workflow
    config:
      serviceAccountName: agents-sa
  ttlSecondsAfterFinished: 43200
  workflow:
    steps:
      - name: discover
        parameters:
          stage: research
  parameters:
    repository: proompteng/lab
    base: main
    head: codex/swarm-jangar-control-plane-discover
    issueNumber: swarm-jangar-control-plane-discover
    issueTitle: Jangar Engineering discover mission
    swarmName: jangar-control-plane
    swarmStage: discover
    swarmAgentRole: architector
    swarmAgentWorkerId: worker-jangar-discover
    swarmAgentIdentity: architector-jangar-discover
    swarmHumanName: architector
    swarmTeamName: Jangar Engineering
    ownerChannel: swarm://owner/platform
    hulyApiBaseUrl: http://transactor.huly.svc.cluster.local
    hulyWorkspace: proompteng
    hulyProject: DefaultProject
    hulyChannelName: general
    hulyChannelUrl: https://huly.proompteng.ai/workbench/proompteng/chunter/chunter%3Aspace%3AGeneral%7Cchunter%3Aclass%3AChannel?message
    hulyTeamspaceName: PROOMPTENG
    hulyTrackerUrl: https://huly.proompteng.ai/workbench/proompteng/tracker/tracker%3Aproject%3ADefaultProject/issues
    hulyRequireDedicatedAccount: "true"
    hulySkillRef: skills/huly-api/SKILL.md
    objective: assess cluster/source/database state and create/update+merge required design-document PRs that improve, maintain, and innovate the Jangar control plane
  vcsRef:
    name: github
  vcsPolicy:
    required: true
    mode: read-write
  secrets:
    - github-token
    - codex-auth
    - huly-api-jangar
---
