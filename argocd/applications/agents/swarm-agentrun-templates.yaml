apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentRun
metadata:
  name: jangar-swarm-implement-template
  namespace: agents
spec:
  agentRef:
    name: codex-spark-agent
  implementationSpecRef:
    name: swarm-autonomous-implementation-v1
  runtime:
    type: workflow
    config:
      serviceAccountName: agents-sa
  ttlSecondsAfterFinished: 172800
  workflow:
    steps:
      - name: implement
        retries: 1
        retryBackoffSeconds: 30
        timeoutSeconds: 7200
        parameters:
          stage: implementation
  parameters:
    repository: proompteng/lab
    base: main
    head: codex/swarm-jangar-control-plane
    issueNumber: swarm-jangar-control-plane
    issueTitle: Jangar autonomous swarm implementation mission
    swarmName: jangar-control-plane
    swarmStage: implement
    swarmAgentRole: implement
    swarmAgentWorkerId: worker-jangar-implement
    swarmAgentIdentity: vw-jangar-control-plane-implement-worker-jangar-implement
    objective: autonomously implement platform improvements and requirement handoffs from Torghut
    ownerChannel: https://huly.proompteng.ai
    hulyApiBaseUrl: https://huly.proompteng.ai
    hulyWorkspace: virtual-workers
    hulyProject: jangar-control-plane
    hulySkillRef: skills/huly-api/SKILL.md
  vcsRef:
    name: github
  vcsPolicy:
    required: true
    mode: read-write
  secrets:
    - github-token
    - codex-auth
    - huly-api
