apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: codex-spark
spec:
  binary: /usr/local/bin/agent-runner
  adapter:
    type: codex-app-server
    codex:
      model: gpt-5.3-codex-spark
      effort: high
      sandbox: danger-full-access
      approval: never
      cwd: /workspace/lab
      threadConfig:
        mcp_servers: {}
        web_search: live
  argsTemplate: []
  envTemplate:
    CODEX_LOG_LEVEL: info
    AGENT_RUN_NAME: "{{agentRun.name}}"
    AGENT_RUN_NAMESPACE: "{{agentRun.namespace}}"
    CODEX_MODEL: gpt-5.3-codex-spark
    CODEX_MODEL_FALLBACKS: gpt-5.6-sol,gpt-5.4,gpt-5.4-mini,gpt-5.2-codex,gpt-5-codex
    CODEX_MAX_SESSION_ATTEMPTS: "5"
    HF_BASE_URL: https://router.huggingface.co/v1
    HF_MODEL: meta-llama/Llama-3.1-8B-Instruct:novita
  inputFiles:
    - path: /root/.codex/config.toml
      content: |-
        model = "gpt-5.3-codex-spark"
        model_reasoning_summary = "none"
        model_reasoning_effort = "high"
        model_verbosity = "medium"
        approval_policy = "never"
        sandbox_mode = "danger-full-access"
        web_search = "live"
        suppress_unstable_features_warning = true

        [features]
        enable_request_compression = true
        unified_exec = true
        shell_snapshot = true
        multi_agent = true
        goals = true

        [shell_environment_policy]
        ignore_default_excludes = true

        [projects."/workspace/lab"]
        trust_level = "trusted"

        [projects."/root"]
        trust_level = "trusted"
  outputArtifacts:
    - name: runner-log
      path: /workspace/.agent/runner.log
    - name: runner-status
      path: /workspace/.agent/status.json
