apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: codex-spark
spec:
  binary: /usr/local/bin/agent-runner
  argsTemplate: []
  envTemplate:
    CODEX_LOG_LEVEL: info
    NATS_URL: nats://nats.nats.svc.cluster.local:4222
    AGENT_RUN_NAME: "{{agentRun.name}}"
    AGENT_RUN_NAMESPACE: "{{agentRun.namespace}}"
    AGENT_PROVIDER_PATH: /root/.codex/provider-codex-spark.json
    CODEX_MODEL: gpt-5.5
    HF_BASE_URL: https://router.huggingface.co/v1
    HF_MODEL: meta-llama/Llama-3.1-8B-Instruct:novita
  inputFiles:
    - path: /root/.codex/config.toml
      content: |-
        model = "gpt-5.5"
        model_reasoning_summary = "none"
        model_reasoning_effort = "xhigh"
        model_verbosity = "medium"
        approval_policy = "never"
        sandbox_mode = "danger-full-access"
        web_search = "live"
        suppress_unstable_features_warning = true

        [features]
        undo = true
        enable_request_compression = true
        apply_patch_freeform = true
        unified_exec = true
        shell_snapshot = true
        steer = true
        multi_agent = true
        child_agents_md = true
        collaboration_modes = true
        responses_websockets = false

        [shell_environment_policy]
        ignore_default_excludes = true

        [projects."/workspace/lab"]
        trust_level = "trusted"

        [projects."/root"]
        trust_level = "trusted"
    - path: /root/.codex/provider-codex-spark.json
      content: |-
        {
          "name": "codex-spark",
          "binary": "/bin/bash",
          "argsTemplate": [
            "-lc",
            "set -o pipefail; EVENT_FILE=$(mktemp /tmp/codex-event.XXXXXX.json) && cp \"$1\" \"$EVENT_FILE\" && python3 /root/.codex/ensure-market-context-issue-number.py \"$EVENT_FILE\" && mkdir -p /workspace/.agent && LOG_PATH=/workspace/.agent/runner.log && /usr/local/bin/codex-implement \"$EVENT_FILE\" 2>&1 | tee \"$LOG_PATH\"; status=${PIPESTATUS[0]}; if [ \"$status\" -eq 0 ]; then exit 0; fi; if python3 /root/.codex/should-hf-swarm-fallback.py \"$LOG_PATH\"; then exec python3 /root/.codex/swarm-hf-codex-fallback.py \"$EVENT_FILE\" \"$LOG_PATH\"; fi; exit \"$status\"",
            "--",
            "{{payloads.eventFilePath}}"
          ],
          "envTemplate": {
            "WORKFLOW_STAGE": "{{inputs.stage}}",
            "CODEX_STAGE": "{{inputs.stage}}"
          }
        }
    - path: /root/.codex/ensure-market-context-issue-number.py
      content: |-
        #!/usr/bin/env python3
        import hashlib
        import json
        import re
        import sys
        from pathlib import Path

        PLACEHOLDER_PATTERN = re.compile(r'\$\{([A-Za-z_][A-Za-z0-9_]*)\}')

        def _is_nonempty_scalar(value) -> bool:
          if isinstance(value, str):
            return bool(value.strip())
          return isinstance(value, (int, float))

        def _scalar_to_text(value):
          if isinstance(value, str):
            return value
          if isinstance(value, bool):
            return 'true' if value else 'false'
          if isinstance(value, (int, float)):
            return str(value)
          return ''

        def _hydrate_top_level(payload: dict) -> None:
          # Market-context runs pass required values in `parameters`; expose them at top-level
          # so command snippets can interpolate without manual user input.
          for container_key in ('parameters',):
            container = payload.get(container_key)
            if not isinstance(container, dict):
              continue
            for key, raw_value in container.items():
              if not isinstance(key, str) or not key:
                continue
              if not _is_nonempty_scalar(raw_value):
                continue
              existing = payload.get(key)
              if _is_nonempty_scalar(existing):
                continue
              payload[key] = _scalar_to_text(raw_value)

        def _interpolate(value: str, values: dict[str, str]) -> str:
          def repl(match):
            key = match.group(1)
            replacement = values.get(key)
            if replacement is None or replacement == '':
              return match.group(0)
            return replacement
          return PLACEHOLDER_PATTERN.sub(repl, value)

        def _interpolate_prompt_fields(payload: dict) -> None:
          values: dict[str, str] = {}
          for key, raw_value in payload.items():
            if isinstance(raw_value, (str, int, float, bool)):
              text = _scalar_to_text(raw_value).strip()
              if text:
                values[key] = text
          if not values:
            return

          for field in ('prompt', 'issueBody'):
            raw_field = payload.get(field)
            if isinstance(raw_field, str):
              payload[field] = _interpolate(raw_field, values)

          implementation = payload.get('implementation')
          if isinstance(implementation, dict):
            raw_text = implementation.get('text')
            if isinstance(raw_text, str):
              implementation['text'] = _interpolate(raw_text, values)

        def main() -> int:
          if len(sys.argv) < 2:
            return 0
          event_path = Path(sys.argv[1])
          if not event_path.exists():
            return 0
          try:
            payload = json.loads(event_path.read_text(encoding='utf-8'))
          except Exception:
            return 0
          if not isinstance(payload, dict):
            return 0

          _hydrate_top_level(payload)

          issue_number = payload.get('issueNumber')
          if isinstance(issue_number, (int, float)):
            payload['issueNumber'] = str(int(issue_number))
          elif isinstance(issue_number, str) and issue_number.strip():
            payload['issueNumber'] = issue_number.strip()
          else:
            seed = '|'.join(
              [
                str(payload.get('repository', '')).strip(),
                str(payload.get('domain', '')).strip(),
                str(payload.get('symbol', '')).strip(),
                str(payload.get('requestId', '')).strip(),
                str(payload.get('head', '')).strip(),
                str(payload.get('base', '')).strip(),
                str(payload.get('stage', '')).strip(),
              ]
            )
            if not seed.strip('|'):
              seed = 'codex-issue-fallback'
            digest = hashlib.sha256(seed.encode('utf-8')).hexdigest()[:10]
            normalized = (int(digest, 16) % 900_000_000) + 100_000_000
            payload['issueNumber'] = str(normalized)

          payload['issue_number'] = str(payload.get('issueNumber', '')).strip()
          _interpolate_prompt_fields(payload)
          event_path.write_text(json.dumps(payload), encoding='utf-8')
          return 0

        if __name__ == '__main__':
          raise SystemExit(main())
    - path: /root/.codex/should-hf-swarm-fallback.py
      content: |-
        #!/usr/bin/env python3
        import re
        import sys
        from pathlib import Path

        FALLBACK_PATTERNS = (
          r'provider capacity exhausted',
          r'ProviderCapacityExhausted',
          r'quota exceeded',
          r'usage limit',
          r'insufficient_quota',
          r'provider auth unavailable',
          r'ProviderAuthUnavailable',
          r'access token could not be refreshed',
          r'refresh token was already used',
          r'please log out and sign in again',
        )

        def main() -> int:
          if len(sys.argv) < 2:
            return 1
          text = Path(sys.argv[1]).read_text(encoding='utf-8', errors='replace') if Path(sys.argv[1]).exists() else ''
          return 0 if any(re.search(pattern, text, re.IGNORECASE) for pattern in FALLBACK_PATTERNS) else 1

        if __name__ == '__main__':
          raise SystemExit(main())
    - path: /root/.codex/swarm-hf-codex-fallback.py
      content: |-
        #!/usr/bin/env python3
        import json
        import os
        import subprocess
        import sys
        import urllib.error
        import urllib.request
        from datetime import datetime, timezone
        from pathlib import Path

        def now_iso() -> str:
          return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

        def as_text(value, default: str = "") -> str:
          if isinstance(value, str):
            return value.strip()
          if isinstance(value, (int, float, bool)):
            return str(value)
          return default

        def read_field(payload: dict, key: str, default: str = "") -> str:
          value = as_text(payload.get(key))
          if value:
            return value
          parameters = payload.get("parameters")
          if isinstance(parameters, dict):
            value = as_text(parameters.get(key))
            if value:
              return value
          return default

        def chat_completion(base_url: str, token: str, model: str, messages: list[dict]) -> str:
          request = urllib.request.Request(
            f"{base_url.rstrip('/')}/chat/completions",
            data=json.dumps({
              "model": model,
              "messages": messages,
              "temperature": 0.2,
              "max_tokens": 900,
            }).encode("utf-8"),
            headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
            },
            method="POST",
          )
          try:
            with urllib.request.urlopen(request, timeout=120) as response:
              payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
            body_text = error.read().decode("utf-8", errors="replace")
            raise RuntimeError(f"HF router returned HTTP {error.code}: {body_text}") from error
          choices = payload.get("choices")
          if not isinstance(choices, list) or not choices:
            raise RuntimeError(f"HF router response missing choices: {json.dumps(payload)[:1000]}")
          message = choices[0].get("message") if isinstance(choices[0], dict) else None
          content = message.get("content") if isinstance(message, dict) else None
          if not isinstance(content, str) or not content.strip():
            raise RuntimeError(f"HF router response missing message content: {json.dumps(payload)[:1000]}")
          return content.strip()

        def k8s_request(path: str) -> dict | str | None:
          host = os.environ.get("KUBERNETES_SERVICE_HOST", "").strip()
          port = os.environ.get("KUBERNETES_SERVICE_PORT", "443").strip()
          token_path = Path("/var/run/secrets/kubernetes.io/serviceaccount/token")
          ca_path = Path("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
          if not host or not token_path.exists():
            return None
          request = urllib.request.Request(
            f"https://{host}:{port}{path}",
            headers={"Authorization": f"Bearer {token_path.read_text(encoding='utf-8').strip()}"},
          )
          context = None
          if ca_path.exists():
            import ssl

            context = ssl.create_default_context(cafile=str(ca_path))
          with urllib.request.urlopen(request, timeout=20, context=context) as response:
            body = response.read().decode("utf-8", errors="replace")
            return json.loads(body) if "application/json" in response.headers.get("content-type", "") else body

        def extract_result(log_text: str) -> str:
          markers = (
            ("SWARM_CODEX_HF_FALLBACK_RESULT_BEGIN", "SWARM_CODEX_HF_FALLBACK_RESULT_END"),
            ("SWARM_HF_RESULT_BEGIN", "SWARM_HF_RESULT_END"),
          )
          for start_marker, end_marker in markers:
            start = log_text.find(start_marker)
            end = log_text.find(end_marker)
            if start >= 0 and end > start:
              return log_text[start + len(start_marker) : end].strip()
          return log_text.strip()[-4000:]

        def read_pod_log(namespace: str, job_name: str) -> str:
          from urllib.parse import quote

          pods = k8s_request(f"/api/v1/namespaces/{namespace}/pods?labelSelector={quote(f'job-name={job_name}', safe='')}")
          if not isinstance(pods, dict):
            return ""
          items = pods.get("items")
          if not isinstance(items, list) or not items:
            return ""
          metadata = items[0].get("metadata") if isinstance(items[0], dict) else {}
          pod_name = as_text(metadata.get("name")) if isinstance(metadata, dict) else ""
          if not pod_name:
            return ""
          log = k8s_request(f"/api/v1/namespaces/{namespace}/pods/{pod_name}/log?container=agent-runner")
          return log if isinstance(log, str) else ""

        def stage_predecessors(stage: str, role: str) -> list[str]:
          normalized_stage = stage.lower().strip()
          normalized_role = role.lower().strip()
          if normalized_stage == "verify":
            return ["implement", "plan", "discover"]
          if normalized_stage == "implement":
            return ["plan", "discover"]
          if normalized_stage == "plan":
            return ["discover"]
          if normalized_role in {"deployer", "reviewer"}:
            return ["engineer", "architect"]
          if normalized_role in {"engineer", "builder"}:
            return ["architect"]
          return []

        def resolve_auto_upstream(payload: dict, swarm_name: str, stage: str, role: str, run_name: str) -> str:
          predecessors = stage_predecessors(stage, role)
          if not predecessors:
            return "None"
          from urllib.parse import quote

          namespace = as_text(payload.get("metadata", {}).get("namespace"), "agents") if isinstance(payload.get("metadata"), dict) else "agents"
          runs = k8s_request(f"/apis/agents.proompteng.ai/v1alpha1/namespaces/{namespace}/agentruns?labelSelector={quote(f'swarm.proompteng.ai/name={swarm_name}', safe='')}")
          if not isinstance(runs, dict):
            return "None"
          candidates_by_predecessor = {predecessor: [] for predecessor in predecessors}
          for item in runs.get("items", []):
            if not isinstance(item, dict):
              continue
            metadata = item.get("metadata") if isinstance(item.get("metadata"), dict) else {}
            name = as_text(metadata.get("name"))
            if not name or name == run_name:
              continue
            labels = metadata.get("labels") if isinstance(metadata.get("labels"), dict) else {}
            item_stage = as_text(labels.get("swarm.proompteng.ai/stage"))
            item_role = read_field(item, "swarmAgentRole")
            if item_stage not in predecessors and item_role not in predecessors:
              continue
            status = item.get("status") if isinstance(item.get("status"), dict) else {}
            if as_text(status.get("phase")).lower() != "succeeded":
              continue
            workflow = status.get("workflow") if isinstance(status.get("workflow"), dict) else {}
            steps = workflow.get("steps") if isinstance(workflow.get("steps"), list) else []
            last_step = steps[-1] if steps and isinstance(steps[-1], dict) else {}
            job_ref = last_step.get("jobRef") if isinstance(last_step.get("jobRef"), dict) else {}
            job_name = as_text(job_ref.get("name"))
            if not job_name:
              continue
            finished = as_text(status.get("finishedAt")) or as_text(status.get("updatedAt")) or as_text(metadata.get("creationTimestamp"))
            candidate = {"name": name, "stage": item_stage or item_role, "finished": finished, "job": job_name}
            for predecessor in predecessors:
              if item_stage == predecessor or item_role == predecessor:
                candidates_by_predecessor[predecessor].append(candidate)
          for predecessor in predecessors:
            candidates = candidates_by_predecessor[predecessor]
            candidates.sort(key=lambda item: item["finished"], reverse=True)
            for candidate in candidates:
              result = extract_result(read_pod_log(namespace, candidate["job"]))
              if result:
                return "\n".join([
                  f"Auto-discovered upstream run: {candidate['name']}",
                  f"Auto-discovered upstream stage: {candidate['stage']}",
                  "",
                  result,
                ])
          return "None"

        def publish_handoff(subject: str, handoff: dict) -> None:
          nats_path = "/usr/local/bin/nats"
          nats_url = os.environ.get("NATS_URL", "").strip()
          if not nats_url or not Path(nats_path).exists():
            return
          command = [nats_path, "--server", nats_url]
          user = os.environ.get("NATS_USER", "").strip()
          password = os.environ.get("NATS_PASSWORD", "").strip()
          if user:
            command.extend(["--user", user])
          if password:
            command.extend(["--password", password])
          command.extend(["pub", subject, json.dumps(handoff, sort_keys=True)])
          subprocess.run(command, check=False, timeout=20)

        def subject_part(value: str, default: str) -> str:
          text = as_text(value, default)
          normalized = "".join(char if char.isalnum() or char in {"-", "_"} else "-" for char in text)
          normalized = "-".join(part for part in normalized.split("-") if part)
          return normalized or default

        def handoff_subject(payload: dict, swarm_name: str, role: str, run_name: str, suffix: str = "") -> str:
          prefix = read_field(payload, "natsSubjectPrefix", "workflow")
          channel = read_field(payload, "natsChannel", "general")
          parts = [
            subject_part(prefix, "workflow"),
            subject_part(channel, "general"),
            "swarm",
            subject_part(swarm_name, "unknown-swarm"),
            subject_part(role, "worker"),
            subject_part(run_name, "unknown-run"),
          ]
          if suffix:
            parts.append(subject_part(suffix, "handoff"))
          return ".".join(parts)

        def role_guidance(role: str, stage: str) -> str:
          normalized_stage = stage.lower().strip()
          normalized_role = role.lower().strip()
          if normalized_stage in {"discover", "plan"} or normalized_role == "architect":
            return "Architect duty: preserve team momentum by turning runtime evidence into a precise blocker, plan, or next action."
          if normalized_stage == "implement" or normalized_role == "engineer":
            return "Engineer duty: consume the prior handoff and produce a concrete repair path or implementation checklist that a code-capable worker can execute."
          if normalized_stage == "verify" or normalized_role == "deployer":
            return "Deployer duty: consume the implementation handoff, give a go/no-go, identify rollout risk, and name the exact next verification action."
          return "Worker duty: consume upstream context, add one useful contribution, and hand off the exact next action."

        def summarize_upstream(upstream: str) -> str:
          if upstream.strip() == "None":
            return "None"
          run = ""
          stage = ""
          for line in upstream.splitlines():
            if line.startswith("Auto-discovered upstream run:"):
              run = line.split(":", 1)[1].strip()
            elif line.startswith("Auto-discovered upstream stage:"):
              stage = line.split(":", 1)[1].strip()
          if run and stage:
            return f"Auto-discovered upstream run: {run}\nAuto-discovered upstream stage: {stage}"
          if run:
            return f"Auto-discovered upstream run: {run}"
          return "Prior handoff was present but did not include structured run metadata."

        def next_action_for_stage(role: str, stage: str, objective: str) -> str:
          normalized_stage = stage.lower().strip()
          normalized_role = role.lower().strip()
          if normalized_stage == "discover":
            return f"Plan from the discovered blocker and preserve the objective: {objective}"
          if normalized_stage == "plan":
            return "Implement the planned repair path once a code-capable Codex worker is available."
          if normalized_stage == "implement":
            return "Verify the implementation handoff, rollout risk, and business evidence before declaring readiness."
          if normalized_stage == "verify":
            return "Escalate the primary provider outage if rollout proof still depends on code-capable Codex execution."
          if normalized_role == "architect":
            return f"Turn the blocker into a concrete execution plan for: {objective}"
          if normalized_role in {"engineer", "builder"}:
            return "Convert the prior plan into a narrow code change when primary provider capacity returns."
          if normalized_role in {"deployer", "reviewer"}:
            return "Validate the prior worker output against runtime evidence and call out any missing proof."
          return f"Carry forward the upstream context and add the next useful contribution toward: {objective}"

        def compact_model_note(content: str) -> str:
          kept: list[str] = []
          for line in content.splitlines():
            stripped = line.strip()
            if not stripped:
              continue
            if stripped.startswith("#"):
              continue
            lowered = stripped.lower()
            if "auto-discovered upstream" in lowered or "upstream handoff" in lowered:
              continue
            kept.append(stripped)
          return "\n".join(kept)[:1500].strip()

        def render_fallback_result(
          *,
          identity: str,
          role: str,
          stage: str,
          upstream: str,
          objective: str,
          business_metric: str,
          evidence_url: str,
          model_note: str,
        ) -> str:
          upstream_read = summarize_upstream(upstream)
          next_action = next_action_for_stage(role, stage, objective)
          contribution = role_guidance(role, stage)
          if model_note:
            contribution = f"{contribution}\n\nAdditional HF note:\n{model_note}"
          return "\n".join([
            "## Role",
            f"{identity} ({role}) acting as fallback swarm teammate for stage `{stage}`.",
            "",
            "## Primary Provider Blocker",
            "Primary Codex execution failed because the provider was unavailable due to auth or capacity, so this is a fallback coordination artifact rather than a completed code change.",
            "",
            "## Upstream Read",
            upstream_read,
            "",
            "## Contribution",
            contribution,
            "",
            "## Evidence",
            f"Business metric: {business_metric}",
            f"Business evidence URL: {evidence_url or 'unavailable'}",
            "",
            "## Handoff",
            next_action,
            "",
            "## Value Created",
            "The swarm preserved a structured handoff, kept stage-to-stage context intact, and avoided converting a provider outage into silent team drift.",
          ])

        def main() -> int:
          event_path = Path(sys.argv[1] if len(sys.argv) > 1 else "/workspace/run.json")
          log_path = Path(sys.argv[2]) if len(sys.argv) > 2 else Path("/workspace/.agent/runner.log")
          payload = json.loads(event_path.read_text(encoding="utf-8"))
          token = os.environ.get("HF_TOKEN", "").strip()
          if not token:
            raise RuntimeError("HF_TOKEN is required for Codex provider fallback")

          env_run_name = os.environ.get("AGENT_RUN_NAME", "").strip()
          run_name = read_field(payload, "name", env_run_name or as_text(payload.get("metadata", {}).get("name"), "unknown-run"))
          repository = read_field(payload, "repository", "unknown")
          base = read_field(payload, "base", "main")
          head = read_field(payload, "head", "unknown")
          swarm_name = read_field(payload, "swarmName", "unknown-swarm")
          team_name = read_field(payload, "swarmTeamName", swarm_name)
          stage = read_field(payload, "swarmStage", read_field(payload, "stage", "unknown"))
          role = read_field(payload, "swarmAgentRole", "worker")
          identity = read_field(payload, "swarmAgentIdentity", role)
          objective = read_field(payload, "objective", "preserve swarm collaboration while primary provider is unavailable")
          business_metric = read_field(payload, "swarmBusinessMetric", "unavailable")
          evidence_url = read_field(payload, "swarmBusinessEvidenceUrl", "")
          failure_tail = log_path.read_text(encoding="utf-8", errors="replace")[-4000:] if log_path.exists() else ""
          upstream = resolve_auto_upstream(payload, swarm_name, stage, role, run_name)

          print("SWARM_CODEX_HF_FALLBACK_UPSTREAM_BEGIN")
          print(upstream)
          print("SWARM_CODEX_HF_FALLBACK_UPSTREAM_END")

          messages = [
            {
              "role": "system",
              "content": (
                "You are a fallback swarm teammate activated only because the primary Codex worker "
                "hit provider auth or capacity failure before completing work. Be explicit that this "
                "is a fallback coordination artifact, not a completed code change. Do not invent file "
                "inspections, commands, PRs, tests, or rollout proof. Create useful team value by "
                "preserving context, consuming upstream handoff, identifying the blocker, and naming "
                "the exact next action for a code-capable worker."
              ),
            },
            {
              "role": "user",
              "content": "\n".join([
                f"Repository: {repository}",
                f"Base branch: {base}",
                f"Head branch: {head}",
                f"Swarm: {swarm_name}",
                f"Team: {team_name}",
                f"Worker identity: {identity}",
                f"Stage: {stage}",
                f"Role: {role}",
                role_guidance(role, stage),
                f"Objective: {objective}",
                f"Business metric: {business_metric}",
                f"Business evidence URL: {evidence_url}",
                "",
                "Primary Codex failure tail:",
                failure_tail,
                "",
                "The wrapper will render authoritative upstream run and stage facts.",
                "Do not mention upstream run or upstream stage. Return 2-4 concise bullets with only additional teammate observations.",
              ]),
            },
          ]

          model = os.environ.get("HF_MODEL", "meta-llama/Llama-3.1-8B-Instruct:novita").strip()
          model_note = compact_model_note(chat_completion(os.environ.get("HF_BASE_URL", "https://router.huggingface.co/v1"), token, model, messages))
          content = render_fallback_result(
            identity=identity,
            role=role,
            stage=stage,
            upstream=upstream,
            objective=objective,
            business_metric=business_metric,
            evidence_url=evidence_url,
            model_note=model_note,
          )
          output_dir = Path("/workspace/.agent")
          output_dir.mkdir(parents=True, exist_ok=True)
          (output_dir / "hf-fallback-result.md").write_text(content + "\n", encoding="utf-8")
          handoff = {
            "schema_version": "swarm.codex-hf-fallback.v1",
            "generated_at": now_iso(),
            "run": run_name,
            "repository": repository,
            "swarm": swarm_name,
            "stage": stage,
            "role": role,
            "identity": identity,
            "model": model,
            "primary_failure_tail": failure_tail,
            "upstream_read": summarize_upstream(upstream),
            "model_note": model_note,
            "content": content,
          }
          (output_dir / "status.json").write_text(json.dumps({"status": "hf_fallback_succeeded", **handoff}, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          publish_handoff(handoff_subject(payload, swarm_name, role, run_name, "fallback"), handoff)
          print("SWARM_CODEX_HF_FALLBACK_RESULT_BEGIN")
          print(content)
          print("SWARM_CODEX_HF_FALLBACK_RESULT_END")
          return 0

        if __name__ == "__main__":
          try:
            raise SystemExit(main())
          except Exception as error:
            print(f"Codex HF fallback failed: {error}", file=sys.stderr)
            raise SystemExit(1)
  outputArtifacts:
    - name: runner-log
      path: /workspace/.agent/runner.log
    - name: runner-status
      path: /workspace/.agent/status.json
