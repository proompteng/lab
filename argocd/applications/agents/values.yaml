          base: main
          head: codex/agents-smoke
          issueNumber: swarm-codex-smoke
          issueTitle: Codex Spark smoke validation
          objective: verify deterministic app-server runner protocol and the promoted runner image without VCS or external model
            calls
        secrets:
          - codex-auth
