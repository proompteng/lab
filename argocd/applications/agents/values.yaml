replicaCount: 1
image:
  repository: registry.ide-newton.ts.net/lab/jangar
  tag: 42e2cafa
  digest: sha256:b02a53a8f8f1869bfdd234db9a06f49cc75acfe5e4e95cacacfd6c993ce2f2ce
  pullPolicy: IfNotPresent
imagePolicy:
  requireDigest: true
nodeSelector:
  kubernetes.io/arch: arm64
controlPlane:
  image:
    repository: registry.ide-newton.ts.net/lab/jangar-control-plane
    tag: 42e2cafa
    digest: sha256:d629b5892d0ece0f20b47cb06ff275f22feb6486bda00a9f025d1da1a31cf710
  env:
    vars:
      JANGAR_CONTROL_PLANE_CACHE_ENABLED: "true"
      JANGAR_TORGHUT_STATUS_URL: http://torghut.torghut.svc.cluster.local/trading/consumer-evidence
      JANGAR_TORGHUT_STATUS_TIMEOUT_MS: "3000"
runner:
  image:
    repository: registry.ide-newton.ts.net/lab/jangar
    tag: 42e2cafa
    digest: sha256:b02a53a8f8f1869bfdd234db9a06f49cc75acfe5e4e95cacacfd6c993ce2f2ce
argocdHooks:
  enabled: true
  image:
    repository: alpine/k8s
    tag: 1.30.11
    digest: sha256:aff9e683cf3950861a806b89404c5d5b4f8d6d4ab527c6da567df71b4cd4f970
  postSync:
    enabled: false
  smoke:
    agentRun:
      apiVersion: agents.proompteng.ai/v1alpha1
      kind: AgentRun
      metadata:
        name: codex-spark-smoke
      spec:
        agentRef:
          name: codex-spark-smoke-agent
        implementationSpecRef:
          name: codex-spark-smoke-implspec
        runtime:
          type: workflow
          config:
            serviceAccountName: agents-sa
        ttlSecondsAfterFinished: 1800
        workflow:
          steps:
            - name: smoke
              timeoutSeconds: 900
              parameters:
                stage: implementation
        parameters:
          repository: proompteng/lab
          base: main
          head: codex/swarm-smoke
          issueNumber: swarm-codex-smoke
          issueTitle: Codex Spark smoke validation
          objective: verify codex auth.json startup, provider startup, and the promoted runner image without VCS or external side
            effects
        vcsRef:
          name: github
        vcsPolicy:
          required: true
          mode: read-write
        secrets:
          - github-token
          - codex-auth
controllers:
  enabled: true
  replicaCount: 2
  autoscaling:
    enabled: false
  env:
    vars:
      JANGAR_AGENT_RUNNER_NATS_AUTH_SECRET_NAME: nats-agents-credentials
      JANGAR_AGENT_RUNNER_NATS_AUTH_USERNAME_KEY: username
      JANGAR_AGENT_RUNNER_NATS_AUTH_PASSWORD_KEY: password
      JANGAR_WHITEPAPER_FINALIZE_ENABLED: "true"
      JANGAR_WHITEPAPER_FINALIZE_BASE_URL: http://torghut.torghut.svc.cluster.local
      JANGAR_WHITEPAPER_FINALIZE_USE_SERVICE_ACCOUNT_TOKEN: "true"
resources:
  requests:
    cpu: 200m
    memory: 512Mi
readinessProbe:
  timeoutSeconds: 5
controller:
  defaultWorkload:
    nodeSelector:
      kubernetes.io/arch: arm64
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
        ephemeral-storage: 8Gi
      limits:
        memory: 8Gi
        ephemeral-storage: 16Gi
  namespaces:
    - agents
  concurrency:
    perNamespace: 14
    perAgent: 10
  queue:
    perRepo: 200
  agentRunRetentionSeconds: 604800
  jobTtlSeconds: 86400
  jobTtlSecondsAfterFinished: 86400
  logRetentionSeconds: 604800
  authSecret:
    name: codex-auth
    key: auth.json
    mountPath: /root/.codex
rbac:
  clusterScoped: true
  extraRules:
    - apiGroups:
        - apiextensions.k8s.io
      resources:
        - customresourcedefinitions
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - ""
      resources:
        - endpoints
        - services
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - discovery.k8s.io
      resources:
        - endpointslices
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - apps
      resources:
        - deployments
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - argoproj.io
      resources:
        - applications
      verbs:
        - get
        - list
        - watch
database:
  secretRef:
    name: jangar-db-app
    key: uri
agentComms:
  enabled: true
  nats:
    url: nats://nats.nats.svc.cluster.local:4222
    userSecret:
      name: nats-agents-credentials
      usernameKey: username
      passwordKey: password
grpc:
  enabled: true
  port: 50051
  servicePort: 50051
  serviceType: ClusterIP
env:
  vars:
    JANGAR_GRPC_ENABLED: "true"
    JANGAR_GRPC_HOST: 0.0.0.0
    JANGAR_GRPC_PORT: "50051"
    JANGAR_GITHUB_REPOS_ALLOWED: proompteng/lab
    JANGAR_DB_POOL_MAX: "4"
    JANGAR_MEMORY_DB_POOL_MAX: "2"
    JANGAR_AGENTS_CONTROLLER_REPO_CONCURRENCY_OVERRIDES: "{}"
    OPENAI_API_BASE_URL: http://saigak.saigak.svc.cluster.local:11434/v1
    OPENAI_EMBEDDING_API_BASE_URL: http://saigak.saigak.svc.cluster.local:11434/v1
    OPENAI_EMBEDDING_MODEL: qwen3-embedding-saigak:8b
    OPENAI_EMBEDDING_DIMENSION: "4096"
    OPENAI_EMBEDDING_TIMEOUT_MS: "120000"
  secrets:
    - name: GITHUB_TOKEN
      secretName: github-token
      key: token
envFromSecretRefs: []
