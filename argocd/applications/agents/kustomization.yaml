apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agents
resources:
  - codex-auth-sealedsecret.yaml
  - hf-router-token-sealedsecret.yaml
  - codex-secretbinding.yaml
  - codex-agent.yaml
  - codex-spark-agent.yaml
  - codex-spark-smoke-agentprovider.yaml
  - codex-spark-smoke-agent.yaml
  - codex-spark-smoke-agent-system-prompt-configmap.yaml
  - codex-spark-smoke-implspec.yaml
  - codex-agentprovider.yaml
  - codex-spark-agentprovider.yaml
  - codex-agent-system-prompt-configmap.yaml
  - codex-versioncontrolprovider.yaml
  - sample-approvalpolicy.yaml
  - sample-budget.yaml
  - sample-signal.yaml
  - tailscale-service.yaml
  - tailscale-networkpolicy.yaml
  - alloy-rbac.yaml
  - alloy-configmap.yaml
  - alloy-deployment.yaml
helmGlobals:
  chartHome: ../../../charts
helmCharts:
  - name: agents
    releaseName: agents
    namespace: agents
    valuesFile: values.yaml
    includeCRDs: true
