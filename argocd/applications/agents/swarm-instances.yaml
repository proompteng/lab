apiVersion: swarm.proompteng.ai/v1alpha1
kind: Swarm
metadata:
  name: jangar-control-plane
  namespace: agents
spec:
  owner:
    id: platform-owner
    channel: swarm://owner/platform
  domains:
    - platform-reliability
    - platform-evolution
  objectives:
    - operate as the Jangar Engineering team in Huly (tracker, chat, documents)
    - continuously discover and implement control-plane improvements
    - deliver Torghut platform requirements safely to production
  mode: lights-out
  timezone: UTC
  cadence:
    discoverEvery: 1h
    planEvery: 1h
    implementEvery: 1h
    verifyEvery: 1h
  integrations:
    huly:
      baseUrl: http://transactor.huly.svc.cluster.local
      workspace: proompteng
      project: DefaultProject
      skillRef: skills/huly-api/SKILL.md
      authSecretRef:
        name: huly-api-jangar
      personas:
        architect:
          humanName: Victor Chen
          workerIdentity: victor-chen-jangar-architect
          tokenKey: HULY_API_TOKEN_VICTOR_CHEN_JANGAR_ARCHITECT
          expectedActorIdKey: HULY_EXPECTED_ACTOR_ID_VICTOR_CHEN_JANGAR_ARCHITECT
        engineer:
          humanName: Elise Novak
          workerIdentity: elise-novak-jangar-engineer
          tokenKey: HULY_API_TOKEN_ELISE_NOVAK_JANGAR_ENGINEER
          expectedActorIdKey: HULY_EXPECTED_ACTOR_ID_ELISE_NOVAK_JANGAR_ENGINEER
        deployer:
          humanName: Marco Silva
          workerIdentity: marco-silva-jangar-deployer
          tokenKey: HULY_API_TOKEN_MARCO_SILVA_JANGAR_DEPLOYER
          expectedActorIdKey: HULY_EXPECTED_ACTOR_ID_MARCO_SILVA_JANGAR_DEPLOYER
  discovery:
    minCitations: 2
    minConfidence: 0.75
    sources:
      - name: internet-research
      - name: runtime-alerts
      - name: huly-requirements
  delivery:
    repoAllowlist:
      - proompteng/lab
    requiredChecks:
      - lint
      - type-check
      - unit-tests
    mergePolicy: merge-queue
    deploymentTargets:
      - agents
    rollout:
      strategy: canary
      steps:
        - setWeight: 10
          pause: 5m
        - setWeight: 30
          pause: 10m
        - setWeight: 100
          pause: 0m
      analysisTemplateRef: default-canary-analysis
  risk:
    budgetRef: default-budget
    approvalPolicyRef: default-approval
    freezeAfterFailures: 3
    freezeDuration: 60m
  execution:
    discover:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-discover-template
    plan:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-plan-template
    implement:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-implement-template
    verify:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-verify-template
---
apiVersion: swarm.proompteng.ai/v1alpha1
kind: Swarm
metadata:
  name: torghut-quant
  namespace: agents
spec:
  owner:
    id: trading-owner
    channel: swarm://owner/trading
  domains:
    - quant-research
    - autonomous-trading
  objectives:
    - operate as the Torghut Traders team in Huly (tracker, chat, documents)
    - continuously discover and implement quant alpha and risk-control improvements
    - issue platform requirements to jangar-control-plane via Huly requirement channels
  mode: lights-out
  timezone: UTC
  cadence:
    discoverEvery: 1h
    planEvery: 1h
    implementEvery: 1h
    verifyEvery: 1h
  integrations:
    huly:
      baseUrl: http://transactor.huly.svc.cluster.local
      workspace: proompteng
      project: DefaultProject
      skillRef: skills/huly-api/SKILL.md
      authSecretRef:
        name: huly-api-torghut
      personas:
        architect:
          humanName: Gideon Park
          workerIdentity: gideon-park-torghut-architect
          tokenKey: HULY_API_TOKEN_GIDEON_PARK_TORGHUT_ARCHITECT
          expectedActorIdKey: HULY_EXPECTED_ACTOR_ID_GIDEON_PARK_TORGHUT_ARCHITECT
        engineer:
          humanName: Naomi Ibarra
          workerIdentity: naomi-ibarra-torghut-engineer
          tokenKey: HULY_API_TOKEN_NAOMI_IBARRA_TORGHUT_ENGINEER
          expectedActorIdKey: HULY_EXPECTED_ACTOR_ID_NAOMI_IBARRA_TORGHUT_ENGINEER
        deployer:
