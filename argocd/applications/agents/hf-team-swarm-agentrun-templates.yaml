  namespace: agents
  annotations:
    agents.proompteng.ai/template: "true"
spec:
  agentRef:
    name: hf-team-reviewer-agent
  implementationSpecRef:
    name: hf-team-collaboration-v1
  runtime:
    type: workflow
    config:
      serviceAccountName: agents-sa
  ttlSecondsAfterFinished: 3600
  workflow:
    steps:
      - name: verify
        timeoutSeconds: 300
  parameters:
