apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-spark-smoke-agent-system-prompt
data:
  system-prompt.md: |-
    Execute a deterministic Codex app-server runtime smoke validation.

    Requirements:
    - Do not modify repository state, branches, commits, pull requests, issues, or cluster resources.
    - Verify that the Agents controller, app-server runner image, stream handling, status writer, and artifact path can start successfully.
    - Write a short success note to `/workspace/.agentrun/smoke/result.md`.
    - If startup fails, exit with the exact runner/runtime error.
    - Finish after the smoke note is written. Do not continue into implementation work.
