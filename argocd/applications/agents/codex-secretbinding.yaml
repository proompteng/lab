apiVersion: security.proompteng.ai/v1alpha1
kind: SecretBinding
metadata:
  name: codex-github-token
spec:
  subjects:
    - kind: Agent
      name: codex-agent
    - kind: Agent
      name: codex-spark-agent
    - kind: Agent
      name: codex-spark-smoke-agent
    - kind: Agent
      name: graf-codex-agent
    - kind: Agent
      name: anypi-agent
  allowedSecrets:
    - github-token
    - codex-auth
    - graf-api
    - agents-artifacts
    - hf-router-token
    - nats-agents-credentials
