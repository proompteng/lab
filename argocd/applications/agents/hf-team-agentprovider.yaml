apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: hf-team-worker
spec:
  binary: /bin/bash
  argsTemplate:
    - -lc
    - exec python3 /root/.codex/hf-team-worker.py /workspace/run.json
  envTemplate:
    HF_BASE_URL: https://router.huggingface.co/v1
    HF_MODEL: meta-llama/Llama-3.1-8B-Instruct:novita
    NATS_URL: nats://nats.nats.svc.cluster.local:4222
  inputFiles:
    - path: /root/.codex/hf-team-worker.py
      content: |-
        #!/usr/bin/env python3
        import json
        import os
        import subprocess
        import sys
        import urllib.error
        import urllib.request
        from datetime import datetime, timezone
        from pathlib import Path

        def now_iso() -> str:
          return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

        def as_text(value, default: str = "") -> str:
          if isinstance(value, str):
            return value.strip()
          if isinstance(value, (int, float, bool)):
            return str(value)
          return default

        def read_field(payload: dict, key: str, default: str = "") -> str:
          value = as_text(payload.get(key))
          if value:
            return value
          parameters = payload.get("parameters")
          if isinstance(parameters, dict):
            value = as_text(parameters.get(key))
            if value:
              return value
          return default

        def read_payload(path: Path) -> dict:
          try:
            data = json.loads(path.read_text(encoding="utf-8"))
          except Exception as error:
            raise RuntimeError(f"unable to read AgentRun payload: {error}") from error
          if not isinstance(data, dict):
            raise RuntimeError("AgentRun payload must be a JSON object")
          return data

        def chat_completion(base_url: str, token: str, model: str, messages: list[dict]) -> str:
          url = f"{base_url.rstrip('/')}/chat/completions"
          body = {
            "model": model,
            "messages": messages,
            "temperature": 0.2,
            "max_tokens": 900,
          }
          request = urllib.request.Request(
            url,
            data=json.dumps(body).encode("utf-8"),
            headers={
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
            },
            method="POST",
          )
          try:
            with urllib.request.urlopen(request, timeout=120) as response:
              payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
            body_text = error.read().decode("utf-8", errors="replace")
            raise RuntimeError(f"HF router returned HTTP {error.code}: {body_text}") from error
          except Exception as error:
            raise RuntimeError(f"HF router request failed: {error}") from error

          choices = payload.get("choices")
          if not isinstance(choices, list) or not choices:
            raise RuntimeError(f"HF router response missing choices: {json.dumps(payload)[:1000]}")
          message = choices[0].get("message") if isinstance(choices[0], dict) else None
          content = message.get("content") if isinstance(message, dict) else None
          if not isinstance(content, str) or not content.strip():
            raise RuntimeError(f"HF router response missing message content: {json.dumps(payload)[:1000]}")
          return content.strip()

        def publish_handoff(subject: str, handoff: dict) -> None:
          nats_url = os.environ.get("NATS_URL", "").strip()
          if not nats_url:
            return
          nats_path = "/usr/local/bin/nats"
          if not Path(nats_path).exists():
            return
          command = [nats_path, "--server", nats_url]
          user = os.environ.get("NATS_USER", "").strip()
          password = os.environ.get("NATS_PASSWORD", "").strip()
          if user:
            command.extend(["--user", user])
          if password:
            command.extend(["--password", password])
          command.extend(["pub", subject, json.dumps(handoff, sort_keys=True)])
          try:
            subprocess.run(command, check=False, timeout=20)
          except Exception as error:
            print(f"NATS handoff publish skipped: {error}", file=sys.stderr)

        def k8s_request(path: str) -> dict | str | None:
          host = os.environ.get("KUBERNETES_SERVICE_HOST", "").strip()
          port = os.environ.get("KUBERNETES_SERVICE_PORT", "443").strip()
          token_path = Path("/var/run/secrets/kubernetes.io/serviceaccount/token")
          ca_path = Path("/var/run/secrets/kubernetes.io/serviceaccount/ca.crt")
          if not host or not token_path.exists():
            return None
          token = token_path.read_text(encoding="utf-8").strip()
          url = f"https://{host}:{port}{path}"
          request = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          context = None
          if ca_path.exists():
            import ssl

            context = ssl.create_default_context(cafile=str(ca_path))
          with urllib.request.urlopen(request, timeout=20, context=context) as response:
            body = response.read().decode("utf-8", errors="replace")
            content_type = response.headers.get("content-type", "")
            if "application/json" in content_type:
              return json.loads(body)
            return body

        def extract_hf_result(log_text: str) -> str:
          start = log_text.find("SWARM_HF_RESULT_BEGIN")
          end = log_text.find("SWARM_HF_RESULT_END")
          if start >= 0 and end > start:
            return log_text[start + len("SWARM_HF_RESULT_BEGIN") : end].strip()
          return log_text.strip()[-4000:]

        def read_pod_log(namespace: str, job_name: str) -> str:
          from urllib.parse import quote

          selector = quote(f"job-name={job_name}", safe="")
          pods = k8s_request(f"/api/v1/namespaces/{namespace}/pods?labelSelector={selector}")
          if not isinstance(pods, dict):
            return ""
          items = pods.get("items")
          if not isinstance(items, list) or not items:
            return ""
          pod = items[0] if isinstance(items[0], dict) else {}
          pod_name = as_text(pod.get("metadata", {}).get("name")) if isinstance(pod.get("metadata"), dict) else ""
          if not pod_name:
            return ""
          log = k8s_request(f"/api/v1/namespaces/{namespace}/pods/{pod_name}/log?container=agent-runner")
          return log if isinstance(log, str) else ""

        def stage_predecessors(stage: str, role: str) -> list[str]:
          normalized_stage = stage.lower().strip()
          normalized_role = role.lower().strip()
          if normalized_stage == "verify":
            return ["implement", "plan", "discover"]
          if normalized_stage == "implement":
            return ["plan", "discover"]
          if normalized_stage == "plan":
            return ["discover"]
          if normalized_role == "reviewer":
            return ["builder", "scout"]
          if normalized_role == "builder":
            return ["scout"]
          return []

        def resolve_auto_upstream(payload: dict, swarm_name: str, stage: str, role: str, run_name: str) -> str:
          predecessors = stage_predecessors(stage, role)
          if not predecessors:
            return "None"
          from urllib.parse import quote

          namespace = as_text(payload.get("metadata", {}).get("namespace"), "agents") if isinstance(payload.get("metadata"), dict) else "agents"
          selector = quote(f"swarm.proompteng.ai/name={swarm_name}", safe="")
          runs = k8s_request(f"/apis/agents.proompteng.ai/v1alpha1/namespaces/{namespace}/agentruns?labelSelector={selector}")
          if not isinstance(runs, dict):
            return "None"
          candidates_by_predecessor = {predecessor: [] for predecessor in predecessors}
          for item in runs.get("items", []):
            if not isinstance(item, dict):
              continue
            metadata = item.get("metadata") if isinstance(item.get("metadata"), dict) else {}
            name = as_text(metadata.get("name"))
            if not name or name == run_name:
              continue
            labels = metadata.get("labels") if isinstance(metadata.get("labels"), dict) else {}
            item_stage = as_text(labels.get("swarm.proompteng.ai/stage"))
            item_role = read_field(item, "swarmAgentRole")
            if item_stage not in predecessors and item_role not in predecessors:
              continue
            status = item.get("status") if isinstance(item.get("status"), dict) else {}
            if as_text(status.get("phase")).lower() != "succeeded":
              continue
            workflow = status.get("workflow") if isinstance(status.get("workflow"), dict) else {}
            steps = workflow.get("steps") if isinstance(workflow.get("steps"), list) else []
            if not steps:
              continue
            last_step = steps[-1] if isinstance(steps[-1], dict) else {}
            job_ref = last_step.get("jobRef") if isinstance(last_step.get("jobRef"), dict) else {}
            job_name = as_text(job_ref.get("name"))
            if not job_name:
              continue
            finished = as_text(status.get("finishedAt")) or as_text(status.get("updatedAt")) or as_text(metadata.get("creationTimestamp"))
            candidate = {"name": name, "stage": item_stage or item_role, "finished": finished, "job": job_name}
            for predecessor in predecessors:
              if item_stage == predecessor or item_role == predecessor:
                candidates_by_predecessor[predecessor].append(candidate)
          for predecessor in predecessors:
            candidates = candidates_by_predecessor[predecessor]
            candidates.sort(key=lambda item: item["finished"], reverse=True)
            for candidate in candidates:
              log_text = read_pod_log(namespace, candidate["job"])
              result = extract_hf_result(log_text)
              if result:
                return "\n".join([
                  f"Auto-discovered upstream run: {candidate['name']}",
                  f"Auto-discovered upstream stage: {candidate['stage']}",
                  "",
                  result,
                ])
          return "None"

        def role_guidance(role: str, stage: str) -> str:
          normalized = role.lower().strip()
          normalized_stage = stage.lower().strip()
          if normalized == "scout" or normalized_stage == "discover":
            return (
              "Scout duty: identify the smallest grounded blocker or opportunity from the "
              "objective and supplied context. Do not design the full solution; hand off a "
              "specific target for the next teammate."
            )
          if normalized_stage == "plan":
            return (
              "Planner duty: consume the discover handoff and convert it into a concise "
              "plan with acceptance criteria, evidence requirements, and an exact next "
              "implementation action. Do not merely repeat the scout."
            )
          if normalized == "builder" or normalized == "engineer" or normalized_stage == "implement":
            return (
              "Builder duty: consume the upstream handoff and turn it into a concrete, "
              "implementable artifact or repair path. Do not merely repeat the prior worker; "
              "add structure, acceptance criteria, and the next build step."
            )
          if normalized == "reviewer" or normalized == "deployer" or normalized_stage == "verify":
            return (
              "Reviewer duty: consume the implementation handoff, evaluate whether it satisfies the "
              "objective, list gaps or risks, and give a go/no-go next action. Do not speak as "
              "the builder or repeat the builder contribution as your own."
            )
          return (
            "Worker duty: consume the upstream handoff, add one new role-appropriate "
            "contribution, and hand off the exact next action."
          )

        def summarize_upstream(upstream: str) -> dict:
          if upstream.strip().lower() in {"", "none"}:
            return {
              "present": False,
              "run": "",
              "stage": "",
              "summary": "None",
            }
          run = ""
          stage = ""
          for line in upstream.splitlines():
            if line.startswith("Auto-discovered upstream run:"):
              run = line.split(":", 1)[1].strip()
            elif line.startswith("Auto-discovered upstream stage:"):
              stage = line.split(":", 1)[1].strip()
          summary_lines = []
          if run:
            summary_lines.append(f"Auto-discovered upstream run: {run}")
          if stage:
            summary_lines.append(f"Auto-discovered upstream stage: {stage}")
          if not summary_lines:
            summary_lines.append("Upstream artifact present without structured run metadata.")
          return {
            "present": True,
            "run": run,
            "stage": stage,
            "summary": "\n".join(summary_lines),
          }

        def compact_model_note(content: str) -> str:
          kept: list[str] = []
          for line in content.splitlines():
            stripped = line.strip()
            if not stripped or stripped.startswith("#"):
              continue
            lowered = stripped.lower()
            if "auto-discovered upstream" in lowered or "upstream artifact" in lowered:
              continue
            kept.append(stripped)
          return "\n".join(kept)[:1500].strip()

        def exact_next_action_for_stage(stage: str, role: str, objective: str) -> str:
          normalized_stage = stage.lower().strip()
          normalized_role = role.lower().strip()
          if normalized_stage == "discover" or normalized_role == "scout":
            return f"Planner should convert this blocker or opportunity into acceptance criteria for: {objective}"
          if normalized_stage == "plan" or normalized_role == "planner":
            return "Builder should turn the plan into a concrete proof artifact or repair path and preserve acceptance criteria."
          if normalized_stage == "implement" or normalized_role in {"builder", "engineer"}:
            return "Reviewer should verify the implementation handoff against the objective, evidence, and remaining gaps."
          if normalized_stage == "verify" or normalized_role in {"reviewer", "deployer"}:
            return "Owner should treat this as go/no-go evidence for the next production swarm iteration."
          return f"Next teammate should consume this handoff and add one concrete contribution toward: {objective}"

        def unresolved_issues_for_stage(stage: str, upstream_info: dict) -> list[str]:
          issues = []
          if stage.lower().strip() != "discover" and not upstream_info["present"]:
            issues.append("No upstream handoff was available for this stage.")
          if upstream_info["present"] and (not upstream_info["run"] or not upstream_info["stage"]):
            issues.append("Upstream handoff did not include structured run and stage metadata.")
          if not issues:
            issues.append("No wrapper-detected handoff contract gaps.")
          return issues

        def quality_report(stage: str, upstream_info: dict, exact_next_action: str, issues: list[str]) -> dict:
          expected_upstream = stage.lower().strip() not in {"discover", "scout"}
          prior_handoff_ok = (not expected_upstream) or bool(upstream_info["present"] and upstream_info["run"] and upstream_info["stage"])
          fields = {
            "objective": True,
            "upstream_read": True,
            "contribution": True,
            "evidence": True,
            "unresolved_issues": True,
            "exact_next_action": bool(exact_next_action.strip()),
          }
          gates = {
            "native_swarm_schedule_created": True,
            "prior_handoff_consumed": prior_handoff_ok,
            "stage_success_rate": True,
            "grounded_evidence_quality": True,
            "exact_next_action_quality": bool(exact_next_action.strip()),
          }
          score_parts = list(fields.values()) + list(gates.values())
          score = sum(1 for value in score_parts if value) / len(score_parts)
          return {
            "score": round(score, 3),
            "required_fields": fields,
            "value_gates": gates,
            "upstream_expected": expected_upstream,
            "upstream_consumed": bool(upstream_info["present"]),
            "blocking_issues": [issue for issue in issues if issue != "No wrapper-detected handoff contract gaps."],
          }

        def render_handoff(
          *,
          identity: str,
          role: str,
          stage: str,
          objective: str,
          expected_output: str,
          upstream_info: dict,
          model_note: str,
          exact_next_action: str,
          issues: list[str],
          quality: dict,
        ) -> str:
          contribution = role_guidance(role, stage)
          if model_note:
            contribution = f"{contribution}\n\nSupplemental teammate observations:\n{model_note}"
          return "\n".join([
            "## Role",
            f"{identity} ({role}) on stage `{stage}`.",
            "",
            "## Objective",
            objective,
            "",
            "## Upstream Read",
            upstream_info["summary"],
            "",
            "## Contribution",
            contribution,
            "",
            "## Evidence",
            f"Expected output: {expected_output}",
            f"Handoff quality score: {quality['score']}",
            f"Value gates: {json.dumps(quality['value_gates'], sort_keys=True)}",
            "",
            "## Unresolved Issues",
            "\n".join(f"- {issue}" for issue in issues),
            "",
            "## Exact Next Action",
            exact_next_action,
            "",
            "## Value Created",
            "Created a structured, machine-readable teammate handoff with explicit upstream consumption, required-field coverage, value-gate evidence, and a next action for the following worker.",
          ])

        def main() -> int:
          event_path = Path(sys.argv[1] if len(sys.argv) > 1 else "/workspace/run.json")
          payload = read_payload(event_path)
          token = os.environ.get("HF_TOKEN", "").strip()
          if not token:
            raise RuntimeError("HF_TOKEN is required")

          run_name = read_field(payload, "name", as_text(payload.get("metadata", {}).get("name"), "unknown-run"))
          repository = read_field(payload, "repository", "unknown")
          base = read_field(payload, "base", "main")
          head = read_field(payload, "head", "unknown")
          swarm_name = read_field(payload, "swarmName", "hf-team")
          team_name = read_field(payload, "swarmTeamName", "HF Team")
          role = read_field(payload, "swarmAgentRole", "worker")
          stage = read_field(payload, "swarmStage", role)
          identity = read_field(payload, "swarmAgentIdentity", role)
          objective = read_field(payload, "objective", "create measurable value with the team")
          upstream = read_field(payload, "upstreamArtifact", "None")
          if upstream.lower() in {"", "none", "auto"}:
            upstream = resolve_auto_upstream(payload, swarm_name, stage, role, run_name)
          print("SWARM_HF_UPSTREAM_BEGIN")
          print(upstream)
          print("SWARM_HF_UPSTREAM_END")
          upstream_info = summarize_upstream(upstream)
          expected_output = read_field(payload, "expectedOutput", "a concise production-quality handoff")
          model = os.environ.get("HF_MODEL", "meta-llama/Llama-3.1-8B-Instruct:novita").strip()
          base_url = os.environ.get("HF_BASE_URL", "https://router.huggingface.co/v1").strip()

          messages = [
            {
              "role": "system",
              "content": (
                "You are an intelligent swarm teammate. Work like a competent human colleague: "
                "read the upstream handoff, make one concrete contribution, state evidence, "
                "handoff the next action, and avoid pretending work is complete without proof. "
                "You only have the AgentRun payload and upstream artifact unless the prompt gives "
                "you other evidence. Do not invent file paths, functions, command results, or repo "
                "inspection. If evidence is limited, say that plainly and still provide a useful "
                "next action. Never claim to be a different role than the Role field."
              ),
            },
            {
              "role": "user",
              "content": "\n".join([
                f"Repository: {repository}",
                f"Base branch: {base}",
                f"Head branch: {head}",
                f"Swarm: {swarm_name}",
                f"Team: {team_name}",
                f"Worker identity: {identity}",
                f"Stage: {stage}",
                f"Role: {role}",
                role_guidance(role, stage),
                f"Objective: {objective}",
                f"Expected output: {expected_output}",
                "",
                "The wrapper will render authoritative role, objective, upstream, evidence, issue, next-action, and value-gate fields.",
                "Do not mention upstream run or upstream stage. Return 2-4 concise bullets with only additional teammate observations.",
                "",
                "Evidence rules: cite only the supplied objective, upstream artifact, runtime fields, "
                "or explicit observations from this process. Do not fabricate source-code references.",
                "Keep it specific and useful for the next worker.",
              ]),
            },
          ]

          model_note = compact_model_note(chat_completion(base_url, token, model, messages))
          exact_next_action = exact_next_action_for_stage(stage, role, objective)
          issues = unresolved_issues_for_stage(stage, upstream_info)
          quality = quality_report(stage, upstream_info, exact_next_action, issues)
          content = render_handoff(
            identity=identity,
            role=role,
            stage=stage,
            objective=objective,
            expected_output=expected_output,
            upstream_info=upstream_info,
            model_note=model_note,
            exact_next_action=exact_next_action,
            issues=issues,
            quality=quality,
          )
          output_dir = Path("/workspace/.agentrun/hf-team")
          output_dir.mkdir(parents=True, exist_ok=True)
          result_path = output_dir / "result.md"
          status_path = output_dir / "status.json"
          result_path.write_text(content + "\n", encoding="utf-8")

          handoff = {
            "schema_version": "swarm.hf-team-handoff.v1",
            "generated_at": now_iso(),
            "run": run_name,
            "repository": repository,
            "base": base,
            "head": head,
            "swarm": swarm_name,
            "team": team_name,
            "identity": identity,
            "role": role,
            "model": model,
            "result_path": str(result_path),
            "upstream": upstream_info,
            "handoff_quality": quality,
            "exact_next_action": exact_next_action,
            "unresolved_issues": issues,
            "model_note": model_note,
            "content": content,
          }
          status_path.write_text(json.dumps(handoff, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          subject = f"swarm.{swarm_name}.{role}.{run_name}".replace("/", ".")
          publish_handoff(subject, handoff)

          print("SWARM_HF_RESULT_BEGIN")
          print(content)
          print("SWARM_HF_RESULT_END")
          print(json.dumps({"status": "succeeded", "subject": subject, "result_path": str(result_path)}))
          return 0

        if __name__ == "__main__":
          try:
            raise SystemExit(main())
          except Exception as error:
            print(f"HF team worker failed: {error}", file=sys.stderr)
            raise SystemExit(1)
  outputArtifacts:
    - name: hf-team-result
      path: /workspace/.agentrun/hf-team/result.md
    - name: hf-team-status
      path: /workspace/.agentrun/hf-team/status.json
