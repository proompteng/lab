apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jangar-agents-api
  namespace: agents
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`jangar.k8s.proompteng.ai`) && PathPrefix(`/api/agents`)
      priority: 100
      services:
        - name: agents
          port: 80
    - kind: Rule
      match: Host(`jangar.k8s.proompteng.ai`) && PathPrefix(`/v1/agent-runs`)
      priority: 100
      services:
        - name: agents
          port: 80
  tls:
    secretName: wildcard-k8s-proompteng-ai-tls
