apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: codex-spark-smoke
spec:
  binary: /bin/bash
  argsTemplate:
    - -lc
    - |-
      set -euo pipefail
      PROMPT_FILE="$(mktemp /tmp/codex-smoke-prompt.XXXXXX.txt)"
      EVENT_FILE="/workspace/run.json"
      DEFAULT_CONFIG="/root/.codex/config.toml"
      PRIMARY_MODEL="${CODEX_MODEL:-gpt-5.3-codex-spark}"
      FALLBACK_MODEL="${CODEX_MODEL_FALLBACKS:-gpt-5.4}"
      LOG_PATH="/workspace/.agentrun/smoke/codex-exec.log"

      python3 - "$EVENT_FILE" "$PROMPT_FILE" <<'PY'
      import json
      import sys
      from pathlib import Path

      event_path = Path(sys.argv[1])
      prompt_path = Path(sys.argv[2])
      payload = json.loads(event_path.read_text(encoding='utf-8'))
      params = payload.get('parameters') or {}

      def read_value(key: str) -> str:
        value = payload.get(key)
        if isinstance(value, str) and value.strip():
          return value.strip()
        value = params.get(key)
        if isinstance(value, str) and value.strip():
          return value.strip()
        return ''

      repository = read_value('repository')
      base = read_value('base')
      head = read_value('head')
      stage = read_value('stage')
      objective = read_value('objective')

      prompt = f"""Execute a read-only Codex runtime smoke validation.

      Requirements:
      - Do not modify repository state, branches, commits, pull requests, issues, Huly artifacts, or cluster resources.
      - Use the mounted Codex config/auth exactly as provided.
      - Verify the configured provider, model, auth secret, and runner image can start successfully.
      - Write `/workspace/.agentrun/smoke/result.md` with:
        - startup status
        - resolved repository/base/head
        - resolved stage
        - one-line confirmation that no repo or external side effects were performed
      - Keep the run short and deterministic.
      - After the file is written, stop immediately and respond with exactly `OK`.

      Resolved inputs:
      - repository: {repository}
      - base: {base}
      - head: {head}
      - stage: {stage}
      - objective: {objective}
      """

      prompt_path.write_text(prompt, encoding='utf-8')
      PY

      mkdir -p /workspace/.agentrun/smoke
      export HOME=/root

      rewrite_config() {
        local model="$1"
        local config_file
        config_file="$(mktemp /tmp/codex-smoke-config.XXXXXX.toml)"
        python3 - "$DEFAULT_CONFIG" "$config_file" "$model" <<'PY'
      from pathlib import Path
      import sys

      source = Path(sys.argv[1]).read_text(encoding='utf-8').splitlines()
      target = Path(sys.argv[2])
      model = sys.argv[3]
      replaced = False
      lines = []
      for line in source:
        if line.strip().startswith('model = '):
          lines.append(f'model = "{model}"')
          replaced = True
        else:
          lines.append(line)
      if not replaced:
        lines.insert(0, f'model = "{model}"')
      target.write_text('\n'.join(lines) + '\n', encoding='utf-8')
      PY
        printf '%s\n' "$config_file"
      }

      can_fallback() {
        grep -Eiq 'usage limit|quota|insufficient_quota|unknown model|model is not supported|not supported when using codex|model unavailable' "$LOG_PATH"
      }

      run_smoke() {
        local model="$1"
        local config_file
        config_file="$(rewrite_config "$model")"
        export CODEX_CONFIG="$config_file"
        if codex exec --skip-git-repo-check -C /workspace < "$PROMPT_FILE" >"$LOG_PATH" 2>&1; then
          rm -f "$config_file"
          return 0
        fi
        local exit_code=$?
        cat "$LOG_PATH" >&2 || true
        rm -f "$config_file"
        return "$exit_code"
      }

      if ! run_smoke "$PRIMARY_MODEL"; then
        if [ -n "$FALLBACK_MODEL" ] && can_fallback; then
          run_smoke "$FALLBACK_MODEL"
        else
          exit 1
        fi
      fi
      test -s /workspace/.agentrun/smoke/result.md
  envTemplate:
    CODEX_LOG_LEVEL: info
    NATS_URL: nats://nats.nats.svc.cluster.local:4222
    HOME: /root
    CODEX_CONFIG: /root/.codex/config.toml
    CODEX_DISABLE_RESUME: "1"
    CODEX_MAX_SESSION_ATTEMPTS: "1"
    CODEX_MODEL: gpt-5.3-codex-spark
    CODEX_MODEL_FALLBACKS: gpt-5.4
  inputFiles:
    - path: /root/.codex/config.toml
      content: |-
        model = "gpt-5.3-codex-spark"
        model_reasoning_summary = "none"
        model_reasoning_effort = "xhigh"
        model_verbosity = "medium"
        approval_policy = "never"
        sandbox_mode = "danger-full-access"
        web_search = "live"
        suppress_unstable_features_warning = true

        [features]
        undo = true
        enable_request_compression = true
        apply_patch_freeform = true
        unified_exec = true
        shell_snapshot = true
        steer = true
        multi_agent = true
        child_agents_md = true
        collaboration_modes = true
        responses_websockets = false

        [shell_environment_policy]
        ignore_default_excludes = true

        [projects."/workspace/lab"]
        trust_level = "trusted"

        [projects."/root"]
        trust_level = "trusted"
  outputArtifacts:
    - name: runner-log
      path: /workspace/.agent/runner.log
    - name: runner-status
      path: /workspace/.agent/status.json
