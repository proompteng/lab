apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: codex-spark-smoke
spec:
  binary: /usr/local/bin/agent-runner
  adapter:
    type: codex-app-server
    codex:
      model: gpt-5.5
      effort: xhigh
      sandbox: danger-full-access
      approval: never
      cwd: /workspace/lab
      prompt: |-
        Execute a read-only Codex app-server runner smoke validation.

        Requirements:
        - Do not modify repository state, branches, commits, pull requests, issues, or cluster resources.
        - Use the mounted Codex config/auth exactly as provided.
        - Verify the configured provider, model, auth secret, app-server runner, and runner image can start successfully.
        - Write `/workspace/.agentrun/smoke/result.md` with:
          - startup status
          - resolved repository/base/head
          - resolved stage
          - one-line confirmation that no repo or external side effects were performed
        - Keep the run short and deterministic.
        - After the file is written, stop immediately and respond with exactly `OK`.

        Resolved inputs:
        - repository: {{ inputs.repository }}
        - base: {{ inputs.base }}
        - head: {{ inputs.head }}
        - stage: {{ inputs.stage }}
        - objective: {{ inputs.objective }}
      goal:
        objective: Validate the Codex app-server Agents runner can start, run one read-only turn, and write the smoke artifact.
      threadConfig:
        mcp_servers: {}
        web_search: live
  argsTemplate: []
  envTemplate:
    CODEX_LOG_LEVEL: info
    HOME: /root
    CODEX_CONFIG: /root/.codex/config.toml
    CODEX_DISABLE_RESUME: "1"
    CODEX_MAX_SESSION_ATTEMPTS: "1"
    CODEX_MODEL: gpt-5.5
  inputFiles:
    - path: /root/.codex/config.toml
      content: |-
        model = "gpt-5.5"
        model_reasoning_summary = "none"
        model_reasoning_effort = "xhigh"
        model_verbosity = "medium"
        approval_policy = "never"
        sandbox_mode = "danger-full-access"
        web_search = "live"
        suppress_unstable_features_warning = true

        [features]
        undo = true
        enable_request_compression = true
        apply_patch_freeform = true
        unified_exec = true
        shell_snapshot = true
        steer = true
        multi_agent = true
        child_agents_md = true
        collaboration_modes = true
        responses_websockets = false
        goals = true

        [shell_environment_policy]
        ignore_default_excludes = true

        [projects."/workspace/lab"]
        trust_level = "trusted"

        [projects."/root"]
        trust_level = "trusted"
  outputArtifacts:
    - name: smoke-result
      path: /workspace/.agentrun/smoke/result.md
    - name: runner-log
      path: /workspace/.agent/runner.log
    - name: runner-status
      path: /workspace/.agent/status.json
