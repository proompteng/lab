apiVersion: orchestration.proompteng.ai/v1alpha1
kind: Orchestration
metadata:
  name: agents-primitives
  namespace: agents
spec:
  entrypoint: main
  steps:
    - name: agent-run
      kind: AgentRun
      agentRef:
        name: agents-primitives-agent
      with:
        repository: proompteng/lab
        base: main
        head: codex/issue-2425-6cedebf4
        stage: implementation
    - name: tool-run
      kind: ToolRun
      dependsOn: [agent-run]
      toolRef:
        name: agents-primitives-tool
      with:
        action: validate
    - name: memory-op
      kind: MemoryOp
      dependsOn: [tool-run]
      memoryRef: agents-primitives
      with:
        operation: write
        payload: '{"event":"memory-op"}'
    - name: approval-gate
      kind: ApprovalGate
      dependsOn: [memory-op]
      policyRef: agents-primitives-approval
    - name: signal-wait
      kind: SignalWait
      dependsOn: [approval-gate]
      with:
        signalRef: agents-primitives-signal
        deliveryId: agents-primitives-delivery
    - name: checkpoint
      kind: Checkpoint
      dependsOn: [signal-wait]
      memoryRef: agents-primitives
      with:
        checkpointId: cp-001
        payload: '{"checkpoint":"cp-001"}'
    - name: sub-orchestration
      kind: SubOrchestration
      dependsOn: [checkpoint]
      orchestrationRef:
        name: agents-primitives-sub
      with:
        parameters: '{"message":"hello"}'
