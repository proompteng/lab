apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: graf-codex
spec:
  binary: /usr/local/bin/agent-runner
  adapter:
    type: codex-app-server
    codex:
      model: gpt-5.5
      effort: high
      sandbox: danger-full-access
      approval: never
      cwd: /workspace/lab
      threadConfig:
        mcp_servers: {}
        web_search: live
  argsTemplate: []
  envTemplate:
    CODEX_LOG_LEVEL: info
    CODEX_GRAF_BASE_URL: http://graf.graf.svc.cluster.local
    NATS_URL: nats://nats.nats.svc.cluster.local:4222
    AGENTS_ARTIFACTS_ENDPOINT: http://observability-minio.minio.svc.cluster.local:9000
    AGENTS_ARTIFACTS_BUCKET: agents-artifacts
    AGENTS_ARTIFACTS_SECURE: "false"
  secretEnv:
    - name: CODEX_GRAF_BEARER_TOKEN
      secretName: graf-api
      key: bearer-tokens
      optional: true
    - name: AGENTS_ARTIFACTS_ACCESS_KEY_ID
      secretName: observability-minio-creds
      key: accesskey
    - name: AGENTS_ARTIFACTS_SECRET_ACCESS_KEY
      secretName: observability-minio-creds
      key: secretkey
    - name: GITHUB_TOKEN
      secretName: github-token
      key: token
      optional: true
  inputFiles:
    - path: /root/.codex/config.toml
      content: |-
        model = "gpt-5.5"
        model_reasoning_summary = "detailed"
        model_reasoning_effort = "high"
        model_verbosity = "medium"
        approval_policy = "never"
        sandbox_mode = "danger-full-access"
        web_search = "live"
        suppress_unstable_features_warning = true

        [features]
        undo = true
        enable_request_compression = true
        apply_patch_freeform = true
        unified_exec = true
        shell_snapshot = true
        steer = true
        multi_agent = true
        child_agents_md = true
        collaboration_modes = true
        responses_websockets = false
        goals = true

        [shell_environment_policy]
        ignore_default_excludes = true

        [projects."/workspace/lab"]
        trust_level = "trusted"

        [projects."/root"]
        trust_level = "trusted"
  outputArtifacts:
    - name: codex-artifact
      path: /workspace/lab/codex-artifact.json
      key: "{{ inputs.artifactKey }}"
    - name: runner-log
      path: /workspace/.agent/runner.log
    - name: runner-status
      path: /workspace/.agent/status.json
