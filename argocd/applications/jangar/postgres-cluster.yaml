apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: jangar-db
spec:
  instances: 2
  primaryUpdateStrategy: unsupervised
  storage:
    storageClass: rook-ceph-block
    size: 300Gi
  bootstrap:
    initdb:
      database: jangar
      owner: jangar
      encoding: "UTF8"
      dataChecksums: true
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS pgcrypto;
        - CREATE EXTENSION IF NOT EXISTS pg_trgm;
        - CREATE EXTENSION IF NOT EXISTS vector;
  backup:
    target: prefer-standby
    barmanObjectStore:
      destinationPath: s3://cnpg
      serverName: jangar-db-live
      endpointURL: http://rook-ceph-rgw-objectstore.rook-ceph.svc.cluster.local:80
      s3Credentials:
        accessKeyId:
          name: cnpg-jangar-db
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-jangar-db
          key: AWS_SECRET_ACCESS_KEY
      data:
        compression: snappy
        jobs: 1
        additionalCommandArgs:
          - --max-bandwidth
          - 8MB
      wal:
        compression: snappy
        maxParallel: 2
    retentionPolicy: "14d"
  inheritedMetadata:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "pgadmin"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "pgadmin"
  monitoring:
    enablePodMonitor: true
# CNPG defaults generate application credentials in `jangar-db-app` (uri, user, password, host, port, dbname)
# and the CA bundle in `jangar-db-ca` (ca.crt). Jangar currently uses `PGSSLMODE=require` and does not pass
# `sslrootcert` URL params (Bun’s Postgres client treats those as server GUCs and errors).
