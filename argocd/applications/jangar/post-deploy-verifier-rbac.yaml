apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: post-deploy-verifier
  namespace: jangar
rules:
  - apiGroups:
      - ""
    resources:
      - services/proxy
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: post-deploy-verifier
  namespace: jangar
subjects:
  - kind: ServiceAccount
    name: arc-arm64-gha-rs-kube-mode
    namespace: arc
  - kind: ServiceAccount
    name: agents-sa
    namespace: agents
roleRef:
  kind: Role
  name: post-deploy-verifier
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jangar-post-deploy-verifier-agents-proxy
rules:
  - apiGroups:
      - ""
    resources:
      - services/proxy
    resourceNames:
      - agents
      - agents:80
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jangar-post-deploy-verifier-agents-proxy
subjects:
  - kind: ServiceAccount
    name: arc-arm64-gha-rs-kube-mode
    namespace: arc
  - kind: ServiceAccount
    name: agents-sa
    namespace: agents
roleRef:
  kind: ClusterRole
  name: jangar-post-deploy-verifier-agents-proxy
  apiGroup: rbac.authorization.k8s.io
