apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jangar-private
  namespace: jangar
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`jangar.k8s.proompteng.ai`)
      services:
        - name: jangar
          port: 80
  tls:
    secretName: wildcard-k8s-proompteng-ai-tls
