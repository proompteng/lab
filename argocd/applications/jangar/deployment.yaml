apiVersion: apps/v1
kind: Deployment
metadata:
  name: jangar
  namespace: jangar
  labels:
    app: jangar
    app.kubernetes.io/name: jangar
    app.kubernetes.io/part-of: lab
  annotations:
    deploy.knative.dev/rollout: 2026-05-29T23:45:32Z
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jangar
  template:
    metadata:
      labels:
        app: jangar
        app.kubernetes.io/name: jangar
        app.kubernetes.io/part-of: lab
