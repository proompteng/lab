apiVersion: v1
kind: ServiceAccount
metadata:
  name: buzz-alloy
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: buzz-alloy
rules:
  - apiGroups:
      - ""
    resources:
      - endpoints
      - pods
      - services
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: buzz-alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: buzz-alloy
subjects:
  - kind: ServiceAccount
    name: buzz-alloy
