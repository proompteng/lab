  labels:
    app.kubernetes.io/name: buzz-db-restore-proof
    app.kubernetes.io/part-of: buzz
    app.kubernetes.io/component: restore-proof
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
