apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-buzz-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tailscale-relay
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: buzz
      app.kubernetes.io/instance: buzz
      app.kubernetes.io/component: relay
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
          podSelector:
            matchLabels:
              tailscale.com/parent-resource-ns: buzz
              tailscale.com/parent-resource: buzz
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-alloy
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: buzz-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: observability-cluster-metrics-alloy
      ports:
        - port: 9187
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubernetes-api-cnpg-status
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: buzz-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        # kube-router SNATs host-networked kube-apiserver pod-proxy traffic to
        # the destination node's pod-CIDR gateway.
        - ipBlock:
            cidr: 10.244.0.1/32
        - ipBlock:
            cidr: 10.244.3.1/32
        - ipBlock:
            cidr: 10.244.5.1/32
      ports:
        - port: 8000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-operators
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redis-operator
