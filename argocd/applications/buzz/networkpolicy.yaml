apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-buzz-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tailscale-relay
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: buzz
      app.kubernetes.io/instance: buzz
      app.kubernetes.io/component: relay
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
          podSelector:
            matchLabels:
              tailscale.com/parent-resource-ns: buzz
              tailscale.com/parent-resource: buzz
      ports:
        - port: 3000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-observability-alloy
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: buzz-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: observability-cluster-metrics-alloy
      ports:
        - port: 9187
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubernetes-api-cnpg-status
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: buzz-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        # kube-apiserver is host-networked, so cross-node pod proxy requests
        # arrive from the three control-plane node addresses.
        - ipBlock:
            cidr: 100.100.244.141/32
        - ipBlock:
            cidr: 100.100.244.142/32
        - ipBlock:
            cidr: 100.100.244.190/32
      ports:
        - port: 8000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-operators
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: redis-operator
