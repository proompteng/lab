apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: buzz-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: buzz-kubernetes
  target:
    name: buzz-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: Opaque
      data:
        BUZZ_RELAY_PRIVATE_KEY: '{{ .relay_private_key }}'
        BUZZ_GIT_HOOK_HMAC_SECRET: '{{ .git_hook_hmac_secret }}'
        DATABASE_URL: '{{ .database_uri }}?sslmode=require'
        REDIS_URL: 'redis://:{{ .redis_password }}@buzz-redis:6379'
        BUZZ_S3_ACCESS_KEY: '{{ .s3_access_key }}'
        BUZZ_S3_SECRET_KEY: '{{ .s3_secret_key }}'
  data:
    - secretKey: relay_private_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: buzz-runtime
        property: RELAY_PRIVATE_KEY
        metadataPolicy: None
        nullBytePolicy: Fail
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: onepassword-infra
    - secretKey: git_hook_hmac_secret
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: buzz-runtime
        property: GIT_HOOK_HMAC_SECRET
        metadataPolicy: None
        nullBytePolicy: Fail
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: onepassword-infra
    - secretKey: redis_password
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: buzz-runtime
        property: REDIS_PASSWORD
        metadataPolicy: None
        nullBytePolicy: Fail
      sourceRef:
        storeRef:
          kind: ClusterSecretStore
          name: onepassword-infra
    - secretKey: database_uri
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: buzz-db-app
        property: uri
        metadataPolicy: None
        nullBytePolicy: Fail
    - secretKey: s3_access_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: buzz-objects
        property: AWS_ACCESS_KEY_ID
        metadataPolicy: None
        nullBytePolicy: Fail
    - secretKey: s3_secret_key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: buzz-objects
        property: AWS_SECRET_ACCESS_KEY
        metadataPolicy: None
        nullBytePolicy: Fail
