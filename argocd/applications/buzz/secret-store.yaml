apiVersion: v1
kind: ServiceAccount
metadata:
  name: buzz-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-12"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: buzz-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-12"
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - authorization.k8s.io
    resources:
      - selfsubjectrulesreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: buzz-secret-reader
  annotations:
    argocd.argoproj.io/sync-wave: "-12"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: buzz-secret-reader
subjects:
  - kind: ServiceAccount
    name: buzz-secret-reader
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: buzz-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
spec:
  provider:
    kubernetes:
      remoteNamespace: buzz
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: buzz-secret-reader
