apiVersion: apps/v1
kind: Deployment
metadata:
  name: buzz-alloy
  labels:
    app.kubernetes.io/name: buzz-alloy
    app.kubernetes.io/part-of: buzz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buzz-alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buzz-alloy
        app.kubernetes.io/part-of: buzz
    spec:
      serviceAccountName: buzz-alloy
      securityContext:
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        fsGroup: 473
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: grafana/alloy:v1.11.2@sha256:6ab34b8201f0e8b0c4346be4934c9965723af3f7f21dd9a65fd73f270f69b451
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --server.http.listen-addr=0.0.0.0:12345
            - /etc/alloy/config.alloy
          workingDir: /var/lib/alloy
          ports:
            - name: http
              containerPort: 12345
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy
      volumes:
        - name: config
          configMap:
            name: buzz-alloy
            items:
              - key: config.alloy
                path: config.alloy
        - name: data
          emptyDir: {}
