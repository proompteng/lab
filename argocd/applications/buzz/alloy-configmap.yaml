apiVersion: v1
kind: ConfigMap
metadata:
  name: buzz-alloy
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    discovery.kubernetes "buzz_endpoints" {
      role = "endpoints"

      namespaces {
        names = ["buzz"]
      }
    }

    discovery.relabel "buzz_relay" {
      targets = discovery.kubernetes.buzz_endpoints.targets

      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = "buzz"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_endpoint_port_name"]
        regex         = "metrics"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        target_label  = "service"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
    }

    discovery.relabel "buzz_redis" {
      targets = discovery.kubernetes.buzz_endpoints.targets

      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = "buzz-redis-metrics"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_endpoint_port_name"]
        regex         = "redis-exporter"
        action        = "keep"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        target_label  = "service"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
    }

    prometheus.remote_write "mimir" {
      endpoint {
        url = "http://observability-mimir-gateway.observability.svc.cluster.local/api/v1/push"
      }
    }

    prometheus.scrape "buzz_relay" {
      job_name        = "buzz-relay"
      targets         = discovery.relabel.buzz_relay.output
      scrape_interval = "30s"
      scrape_timeout  = "10s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.scrape "buzz_redis" {
      job_name        = "buzz-redis"
      targets         = discovery.relabel.buzz_redis.output
      scrape_interval = "30s"
      scrape_timeout  = "10s"
      forward_to      = [prometheus.remote_write.mimir.receiver]
    }
