apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka
  namespace: kafka
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      - name: plain2
        port: 9093
        type: internal
        tls: false
      - name: posthog-ingest
        port: 9094
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      controller.quorum.election.timeout.ms: 60000
      controller.quorum.fetch.timeout.ms: 180000
    livenessProbe:
      initialDelaySeconds: 180
      timeoutSeconds: 10
      periodSeconds: 15
      failureThreshold: 40
    readinessProbe:
      initialDelaySeconds: 60
      timeoutSeconds: 10
      periodSeconds: 15
      failureThreshold: 60
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: pool-a
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 3
  roles:
    - controller
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: kafka
                  strimzi.io/name: kafka-kafka
                  strimzi.io/pool-name: pool-a
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              strimzi.io/cluster: kafka
              strimzi.io/name: kafka-kafka
              strimzi.io/pool-name: pool-a
  resources:
    requests:
      cpu: '2000m'
      memory: 4Gi
  storage:
    type: persistent-claim
    size: 30Gi
    deleteClaim: false
    class: rook-ceph-block
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: pool-b
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 3
  roles:
    - broker
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: kafka
                  strimzi.io/name: kafka-kafka
                  strimzi.io/pool-name: pool-b
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              strimzi.io/cluster: kafka
              strimzi.io/name: kafka-kafka
              strimzi.io/pool-name: pool-b
  resources:
    requests:
      cpu: '2000m'
      memory: 4Gi
  storage:
    type: persistent-claim
    size: 30Gi
    deleteClaim: false
    class: rook-ceph-block
---
