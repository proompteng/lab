apiVersion: v1
kind: ServiceAccount
metadata:
  name: bilig-alloy
  namespace: bilig
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bilig-alloy
  namespace: bilig
rules:
  - apiGroups: [""]
    resources: ["endpoints", "services", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bilig-alloy
  namespace: bilig
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: bilig-alloy
subjects:
  - kind: ServiceAccount
    name: bilig-alloy
    namespace: bilig
