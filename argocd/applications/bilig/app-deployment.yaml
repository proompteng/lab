apiVersion: apps/v1
kind: Deployment
metadata:
  name: bilig-app
  namespace: bilig
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bilig-app
  template:
    metadata:
      labels:
        app: bilig-app
    spec:
      containers:
        - name: bilig-app
          image: registry.ide-newton.ts.net/lab/bilig-app
          ports:
            - name: http
              containerPort: 4321
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4321"
            - name: LOCAL_PORT
              value: "4381"
            - name: BILIG_PUBLIC_SERVER_URL
              value: https://bilig.proompteng.ai
            - name: BILIG_WEB_APP_BASE_URL
              value: https://bilig.proompteng.ai
            - name: BILIG_ZERO_CACHE_URL
              value: /zero
            - name: BILIG_ZERO_PROXY_UPSTREAM
              value: http://bilig-zero:4848
            - name: BILIG_DEFAULT_DOCUMENT_ID
              value: bilig-demo
            - name: BILIG_PERSIST_STATE
              value: "true"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bilig-db-app
                  key: uri
                  optional: true
            - name: SNAPSHOT_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: bilig-object-storage
                  key: SNAPSHOT_BUCKET
                  optional: true
            - name: SNAPSHOT_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: bilig-object-storage
                  key: SNAPSHOT_ENDPOINT
                  optional: true
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
