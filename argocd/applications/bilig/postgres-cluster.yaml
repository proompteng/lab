apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bilig-db
  namespace: bilig
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  managed:
    roles:
      - name: bilig
        ensure: present
        login: true
        replication: true
        passwordSecret:
          name: bilig-db-app
  storage:
    storageClass: rook-ceph-block
    size: 10Gi
  bootstrap:
    initdb:
      database: bilig
      owner: bilig
      encoding: "UTF8"
      dataChecksums: true
      postInitApplicationSQL:
        - CREATE PUBLICATION zero_data FOR TABLES IN SCHEMA public;
  monitoring:
    enablePodMonitor: true
