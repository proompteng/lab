apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: bilig-db
  namespace: bilig
spec:
  instances: 1
  primaryUpdateStrategy: unsupervised
  storage:
    storageClass: rook-ceph-block
    size: 10Gi
  bootstrap:
    initdb:
      database: bilig
      owner: bilig
      encoding: "UTF8"
      dataChecksums: true
  monitoring:
    enablePodMonitor: true
