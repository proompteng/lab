apiVersion: apps/v1
kind: Deployment
metadata:
  name: bilig-web
  namespace: bilig
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bilig-web
  template:
    metadata:
      annotations:
        bilig.proompteng.ai/runtime-config-sha: "030f88422d165c94"
      labels:
        app: bilig-web
    spec:
      containers:
        - name: bilig-web
          image: registry.ide-newton.ts.net/lab/bilig-web
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: runtime-config
              mountPath: /usr/share/nginx/html/runtime-config.json
              subPath: runtime-config.json
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
      volumes:
        - name: runtime-config
          configMap:
            name: bilig-web-runtime
