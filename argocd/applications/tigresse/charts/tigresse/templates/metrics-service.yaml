apiVersion: v1
kind: Service
metadata:
  name: {{ include "tigresse.fullname" . }}-metrics
  labels:
    {{- include "tigresse.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "tigresse.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
