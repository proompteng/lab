apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tigresse.fullname" . }}
  labels:
    {{- include "tigresse.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - tigerbeetle.proompteng.ai
    resources:
      - tigerbeetleclusters
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - tigerbeetle.proompteng.ai
    resources:
      - tigerbeetleclusters/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - tigerbeetle.proompteng.ai
    resources:
      - tigerbeetleclusters/finalizers
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - configmaps
      - services
      - pods
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - apps
    resources:
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
