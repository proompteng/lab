replicaCount: 1

image:
  repository: ghcr.io/proompteng/tigresse
  tag: "v0.1.2"
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

metrics:
  bindAddress: ":8080"

healthProbe:
  bindAddress: ":8081"

leaderElection:
  enabled: true
