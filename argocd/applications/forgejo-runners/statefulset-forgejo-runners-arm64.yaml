apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: forgejo-runners-arm64
  labels:
    app.kubernetes.io/name: forgejo-runners
    app.kubernetes.io/component: runner
    app.kubernetes.io/instance: forgejo-runners-arm64
    app.kubernetes.io/part-of: forgejo-runners
spec:
  serviceName: forgejo-runners
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forgejo-runners
      app.kubernetes.io/instance: forgejo-runners-arm64
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forgejo-runners
        app.kubernetes.io/component: runner
        app.kubernetes.io/instance: forgejo-runners-arm64
        app.kubernetes.io/part-of: forgejo-runners
        forgejo-runners.proompteng.ai/arch: arm64
    spec:
      serviceAccountName: forgejo-runners
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 360
      nodeSelector:
        kubernetes.io/arch: arm64
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: forgejo-runners
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: register-runner
          image: data.forgejo.org/forgejo/runner:11
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -ec
            - |
              if [ -s /data/.runner ]; then
                echo 'Runner already registered, skipping registration.'
                exit 0
              fi

              if [ -z "${FORGEJO_RUNNER_REGISTRATION_TOKEN:-}" ]; then
                echo 'Missing FORGEJO_RUNNER_REGISTRATION_TOKEN.'
                exit 1
              fi

              forgejo-runner register --no-interactive \
                --instance "${FORGEJO_INSTANCE_URL}" \
                --token "${FORGEJO_RUNNER_REGISTRATION_TOKEN}" \
                --name "${RUNNER_NAME_PREFIX}-${HOSTNAME}" \
                --labels "${RUNNER_LABELS}" \
                -c /config/config.yaml
          env:
            - name: FORGEJO_INSTANCE_URL
              valueFrom:
                secretKeyRef:
                  name: forgejo-runners-token
                  key: FORGEJO_INSTANCE_URL
            - name: FORGEJO_RUNNER_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-runners-token
                  key: FORGEJO_RUNNER_REGISTRATION_TOKEN
            - name: RUNNER_NAME_PREFIX
              value: forgejo-runners-arm64
            - name: RUNNER_LABELS
              value: ubuntu-24.04-arm64:docker://ghcr.io/catthehacker/ubuntu:act-latest,docker-arm64:docker://ghcr.io/catthehacker/ubuntu:act-latest
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
            - name: dind-sock
              mountPath: /var/run
      containers:
        - name: runner
          image: data.forgejo.org/forgejo/runner:11
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - forgejo-runner
            - daemon
            - -c
            - /config/config.yaml
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '2'
              memory: 4Gi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
            - name: dind-sock
              mountPath: /var/run
        - name: dind
          image: docker:27.5.1-dind
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ''
          command:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --storage-driver=overlay2
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: '3'
              memory: 6Gi
          volumeMounts:
            - name: dind-sock
              mountPath: /var/run
            - name: docker-graph
              mountPath: /var/lib/docker
      volumes:
        - name: config
          configMap:
            name: forgejo-runners-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: dind-sock
          emptyDir: {}
        - name: docker-graph
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: rook-ceph-block
        resources:
          requests:
            storage: 20Gi
