apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runners-config
data:
  config.yaml: |
    log:
      level: info
      job_level: info

    runner:
      file: /data/.runner
      capacity: 1
      timeout: 3h
      shutdown_timeout: 5m
      insecure: false
      fetch_timeout: 30s
      fetch_interval: 10s
      report_interval: 10s

    cache:
      enabled: true
      dir: /data/cache
      host: ""
      external_server: ""
      secret: ""
      actions_cache_url_override: ""

    container:
      network: ""
      enable_ipv6: false
      privileged: false
      options: ""
      workdir_parent: /data/workspace
      valid_volumes:
        - "**"
      docker_host: unix:///var/run/docker.sock
      force_pull: false
      force_rebuild: false
