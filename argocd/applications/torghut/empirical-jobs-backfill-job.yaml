apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-empirical-jobs-backfill
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      containers:
        - name: backfill
          image: registry.ide-newton.ts.net/lab/torghut@sha256:f6e8557a91daa509dddf8246d2da41f2a7b8f316e7354a6c42595117fbf107e8
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /app
              /opt/venv/bin/python scripts/backfill_vnext_empirical_jobs.py --json
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
