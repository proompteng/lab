apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-empirical-jobs-backfill
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: backfill
          image: registry.ide-newton.ts.net/lab/torghut@sha256:2d91a1a0229c72e7f0a1ae6aee2c05cc77e6c106d1148a7473f2af2a299bfae2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /app
              /opt/venv/bin/python scripts/backfill_vnext_empirical_jobs.py --json
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
