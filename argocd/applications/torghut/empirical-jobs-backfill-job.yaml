apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-empirical-jobs-backfill
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: backfill
          image: registry.ide-newton.ts.net/lab/torghut@sha256:97f44c164fe56ade3b3f664aa5ef90d28726c822f88ab70d12478be0c2d28c90
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /app
              /opt/venv/bin/python scripts/backfill_vnext_empirical_jobs.py --json
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
