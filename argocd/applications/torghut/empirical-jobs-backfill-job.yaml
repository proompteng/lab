apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-empirical-jobs-backfill
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      containers:
        - name: backfill
          image: registry.ide-newton.ts.net/lab/torghut@sha256:c249650f9d498da61ac732f7ead1c7b62ba83392df871a6328595dc350ac02a2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              cd /app
              /opt/venv/bin/python scripts/backfill_vnext_empirical_jobs.py --json
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
