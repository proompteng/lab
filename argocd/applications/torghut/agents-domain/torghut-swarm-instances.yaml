apiVersion: swarm.proompteng.ai/v1alpha1
kind: Swarm
metadata:
  name: torghut-quant
  namespace: agents
spec:
  owner:
    id: trading-owner
    channel: swarm://owner/trading
  domains:
    - quant-research
    - autonomous-trading
  objectives:
    - operate as the Torghut Traders team through NATS-backed swarm communication
    - continuously discover and implement quant alpha and risk-control improvements
    - issue platform requirements to jangar-control-plane via NATS requirement channels
  mission:
    ledgerRef: /workspace/.agentrun/swarm/torghut-quant-mission-ledger.md
    sourceDesign: docs/agents/designs/swarm-agentic-mission-architecture-2026-05-08.md
    businessMetric: increase routeable post-cost profit evidence and live trading readiness without weakening capital safety
    validationContract:
      - every run must cite the governing Torghut design or runtime requirement before changing code
      - implement stages must produce production PRs that improve readiness, profit evidence, data freshness, execution quality, or capital safety
      - verify stages must merge only green PRs and prove image promotion, Argo sync, live service health, and trading or evidence status after rollout
      - final handoff must name the revenue metric improved or the smallest blocker preventing revenue impact
    valueGates:
      - post_cost_daily_net_pnl
      - routeable_candidate_count
      - zero_notional_or_stale_evidence_rate
      - fill_tca_or_slippage_quality
      - capital_gate_safety
    handoffRequiredFields:
      - objective
      - files_changed_or_inspected
      - commands_and_exit_codes
      - tests_passed_or_failed
      - unresolved_issues
      - risk_and_rollback
      - exact_next_action
  mode: lights-out
  timezone: UTC
  cadence:
    discoverEvery: 6h
    planEvery: 24h
    implementEvery: 6h
    verifyEvery: 6h
  integrations:
    nats:
      url: nats://nats.nats.svc.cluster.local:4222
      subjectPrefix: workflow
      channel: general
      personas:
        architect:
          humanName: Gideon Park
          workerIdentity: gideon-park-torghut-architect
        engineer:
          humanName: Naomi Ibarra
          workerIdentity: naomi-ibarra-torghut-engineer
        deployer:
          humanName: Julian Hart
          workerIdentity: julian-hart-torghut-deployer
  discovery:
    minCitations: 2
    minConfidence: 0.8
    sources:
      - name: internet-research
      - name: market-regime-feed
      - name: runtime-alerts
  delivery:
    repoAllowlist:
      - proompteng/lab
    requiredChecks:
      - lint
      - pyright
      - unit-tests
    mergePolicy: merge-queue
    deploymentTargets:
      - torghut
    rollout:
      strategy: canary
      steps:
        - setWeight: 10
          pause: 5m
        - setWeight: 30
          pause: 10m
        - setWeight: 100
          pause: 0m
      analysisTemplateRef: default-canary-analysis
  risk:
    budgetRef: default-budget
    approvalPolicyRef: default-approval
    freezeAfterFailures: 2
    freezeDuration: 60m
  execution:
    discover:
      enabled: false
      targetRef:
        kind: AgentRun
        name: torghut-swarm-discover-template
    plan:
      enabled: false
      targetRef:
        kind: AgentRun
        name: torghut-swarm-plan-template
    implement:
      enabled: false
      targetRef:
        kind: AgentRun
        name: torghut-swarm-implement-template
    verify:
      enabled: false
      targetRef:
        kind: AgentRun
        name: torghut-swarm-verify-template
