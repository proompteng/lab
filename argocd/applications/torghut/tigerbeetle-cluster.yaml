apiVersion: tigerbeetle.proompteng.ai/v1alpha1
kind: TigerBeetleCluster
metadata:
  name: torghut-tigerbeetle
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut-tigerbeetle
    app.kubernetes.io/part-of: torghut
spec:
  clusterID: "2001"
  replicas: 1
  image:
    repository: ghcr.io/tigerbeetle/tigerbeetle
    tag: "0.17.4"
    pullPolicy: IfNotPresent
  storage:
    className: rook-ceph-block
    size: 100Gi
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      memory: 8Gi
  nodeSelector:
    kubernetes.io/arch: arm64
  pdb:
    enabled: true
    minAvailable: 1
  health:
    checkIntervalSeconds: 5
