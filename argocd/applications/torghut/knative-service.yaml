apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: torghut
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: lab
    networking.knative.dev/visibility: cluster-local
  annotations:
    serving.knative.dev/creator: system:serviceaccount:argocd:argocd-application-controller
    serving.knative.dev/rollout-duration: 10s
    argocd.argoproj.io/tracking-id: torghut:serving.knative.dev/Service:torghut/torghut
spec:
  template:
    metadata:
      annotations:
        client.knative.dev/updateTimestamp: "2026-04-19T00:47:40Z"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        autoscaling.knative.dev/target: "80"
    spec:
      containerConcurrency: 0
      timeoutSeconds: 60
      containers:
        - name: user-container
          imagePullPolicy: IfNotPresent
          image: registry.ide-newton.ts.net/lab/torghut@sha256:f3abf056f0292878c82e4063180199a16e220fbad3c211b301da9403e1f0d41c
          ports:
            - name: http1
              containerPort: 8181
          env:
            - name: APP_ENV
              value: prod
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: json
            - name: LOG_ACCESS_LOG
              value: "true"
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: APCA_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_KEY_ID
                  optional: true
            - name: APCA_API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_SECRET_KEY
                  optional: true
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_BASE_URL
                  optional: true
            - name: CLICKHOUSE_HOST
              value: torghut-clickhouse.torghut.svc.cluster.local
            - name: CLICKHOUSE_PORT
              value: "8123"
            - name: CLICKHOUSE_DATABASE
              value: torghut
            - name: CLICKHOUSE_USERNAME
              value: torghut
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-clickhouse-auth
                  key: torghut_password
            - name: CLICKHOUSE_SECURE
              value: "false"
            - name: CLICKHOUSE_TIMEOUT_SECONDS
              value: "10"
            - name: TRADING_ENABLED
              value: "true"
            - name: TRADING_PIPELINE_MODE
              value: simple
            - name: TRADING_SIMPLE_SUBMIT_ENABLED
              value: "true"
            - name: TRADING_SIMPLE_ORDER_FEED_TELEMETRY_ENABLED
              value: "false"
            - name: TRADING_KILL_SWITCH_ENABLED
              value: "false"
            - name: TRADING_FEATURE_FLAGS_ENABLED
              value: "false"
            - name: TRADING_MULTI_ACCOUNT_ENABLED
              value: "false"
            - name: TRADING_MODE
              value: live
            - name: TRADING_STRATEGY_RUNTIME_MODE
              value: scheduler_v3
            - name: TRADING_STRATEGY_SCHEDULER_ENABLED
              value: "true"
            - name: TRADING_AUTONOMY_ENABLED
              value: "false"
            - name: TRADING_AUTONOMY_ALLOW_LIVE_PROMOTION
              value: "false"
            - name: TRADING_EVIDENCE_CONTINUITY_ENABLED
              value: "false"
            - name: TRADING_ACCOUNT_LABEL
              value: PA3SX7FYNUTF
            - name: TRADING_ACCOUNTS_JSON
              value: >
                [{"label":"PA3SX7FYNUTF","mode":"live","enabled":true}]
            - name: TRADING_ALLOW_SHORTS
              value: "true"
            - name: TRADING_FRACTIONAL_EQUITIES_ENABLED
              value: "true"
            - name: TRADING_SIGNAL_SOURCE
              value: clickhouse
            - name: TRADING_SIGNAL_TABLE
              value: torghut.ta_signals
            - name: TRADING_SIGNAL_LOOKBACK_MINUTES
              value: "15"
            - name: TRADING_PLANNED_DECISION_TIMEOUT_SECONDS
              value: "600"
            - name: TRADING_POLL_MS
              value: "5000"
            - name: TRADING_RECONCILE_MS
              value: "15000"
            - name: TRADING_ORDER_FEED_TOPIC_V2
              value: torghut.trade-updates.v2
            - name: TRADING_EXECUTION_PREFER_LIMIT
              value: "true"
            - name: TRADING_EXECUTION_ADVISOR_LIVE_APPLY_ENABLED
              value: "false"
            - name: TRADING_EXECUTION_ADVISOR_ENABLED
              value: "false"
            - name: TRADING_CRYPTO_ENABLED
              value: "false"
            - name: TRADING_CRYPTO_LIVE_ENABLED
              value: "false"
            - name: TRADING_STRATEGY_CONFIG_PATH
              value: /etc/torghut/strategies.yaml
            - name: TRADING_STRATEGY_CONFIG_MODE
              value: sync
            - name: TRADING_STRATEGY_RELOAD_SECONDS
              value: "10"
            - name: TRADING_UNIVERSE_SOURCE
              value: jangar
            - name: TRADING_UNIVERSE_STATIC_FALLBACK_ENABLED
              value: "true"
            - name: TRADING_UNIVERSE_STATIC_FALLBACK_SYMBOLS
              value: AAPL,AMAT,AMD,AVGO,GOOG,INTC,META,MSFT,NVDA,QQQ,SPY,TSLA
            - name: POSTHOG_ENABLED
              value: "false"
            - name: WHITEPAPER_WORKFLOW_ENABLED
              value: "true"
            - name: WHITEPAPER_KAFKA_ENABLED
              value: "true"
            - name: WHITEPAPER_KAFKA_BOOTSTRAP_SERVERS
              value: kafka-kafka-bootstrap.kafka:9092
            - name: WHITEPAPER_KAFKA_TOPIC
              value: github.webhook.events
            - name: WHITEPAPER_KAFKA_GROUP_ID
              value: torghut-whitepaper-v1
            - name: WHITEPAPER_KAFKA_CLIENT_ID
              value: torghut-whitepaper
            - name: WHITEPAPER_KAFKA_SECURITY_PROTOCOL
              value: SASL_PLAINTEXT
            - name: WHITEPAPER_KAFKA_SASL_MECHANISM
              value: SCRAM-SHA-512
            - name: WHITEPAPER_KAFKA_SASL_USERNAME
              value: torghut-ws
            - name: WHITEPAPER_KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-ws
                  key: password
            - name: WHITEPAPER_CEPH_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: torghut-whitepapers
                  key: BUCKET_NAME
            - name: WHITEPAPER_CEPH_BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: torghut-whitepapers
                  key: BUCKET_HOST
            - name: WHITEPAPER_CEPH_BUCKET_PORT
              valueFrom:
                configMapKeyRef:
                  name: torghut-whitepapers
                  key: BUCKET_PORT
            - name: WHITEPAPER_CEPH_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-whitepapers
                  key: AWS_ACCESS_KEY_ID
            - name: WHITEPAPER_CEPH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-whitepapers
                  key: AWS_SECRET_ACCESS_KEY
            - name: WHITEPAPER_CEPH_CONFIG_DIR
              value: /etc/torghut/whitepapers-config
            - name: WHITEPAPER_CEPH_SECRET_DIR
              value: /etc/torghut/whitepapers-secret
            - name: WHITEPAPER_AGENTRUN_AUTO_DISPATCH
              value: "true"
            - name: WHITEPAPER_AGENTRUN_NAMESPACE
              value: agents
            - name: WHITEPAPER_AGENT_NAME
              value: codex-whitepaper-agent
            - name: WHITEPAPER_AGENTRUN_VCS_REF
              value: github
            - name: WHITEPAPER_AGENTRUN_SECRET_BINDING
              value: codex-whitepaper-github-token
            - name: WHITEPAPER_AGENTRUN_SUBMIT_URL
              value: http://agents.agents.svc.cluster.local/v1/agent-runs
            - name: INNGEST_APP_ID
              value: torghut
            - name: INNGEST_BASE_URL
              value: http://inngest.inngest.svc.cluster.local:8288
            - name: INNGEST_EVENT_KEY
              valueFrom:
                secretKeyRef:
                  name: inngest
                  key: INNGEST_EVENT_KEY
            - name: INNGEST_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: inngest
                  key: INNGEST_SIGNING_KEY
            - name: WHITEPAPER_INNGEST_EVENT_NAME
              value: torghut/whitepaper.analysis.requested
            - name: WHITEPAPER_INNGEST_FUNCTION_ID
              value: torghut-whitepaper-analysis-v1
            - name: WHITEPAPER_INNGEST_ENABLED
              value: "false"
            - name: WHITEPAPER_INNGEST_FINALIZED_EVENT_NAME
              value: torghut/whitepaper.analysis.finalized
            - name: WHITEPAPER_INNGEST_FINALIZE_FUNCTION_ID
              value: torghut-whitepaper-synthesis-index-v1
            - name: WHITEPAPER_SEMANTIC_INDEXING_ENABLED
              value: "false"
            - name: WHITEPAPER_SEMANTIC_REQUIRED
              value: "false"
            - name: WHITEPAPER_EMBEDDING_API_BASE_URL
              value: http://saigak.saigak.svc.cluster.local:11435/api
            - name: WHITEPAPER_EMBEDDING_MODEL
              value: qwen3-embedding-saigak:8b
            - name: WHITEPAPER_EMBEDDING_DIMENSION
              value: "4096"
            - name: WHITEPAPER_EMBEDDING_TIMEOUT_MS
              value: "120000"
            - name: WHITEPAPER_CHUNK_SIZE_CHARS
              value: "2400"
            - name: WHITEPAPER_CHUNK_OVERLAP_CHARS
              value: "300"
            - name: WHITEPAPER_EMBEDDING_BATCH_SIZE
              value: "32"
            - name: TRADING_EMERGENCY_STOP_ENABLED
              value: "false"
            - name: LLM_ENABLED
              value: "false"
            - name: LLM_DSPY_RUNTIME_MODE
              value: disabled
            - name: TA_CLICKHOUSE_URL
              value: http://torghut-clickhouse.torghut.svc.cluster.local:8123
            - name: TA_CLICKHOUSE_USERNAME
              value: torghut
            - name: TA_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-clickhouse-auth
                  key: torghut_password
            - name: TA_CLICKHOUSE_CONN_TIMEOUT_SECONDS
              value: "10"
            - name: TORGHUT_VERSION
              value: v0.566.0-418-ga30048cb9
            - name: TORGHUT_COMMIT
              value: a30048cb95919bfbb8ba1e734ee3a478a9d9c12f
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8181
          startupProbe:
            httpGet:
              path: /healthz
              port: 8181
            failureThreshold: 18
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8181
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: strategy-config
              mountPath: /etc/torghut
              readOnly: true
            - name: whitepapers-config
              mountPath: /etc/torghut/whitepapers-config
              readOnly: true
            - name: whitepapers-secret
              mountPath: /etc/torghut/whitepapers-secret
              readOnly: true
      volumes:
        - name: strategy-config
          configMap:
            name: torghut-strategy-config
        - name: whitepapers-config
          configMap:
            name: torghut-whitepapers
        - name: whitepapers-secret
          secret:
            secretName: torghut-whitepapers
