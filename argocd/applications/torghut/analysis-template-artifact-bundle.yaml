apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: torghut-simulation-artifact-bundle
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
spec:
  args:
    - name: runDir
  metrics:
    - name: artifact-bundle
      provider:
        job:
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
            template:
              spec:
                serviceAccountName: torghut-runtime
                restartPolicy: Never
                nodeSelector:
                  kubernetes.io/arch: arm64
                containers:
                  - name: analysis
                    image: registry.ide-newton.ts.net/lab/torghut@sha256:bcde11de7d8a646bdf8feae2aba3a2f04b4a101a75ad42f1a3072d1d6a0f3ffd
                    imagePullPolicy: IfNotPresent
                    command:
                      - /bin/bash
                      - -lc
                    args:
                      - >-
                        set -euo pipefail &&
                        cd /app &&
                        /opt/venv/bin/python scripts/run_simulation_analysis.py artifact-bundle
                        --run-dir "{{args.runDir}}"
                        --json
