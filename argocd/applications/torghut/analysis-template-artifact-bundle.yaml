apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: torghut-simulation-artifact-bundle
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
spec:
  args:
    - name: runDir
  metrics:
    - name: artifact-bundle
      provider:
        job:
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
            template:
              spec:
                serviceAccountName: torghut-runtime
                restartPolicy: Never
                containers:
                  - name: analysis
                    image: registry.ide-newton.ts.net/lab/torghut@sha256:ec1502d1ad0d758a4647719626000331edf9da2b16e8063f305f61d037d779f6
                    imagePullPolicy: IfNotPresent
                    command:
                      - /bin/bash
                      - -lc
                    args:
                      - >-
                        set -euo pipefail &&
                        cd /app &&
                        /opt/venv/bin/python scripts/run_simulation_analysis.py artifact-bundle
                        --run-dir "{{args.runDir}}"
                        --json
