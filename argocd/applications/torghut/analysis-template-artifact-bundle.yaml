apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: torghut-simulation-artifact-bundle
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
spec:
  args:
    - name: runDir
  metrics:
    - name: artifact-bundle
      provider:
        job:
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
            template:
              spec:
                serviceAccountName: torghut-runtime
                restartPolicy: Never
                nodeSelector:
                  kubernetes.io/arch: arm64
                containers:
                  - name: analysis
                    image: registry.ide-newton.ts.net/lab/torghut@sha256:ab91594db1765911a275244ce93ec2657028c788bcaaabb6569fac1cd83aee6f
                    imagePullPolicy: IfNotPresent
                    command:
                      - /bin/bash
                      - -lc
                    args:
                      - >-
                        set -euo pipefail &&
                        cd /app &&
                        /opt/venv/bin/python scripts/run_simulation_analysis.py artifact-bundle
                        --run-dir "{{args.runDir}}"
                        --json
