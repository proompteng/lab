apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: torghut-simulation-artifact-bundle
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
spec:
  args:
    - name: runDir
  metrics:
    - name: artifact-bundle
      provider:
        job:
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 300
            template:
              spec:
                serviceAccountName: torghut-runtime
                restartPolicy: Never
                containers:
                  - name: analysis
                    image: registry.ide-newton.ts.net/lab/torghut@sha256:3b25b5873f550164c5963359fe513c3658cd65d7a661a80abe2e219212c8a094
                    imagePullPolicy: IfNotPresent
                    command:
                      - /bin/bash
                      - -lc
                    args:
                      - >-
                        set -euo pipefail &&
                        cd /app &&
                        /opt/venv/bin/python scripts/run_simulation_analysis.py artifact-bundle
                        --run-dir "{{args.runDir}}"
                        --json
