apiVersion: batch/v1
kind: CronJob
metadata:
  name: torghut-order-lineage-reconciliation
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
    app.kubernetes.io/component: order-lineage-reconciliation
    app.kubernetes.io/part-of: lab
spec:
  # Enabled only after the closed-census image and migration 0082 reached
  # Synced/Healthy production state at the exact promoted source and digest.
  suspend: false
  schedule: "12 * * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 900
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 0
      activeDeadlineSeconds: 1200
      template:
        metadata:
          labels:
            app.kubernetes.io/name: torghut
            app.kubernetes.io/component: order-lineage-reconciliation
            app.kubernetes.io/part-of: lab
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reconcile
              image: registry.ide-newton.ts.net/lab/torghut@sha256:5bad4a41c045fd00ea9ce014f5e49f5249bed686657e137fade783542da9e181
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                  ephemeral-storage: 64Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
                  ephemeral-storage: 256Mi
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: APP_ENV
                  value: prod
                - name: DB_DSN
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: uri
                - name: TORGHUT_SIM_DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: host
                - name: TORGHUT_SIM_DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: port
                - name: TORGHUT_SIM_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: username
                - name: TORGHUT_SIM_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: password
                - name: SIM_DB_DSN
                  value: postgresql://$(TORGHUT_SIM_DB_USER):$(TORGHUT_SIM_DB_PASSWORD)@$(TORGHUT_SIM_DB_HOST):$(TORGHUT_SIM_DB_PORT)/torghut_sim_default
                - name: TORGHUT_VERSION
                  value: v0.596.0-2289-ge8cbb0618
                - name: TORGHUT_COMMIT
                  value: e8cbb061811bf6c279581eab9bdfd1299fb5187a
                - name: TORGHUT_IMAGE_DIGEST
                  value: sha256:5bad4a41c045fd00ea9ce014f5e49f5249bed686657e137fade783542da9e181
                - name: TORGHUT_REQUIRED_IMAGE_PLATFORMS
                  value: linux/amd64,linux/arm64
                - name: TORGHUT_OBSERVED_IMAGE_PLATFORMS
                  value: linux/amd64,linux/arm64
              command:
                - python
                - scripts/reconcile_cross_dsn_order_feed_links.py
              args:
                - --apply
                - --json
                - --environment
                - paper
