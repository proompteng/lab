apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-autonomy-config
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
    app.kubernetes.io/component: autonomy-runtime
    app.kubernetes.io/part-of: lab
data:
  # Migration defaults: keep scheduler-integrated runtime disabled until explicitly enabled.
  TRADING_STRATEGY_RUNTIME_MODE: scheduler_v3
  TRADING_STRATEGY_SCHEDULER_ENABLED: "false"
  TRADING_STRATEGY_RUNTIME_FALLBACK_LEGACY: "true"
  TRADING_STRATEGY_RUNTIME_CIRCUIT_ERRORS: "3"
  TRADING_STRATEGY_RUNTIME_CIRCUIT_COOLDOWN_SECONDS: "300"
  TRADING_FEATURE_SCHEMA_VERSION: v3
  TRADING_FEATURE_NORMALIZATION_VERSION: v1
  TRADING_FORECAST_ROUTER_ENABLED: "true"
  TRADING_FORECAST_ROUTER_POLICY_PATH: /etc/torghut/forecast-router-policy.json
  TRADING_FORECAST_ROUTER_REFINEMENT_ENABLED: "true"
  TRADING_AUTONOMY_ENABLED: "true"
  TRADING_AUTONOMY_ALLOW_LIVE_PROMOTION: "false"
  TRADING_AUTONOMY_GATE_POLICY_PATH: /etc/torghut/autonomy/autonomy-gates-v3.json
  TRADING_AUTONOMY_INTERVAL_SECONDS: "300"
  TRADING_AUTONOMY_SIGNAL_LOOKBACK_MINUTES: "15"
  TRADING_AUTONOMY_ARTIFACT_DIR: /tmp/torghut/autonomy
  TRADING_SIGNAL_NO_SIGNAL_STREAK_ALERT_THRESHOLD: "2"
  TRADING_SIGNAL_STALE_LAG_ALERT_SECONDS: "300"
  TRADING_SIGNAL_STALENESS_ALERT_CRITICAL_REASONS: cursor_ahead_of_stream,no_signals_in_window,universe_source_unavailable
  TRADING_ALLOCATOR_ENABLED: "true"
  TRADING_ALLOCATOR_DEFAULT_REGIME: "neutral"
  TRADING_ALLOCATOR_DEFAULT_BUDGET_MULTIPLIER: "0.88"
  TRADING_ALLOCATOR_DEFAULT_CAPACITY_MULTIPLIER: "0.88"
  TRADING_ALLOCATOR_MIN_MULTIPLIER: "0.05"
  TRADING_ALLOCATOR_MAX_MULTIPLIER: "1.3"
  TRADING_ALLOCATOR_REGIME_BUDGET_MULTIPLIERS: |
    {"trend": 1.0, "mean_revert": 0.82, "range": 0.58, "unknown": 0.5, "default": 0.7}
  TRADING_ALLOCATOR_REGIME_CAPACITY_MULTIPLIERS: |
    {"trend": 1.0, "mean_revert": 0.8, "range": 0.52, "unknown": 0.45, "default": 0.65}
  TRADING_RUNTIME_REGIME_CONFIDENCE_THRESHOLDS_BY_ENTROPY_BAND: |
    {"low":[0.65,0.45],"medium":[0.75,0.55],"high":[0.85,0.70]}
  TRADING_FRAGILITY_MODE: "enforce"
  TRADING_FRAGILITY_UNKNOWN_STATE: "elevated"
  TRADING_FRAGILITY_ELEVATED_THRESHOLD: "0.42"
  TRADING_FRAGILITY_STRESS_THRESHOLD: "0.68"
  TRADING_FRAGILITY_CRISIS_THRESHOLD: "0.84"
  TRADING_FRAGILITY_STATE_BUDGET_MULTIPLIERS: |
    {"normal": 1.0, "elevated": 0.8, "stress": 0.5, "crisis": 0.25, "unknown": 0.6}
  TRADING_FRAGILITY_STATE_CAPACITY_MULTIPLIERS: |
    {"normal": 1.0, "elevated": 0.8, "stress": 0.5, "crisis": 0.25, "unknown": 0.55}
  TRADING_FRAGILITY_STATE_PARTICIPATION_CLAMPS: |
    {"normal": 1.0, "elevated": 0.78, "stress": 0.45, "crisis": 0.25, "unknown": 0.55}
  TRADING_FRAGILITY_STATE_ABSTAIN_BIAS: |
    {"normal": 0.0, "elevated": 0.16, "stress": 0.46, "crisis": 0.74, "unknown": 0.38}
  TRADING_EVIDENCE_CONTINUITY_ENABLED: "true"
  TRADING_EVIDENCE_CONTINUITY_INTERVAL_SECONDS: "86400"
  TRADING_EVIDENCE_CONTINUITY_RUN_LIMIT: "8"
  TRADING_ROLLBACK_SIGNAL_STALENESS_ALERT_STREAK_LIMIT: "3"
