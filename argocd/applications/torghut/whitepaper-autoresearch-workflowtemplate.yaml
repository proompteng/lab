apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: torghut-whitepaper-autoresearch-profit-target
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
    app.kubernetes.io/component: whitepaper-autoresearch
    app.kubernetes.io/part-of: lab
spec:
  serviceAccountName: torghut-runtime
  parallelism: 1
  synchronization:
    mutexes:
      - name: torghut-whitepaper-autoresearch-profit-target
  ttlStrategy:
    secondsAfterSuccess: 86400
    secondsAfterFailure: 172800
    secondsAfterCompletion: 172800
  podGC:
    strategy: OnPodCompletion
  entrypoint: run
  arguments:
    parameters:
      - name: runId
        value: ''
      - name: outputRoot
        value: /tmp/torghut-whitepaper-autoresearch
      - name: sourceJsonlB64
        value: ''
      - name: candidateSpecsJsonlB64
        value: ''
      - name: candidateSpecsConfigMapName
        value: torghut-whitepaper-autoresearch-candidate-specs
      - name: candidateSpecsConfigMapKey
        value: candidate-specs.jsonl
      - name: feedbackEvidenceJsonlB64
        value: ''
      - name: feedbackEvidenceConfigMapName
        value: torghut-whitepaper-autoresearch-feedback-evidence
      - name: feedbackEvidenceConfigMapKey
        value: feedback-evidence.jsonl
      - name: seedRecentWhitepapers
        value: 'true'
      - name: symbols
        value: NVDA,AAPL,AMZN,GOOGL,AVGO,AMD,ORCL,INTC
      - name: fullWindowStartDate
        value: ''
      - name: fullWindowEndDate
        value: ''
      - name: expectedLastTradingDay
        value: ''
      - name: targetNetPnlPerDay
        value: '500'
      - name: maxCandidates
        value: '128'
      - name: topK
        value: '64'
      - name: explorationSlots
        value: '48'
      - name: feedbackBlockReauditSlots
        value: '32'
      - name: portfolioSizeMin
        value: '3'
      - name: portfolioSizeMax
        value: '12'
      - name: maxFrontierCandidatesPerSpec
        value: '2'
      - name: maxTotalFrontierCandidates
        value: '128'
      - name: realReplayTimeoutSeconds
        value: '7200'
      - name: realReplayShardSize
        value: '1'
      - name: realReplayShardTimeoutSeconds
        value: '900'
      - name: realReplayShardWorkers
        value: '4'
      - name: trainDays
        value: '12'
      - name: holdoutDays
        value: '8'
      - name: secondOosDays
        value: '5'
      - name: prefetchFullWindowRows
        value: 'true'
      - name: replayTapePath
        value: ''
      - name: replayTapeManifest
        value: ''
      - name: replayTapePreviewTopK
        value: '0'
      - name: replayTapePreviewMinRows
        value: '2'
      - name: allowStaleTape
        value: 'false'
      - name: latestCompleteWindowMinDays
        value: '0'
      - name: minExecutableRowsPerSymbolDay
        value: '1'
      - name: minQuoteValidRatio
        value: '0'
      - name: maxCoverageSpreadBps
        value: '1000000000'
      - name: maxExecutableGapSeconds
        value: '999999'
      - name: selectionOnly
        value: 'false'
      - name: persistResults
        value: 'true'
  templates:
    - name: run
      nodeSelector:
        kubernetes.io/arch: arm64
      activeDeadlineSeconds: 9000
      inputs:
        parameters:
          - name: runId
          - name: outputRoot
          - name: sourceJsonlB64
          - name: candidateSpecsJsonlB64
          - name: candidateSpecsConfigMapName
          - name: candidateSpecsConfigMapKey
          - name: feedbackEvidenceJsonlB64
          - name: feedbackEvidenceConfigMapName
          - name: feedbackEvidenceConfigMapKey
          - name: seedRecentWhitepapers
          - name: symbols
          - name: fullWindowStartDate
          - name: fullWindowEndDate
          - name: expectedLastTradingDay
          - name: targetNetPnlPerDay
          - name: maxCandidates
          - name: topK
          - name: explorationSlots
          - name: feedbackBlockReauditSlots
          - name: portfolioSizeMin
          - name: portfolioSizeMax
          - name: maxFrontierCandidatesPerSpec
          - name: maxTotalFrontierCandidates
          - name: realReplayTimeoutSeconds
          - name: realReplayShardSize
          - name: realReplayShardTimeoutSeconds
          - name: realReplayShardWorkers
          - name: trainDays
          - name: holdoutDays
          - name: secondOosDays
          - name: prefetchFullWindowRows
          - name: replayTapePath
          - name: replayTapeManifest
          - name: replayTapePreviewTopK
          - name: replayTapePreviewMinRows
          - name: allowStaleTape
          - name: latestCompleteWindowMinDays
          - name: minExecutableRowsPerSymbolDay
          - name: minQuoteValidRatio
          - name: maxCoverageSpreadBps
          - name: maxExecutableGapSeconds
          - name: selectionOnly
          - name: persistResults
      container:
        image: registry.ide-newton.ts.net/lab/torghut@sha256:efccee9310b5bba816635915bcdfa9f49b337f7cfc02cd7a6db99a6589530813
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
          - -lc
        env:
          - name: DB_DSN
            valueFrom:
              secretKeyRef:
                name: torghut-db-app
                key: uri
          - name: TA_CLICKHOUSE_URL
            value: http://torghut-clickhouse.torghut.svc.cluster.local:8123
          - name: TA_CLICKHOUSE_USERNAME
            value: torghut
          - name: TA_CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: torghut-clickhouse-auth
                key: torghut_password
          - name: TRADING_STRATEGY_CONFIG_PATH
            value: /etc/torghut/strategies.yaml
          - name: TORGHUT_WHITEPAPER_SOURCE_JSONL_B64
            value: "{{inputs.parameters.sourceJsonlB64}}"
          - name: TORGHUT_WHITEPAPER_CANDIDATE_SPECS_JSONL_B64
            value: "{{inputs.parameters.candidateSpecsJsonlB64}}"
          - name: TORGHUT_WHITEPAPER_CANDIDATE_SPECS_CONFIGMAP_PATH
            value: /var/run/torghut-candidate-specs/candidate-specs.jsonl
          - name: TORGHUT_WHITEPAPER_FEEDBACK_EVIDENCE_JSONL_B64
            value: "{{inputs.parameters.feedbackEvidenceJsonlB64}}"
          - name: TORGHUT_WHITEPAPER_FEEDBACK_EVIDENCE_CONFIGMAP_PATH
            value: /var/run/torghut-feedback/feedback-evidence.jsonl
        volumeMounts:
          - name: strategy-config
            mountPath: /etc/torghut
            readOnly: true
          - name: feedback-evidence
            mountPath: /var/run/torghut-feedback
            readOnly: true
          - name: candidate-specs
            mountPath: /var/run/torghut-candidate-specs
            readOnly: true
        resources:
          requests:
            cpu: 4
            memory: 12Gi
          limits:
            cpu: 8
            memory: 32Gi
        args:
          - |
            set -euo pipefail
            cd /app

            RUN_ID="{{inputs.parameters.runId}}"
            if [ -z "${RUN_ID}" ]; then
              RUN_ID="$(date -u +%Y%m%dT%H%M%SZ)"
            fi

            OUTPUT_ROOT="{{inputs.parameters.outputRoot}}"
            OUTPUT_DIR="${OUTPUT_ROOT%/}/${RUN_ID}"
            WORKDIR=/tmp/torghut-whitepaper-autoresearch-workflow
            SOURCE_JSONL="${WORKDIR}/sources.jsonl"
            CANDIDATE_SPECS_JSONL="${WORKDIR}/candidate-specs.jsonl"
            FEEDBACK_EVIDENCE_JSONL="${WORKDIR}/feedback-evidence.jsonl"
            mkdir -p "${WORKDIR}" "${OUTPUT_DIR}"

            SCRIPT_ARGS=(
              --output-dir "${OUTPUT_DIR}"
              --epoch-id "${RUN_ID}"
              --target-net-pnl-per-day "{{inputs.parameters.targetNetPnlPerDay}}"
              --max-candidates "{{inputs.parameters.maxCandidates}}"
              --top-k "{{inputs.parameters.topK}}"
              --exploration-slots "{{inputs.parameters.explorationSlots}}"
              --feedback-block-reaudit-slots "{{inputs.parameters.feedbackBlockReauditSlots}}"
              --portfolio-size-min "{{inputs.parameters.portfolioSizeMin}}"
              --portfolio-size-max "{{inputs.parameters.portfolioSizeMax}}"
              --replay-mode real
              --program config/trading/research-programs/portfolio-profit-autoresearch-500-v1.yaml
              --strategy-configmap /etc/torghut/strategies.yaml
              --clickhouse-http-url "${TA_CLICKHOUSE_URL}"
              --clickhouse-username "${TA_CLICKHOUSE_USERNAME}"
              --clickhouse-password-env TA_CLICKHOUSE_PASSWORD
              --start-equity 31590.02
              --chunk-minutes 10
              --symbols "{{inputs.parameters.symbols}}"
              --progress-log-seconds 30
              --max-frontier-candidates-per-spec "{{inputs.parameters.maxFrontierCandidatesPerSpec}}"
              --max-total-frontier-candidates "{{inputs.parameters.maxTotalFrontierCandidates}}"
              --real-replay-timeout-seconds "{{inputs.parameters.realReplayTimeoutSeconds}}"
              --real-replay-shard-size "{{inputs.parameters.realReplayShardSize}}"
              --real-replay-shard-timeout-seconds "{{inputs.parameters.realReplayShardTimeoutSeconds}}"
              --real-replay-shard-workers "{{inputs.parameters.realReplayShardWorkers}}"
              --train-days "{{inputs.parameters.trainDays}}"
              --holdout-days "{{inputs.parameters.holdoutDays}}"
              --second-oos-days "{{inputs.parameters.secondOosDays}}"
              --coverage-diagnostic-output "${OUTPUT_DIR}/replay-source-coverage-diagnostics.json"
              --latest-complete-window-receipt-output "${OUTPUT_DIR}/replay-source-latest-complete-window.json"
              --latest-complete-window-min-days "{{inputs.parameters.latestCompleteWindowMinDays}}"
              --min-executable-rows-per-symbol-day "{{inputs.parameters.minExecutableRowsPerSymbolDay}}"
              --min-quote-valid-ratio "{{inputs.parameters.minQuoteValidRatio}}"
              --max-coverage-spread-bps "{{inputs.parameters.maxCoverageSpreadBps}}"
              --max-executable-gap-seconds "{{inputs.parameters.maxExecutableGapSeconds}}"
            )

            if [ "{{inputs.parameters.seedRecentWhitepapers}}" = "true" ]; then
              SCRIPT_ARGS+=(--seed-recent-whitepapers)
            fi
            if [ -n "${TORGHUT_WHITEPAPER_SOURCE_JSONL_B64}" ]; then
              printf '%s' "${TORGHUT_WHITEPAPER_SOURCE_JSONL_B64}" | base64 -d > "${SOURCE_JSONL}"
              SCRIPT_ARGS+=(--source-jsonl "${SOURCE_JSONL}")
            fi
            if [ -s "${TORGHUT_WHITEPAPER_CANDIDATE_SPECS_CONFIGMAP_PATH:-}" ]; then
              cp "${TORGHUT_WHITEPAPER_CANDIDATE_SPECS_CONFIGMAP_PATH}" "${CANDIDATE_SPECS_JSONL}"
              SCRIPT_ARGS+=(--candidate-specs "${CANDIDATE_SPECS_JSONL}")
            elif [ -n "${TORGHUT_WHITEPAPER_CANDIDATE_SPECS_JSONL_B64}" ]; then
              printf '%s' "${TORGHUT_WHITEPAPER_CANDIDATE_SPECS_JSONL_B64}" | base64 -d > "${CANDIDATE_SPECS_JSONL}"
              SCRIPT_ARGS+=(--candidate-specs "${CANDIDATE_SPECS_JSONL}")
            fi
            if [ -s "${TORGHUT_WHITEPAPER_FEEDBACK_EVIDENCE_CONFIGMAP_PATH:-}" ]; then
              cp "${TORGHUT_WHITEPAPER_FEEDBACK_EVIDENCE_CONFIGMAP_PATH}" "${FEEDBACK_EVIDENCE_JSONL}"
              SCRIPT_ARGS+=(--feedback-evidence-jsonl "${FEEDBACK_EVIDENCE_JSONL}")
            elif [ -n "${TORGHUT_WHITEPAPER_FEEDBACK_EVIDENCE_JSONL_B64}" ]; then
              printf '%s' "${TORGHUT_WHITEPAPER_FEEDBACK_EVIDENCE_JSONL_B64}" | base64 -d > "${FEEDBACK_EVIDENCE_JSONL}"
              SCRIPT_ARGS+=(--feedback-evidence-jsonl "${FEEDBACK_EVIDENCE_JSONL}")
            fi
            if [ -n "{{inputs.parameters.fullWindowStartDate}}" ]; then
              SCRIPT_ARGS+=(--full-window-start-date "{{inputs.parameters.fullWindowStartDate}}")
            fi
            if [ -n "{{inputs.parameters.fullWindowEndDate}}" ]; then
              SCRIPT_ARGS+=(--full-window-end-date "{{inputs.parameters.fullWindowEndDate}}")
            fi
            if [ -n "{{inputs.parameters.expectedLastTradingDay}}" ]; then
              SCRIPT_ARGS+=(--expected-last-trading-day "{{inputs.parameters.expectedLastTradingDay}}")
            fi
            if [ "{{inputs.parameters.prefetchFullWindowRows}}" = "true" ]; then
              SCRIPT_ARGS+=(--prefetch-full-window-rows)
            fi
            if [ -n "{{inputs.parameters.replayTapePath}}" ]; then
              SCRIPT_ARGS+=(--replay-tape-path "{{inputs.parameters.replayTapePath}}")
            fi
            if [ -n "{{inputs.parameters.replayTapeManifest}}" ]; then
              SCRIPT_ARGS+=(--replay-tape-manifest "{{inputs.parameters.replayTapeManifest}}")
            fi
            if [ "{{inputs.parameters.replayTapePreviewTopK}}" != "0" ]; then
              if [ -z "{{inputs.parameters.replayTapePath}}" ]; then
                SCRIPT_ARGS+=(--materialize-replay-tape)
              fi
              SCRIPT_ARGS+=(--replay-tape-preview-top-k "{{inputs.parameters.replayTapePreviewTopK}}")
              SCRIPT_ARGS+=(--replay-tape-preview-min-rows "{{inputs.parameters.replayTapePreviewMinRows}}")
            fi
            if [ "{{inputs.parameters.allowStaleTape}}" = "true" ]; then
              SCRIPT_ARGS+=(--allow-stale-tape)
            fi
            if [ "{{inputs.parameters.selectionOnly}}" = "true" ]; then
              SCRIPT_ARGS+=(--selection-only)
            fi
            if [ "{{inputs.parameters.persistResults}}" = "true" ]; then
              SCRIPT_ARGS+=(--persist-results)
            else
              SCRIPT_ARGS+=(--no-persist-results)
            fi

            echo "RUN_LOG whitepaper_autoresearch_start run_id=${RUN_ID} output_dir=${OUTPUT_DIR} symbols={{inputs.parameters.symbols}}"
            /opt/venv/bin/python -u scripts/run_whitepaper_autoresearch_profit_target.py "${SCRIPT_ARGS[@]}"
      volumes:
        - name: strategy-config
          configMap:
            name: torghut-strategy-config
            items:
              - key: strategies.yaml
                path: strategies.yaml
        - name: feedback-evidence
          configMap:
            name: "{{inputs.parameters.feedbackEvidenceConfigMapName}}"
            optional: true
            items:
              - key: "{{inputs.parameters.feedbackEvidenceConfigMapKey}}"
                path: feedback-evidence.jsonl
        - name: candidate-specs
          configMap:
            name: "{{inputs.parameters.candidateSpecsConfigMapName}}"
            optional: true
            items:
              - key: "{{inputs.parameters.candidateSpecsConfigMapKey}}"
                path: candidate-specs.jsonl
      outputs:
        artifacts:
          - name: whitepaper-autoresearch-output
            path: "{{inputs.parameters.outputRoot}}"
