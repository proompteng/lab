apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-db-migrations
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut-db-migrations
    app.kubernetes.io/part-of: lab
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: torghut-db-migrations
        app.kubernetes.io/part-of: lab
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: migrate
          imagePullPolicy: IfNotPresent
          image: registry.ide-newton.ts.net/lab/torghut@sha256:23adc234f54e682c190a0afe55e799c16d18e4a9811c9f1d95ee27bfcfb31682
          command:
            - /bin/sh
            - -ec
          args:
            - |
              /opt/venv/bin/alembic -c /app/alembic.ini upgrade heads
              DB_DSN="${TORGHUT_SIM_DB_DSN}" /opt/venv/bin/alembic -c /app/alembic.ini upgrade heads
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: TORGHUT_SIM_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: host
            - name: TORGHUT_SIM_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: port
            - name: TORGHUT_SIM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: username
            - name: TORGHUT_SIM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: password
            - name: TORGHUT_SIM_DB_DSN
              value: postgresql://$(TORGHUT_SIM_DB_USER):$(TORGHUT_SIM_DB_PASSWORD)@$(TORGHUT_SIM_DB_HOST):$(TORGHUT_SIM_DB_PORT)/torghut_sim_default
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
