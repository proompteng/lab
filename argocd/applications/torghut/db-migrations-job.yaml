apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-db-migrations
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut-db-migrations
    app.kubernetes.io/part-of: lab
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: torghut-db-migrations
        app.kubernetes.io/part-of: lab
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: migrate
          imagePullPolicy: IfNotPresent
          image: registry.ide-newton.ts.net/lab/torghut@sha256:22f8ef16231113f2ef151559bc8e124ebc6fa9e28691fc51ef11b5dcc74dd885
          command:
            - /bin/sh
            - -ec
          args:
            - |
              /opt/venv/bin/alembic -c /app/alembic.ini upgrade heads
              DB_DSN="${TORGHUT_SIM_DB_DSN}" /opt/venv/bin/python - <<'PY'
              import os
              from urllib.parse import urlsplit

              from sqlalchemy import create_engine, text

              revision_before_context = '0023_simulation_run_progress'
              context_revision = '0024_simulation_runtime_context'
              simulation_database = 'torghut_sim_default'

              def database_url(url: str, database: str) -> str:
                  parsed = urlsplit(url)
                  return parsed._replace(path=f'/{database}', query='', fragment='').geturl()

              admin_engine = create_engine(
                  os.environ['TORGHUT_POSTGRES_ADMIN_URI'],
                  isolation_level='AUTOCOMMIT',
              )
              with admin_engine.connect() as connection:
                  owner = connection.execute(
                      text('select quote_ident(:owner)'),
                      {'owner': os.environ['TORGHUT_SIM_DB_USER']},
                  ).scalar_one()
                  exists = connection.execute(
                      text('select 1 from pg_database where datname = :database'),
                      {'database': simulation_database},
                  ).first()
                  if exists is None:
                      connection.execute(text(f'CREATE DATABASE {simulation_database} OWNER {owner}'))
                  connection.execute(text(f'GRANT ALL PRIVILEGES ON DATABASE {simulation_database} TO {owner}'))

              admin_sim_engine = create_engine(
                  database_url(os.environ['TORGHUT_POSTGRES_ADMIN_URI'], simulation_database),
                  isolation_level='AUTOCOMMIT',
              )
              with admin_sim_engine.connect() as connection:
                  connection.execute(text('CREATE EXTENSION IF NOT EXISTS vector'))

              engine = create_engine(os.environ['DB_DSN'])
              with engine.begin() as connection:
                  has_version_table = connection.execute(
                      text("select to_regclass('public.alembic_version') is not null"),
                  ).scalar()
                  has_context_table = connection.execute(
                      text("select to_regclass('public.simulation_runtime_context') is not null"),
                  ).scalar()
                  versions = []
                  if has_version_table:
                      versions = [
                          row[0]
                          for row in connection.execute(text('select version_num from alembic_version')).all()
                      ]

                  if versions == [revision_before_context] and bool(has_context_table):
                      connection.execute(
                          text('update alembic_version set version_num = :revision'),
                          {'revision': context_revision},
                      )
                      print(f'stamped existing simulation runtime context as {context_revision}')
              PY
              DB_DSN="${TORGHUT_SIM_DB_DSN}" /opt/venv/bin/alembic -c /app/alembic.ini upgrade heads
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: TORGHUT_SIM_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: host
            - name: TORGHUT_SIM_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: port
            - name: TORGHUT_SIM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: username
            - name: TORGHUT_SIM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: password
            - name: TORGHUT_POSTGRES_ADMIN_URI
              valueFrom:
                secretKeyRef:
                  name: torghut-db-superuser
                  key: uri
            - name: TORGHUT_SIM_DB_DSN
              value: postgresql://$(TORGHUT_SIM_DB_USER):$(TORGHUT_SIM_DB_PASSWORD)@$(TORGHUT_SIM_DB_HOST):$(TORGHUT_SIM_DB_PORT)/torghut_sim_default
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
