apiVersion: clickhouse-keeper.altinity.com/v1
kind: ClickHouseKeeperInstallation
metadata:
  name: torghut-keeper
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut-keeper
    app.kubernetes.io/part-of: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  taskID: torghut-keeper-reconcile-20260703
  configuration:
    clusters:
      - name: default
        layout:
          replicasCount: 1
        templates:
          podTemplate: chk-default
          volumeClaimTemplate: chk-data
  templates:
    podTemplates:
      - name: chk-default
        spec:
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: clickhouse-keeper
              image: mirror.gcr.io/clickhouse/clickhouse-keeper:25.12.5.44@sha256:525b8b0f93ccb371131c46f22a066ea43d33d74aba314203e8044609945d8524
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
    volumeClaimTemplates:
      - name: chk-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
          storageClassName: rook-ceph-block
  defaults:
    templates:
      podTemplate: chk-default
      volumeClaimTemplate: chk-data
