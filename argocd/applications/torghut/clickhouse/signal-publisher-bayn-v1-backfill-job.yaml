apiVersion: batch/v1
kind: Job
metadata:
  name: signal-adjusted-daily-bayn-v1-backfill
  namespace: torghut
  labels:
    app.kubernetes.io/name: signal-adjusted-daily-publisher
    app.kubernetes.io/part-of: signal
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  suspend: false
  backoffLimit: 1
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signal-adjusted-daily-publisher
        app.kubernetes.io/part-of: signal
        bayn.proompteng.ai/universe: equity-infrastructure-v1
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: arm64
      restartPolicy: Never
      serviceAccountName: torghut-runtime
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: publish
          image: registry.ide-newton.ts.net/lab/signal-publisher:bootstrap
          imagePullPolicy: IfNotPresent
          args:
            - backfill
            - --start
            - "2022-01-27"
            - --end
            - "2026-07-20"
          env:
            - name: SIGNAL_UNIVERSE_ID
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_ID
            - name: SIGNAL_UNIVERSE_SYMBOL_HASH
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_SYMBOL_HASH
            - name: SIGNAL_SYMBOLS
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_SYMBOLS
            - name: SIGNAL_START_DATE
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: HISTORY_START_DATE
            - name: SIGNAL_ALPACA_FEED
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: HISTORY_FEED
            - name: SIGNAL_CODE_REVISION
              value: "72006ac26afef02e42fc1af8d434e49835cc40d6"
            - name: SIGNAL_IMAGE_REPOSITORY
              value: registry.ide-newton.ts.net/lab/signal-publisher
            - name: SIGNAL_IMAGE_DIGEST
              value: sha256:2561a79d2baaa998036344c121cc3986aedec365881911dd592d334163d82729
            - name: SIGNAL_CLICKHOUSE_URL
              value: http://torghut-clickhouse.torghut.svc.cluster.local:8123
            - name: SIGNAL_CLICKHOUSE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: signal-publisher-clickhouse-auth
                  key: username
            - name: SIGNAL_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: signal-publisher-clickhouse-auth
                  key: password
            - name: APCA_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_KEY_ID
            - name: APCA_API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_SECRET_KEY
            - name: SIGNAL_CALENDAR_VERSION
              value: alpaca-us-equity-calendar-v1
            - name: SIGNAL_FINALIZATION_LAG_MINUTES
              value: "90"
            - name: SIGNAL_OPERATION_TIMEOUT_MS
              value: "180000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
