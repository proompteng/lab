apiVersion: v1
kind: ConfigMap
metadata:
  name: market-data-archive-config
  namespace: torghut
data:
  ARCHIVE_KAFKA_BOOTSTRAP: "kafka-kafka-bootstrap.kafka:9092"
  ARCHIVE_KAFKA_SECURITY: "SASL_PLAINTEXT"
  ARCHIVE_KAFKA_SASL_MECH: "SCRAM-SHA-512"
  ARCHIVE_KAFKA_USERNAME: "torghut-ws"
  ARCHIVE_GROUP_ID: "bayn-market-data-archive-v1"
  ARCHIVE_CLIENT_ID: "bayn-market-data-archive"
  ARCHIVE_IEX_BARS_TOPIC: "torghut.bars.1m.v1"
  ARCHIVE_CORE_UNIVERSE_ID: "torghut-core-equity-v1"
  ARCHIVE_CORE_UNIVERSE_SYMBOLS: "AMD,AVGO,COHR,CRDO,LITE,MRVL,MU,NVDA,SNDK,WDC"
  ARCHIVE_CORE_UNIVERSE_SYMBOL_HASH: "8c6b71d066bce38f6f61d5264bb7ebdd45f44ee0c606b92ecf6bc68b81e1d49d"
  ARCHIVE_DELAYED_SIP_BARS_TOPIC: "bayn.market-data.delayed-sip.bars.1m.v1"
  ARCHIVE_OVERNIGHT_BARS_TOPIC: "bayn.market-data.overnight.bars.1m.v1"
  ARCHIVE_CHECKPOINT_INTERVAL_MS: "60000"
  ARCHIVE_PARALLELISM: "3"
  # ClickHouse JDBC v2 forwards server settings only with the clickhouse_setting_ prefix.
  ARCHIVE_CLICKHOUSE_URL: "jdbc:clickhouse://torghut-clickhouse.torghut.svc.cluster.local:8123/signal?clickhouse_setting_insert_quorum_parallel=1"
  ARCHIVE_CLICKHOUSE_USERNAME: "signal_publisher"
  ARCHIVE_CLICKHOUSE_BATCH_SIZE: "100"
  ARCHIVE_CLICKHOUSE_FLUSH_MS: "1000"
  ARCHIVE_CLICKHOUSE_MAX_RETRIES: "3"
