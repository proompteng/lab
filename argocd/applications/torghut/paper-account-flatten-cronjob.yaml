apiVersion: batch/v1
kind: CronJob
metadata:
  name: torghut-paper-account-flatten
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
    app.kubernetes.io/component: paper-account-flatten
spec:
  schedule: "5,15,20,25 9,16 * * 1-5"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 0
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 1800
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: torghut-runtime
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: flatten-paper-account
              image: registry.ide-newton.ts.net/lab/torghut@sha256:36b3205ad9afff6bed096a7a56d727b5447e8a376175bc7a11cc97c1c8a6b73c
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                  ephemeral-storage: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
                  ephemeral-storage: 512Mi
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  cd /app
                  target_plan_readback_args=()
                  if /opt/venv/bin/python scripts/flatten_paper_account_positions.py --help \
                    | grep -q -- '--target-plan-readback-url'; then
                    target_plan_readback_args=(
                      --target-plan-readback-url 'http://torghut-sim.torghut.svc.cluster.local/trading/proofs?kind=runtime_window&window=next&limit=20'
                      --target-plan-readback-timeout-seconds 10
                      --require-target-plan-readback-clean
                      --allow-pending-clean-window-baseline-readback
                    )
                  fi
                  /opt/venv/bin/python scripts/flatten_paper_account_positions.py \
                    --account-label TORGHUT_SIM \
                    --expected-account-label TORGHUT_SIM \
                    --trading-mode paper \
                    --paper-base-url https://paper-api.alpaca.markets \
                    --database-dsn-env SIM_DB_DSN \
                    --max-gross-market-value 1000000 \
                    --max-position-count 25 \
                    --extended-hours-limit \
                    --limit-away-bps 200 \
                    --wait-flat-seconds 120 \
                    --poll-seconds 10 \
                    --persist-snapshot \
                    "${target_plan_readback_args[@]}" \
                    --persist-lineage \
                    --apply \
                    --json
              env:
                - name: DB_DSN
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: uri
                - name: TORGHUT_SIM_DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: host
                - name: TORGHUT_SIM_DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: port
                - name: TORGHUT_SIM_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: username
                - name: TORGHUT_SIM_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: password
                - name: SIM_DB_DSN
                  value: postgresql://$(TORGHUT_SIM_DB_USER):$(TORGHUT_SIM_DB_PASSWORD)@$(TORGHUT_SIM_DB_HOST):$(TORGHUT_SIM_DB_PORT)/torghut_sim_default
                - name: APCA_API_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: torghut-alpaca
                      key: APCA_API_KEY_ID
                      optional: true
                - name: APCA_API_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: torghut-alpaca
                      key: APCA_API_SECRET_KEY
                      optional: true
                - name: APCA_API_BASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: torghut-alpaca
                      key: APCA_API_BASE_URL
                      optional: true
                - name: TRADING_MODE
                  value: paper
                - name: TRADING_ACCOUNT_LABEL
                  value: TORGHUT_SIM
                - name: TRADING_ACCOUNTS_JSON
                  value: >
                    [{"label":"TORGHUT_SIM","mode":"paper","enabled":true}]
                - name: TRADING_KILL_SWITCH_ENABLED
                  value: "false"
