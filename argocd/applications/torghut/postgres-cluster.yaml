apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: torghut-db
  namespace: torghut
spec:
  # Avoid unproved cross-architecture physical replication. The lab has two
  # amd64 workers, so run one instance on each instead of retaining the legacy
  # single-host pin.
  instances: 2
  primaryUpdateStrategy: unsupervised
  affinity:
    # Explicit null removes the legacy kubectl-owned hostname selector through
    # server-side apply. Architecture placement is expressed below instead.
    nodeSelector: null
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                  - amd64
    podAntiAffinityType: required
    topologyKey: kubernetes.io/hostname
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 8Gi
  managed:
    roles:
      - name: torghut_notebook
        ensure: present
        login: true
        inherit: true
        connectionLimit: 4
        comment: Read-only Torghut diagnostics notebooks
        inRoles:
          - pg_read_all_data
        passwordSecret:
          name: torghut-notebook-postgres
  postgresql:
    parameters:
      # The automatic 4 MiB allocation exhausted repeatedly under short write bursts.
      # Keep durability intact and absorb those bursts with a bounded 16 MiB buffer.
      wal_buffers: "16MB"
  storage:
    storageClass: rook-ceph-block
    size: 50Gi
  bootstrap:
    initdb:
      database: torghut
      owner: torghut_app
      encoding: "UTF8"
      dataChecksums: true
  backup:
    target: prefer-standby
    barmanObjectStore:
      destinationPath: s3://cnpg-torghut
      serverName: torghut-db-live
      endpointURL: http://rook-ceph-rgw-objectstore.rook-ceph.svc.cluster.local:80
      s3Credentials:
        accessKeyId:
          name: cnpg-torghut-db
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: cnpg-torghut-db
          key: AWS_SECRET_ACCESS_KEY
      wal:
        maxParallel: 8
    retentionPolicy: "14d"
  inheritedMetadata:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "pgadmin,jangar,argo-workflows"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "pgadmin,jangar,argo-workflows"
  monitoring:
    enablePodMonitor: true
# CNPG will emit application credentials in `torghut-db-app` (uri, user, password, host, port, dbname)
