apiVersion: batch/v1
kind: CronJob
metadata:
  name: torghut-empirical-promotion-renewal
  namespace: torghut
spec:
  schedule: "23 8,20 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 900
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 900
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: torghut-runtime
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: renew
              image: registry.ide-newton.ts.net/lab/torghut@sha256:bbdb0b848da51ea99b0dda1ef01061d203bd93de8ffe323377d141bed32473e7
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  cd /app
                  /opt/venv/bin/python scripts/renew_latest_empirical_promotion_jobs.py \
                    --output-dir /tmp/torghut-empirical-renewal \
                    --strategy-spec-ref intraday_tsmom_v2@research \
                    --runtime-window-import \
                    --runtime-window-target hypothesis_id=H-TSMOM-01,candidate_id=spec-83161ae16d17828eabcc58cc,strategy_family=intraday_tsmom_consistent,strategy_name=intraday-tsmom-profit-v3,source_manifest_ref=config/trading/hypotheses/h-tsmom-01.json \
                    --runtime-window-target hypothesis_id=H-PAIRS-01,candidate_id=spec-d74b07b2aaab8d0cfa8a4c38,strategy_family=microbar_cross_sectional_pairs,strategy_name=microbar-cross-sectional-pairs-v1,source_manifest_ref=config/trading/hypotheses/h-pairs-01.json \
                    --runtime-window-hypothesis-id H-TSMOM-01 \
                    --runtime-window-candidate-id spec-83161ae16d17828eabcc58cc \
                    --runtime-window-strategy-family intraday_tsmom_consistent \
                    --runtime-window-strategy-name intraday-tsmom-profit-v3 \
                    --runtime-window-account-label TORGHUT_SIM \
                    --runtime-window-observed-stage paper \
                    --runtime-window-source-dsn-env SIM_DB_DSN \
                    --runtime-window-dataset-snapshot-ref portfolio-profit-autoresearch-500-v1 \
                    --runtime-window-source-manifest-ref config/trading/hypotheses/h-tsmom-01.json \
                    --json
              env:
                - name: DB_DSN
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: uri
                - name: TORGHUT_SIM_DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: host
                - name: TORGHUT_SIM_DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: port
                - name: TORGHUT_SIM_DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: username
                - name: TORGHUT_SIM_DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: password
                - name: SIM_DB_DSN
                  value: postgresql://$(TORGHUT_SIM_DB_USER):$(TORGHUT_SIM_DB_PASSWORD)@$(TORGHUT_SIM_DB_HOST):$(TORGHUT_SIM_DB_PORT)/torghut_sim_default
                - name: TORGHUT_IMAGE_DIGEST
                  value: sha256:bbdb0b848da51ea99b0dda1ef01061d203bd93de8ffe323377d141bed32473e7
                - name: TORGHUT_EMPIRICAL_CEPH_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: torghut-empirical-artifacts
                      key: BUCKET_NAME
                - name: TORGHUT_EMPIRICAL_CEPH_BUCKET_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: torghut-empirical-artifacts
                      key: BUCKET_HOST
                - name: TORGHUT_EMPIRICAL_CEPH_BUCKET_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: torghut-empirical-artifacts
                      key: BUCKET_PORT
                - name: TORGHUT_EMPIRICAL_CEPH_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: torghut-empirical-artifacts
                      key: AWS_ACCESS_KEY_ID
                - name: TORGHUT_EMPIRICAL_CEPH_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: torghut-empirical-artifacts
                      key: AWS_SECRET_ACCESS_KEY
