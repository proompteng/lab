apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-ws
  namespace: torghut
  labels:
    app: torghut-ws
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: torghut-ws
  template:
    metadata:
      labels:
        app: torghut-ws
      annotations:
        kubectl.kubernetes.io/restartedAt: 2026-05-01T01:25:51.190Z
        torghut.proompteng.ai/ws-config-generation: bayn-delayed-sip-v1
    spec:
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: torghut-ws
          image: registry.ide-newton.ts.net/lab/torghut-ws@sha256:c5753db003befaa6525469de4bf659bc774c4543531bae2dcd2f145ecb8e608b
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: torghut-ws-config
          env:
            - name: SYMBOLS
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_SYMBOLS
            - name: SYMBOLS_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_SYMBOLS
            - name: MARKET_DATA_UNIVERSE_ID
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_ID
            - name: MARKET_DATA_UNIVERSE_SYMBOL_HASH
              valueFrom:
                configMapKeyRef:
                  name: bayn-universe-v1
                  key: UNIVERSE_SYMBOL_HASH
            - name: ALPACA_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_SECRET_KEY
            - name: KAFKA_SASL_USER
              value: torghut-ws
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-ws
                  key: password
            - name: TORGHUT_WS_VERSION
              value: main-sha-b03f46c00bf843ca1b0d17f81c9bf85ed6bad34d
            - name: TORGHUT_WS_COMMIT
              value: b03f46c00bf843ca1b0d17f81c9bf85ed6bad34d
            - name: JAVA_TOOL_OPTIONS
              value: -XX:+UseContainerSupport -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      nodeSelector: {}
      tolerations: []
