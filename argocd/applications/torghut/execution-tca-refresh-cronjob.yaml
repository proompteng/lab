apiVersion: batch/v1
kind: CronJob
metadata:
  name: torghut-execution-tca-refresh
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut
    app.kubernetes.io/component: execution-tca-refresh
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 240
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: torghut-runtime
          nodeSelector:
            kubernetes.io/arch: arm64
          containers:
            - name: refresh-execution-tca
              image: registry.ide-newton.ts.net/lab/torghut@sha256:215597510ad733d75cb4c8af628f96c7d738f19263469907998fa6cb0e294671
              imagePullPolicy: IfNotPresent
              env:
                - name: DB_DSN
                  valueFrom:
                    secretKeyRef:
                      name: torghut-db-app
                      key: uri
              command:
                - /bin/bash
                - -lc
              args:
                - |
                  set -euo pipefail
                  cd /app
                  /opt/venv/bin/python scripts/refresh_execution_tca_metrics.py \
                    --older-than-seconds 900 \
                    --batch-size 250 \
                    --max-batches 1 \
                    --apply \
                    --json
