apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-lean-runner
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut-lean-runner
    app.kubernetes.io/component: execution
    app.kubernetes.io/part-of: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: torghut-lean-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: torghut-lean-runner
        app.kubernetes.io/component: execution
        app.kubernetes.io/part-of: lab
    spec:
      serviceAccountName: torghut-runtime
      containers:
        - name: lean-runner
          # Keep in lockstep with `argocd/applications/torghut/knative-service.yaml`.
          image: registry.ide-newton.ts.net/lab/torghut@sha256:94f16d76d6c86fba0ed643f9414579df4a3ee6aeebc43a766f49f26791290c96
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.lean_runner:app
            - --host
            - 0.0.0.0
            - --port
            - "8088"
          ports:
            - name: http
              containerPort: 8088
          env:
            - name: APP_ENV
              value: prod
            - name: TRADING_UNIVERSE_SOURCE
              value: jangar
            - name: TRADING_UNIVERSE_REQUIRE_NON_EMPTY_JANGAR
              value: "true"
            - name: TRADING_UNIVERSE_STATIC_FALLBACK_ENABLED
              value: "true"
            - name: TRADING_UNIVERSE_STATIC_FALLBACK_SYMBOLS
              value: AAPL,AMAT,AMD,AVGO,GOOG,INTC,META,MSFT,NVDA,QQQ,SPY,TSLA
            - name: TRADING_UNIVERSE_MAX_STALE_SECONDS
              value: "900"
            - name: JANGAR_SYMBOLS_URL
              value: http://jangar.jangar.svc.cluster.local/api/torghut/symbols?assetClass=equity
            - name: JANGAR_BASE_URL
              value: http://jangar.jangar.svc.cluster.local
            - name: JANGAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jangar-api-key
                  key: key
                  optional: true
            - name: TRADING_MODE
              value: live
            - name: TRADING_LIVE_ENABLED
              value: "true"
            - name: TRADING_AUTONOMY_ALLOW_LIVE_PROMOTION
              value: "false"
            - name: TRADING_EXECUTION_ADVISOR_ENABLED
              value: "false"
            - name: TRADING_EXECUTION_ADVISOR_LIVE_APPLY_ENABLED
              value: "false"
            - name: TRADING_KILL_SWITCH_ENABLED
              value: "true"
            - name: TRADING_EMERGENCY_STOP_ENABLED
              value: "true"
            - name: APCA_API_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_KEY_ID
                  optional: true
            - name: APCA_API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_SECRET_KEY
                  optional: true
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-alpaca
                  key: APCA_API_BASE_URL
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
