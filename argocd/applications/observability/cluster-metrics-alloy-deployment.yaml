apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-cluster-metrics-alloy
  namespace: observability
  labels:
    app.kubernetes.io/name: observability-cluster-metrics-alloy
    app.kubernetes.io/component: cluster-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: observability-cluster-metrics-alloy
  template:
    metadata:
      annotations:
        observability.proompteng.ai/config-sha256: 77902b17bdfdb9453e977a7c4457a8a04eeb1b13c5d6e597cf91c1e7f8175af3
      labels:
        app.kubernetes.io/name: observability-cluster-metrics-alloy
        app.kubernetes.io/component: cluster-metrics
    spec:
      serviceAccountName: observability-cluster-metrics-alloy
      securityContext:
        runAsNonRoot: true
        runAsUser: 473
        runAsGroup: 473
        fsGroup: 473
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          image: grafana/alloy:v1.11.2
          args:
            - run
            - /etc/alloy/config.river
          workingDir: /var/lib/alloy
          ports:
            - name: http
              containerPort: 12345
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy
      volumes:
        - name: config
          configMap:
            name: observability-cluster-metrics-alloy
        - name: data
          emptyDir: {}
