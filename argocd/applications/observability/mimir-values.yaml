global:
  extraEnv:
    - name: OBS_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: rook-ceph-rgw-loki
          key: AccessKey
    - name: OBS_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: rook-ceph-rgw-loki
          key: SecretKey
    - name: OBS_S3_REGION
      value: us-east-1

mimir:
  structuredConfig:
    limits:
      ingestion_rate: 20000
      ingestion_burst_size: 400000
    blocks_storage:
      backend: s3
      bucket_store:
        sync_dir: /data/tsdb-sync
      s3:
        endpoint: rook-ceph-rgw-objectstore.rook-ceph.svc:80
        bucket_name: mimir-blocks
        access_key_id: ${OBS_S3_ACCESS_KEY}
        secret_access_key: ${OBS_S3_SECRET_KEY}
        region: ${OBS_S3_REGION}
        insecure: true
        bucket_lookup_type: path
    alertmanager_storage:
      backend: s3
      s3:
        endpoint: rook-ceph-rgw-objectstore.rook-ceph.svc:80
        bucket_name: mimir-alertmanager
        access_key_id: ${OBS_S3_ACCESS_KEY}
        secret_access_key: ${OBS_S3_SECRET_KEY}
        region: ${OBS_S3_REGION}
        insecure: true
        bucket_lookup_type: path
    ruler_storage:
      backend: s3
      s3:
        endpoint: rook-ceph-rgw-objectstore.rook-ceph.svc:80
        bucket_name: mimir-ruler
        access_key_id: ${OBS_S3_ACCESS_KEY}
        secret_access_key: ${OBS_S3_SECRET_KEY}
        region: ${OBS_S3_REGION}
        insecure: true
        bucket_lookup_type: path
    ruler:
      # /data/ruler is the writable working directory used by the ruler.
      # Rule groups are stored in object storage via ruler_storage (S3 backend).
      rule_path: /data/ruler
    usage_stats:
      enabled: false
      installation_mode: helm
  runtimeConfig:
    overrides:
      anonymous:
        ingestion_rate: 20000
        ingestion_burst_size: 400000

rollout_operator:
  enabled: false

admin_api:
  replicas: 1

distributor:
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi

ingester:
  replicas: 3
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 20Gi
    storageClass: rook-ceph-block

querier:
  replicas: 1

query_frontend:
  replicas: 1

query_scheduler:
  replicas: 1

ruler:
  replicas: 1

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    size: 20Gi
    storageClass: rook-ceph-block

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    size: 20Gi
    storageClass: rook-ceph-block

alertmanager:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  env:
    - name: OBS_ALERT_SMTP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: observability-alertmanager-email
          key: smtp-password
    - name: OBS_ALERT_SMTP_FROM
      valueFrom:
        secretKeyRef:
          name: observability-alertmanager-email
          key: smtp-from
    - name: OBS_ALERT_EMAIL_TO
      valueFrom:
        secretKeyRef:
          name: observability-alertmanager-email
          key: email-to
  fallbackConfig: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: smtp.resend.com:587
      smtp_from: ${OBS_ALERT_SMTP_FROM}
      smtp_auth_username: resend
      smtp_auth_password: ${OBS_ALERT_SMTP_PASSWORD}
      smtp_require_tls: true
    route:
      receiver: default-receiver
      group_by: [alertname, namespace, service, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: critical-email
          matchers:
            - severity = "critical"
            - notify = "email"
          group_wait: 10s
          group_interval: 2m
          repeat_interval: 1h
          continue: false
    receivers:
      - name: default-receiver
      - name: critical-email
        email_configs:
          - to: ${OBS_ALERT_EMAIL_TO}
            send_resolved: true
            headers:
              subject: '[lab] {{ .CommonLabels.alertname }}'
  persistence:
    enabled: true
    storageClass: rook-ceph-block
    size: 5Gi

metaMonitoring:
  dashboards:
    enabled: false

minio:
  enabled: false
