apiVersion: v1
kind: ConfigMap
metadata:
  name: arc-runner-capacity-dashboard
  namespace: observability
data:
  arc-runner-capacity-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prom"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom"
              },
              "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"arc\",pod=~\"arc-(amd64|arm64).*runner.*\",container=~\"runner|dind\"}[5m]))",
              "legendFormat": "used {{container}}",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom"
              },
              "expr": "sum by (container) (kube_pod_container_resource_requests{namespace=\"arc\",resource=\"cpu\",pod=~\"arc-(amd64|arm64).*runner.*\",container=~\"runner|dind\"})",
              "legendFormat": "requested {{container}}",
              "refId": "B"
            }
          ],
          "title": "ARC CPU Used vs Requested",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prom"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom"
              },
              "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"arc\",pod=~\"arc-(amd64|arm64).*runner.*\",container=~\"runner|dind\"})",
              "legendFormat": "working set {{container}}",
              "refId": "A"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom"
              },
              "expr": "sum by (container) (kube_pod_container_resource_requests{namespace=\"arc\",resource=\"memory\",pod=~\"arc-(amd64|arm64).*runner.*\",container=~\"runner|dind\"})",
              "legendFormat": "requested {{container}}",
              "refId": "B"
            }
          ],
          "title": "ARC Memory Used vs Requested",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prom"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom"
              },
              "expr": "sum by (phase) (kube_pod_status_phase{namespace=\"arc\",pod=~\"arc-(amd64|arm64).*runner.*\",phase=~\"Pending|Running\"})",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ],
          "title": "ARC Runner Pod Phase",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prom"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prom"
              },
              "expr": "sum by (node) (kube_pod_container_resource_requests{resource=\"cpu\",node!=\"\"}) / sum by (node) (kube_node_status_allocatable{resource=\"cpu\"})",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "Node Requested CPU Fraction",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 42,
      "tags": [
        "arc",
        "capacity",
        "kubernetes"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "ARC Runner Capacity",
      "uid": "arc-runner-capacity",
      "version": 1,
      "weekStart": ""
    }

