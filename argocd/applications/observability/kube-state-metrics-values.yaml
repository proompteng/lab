fullnameOverride: observability-kube-state-metrics
prometheusScrape: false
replicas: 1

collectors:
  - cronjobs
  - deployments
  - namespaces
  - nodes
  - pods
  - services
  - statefulsets

metricLabelsAllowlist:
  - namespaces=[observability.proompteng.ai/hermes-rollout-enabled]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
