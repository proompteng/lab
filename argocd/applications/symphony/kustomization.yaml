apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jangar
configMapGenerator:
  - name: symphony-workflow
    files:
      - WORKFLOW.md
    options:
      disableNameSuffixHash: true
resources:
  - ../symphony-base
  - codex-auth-sealedsecret.yaml
  - linear-api-key-sealedsecret.yaml
  - posthog-sealedsecret.yaml
  - target-argocd-role.yaml
  - target-argocd-rolebinding.yaml
patches:
  - path: deployment.patch.yaml
  - path: pvc.patch.yaml
images:
  - name: registry.ide-newton.ts.net/lab/symphony
    newName: registry.ide-newton.ts.net/lab/symphony
    newTag: "932cb557"
    digest: sha256:be6593a37b2cb8f3162ea98a890dbd640c261a86b18299e771e86f774ed35387
