apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jangar
configMapGenerator:
  - name: symphony-workflow
    files:
      - WORKFLOW.md
    options:
      disableNameSuffixHash: true
resources:
  - ../symphony-base
  - codex-auth-sealedsecret.yaml
  - linear-api-key-sealedsecret.yaml
  - target-argocd-role.yaml
  - target-argocd-rolebinding.yaml
patches:
  - path: deployment.patch.yaml
  - path: pvc.patch.yaml
images:
  - name: registry.ide-newton.ts.net/lab/symphony
    newName: registry.ide-newton.ts.net/lab/symphony
    newTag: "db20184c"
    digest: sha256:e6205f20561623d9b22de4390a37ea9d523612191f26ef7444d2eca8dbefd25c
