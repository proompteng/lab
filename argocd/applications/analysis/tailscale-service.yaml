apiVersion: v1
kind: Service
metadata:
  name: analysis-tailscale
  namespace: analysis
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: analysis
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: analysis
  ports:
    - name: http
      port: 80
      targetPort: http
