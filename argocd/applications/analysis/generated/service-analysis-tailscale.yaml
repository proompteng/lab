apiVersion: v1
kind: Service
metadata:
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: analysis
  name: analysis-tailscale
  namespace: analysis
spec:
  loadBalancerClass: tailscale
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app: analysis
  type: LoadBalancer
