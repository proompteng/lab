apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-hyperliquid-feed-config
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  HYPERLIQUID_NETWORK: "mainnet"
  HYPERLIQUID_INFO_URL: "https://api.hyperliquid.xyz/info"
  HYPERLIQUID_WS_URL: "wss://api.hyperliquid.xyz/ws"
  HYPERLIQUID_INCLUDE_PERPS: "true"
  HYPERLIQUID_INCLUDE_SPOT: "false"
  HYPERLIQUID_MARKET_COVERAGE: "top-volume"
  HYPERLIQUID_TOP_MARKET_COUNT: "12"
  HYPERLIQUID_PINNED_PERP_COINS: "BTC,ETH,HYPE,SOL,SKHX,MU,XYZ100,CL,SNDK,MSTR,SILVER,GOLD"
  HYPERLIQUID_WS_CHANNELS: "allMids,bbo,candle,activeAssetCtx,allDexsAssetCtxs"
  # Five candle windows over the top 12 volume markets plus the pinned execution universe keep feed coverage explicit.
  HYPERLIQUID_CANDLE_INTERVALS: "1m,3m,5m,15m,1h"
  HYPERLIQUID_MAX_WS_CONNECTIONS: "8"
  HYPERLIQUID_MAX_SUBSCRIPTIONS_PER_CONNECTION: "125"
  HYPERLIQUID_MAX_TOTAL_SUBSCRIPTIONS: "1000"
  HYPERLIQUID_REST_WEIGHT_BUDGET_PER_MINUTE: "1000"
  HYPERLIQUID_REST_METADATA_REFRESH_MS: "300000"
  HYPERLIQUID_HEARTBEAT_INTERVAL_MS: "30000"
  HYPERLIQUID_WS_READ_IDLE_TIMEOUT_MS: "180000"
  HYPERLIQUID_READY_REQUIRED_CHANNELS: "candle,bbo"
  HYPERLIQUID_READY_EVENT_MAX_AGE_MS: "180000"
  RECONNECT_BASE_MS: "500"
  RECONNECT_MAX_MS: "30000"
  DEDUP_TTL_SEC: "30"
  DEDUP_MAX_ENTRIES: "100000"
  HEALTH_PORT: "8080"
  METRICS_PORT: "9090"
  KAFKA_BOOTSTRAP: "kafka-kafka-bootstrap.kafka:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KAFKA_SASL_MECH: "SCRAM-SHA-512"
  KAFKA_CLIENT_ID: "torghut-hyperliquid-feed"
  KAFKA_LINGER_MS: "30"
  KAFKA_BATCH_SIZE: "32768"
  KAFKA_BUFFER_MEMORY_BYTES: "16777216"
  KAFKA_MAX_REQUEST_SIZE_BYTES: "524288"
  KAFKA_DELIVERY_TIMEOUT_MS: "60000"
  KAFKA_REQUEST_TIMEOUT_MS: "15000"
  KAFKA_MAX_BLOCK_MS: "10000"
  KAFKA_READY_MAX_AGE_MS: "120000"
  KAFKA_ACKS: "all"
  TOPIC_RAW: "torghut.hyperliquid.raw.v1"
  TOPIC_MARKETS: "torghut.hyperliquid.markets.v1"
  TOPIC_TRADES: "torghut.hyperliquid.trades.v1"
  TOPIC_BOOKS_L2: "torghut.hyperliquid.books.l2.v1"
  TOPIC_BBO: "torghut.hyperliquid.bbo.v1"
  TOPIC_CANDLES: "torghut.hyperliquid.candles.v1"
  TOPIC_ASSET_CTX: "torghut.hyperliquid.asset-ctx.v1"
  TOPIC_FUNDING: "torghut.hyperliquid.funding.v1"
  TOPIC_STATUS: "torghut.hyperliquid.status.v1"
  CLICKHOUSE_ENABLED: "true"
  CLICKHOUSE_REQUIRED_FOR_READINESS: "true"
  CLICKHOUSE_HTTP_URL: "http://torghut-clickhouse.torghut.svc.cluster.local:8123"
  CLICKHOUSE_DATABASE: "torghut"
  CLICKHOUSE_USERNAME: "torghut"
  CLICKHOUSE_BATCH_SIZE: "1000"
  CLICKHOUSE_FLUSH_MS: "500"
  CLICKHOUSE_BBO_BATCH_SIZE: "1000"
  CLICKHOUSE_BBO_FLUSH_MS: "30000"
  CLICKHOUSE_SPARSE_BATCH_SIZE: "100"
  CLICKHOUSE_SPARSE_FLUSH_MS: "30000"
  CLICKHOUSE_QUEUE_CAPACITY: "10000"
  CLICKHOUSE_RETRY_INITIAL_MS: "250"
  CLICKHOUSE_RETRY_MAX_MS: "5000"
  CLICKHOUSE_SHUTDOWN_FLUSH_TIMEOUT_MS: "10000"
  CLICKHOUSE_REQUEST_TIMEOUT_MS: "30000"
  CLICKHOUSE_ENABLED_TABLES: "hyperliquid_market_catalog,hyperliquid_bbo,hyperliquid_candles,hyperliquid_asset_contexts,hyperliquid_funding,hyperliquid_status"
  CLICKHOUSE_READY_TABLES: "hyperliquid_bbo,hyperliquid_candles"
  CLICKHOUSE_READY_MAX_AGE_MS: "300000"
  CLICKHOUSE_TABLE_READY_MAX_AGE_MS: "300000"
  CLICKHOUSE_FAILURE_HOLD_MS: "1000"
  CLICKHOUSE_WRITER_GROUP_ID: "torghut-hyperliquid-clickhouse-writer-v1"
  CLICKHOUSE_WRITER_CLIENT_ID: "torghut-hyperliquid-clickhouse-writer"
  CLICKHOUSE_WRITER_AUTO_OFFSET_RESET: "earliest"
  CLICKHOUSE_WRITER_TOPICS: "torghut.hyperliquid.markets.v1,torghut.hyperliquid.bbo.v1,torghut.hyperliquid.candles.v1,torghut.hyperliquid.asset-ctx.v1,torghut.hyperliquid.funding.v1,torghut.hyperliquid.status.v1"
  CLICKHOUSE_WRITER_DESTINATION_SUFFIX: "_kafka_staging"
  CLICKHOUSE_WRITER_MAX_POLL_RECORDS: "1000"
  CLICKHOUSE_WRITER_MAX_POLL_INTERVAL_MS: "900000"
  CLICKHOUSE_WRITER_SESSION_TIMEOUT_MS: "45000"
  CLICKHOUSE_WRITER_HEARTBEAT_INTERVAL_MS: "3000"
  CLICKHOUSE_WRITER_POLL_MS: "1000"
  CLICKHOUSE_WRITER_HIGH_THROUGHPUT_BATCH_SIZE: "1000"
  CLICKHOUSE_WRITER_HIGH_THROUGHPUT_MAX_AGE_MS: "300000"
  CLICKHOUSE_WRITER_SPARSE_BATCH_SIZE: "100"
  CLICKHOUSE_WRITER_SPARSE_MAX_AGE_MS: "300000"
  CLICKHOUSE_WRITER_MAX_BUFFERED_RECORDS_PER_PARTITION: "5000"
  CLICKHOUSE_WRITER_RETRY_INITIAL_MS: "1000"
  CLICKHOUSE_WRITER_RETRY_MAX_MS: "30000"
  CLICKHOUSE_WRITER_LAG_REFRESH_MS: "30000"
  CLICKHOUSE_WRITER_REQUEST_TIMEOUT_MS: "10000"
  CLICKHOUSE_WRITER_KAFKA_OPERATION_TIMEOUT_MS: "10000"
  CLICKHOUSE_WRITER_MAX_FLUSHES_PER_POLL: "4"
  CLICKHOUSE_WRITER_SHUTDOWN_FLUSH_TIMEOUT_MS: "35000"
  CLICKHOUSE_WRITER_CONSUMER_CLOSE_TIMEOUT_MS: "10000"
  CLICKHOUSE_WRITER_READINESS_MAX_AGE_MS: "360000"
  CLICKHOUSE_WRITER_CATCH_UP_MAX_PARTITION_LAG_RECORDS: "1000"
  CLICKHOUSE_PARITY_GROUP_ID: "torghut-hyperliquid-clickhouse-parity-v1"
  CLICKHOUSE_PARITY_CLIENT_ID: "torghut-hyperliquid-clickhouse-parity"
  CLICKHOUSE_PARITY_MAX_POLL_RECORDS: "5000"
  CLICKHOUSE_PARITY_REQUEST_TIMEOUT_MS: "120000"
  CLICKHOUSE_PARITY_OPERATION_TIMEOUT_MS: "30000"
  CLICKHOUSE_PARITY_POLL_TIMEOUT_MS: "1000"
  CLICKHOUSE_PARITY_MAX_IDLE_POLLS: "30"
  CLICKHOUSE_PARITY_MAX_COMPACTED_RECORDS_PER_PARTITION: "1000000"
  CLICKHOUSE_PARITY_OFFSET_QUERY_BATCH_SIZE: "1000"
  CLICKHOUSE_PARITY_MAX_RUNTIME_MS: "1200000"
