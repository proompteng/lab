apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-hyperliquid-clickhouse-schema
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 360
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: torghut-hyperliquid-clickhouse-schema
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      containers:
        - name: schema
          image: altinity/clickhouse-server:25.3.6.10034.altinitystable
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -ec
          args:
            - |
              set -euo pipefail
              CLICKHOUSE_CLIENT=(
                clickhouse-client
                --host torghut-clickhouse.torghut.svc.cluster.local
                --port 9000
                --user "${CLICKHOUSE_USERNAME}"
                --password "${CLICKHOUSE_PASSWORD}"
                --connect_timeout 5
                --send_timeout 30
                --receive_timeout 60
              )
              deadline=$((SECONDS + 300))
              until "${CLICKHOUSE_CLIENT[@]}" --query 'SELECT 1'; do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "ClickHouse did not become ready in time" >&2
                  exit 1
                fi
                sleep 5
              done
              timeout 240s "${CLICKHOUSE_CLIENT[@]}" --multiquery < /schema/schema.sql
          env:
            - name: CLICKHOUSE_USERNAME
              value: torghut
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-clickhouse-auth
                  key: torghut_password
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: schema
          configMap:
            name: torghut-hyperliquid-clickhouse-schema
