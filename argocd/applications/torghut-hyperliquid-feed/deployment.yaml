apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-hyperliquid-feed
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: torghut-hyperliquid-feed
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: torghut-hyperliquid-feed
  template:
    metadata:
      annotations:
        proompteng.ai/config-revision: hyperliquid-feed-clickhouse-catchup-window-20260620a
      labels:
        app: torghut-hyperliquid-feed
    spec:
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: torghut-hyperliquid-feed
          image: registry.ide-newton.ts.net/lab/torghut-hyperliquid-feed@sha256:ecdf3103d12581ec6c853d6b07353a05d778b35e283394a6c582fe1c3956de0a
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: torghut-hyperliquid-feed-config
          env:
            - name: TORGHUT_HYPERLIQUID_FEED_VERSION
              value: main-a284b225
            - name: TORGHUT_HYPERLIQUID_FEED_COMMIT
              value: a284b225b5eeeb6a9fb5d0a86f0dc6311bef1f1c
            - name: TORGHUT_HYPERLIQUID_FEED_IMAGE_DIGEST
              value: sha256:ecdf3103d12581ec6c853d6b07353a05d778b35e283394a6c582fe1c3956de0a
            - name: KAFKA_SASL_USER
              value: torghut-hyperliquid-feed
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-hyperliquid-feed
                  key: password
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-clickhouse-auth
                  key: torghut_password
            - name: JAVA_TOOL_OPTIONS
              value: -XX:+UseContainerSupport -XX:InitialRAMPercentage=40.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
