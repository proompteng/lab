apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-hyperliquid-clickhouse-schema
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
data:
  schema.sql: |-
    SET distributed_ddl_task_timeout = 10;
    SET distributed_ddl_output_mode = 'null_status_on_timeout';

    CREATE DATABASE IF NOT EXISTS torghut ON CLUSTER default;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_raw ON CLUSTER default
    (
      ingest_ts String,
      event_ts String,
      provider LowCardinality(String),
      network LowCardinality(String),
      feed LowCardinality(String),
      channel LowCardinality(String),
      symbol String,
      market_type Nullable(String),
      market_id Nullable(String),
      dex Nullable(String),
      coin Nullable(String),
      spot_index Nullable(Int32),
      seq UInt64,
      is_final UInt8,
      source LowCardinality(String),
      version UInt32,
      payload String
    )
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_raw', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (channel, symbol, event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 7 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_market_catalog ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_market_catalog', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 35 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_trades ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_trades', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 35 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_l2_books ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_l2_books', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 7 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_bbo ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_bbo', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 35 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_candles ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_candles', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 35 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_asset_contexts ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_asset_contexts', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 35 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_funding ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_funding', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (coalesce(market_id, symbol), event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 35 DAY
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS torghut.hyperliquid_status ON CLUSTER default AS torghut.hyperliquid_raw
    ENGINE = ReplicatedReplacingMergeTree('/clickhouse/tables/{cluster}/{shard}/hyperliquid_status', '{replica}')
    PARTITION BY toDate(parseDateTimeBestEffort(event_ts))
    ORDER BY (channel, symbol, event_ts, seq)
    TTL parseDateTimeBestEffort(event_ts) + INTERVAL 7 DAY
    SETTINGS index_granularity = 8192;

    DROP TABLE IF EXISTS torghut.hyperliquid_raw_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_market_catalog_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_trades_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_l2_books_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_bbo_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_candles_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_asset_contexts_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_funding_kafka_staging ON CLUSTER default SYNC;
    DROP TABLE IF EXISTS torghut.hyperliquid_status_kafka_staging ON CLUSTER default SYNC;

    ALTER TABLE torghut.hyperliquid_raw ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_market_catalog ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_trades ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_l2_books ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_bbo ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_candles ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_asset_contexts ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_funding ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
    ALTER TABLE torghut.hyperliquid_status ON CLUSTER default
      DROP COLUMN IF EXISTS kafka_topic,
      DROP COLUMN IF EXISTS kafka_partition,
      DROP COLUMN IF EXISTS kafka_offset;
