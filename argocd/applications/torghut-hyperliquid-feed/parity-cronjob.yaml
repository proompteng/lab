apiVersion: batch/v1
kind: CronJob
metadata:
  name: torghut-hyperliquid-clickhouse-parity
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: torghut-hyperliquid-clickhouse-parity
spec:
  # This is an operator-triggered cutover gate. Create a bounded Job from this
  # template only after the staging writer has reached its captured high watermarks.
  schedule: "0 0 1 1 *"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 1500
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: torghut-hyperliquid-clickhouse-parity
        spec:
          serviceAccountName: torghut-runtime
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: torghut-hyperliquid-clickhouse-parity
              image: registry.ide-newton.ts.net/lab/torghut-hyperliquid-feed@sha256:40598685cc3298597be18666959510683789d1c59521f089724a7a3724198ec1
              imagePullPolicy: Always
              envFrom:
                - configMapRef:
                    name: torghut-hyperliquid-feed-config
              env:
                - name: TORGHUT_HYPERLIQUID_MODE
                  value: clickhouse-parity
                - name: TORGHUT_HYPERLIQUID_FEED_VERSION
                  value: main-sha-bf6d10ebebc63e55322a5d4d08a2c4f8b20c7bcf
                - name: TORGHUT_HYPERLIQUID_FEED_COMMIT
                  value: bf6d10ebebc63e55322a5d4d08a2c4f8b20c7bcf
                - name: TORGHUT_HYPERLIQUID_FEED_IMAGE_DIGEST
                  value: sha256:40598685cc3298597be18666959510683789d1c59521f089724a7a3724198ec1
                - name: KAFKA_SASL_USER
                  value: torghut-hyperliquid-feed
                - name: KAFKA_SASL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: torghut-hyperliquid-feed
                      key: password
                - name: CLICKHOUSE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: torghut-clickhouse-auth
                      key: torghut_password
                - name: JAVA_TOOL_OPTIONS
                  value: -XX:+UseContainerSupport -XX:InitialRAMPercentage=30.0 -XX:MaxRAMPercentage=70.0 -XX:+ExitOnOutOfMemoryError
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
