apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-forecast-sim
  namespace: torghut
  labels:
    app.kubernetes.io/name: torghut-forecast-sim
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: torghut-forecast-sim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: torghut-forecast-sim
        app.kubernetes.io/component: inference
        app.kubernetes.io/part-of: lab
    spec:
      serviceAccountName: torghut-runtime
      containers:
        - name: forecast
          image: registry.ide-newton.ts.net/lab/torghut@sha256:64226b1a50fd603b2bd741e7a3738088c9d4f80042c6d3ce1c219fc0d0f7de68
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.forecast_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8089"
          ports:
            - name: http
              containerPort: 8089
          env:
            - name: APP_ENV
              value: prod
            - name: TRADING_FORECAST_REGISTRY_MANIFEST_PATH
              value: /etc/torghut-forecast-sim/registry.json
            - name: TRADING_FORECAST_REGISTRY_REFRESH_SECONDS
              value: "30"
            - name: TRADING_FORECAST_CALIBRATION_STALE_AFTER_SECONDS
              value: "604800"
            - name: TRADING_FORECAST_SERVICE_TIMEOUT_SECONDS
              value: "5"
          volumeMounts:
            - name: registry
              mountPath: /etc/torghut-forecast-sim
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: registry
          configMap:
            name: torghut-forecast-sim-registry
