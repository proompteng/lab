apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflows-sso-admin
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/rbac-rule: "email == 'admin@proompteng.ai'"
    workflows.argoproj.io/rbac-rule-precedence: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflows-sso-admin
subjects:
  - kind: ServiceAccount
    name: argo-workflows-sso-admin
    namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflows-sso-logs
  namespace: argo-workflows
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflows-sso-logs
  namespace: argo-workflows
subjects:
  - kind: ServiceAccount
    name: argo-workflows-sso-admin
    namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflows-sso-logs
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-workflows-sso-admin.service-account-token
  namespace: argo-workflows
  annotations:
    kubernetes.io/service-account.name: argo-workflows-sso-admin
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder-workspace-cluster-admin
  namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: coder
    namespace: coder
