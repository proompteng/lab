apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: jangar-sub-orchestration
  namespace: argo-workflows
spec:
  serviceAccountName: codex-workflow
  entrypoint: run
  templates:
    - name: run
      inputs:
        parameters:
          - name: orchestrationRef
            default: ''
          - name: parameters
            default: ''
          - name: namespace
            default: ''
          - name: deliveryId
            default: ''
      script:
        image: registry.ide-newton.ts.net/lab/agents-controller:3b6c02e9
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-token
                key: token
        command:
          - /bin/bash
          - -c
        source: |
          set -euo pipefail
          orchestration_ref="{{inputs.parameters.orchestrationRef}}"
          parameters_raw="{{inputs.parameters.parameters}}"
          namespace="{{inputs.parameters.namespace}}"
          delivery_id="{{inputs.parameters.deliveryId}}"
          if [ -z "${namespace}" ]; then
            namespace="{{workflow.namespace}}"
          fi

          if [ -z "${orchestration_ref}" ]; then
            echo "orchestrationRef is required" >&2
            exit 1
          fi

          PARAMETERS_RAW="${parameters_raw}" \
          ORCHESTRATION_REF="${orchestration_ref}" \
          ORCHESTRATION_NAMESPACE="${namespace}" \
          DELIVERY_ID="${delivery_id}" \
            bun <<'JS' | kubectl create -f -
          const raw = process.env.PARAMETERS_RAW ?? ''
          let parameters = {}
          if (raw.trim()) {
            try {
              parameters = JSON.parse(raw)
            } catch {
              parameters = {}
            }
          }
          const orchestrationRef = process.env.ORCHESTRATION_REF ?? ''
          const namespace = process.env.ORCHESTRATION_NAMESPACE ?? ''
          const deliveryId = process.env.DELIVERY_ID ?? ''
          const manifest = {
            apiVersion: 'orchestration.proompteng.ai/v1alpha1',
            kind: 'OrchestrationRun',
            metadata: {
              generateName: `${orchestrationRef}-run-`,
              namespace,
            },
            spec: {
              orchestrationRef: { name: orchestrationRef },
              parameters,
            },
          }
          if (deliveryId) {
            manifest.spec.deliveryId = deliveryId
          }
          console.log(JSON.stringify(manifest))
          JS
