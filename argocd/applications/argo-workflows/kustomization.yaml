apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - rbac.yaml
  - codex-workflow-serviceaccount.yaml
  - codex-workflow-rbac.yaml
  - codex-docker-policy.yaml
  - codex-implementation-semaphore.yaml
  - ingressroute.yaml
  - middleware-workflows-canonical-host.yaml
  - ingressroute-private.yaml
  - objectbucketclaim.yaml
  - alloy-rbac.yaml
  - alloy-configmap.yaml
  - alloy-deployment.yaml
  - codex-research-workflow.yaml
  - codex-research-rbac.yaml
  - codex-cluster-admin.yaml
  - agents-embeddings-config.yaml
  - agents-primitives-echo-workflowtemplate.yaml
  - agents-approval-gate-workflowtemplate.yaml
  - agents-memory-op-workflowtemplate.yaml
  - agents-signal-wait-workflowtemplate.yaml
  - agents-checkpoint-workflowtemplate.yaml
  - agents-sub-orchestration-workflowtemplate.yaml
images:
  - name: registry.ide-newton.ts.net/lab/agents-controller
    newTag: "3b6c02e9"
    digest: sha256:a065a1e35846afea7445bbaf79accacf66c37a7da3301139eb241b1f73163a9f
helmCharts:
  - name: argo-workflows
    repo: https://argoproj.github.io/argo-helm
    version: 1.0.13
    releaseName: argo-workflows
    namespace: argo-workflows
    valuesInline:
      controller:
        workflowNamespaces:
          - argo-workflows
          - agents
          - jangar
        workflowDefaults:
          spec:
            ttlStrategy:
              secondsAfterSuccess: 259200 # 3d retention for successful runs
              secondsAfterFailure: 604800 # 7d retention to keep failure diagnostics
              secondsAfterCompletion: 604800
      server:
        secure: false
        authModes:
          - sso
        sso:
          enabled: true
          issuer: https://argocd.proompteng.ai/api/dex
          clientId:
            name: argo-workflows-sso
            key: client-id
          clientSecret:
            name: argo-workflows-sso
            key: client-secret
          redirectUrl: https://workflows.k8s.proompteng.ai/oauth2/callback
          scopes:
            - openid
            - profile
            - email
          rbac:
            enabled: true
          insecureSkipVerify: true
      workflow:
        serviceAccount:
          create: true
          name: argo-workflows-workflow
      useStaticCredentials: true
      artifactRepository:
        archiveLogs: true
        s3:
          bucket: argo-workflows
          endpoint: rook-ceph-rgw-objectstore.rook-ceph.svc.cluster.local:80
          insecure: true
          accessKeySecret:
            name: argo-workflows
            key: AWS_ACCESS_KEY_ID
          secretKeySecret:
            name: argo-workflows
            key: AWS_SECRET_ACCESS_KEY
          useSDKCreds: false
  - name: argo-events
    repo: https://argoproj.github.io/argo-helm
    version: 2.4.21
    releaseName: argo-events
    namespace: argo-workflows
    valuesInline:
      singleNamespace: true
      controller:
        metricsConfigMap: ""
      eventsource:
        serviceAccount:
          create: true
      sensor:
        serviceAccount:
          create: false
