apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: istio-system
resources:
  - ingress-class.yaml
  - knative-local-gateway.yaml
  - knative-local-gateway-rbac.yaml
  - knative-local-gateway-deployment.yaml
helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    releaseName: istio-base
    namespace: istio-system
    includeCRDs: true
    valuesInline:
      defaultRevision: default
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    releaseName: istiod
    namespace: istio-system
  - name: cni
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.29.2
    releaseName: istio-cni
    namespace: istio-system
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: istiod
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: istiod
      spec:
        template:
          spec:
            containers:
              - name: discovery
                env:
                  - name: GOMEMLIMIT
                    valueFrom:
                      resourceFieldRef:
                        divisor: "1"
                        resource: limits.memory
