# KubeVirt VM passthrough mode remains available for stopped rollback VMs:
# - Talos does not support GPU Operator installing host drivers/toolkit.
# - NVIDIA's KubeVirt sandbox device plugin image is amd64-only, but our GPU node (`altra`) is arm64.
# - KubeVirt's built-in device-plugin advertises passthrough resources
#   (externalResourceProvider=false in the KubeVirt CR).
# Native Talos container GPU nodes use dedicated standalone device-plugin
# DaemonSets in this app after the host NVIDIA system extensions are installed.
sandboxWorkloads:
  enabled: true

operator:
  # Talos uses containerd.
  defaultRuntime: containerd

# Do not attempt to install host NVIDIA drivers/toolkit on Talos.
driver:
  enabled: false

toolkit:
  enabled: false

# Standalone, node-scoped device-plugin DaemonSets advertise native GPU nodes.
devicePlugin:
  enabled: false

# This image is amd64-only; disable it on arm64 nodes.
sandboxDevicePlugin:
  enabled: false

vfioManager:
  enabled: false
