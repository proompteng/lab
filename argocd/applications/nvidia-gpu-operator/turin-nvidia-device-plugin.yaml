apiVersion: v1
kind: ServiceAccount
metadata:
  name: turin-nvidia-device-plugin
  namespace: gpu-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: turin-nvidia-device-plugin
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: turin-nvidia-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: turin-nvidia-device-plugin
subjects:
  - kind: ServiceAccount
    name: turin-nvidia-device-plugin
    namespace: gpu-operator
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: turin-nvidia-device-plugin
  namespace: gpu-operator
  labels:
    app: turin-nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: turin-nvidia-device-plugin
  template:
    metadata:
      labels:
        app: turin-nvidia-device-plugin
    spec:
      serviceAccountName: turin-nvidia-device-plugin
      priorityClassName: system-node-critical
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: turin
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nvidia-device-plugin
          image: nvcr.io/nvidia/k8s-device-plugin:v0.19.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PASS_DEVICE_SPECS
              value: "true"
            - name: FAIL_ON_INIT_ERROR
              value: "true"
            - name: DEVICE_LIST_STRATEGY
              value: cdi-annotations,cdi-cri
            - name: DEVICE_ID_STRATEGY
              value: uuid
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: NVIDIA_DRIVER_ROOT
              value: /usr/local
            - name: MIG_STRATEGY
              value: single
            - name: CDI_ENABLED
              value: "true"
            - name: CDI_ANNOTATION_PREFIX
              value: cdi.k8s.io/
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: driver-install-dir
              mountPath: /driver-root
              mountPropagation: HostToContainer
            - name: host-root
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
            - name: cdi-root
              mountPath: /var/run/cdi
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: driver-install-dir
          hostPath:
            path: /
        - name: host-root
          hostPath:
            path: /
        - name: cdi-root
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
