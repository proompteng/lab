apiVersion: swarm.proompteng.ai/v1alpha1
kind: Swarm
metadata:
  name: jangar-control-plane
  namespace: agents
spec:
  owner:
    id: platform-owner
    channel: swarm://owner/platform
  domains:
    - platform-reliability
    - platform-evolution
  objectives:
    - operate as the Jangar Engineering team through NATS-backed swarm communication
    - continuously discover and implement control-plane improvements
    - deliver platform requirements safely to production
  mission:
    ledgerRef: /workspace/.agentrun/swarm/jangar-control-plane-mission-ledger.md
    sourceDesign: docs/agents/designs/swarm-agentic-mission-architecture-2026-05-08.md
    businessMetric: reduce failed AgentRuns and shorten green PR-to-healthy GitOps rollout time for the Jangar control plane
    validationContract:
      - every run must cite the governing design or runtime requirement before changing code
      - implement stages must produce production PRs with tests or report the exact blocker to code
      - verify stages must merge only green PRs and prove Argo, workload readiness, and service health after rollout
      - final handoff must name the control-plane metric improved or the smallest blocker preventing improvement
    valueGates:
      - failed_agentrun_rate
      - pr_to_rollout_latency
      - ready_status_truth
      - manual_intervention_count
      - handoff_evidence_quality
    handoffRequiredFields:
      - objective
      - files_changed_or_inspected
      - commands_and_exit_codes
      - tests_passed_or_failed
      - unresolved_issues
      - risk_and_rollback
      - exact_next_action
  mode: lights-out
  timezone: UTC
  cadence:
    discoverEvery: 6h
    planEvery: 24h
    implementEvery: 6h
    verifyEvery: 6h
  integrations:
    nats:
      url: nats://nats.nats.svc.cluster.local:4222
      subjectPrefix: workflow
      channel: general
      personas:
        architect:
          humanName: Victor Chen
          workerIdentity: victor-chen-jangar-architect
        engineer:
          humanName: Elise Novak
          workerIdentity: elise-novak-jangar-engineer
        deployer:
          humanName: Marco Silva
          workerIdentity: marco-silva-jangar-deployer
  discovery:
    minCitations: 2
    minConfidence: 0.75
    sources:
      - name: internet-research
      - name: runtime-alerts
      - name: nats-requirements
  delivery:
    repoAllowlist:
      - proompteng/lab
    requiredChecks:
      - lint
      - type-check
      - unit-tests
    mergePolicy: merge-queue
    deploymentTargets:
      - agents
    rollout:
      strategy: canary
      steps:
        - setWeight: 10
          pause: 5m
        - setWeight: 30
          pause: 10m
        - setWeight: 100
          pause: 0m
      analysisTemplateRef: default-canary-analysis
  risk:
    budgetRef: default-budget
    approvalPolicyRef: default-approval
    freezeAfterFailures: 3
    freezeDuration: 60m
  execution:
    discover:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-discover-template
    plan:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-plan-template
    implement:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-implement-template
    verify:
      targetRef:
        kind: AgentRun
        name: jangar-swarm-verify-template
