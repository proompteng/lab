apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentRun
metadata:
  name: jangar-swarm-verify-template
  namespace: agents
  annotations:
    agents.proompteng.ai/template: "true"
spec:
  agentRef:
    name: codex-spark-agent
  implementationSpecRef:
    name: jangar-swarm-deployer-v1
  runtime:
    type: workflow
    config:
      serviceAccountName: agents-sa
  workload:
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
        ephemeral-storage: 8Gi
      limits:
        memory: 16Gi
        ephemeral-storage: 16Gi
  ttlSecondsAfterFinished: 21600
  workflow:
    steps:
      - name: verify
        retries: 0
        retryBackoffSeconds: 30
        timeoutSeconds: 7200
        parameters:
          stage: verify
  parameters:
    repository: proompteng/lab
    base: main
    head: codex/swarm-jangar-control-plane-verify
