    swarmValueGates: >-
      ["failed_agentrun_rate","pr_to_rollout_latency","ready_status_truth","manual_intervention_count","handoff_evidence_quality"]
    swarmHandoffRequiredFields: >-
      ["objective","files_changed_or_inspected","commands_and_exit_codes","tests_passed_or_failed","unresolved_issues","risk_and_rollback","exact_next_action"]
    swarmSourceDesign: docs/agents/designs/swarm-agentic-mission-architecture-2026-05-08.md
  vcsRef:
