apiVersion: security.proompteng.ai/v1alpha1
kind: SecretBinding
metadata:
  name: autonomous-trader-secrets
  namespace: synthesis
  labels:
    app.kubernetes.io/part-of: autotrader
    app.kubernetes.io/component: autonomous-trader
spec:
  subjects:
    - kind: Agent
      name: autonomous-trader-agent
    - kind: Agent
      name: autonomous-trader-agent-green
  allowedSecrets:
    - autonomous-trader-alpaca-mcp
    - agents-artifacts
    - codex-auth
    - github-token
    - synthesis-env
