apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bayn-ledger-restore
  labels:
    app.kubernetes.io/name: bayn-ledger-restore
    app.kubernetes.io/part-of: bayn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bayn-ledger-restore
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: bayn-db
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: bayn-tigerbeetle
      ports:
        - port: 3000
          protocol: TCP
