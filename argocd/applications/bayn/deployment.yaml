apiVersion: apps/v1
kind: Deployment
metadata:
  name: bayn
  labels:
    app.kubernetes.io/name: bayn
    app.kubernetes.io/part-of: bayn
spec:
  replicas: 1
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bayn
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bayn
        app.kubernetes.io/part-of: bayn
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-07-23T05:39:34Z"
    spec:
      serviceAccountName: bayn
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bayn
          image: registry.ide-newton.ts.net/lab/bayn
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: BAYN_CODE_REVISION
              value: 427976e4b5612fd1d2eb65ddf01f987fe0850c00
            - name: BAYN_IMAGE_REPOSITORY
              value: registry.ide-newton.ts.net/lab/bayn
            - name: BAYN_IMAGE_DIGEST
              value: sha256:88f1a072f2f9b89f0563bc845eca14f83e3eba3b7135cbd931a7010f5147fd64
            - name: BAYN_STRATEGY_BEHAVIOR_HASH
              value: "43cece33d3db232ffb02ba78826727e50b5795319d09d27e1baa0c04709eb056"
            - name: BAYN_STRATEGY_PARAMETER_HASH
              value: "649148eeaaf1f3aa1f1dd6d129a93aeef6b07f63e1aa60b6ed79f91a9cf7bbf8"
            - name: BAYN_QUALIFICATION_RUN_ID
              value: "7a521052ff039376267eb16f222023edf5d72f308af380c71f2d50da6e6a1b32"
            - name: BAYN_MAXIMUM_AUTHORITY
              value: OBSERVE
            - name: BAYN_HEALTH_INTERVAL_MS
              value: "30000"
            - name: BAYN_OPERATION_TIMEOUT_MS
              value: "30000"
            - name: BAYN_CLICKHOUSE_URL
              value: http://torghut-clickhouse.torghut.svc.cluster.local:8123
            - name: BAYN_CLICKHOUSE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bayn-clickhouse-auth
                  key: username
            - name: BAYN_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bayn-clickhouse-auth
                  key: password
            - name: BAYN_SIGNAL_SNAPSHOT_ID
              value: "840c75885270b349d4a992e003918ce7e6fe39730f981a20b2e88ae2db45a2e2"
            - name: BAYN_SIGNAL_PUBLICATION_ASOF
              value: "2026-07-22"
            - name: BAYN_SIGNAL_CALENDAR_VERSION
              value: "alpaca-us-equity-calendar-v1"
            - name: BAYN_SIGNAL_DATA_START
              value: "2016-01-04"
            - name: BAYN_SIGNAL_DATA_END
              value: "2026-07-22"
            - name: BAYN_SIGNAL_LOOKBACK_START
              value: "2016-01-04"
            - name: BAYN_SIGNAL_EVALUATION_START
              value: "2017-01-03"
            - name: BAYN_SIGNAL_EVALUATION_END
              value: "2026-07-22"
            - name: BAYN_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: bayn-db-app
                  key: fqdn-uri
            - name: BAYN_POSTGRES_TLS
              value: "true"
            - name: BAYN_POSTGRES_CA_PATH
              value: /var/run/secrets/bayn/postgres/ca.crt
            - name: BAYN_TIGERBEETLE_CLUSTER_ID
              value: "122731676035874920802382025803517750735"
            - name: BAYN_TIGERBEETLE_ADDRESSES
              value: "ledger-0.ledger-headless.bayn.svc.cluster.local:3000,ledger-1.ledger-headless.bayn.svc.cluster.local:3000,ledger-2.ledger-headless.bayn.svc.cluster.local:3000"
            - name: BAYN_TIGERBEETLE_LEDGER
              value: "7001"
            - name: NODE_ENV
              value: production
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            # TigerBeetle's native client requires io_uring, which containerd's
            # RuntimeDefault seccomp profile blocks. Keep every other control.
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: postgres-ca
              mountPath: /var/run/secrets/bayn/postgres
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: postgres-ca
          secret:
            secretName: bayn-db-ca
            defaultMode: 0444
            items:
              - key: ca.crt
                path: ca.crt
