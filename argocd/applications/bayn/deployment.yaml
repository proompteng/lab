apiVersion: apps/v1
kind: Deployment
metadata:
  name: bayn
  labels:
    app.kubernetes.io/name: bayn
    app.kubernetes.io/part-of: bayn
spec:
  replicas: 1
  revisionHistoryLimit: 2
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bayn
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bayn
        app.kubernetes.io/part-of: bayn
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-07-21T04:13:58Z"
    spec:
      serviceAccountName: bayn
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/arch: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bayn
          image: registry.ide-newton.ts.net/lab/bayn
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: BAYN_CODE_REVISION
              value: cc739b2cf7cf3ac03f4ecc42f9538fe67fc959e7
            - name: BAYN_IMAGE_REPOSITORY
              value: registry.ide-newton.ts.net/lab/bayn
            - name: BAYN_IMAGE_DIGEST
              value: sha256:cc1e1cadddef8c179f0b45a4a1b8191491034032f097318a856e4d8278c67711
            - name: BAYN_HEALTH_INTERVAL_MS
              value: "30000"
            - name: BAYN_OPERATION_TIMEOUT_MS
              value: "30000"
            - name: BAYN_CLICKHOUSE_URL
              value: http://torghut-clickhouse.torghut.svc.cluster.local:8123
            - name: BAYN_CLICKHOUSE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bayn-clickhouse-auth
                  key: username
            - name: BAYN_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bayn-clickhouse-auth
                  key: password
            - name: BAYN_SIGNAL_SNAPSHOT_ID
              value: 0e3188062fb6781f9dfdc048b4bfe9846d8f4ce74c5e429e296e3ebcd75e93a5
            - name: BAYN_SIGNAL_PUBLICATION_ASOF
              value: "2026-07-20"
            - name: BAYN_SIGNAL_CALENDAR_VERSION
              value: alpaca-us-equity-calendar-v1
            - name: BAYN_SIGNAL_DATA_START
              value: "2017-01-03"
            - name: BAYN_SIGNAL_DATA_END
              value: "2026-07-20"
            - name: BAYN_SIGNAL_LOOKBACK_START
              value: "2017-01-03"
            - name: BAYN_SIGNAL_EVALUATION_START
              value: "2018-01-03"
            - name: BAYN_SIGNAL_EVALUATION_END
              value: "2026-07-20"
            - name: BAYN_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: bayn-db-app
                  key: fqdn-uri
            - name: BAYN_POSTGRES_TLS
              value: "true"
            - name: BAYN_POSTGRES_CA_PATH
              value: /var/run/secrets/bayn/postgres/ca.crt
            - name: BAYN_TIGERBEETLE_CLUSTER_ID
              value: "2001"
            - name: BAYN_TIGERBEETLE_ADDRESSES
              value: torghut-tigerbeetle.torghut.svc.cluster.local:3000
            - name: BAYN_TIGERBEETLE_LEDGER
              value: "7001"
            - name: NODE_ENV
              value: production
          startupProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            # TigerBeetle's native client requires io_uring, which containerd's
            # RuntimeDefault seccomp profile blocks. Keep every other control.
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: postgres-ca
              mountPath: /var/run/secrets/bayn/postgres
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        - name: postgres-ca
          secret:
            secretName: bayn-db-ca
            defaultMode: 0444
            items:
              - key: ca.crt
                path: ca.crt
