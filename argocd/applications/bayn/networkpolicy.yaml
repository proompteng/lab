apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bayn
  labels:
    app.kubernetes.io/name: bayn
    app.kubernetes.io/part-of: bayn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bayn
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: http
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: torghut
          podSelector:
            matchLabels:
              clickhouse.altinity.com/chi: torghut-clickhouse
      ports:
        - port: 8123
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: torghut
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: torghut-tigerbeetle
      ports:
        - port: 3000
          protocol: TCP
