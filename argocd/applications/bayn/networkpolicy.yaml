apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bayn
  labels:
    app.kubernetes.io/name: bayn
    app.kubernetes.io/part-of: bayn
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bayn
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: http
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: torghut
          podSelector:
            matchLabels:
              clickhouse.altinity.com/chi: torghut-clickhouse
      ports:
        - port: 8123
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: ledger
      ports:
        - port: 3000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: bayn-db
      ports:
        - port: 5432
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bayn-db
  labels:
    app.kubernetes.io/name: bayn-db
    app.kubernetes.io/part-of: bayn
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: bayn-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: bayn
      ports:
        - port: 5432
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: bayn-db
      ports:
        - port: 5432
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
      ports:
        - port: 5432
          protocol: TCP
        - port: 8000
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: observability-cluster-metrics-alloy
      ports:
        - port: 9187
          protocol: TCP
