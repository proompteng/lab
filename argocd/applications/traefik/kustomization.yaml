apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: traefik

resources:
  - k8s-proompteng-ai-certificate.yaml
helmCharts:
  - name: traefik
    repo: https://traefik.github.io/charts
    version: 39.0.1
    releaseName: traefik
    namespace: traefik
    includeCRDs: true
    valuesFile: values.yaml
