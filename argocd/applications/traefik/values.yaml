deployment:
  replicas: 2

service:
  type: LoadBalancer
  annotations:
    metallb.io/address-pool: metallb-ip-pool
    metallb.io/allow-shared-ip: ingress-edge
    metallb.io/loadBalancerIPs: 100.100.244.181

ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

providers:
  kubernetesGateway:
    enabled: false
