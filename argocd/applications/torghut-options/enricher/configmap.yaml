apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-options-enricher-config
  namespace: torghut
data:
  OPTIONS_HTTP_HOST: "0.0.0.0"
  OPTIONS_HTTP_PORT: "8080"
  KAFKA_BOOTSTRAP: "kafka-kafka-bootstrap.kafka:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KAFKA_SASL_MECH: "SCRAM-SHA-512"
  KAFKA_LINGER_MS: "30"
  KAFKA_BATCH_SIZE: "32768"
  KAFKA_REQUEST_TIMEOUT_MS: "15000"
  ALPACA_OPTIONS_FEED: "indicative"
  ALPACA_OPTIONS_STREAM_URL: "wss://stream.data.alpaca.markets"
  ALPACA_OPTIONS_DATA_BASE_URL: "https://data.alpaca.markets"
  OPTIONS_CONTRACT_DISCOVERY_INTERVAL_SEC: "300"
  OPTIONS_CONTRACT_DISCOVERY_OFFSESSION_INTERVAL_SEC: "3600"
  OPTIONS_CONTRACT_DISCOVERY_PAGE_LIMIT: "100"
  OPTIONS_CONTRACT_EXPIRATION_HORIZON_DAYS: "730"
  OPTIONS_SUBSCRIPTION_HOT_CAP: "400"
  OPTIONS_SUBSCRIPTION_WARM_CAP: "2000"
  OPTIONS_SUBSCRIPTION_ROTATION_BATCH_SIZE: "250"
  OPTIONS_SUBSCRIPTION_ROTATION_MIN_INTERVAL_SEC: "30"
  OPTIONS_PROVIDER_CAP_BOOTSTRAP: "200"
  OPTIONS_SNAPSHOT_HOT_INTERVAL_SEC: "30"
  OPTIONS_SNAPSHOT_WARM_INTERVAL_SEC: "300"
  OPTIONS_SNAPSHOT_COLD_INTERVAL_SEC: "21600"
  OPTIONS_SNAPSHOT_BATCH_SIZE: "64"
  OPTIONS_BACKFILL_MAX_DAYS: "5"
  OPTIONS_SLO_DISCOVERY_FRESHNESS_SEC: "300"
  OPTIONS_SLO_HOT_SNAPSHOT_FRESHNESS_SEC: "30"
  OPTIONS_SLO_TA_WATERMARK_LAG_SEC: "30"
  OPTIONS_SLO_CLICKHOUSE_FRESHNESS_SEC: "120"
  OPTIONS_MARKET_HOLIDAYS: "[]"
  OPTIONS_UNDERLYING_PRIORITY_SYMBOLS: "[]"
  TOPIC_OPTIONS_CONTRACTS: "torghut.options.contracts.v1"
  TOPIC_OPTIONS_TRADES: "torghut.options.trades.v1"
  TOPIC_OPTIONS_QUOTES: "torghut.options.quotes.v1"
  TOPIC_OPTIONS_SNAPSHOTS: "torghut.options.snapshots.v1"
  TOPIC_OPTIONS_STATUS: "torghut.options.status.v1"
