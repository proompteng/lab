apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-options-enricher
  namespace: torghut
  labels:
    app: torghut-options-enricher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: torghut-options-enricher
  template:
    metadata:
      labels:
        app: torghut-options-enricher
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-09T03:45:00Z"
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: torghut-options-enricher
          image: registry.ide-newton.ts.net/lab/torghut@sha256:b70e3acea25a06b46b1cf816519180aac336965f8303074b098f5722db98dc78
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.options_lane.enricher_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          envFrom:
            - configMapRef:
                name: torghut-options-enricher-config
          env:
            - name: APP_ENV
              value: prod
            - name: KAFKA_SASL_USER
              value: torghut-options
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-options
                  key: password
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: ALPACA_OPTIONS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_OPTIONS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_SECRET_KEY
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_BASE_URL
            - name: TORGHUT_OPTIONS_VERSION
              value: v0.594.0-9-g28607f384
            - name: TORGHUT_OPTIONS_COMMIT
              value: 28607f38450ba42c9cdaa6f494c973d46b3eefdb
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
