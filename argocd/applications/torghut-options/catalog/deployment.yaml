apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-options-catalog
  namespace: torghut
  labels:
    app: torghut-options-catalog
spec:
  replicas: 1
  revisionHistoryLimit: 2
  # The catalog is a singleton database reconciler. Recreate prevents old and
  # new revisions from scanning and writing the same universe concurrently.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: torghut-options-catalog
  template:
    metadata:
      labels:
        app: torghut-options-catalog
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-05-05T20:20:00Z"
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: await-options-schema
          image: registry.ide-newton.ts.net/lab/torghut@sha256:a5e4bf7442f80de5ca61630a300fd0b53817f5c67f8a13d94dc3414b81e57065
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /schema-gate/await-options-schema.py
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
          volumeMounts:
            - name: options-schema-gate
              mountPath: /schema-gate
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: torghut-options-catalog
          image: registry.ide-newton.ts.net/lab/torghut@sha256:a5e4bf7442f80de5ca61630a300fd0b53817f5c67f8a13d94dc3414b81e57065
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.options_lane.catalog_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          envFrom:
            - configMapRef:
                name: torghut-options-catalog-config
          env:
            - name: APP_ENV
              value: prod
            - name: KAFKA_SASL_USER
              value: torghut-options
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-options
                  key: password
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: ALPACA_OPTIONS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_OPTIONS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_SECRET_KEY
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_BASE_URL
            - name: OPTIONS_LIVE_UNDERLYING_SYMBOLS
              valueFrom:
                configMapKeyRef:
                  name: torghut-ws-config
                  key: SYMBOLS_ALLOWLIST
            - name: TORGHUT_OPTIONS_VERSION
              value: v0.596.0-2352-g726672299
            - name: TORGHUT_OPTIONS_COMMIT
              value: 7266722998cca1893ed68b8f98423ebf1b22026d
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: options-schema-gate
          configMap:
            name: torghut-options-schema-gate
