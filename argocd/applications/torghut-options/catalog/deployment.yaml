apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-options-catalog
  namespace: torghut
  labels:
    app: torghut-options-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: torghut-options-catalog
  template:
    metadata:
      labels:
        app: torghut-options-catalog
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-09T03:45:00Z"
    spec:
      serviceAccountName: torghut-runtime
      containers:
        - name: torghut-options-catalog
          image: registry.ide-newton.ts.net/lab/torghut@sha256:8f42839fd5f25e48488613fb0faaa940f940c46c8aa96bb918a0690e613c9b47
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.options_lane.catalog_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          envFrom:
            - configMapRef:
                name: torghut-options-catalog-config
          env:
            - name: APP_ENV
              value: prod
            - name: KAFKA_SASL_USER
              value: torghut-options
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-options
                  key: password
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-options-db-app
                  key: uri
            - name: ALPACA_OPTIONS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_OPTIONS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_SECRET_KEY
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_BASE_URL
            - name: TORGHUT_OPTIONS_VERSION
              value: v0.563.0-46-ga1567c95
            - name: TORGHUT_OPTIONS_COMMIT
              value: a1567c955e2b3f5bc99696ed983f8e4a6c3f83b5
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
