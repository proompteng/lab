apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-options-catalog
  namespace: torghut
  labels:
    app: torghut-options-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: torghut-options-catalog
  template:
    metadata:
      labels:
        app: torghut-options-catalog
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-05-05T20:20:00Z"
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: torghut-options-catalog
          image: registry.ide-newton.ts.net/lab/torghut@sha256:5ffa0cdcaa707b396cdc9c611b27b82ccc8c405bdc5884a005dafbbb0ecd213a
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.options_lane.catalog_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          envFrom:
            - configMapRef:
                name: torghut-options-catalog-config
          env:
            - name: APP_ENV
              value: prod
            - name: KAFKA_SASL_USER
              value: torghut-options
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-options
                  key: password
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: ALPACA_OPTIONS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_OPTIONS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_SECRET_KEY
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_BASE_URL
            - name: TORGHUT_OPTIONS_VERSION
              value: v0.586.0-102-gfe5f55f8c
            - name: TORGHUT_OPTIONS_COMMIT
              value: fe5f55f8c0152fe9d8fd2faf14c7d71f594308ac
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
