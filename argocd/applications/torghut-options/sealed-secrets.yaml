---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: torghut-options-alpaca
  namespace: torghut
spec:
  encryptedData:
    APCA_API_BASE_URL: 
    APCA_API_KEY_ID: 
    APCA_API_SECRET_KEY: 
  template:
    metadata:
      name: torghut-options-alpaca
      namespace: torghut
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: torghut-options-db-app
  namespace: torghut
spec:
  encryptedData:
    dbname: 
    host: 
    jdbc-uri: 
    password: 
    pgpass: 
    port: 
    uri: 
    user: 
    username: 
  template:
    metadata:
      name: torghut-options-db-app
      namespace: torghut
    type: kubernetes.io/basic-auth
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: torghut-options-clickhouse-auth
  namespace: torghut
spec:
  encryptedData:
    default_password: 
    default_password_sha256_hex: 
    torghut_password: 
    torghut_password_sha256_hex: 
  template:
    metadata:
      name: torghut-options-clickhouse-auth
      namespace: torghut
