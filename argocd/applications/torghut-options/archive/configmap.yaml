apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-options-archive-config
  namespace: torghut
data:
  OPTIONS_CONTRACT_ARCHIVE_HORIZON_DAYS: "730"
  OPTIONS_CONTRACT_ARCHIVE_PAGE_LIMIT: "10000"
