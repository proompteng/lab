apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-options-archive
  namespace: torghut
  labels:
    app: torghut-options-archive
spec:
  # Run exactly one fenced worker so archive finalization has a single writer.
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: torghut-options-archive
  template:
    metadata:
      labels:
        app: torghut-options-archive
      annotations:
        # Bump with archive ConfigMap changes so GitOps starts a pod with the
        # new write budget instead of leaving the existing env snapshot alive.
        proompteng.ai/config-revision: archive-overlay-write-budget-20260714a
    spec:
      terminationGracePeriodSeconds: 45
      nodeSelector:
        kubernetes.io/arch: arm64
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: await-options-schema
          image: registry.ide-newton.ts.net/lab/torghut@sha256:ad3fc679b7698e6a737d441f188a702010bebf58918462f1ea07b74e1f24844d
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /schema-gate/await-options-schema.py
          env:
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
          volumeMounts:
            - name: options-schema-gate
              mountPath: /schema-gate
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: torghut-options-archive
          image: registry.ide-newton.ts.net/lab/torghut@sha256:ad3fc679b7698e6a737d441f188a702010bebf58918462f1ea07b74e1f24844d
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - app.options_lane.archive_service:app
            - --host
            - 0.0.0.0
            - --port
            - "8080"
          envFrom:
            - configMapRef:
                name: torghut-options-archive-config
          env:
            - name: APP_ENV
              value: prod
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: ALPACA_OPTIONS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_OPTIONS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_SECRET_KEY
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_BASE_URL
            - name: TORGHUT_OPTIONS_VERSION
              value: v0.596.0-2133-gf4d685dc7
            - name: TORGHUT_OPTIONS_COMMIT
              value: f4d685dc7bdce482a0de4852917de47f9340a41f
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: options-schema-gate
          configMap:
            name: torghut-options-schema-gate
