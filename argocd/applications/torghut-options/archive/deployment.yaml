apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-options-archive
  namespace: torghut
  labels:
    app: torghut-options-archive
spec:
  # Keep the regressed archive contained until the fixed image promotion activates
  # this replica. The startup gate below also requires migration 0063's valid index.
  replicas: 0
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: torghut-options-archive
  template:
    metadata:
      labels:
        app: torghut-options-archive
    spec:
      terminationGracePeriodSeconds: 45
      nodeSelector:
        kubernetes.io/arch: arm64
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: torghut-options-archive
          image: registry.ide-newton.ts.net/lab/torghut@sha256:47736d5ab0ea9c9025d99131a7f44e052623740414c17cbfaa88e1e1a240038b
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              python - <<'PY'
              import os
              import time

              from sqlalchemy import create_engine, text
              from sqlalchemy.exc import SQLAlchemyError

              raw_dsn = os.environ["DB_DSN"]
              if raw_dsn.startswith("postgresql://"):
                  dsn = "postgresql+psycopg://" + raw_dsn.removeprefix("postgresql://")
              elif raw_dsn.startswith("postgres://"):
                  dsn = "postgresql+psycopg://" + raw_dsn.removeprefix("postgres://")
              else:
                  dsn = raw_dsn
              deadline = time.monotonic() + 900
              attempts = 0
              while True:
                  attempts += 1
                  try:
                      engine = create_engine(dsn, pool_pre_ping=True)
                      try:
                          with engine.connect() as connection:
                              ready = connection.execute(
                                  text(
                                      """
                                      SELECT
                                        to_regclass('public.torghut_options_archive_membership') IS NOT NULL
                                        AND COALESCE(
                                          (
                                            SELECT index_entry.indisvalid AND index_entry.indisready
                                            FROM pg_index AS index_entry
                                            WHERE index_entry.indexrelid = to_regclass(
                                              'public.ix_options_catalog_active_expiration_symbol'
                                            )
                                          ),
                                          FALSE
                                        )
                                      """
                                  )
                              ).scalar_one()
                      finally:
                          engine.dispose()
                      if ready:
                          print(f"options archive migration gate ready after {attempts} attempt(s)")
                          break
                  except SQLAlchemyError as error:
                      print(
                          "waiting for options archive migration: "
                          f"attempt={attempts} last_error={type(error).__name__}"
                      )
                  if time.monotonic() >= deadline:
                      raise SystemExit("options archive migrations through 0063 were not ready within 900 seconds")
                  time.sleep(5)
              PY
              exec uvicorn app.options_lane.archive_service:app --host 0.0.0.0 --port 8080
          envFrom:
            - configMapRef:
                name: torghut-options-archive-config
          env:
            - name: APP_ENV
              value: prod
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: ALPACA_OPTIONS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_KEY_ID
            - name: ALPACA_OPTIONS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_SECRET_KEY
            - name: APCA_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: torghut-options-alpaca
                  key: APCA_API_BASE_URL
            - name: TORGHUT_OPTIONS_VERSION
              value: v0.596.0-1880-gcd9e04b96
            - name: TORGHUT_OPTIONS_COMMIT
              value: cd9e04b9652e8b4b1a1cf15d0281ca2b13e1f4fe
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 90
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
