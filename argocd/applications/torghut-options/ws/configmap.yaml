apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-ws-options-config
  namespace: torghut
data:
  ALPACA_MARKET_TYPE: "options"
  ALPACA_FEED: "indicative"
  ALPACA_STREAM_URL: "wss://stream.data.alpaca.markets"
  ALPACA_BASE_URL: "https://data.alpaca.markets"
  ALPACA_MARKET_DATA_CHANNELS: "trades,quotes"
  JANGAR_SYMBOLS_URL: "http://torghut-options-catalog.torghut.svc.cluster.local/v1/options/hot-set"
  SYMBOLS: ""
  SYMBOLS_POLL_INTERVAL_MS: "30000"
  SUBSCRIBE_BATCH_SIZE: "200"
  SHARD_COUNT: "1"
  SHARD_INDEX: "0"
  ENABLE_TRADE_UPDATES: "false"
  ENABLE_BARS_BACKFILL: "false"
  RECONNECT_BASE_MS: "500"
  RECONNECT_MAX_MS: "30000"
  DEDUP_TTL_SEC: "5"
  DEDUP_MAX_ENTRIES: "10000"
  KAFKA_BOOTSTRAP: "kafka-kafka-bootstrap.kafka:9092"
  KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KAFKA_SASL_MECH: "SCRAM-SHA-512"
  KAFKA_CLIENT_ID: "torghut-ws-options"
  KAFKA_LINGER_MS: "30"
  KAFKA_BATCH_SIZE: "32768"
  KAFKA_BUFFER_MEMORY_BYTES: "16777216"
  KAFKA_MAX_REQUEST_SIZE_BYTES: "524288"
  KAFKA_DELIVERY_TIMEOUT_MS: "60000"
  KAFKA_REQUEST_TIMEOUT_MS: "15000"
  KAFKA_MAX_BLOCK_MS: "10000"
  KAFKA_ACKS: "all"
  HEALTH_PORT: "8080"
  METRICS_PORT: "9090"
  HEALTH_NOT_READY_KILL_AFTER_MS: "300000"
  TOPIC_TRADES: "torghut.options.trades.v1"
  TOPIC_QUOTES: "torghut.options.quotes.v1"
  TOPIC_BARS_1M: ""
  TOPIC_STATUS: "torghut.options.status.v1"
  TORGHUT_ACCOUNT_LABEL: "OPTIONS"
  OPTIONS_SUBSCRIPTION_HOT_CAP: "400"
  OPTIONS_SUBSCRIPTION_WARM_CAP: "2000"
  OPTIONS_SUBSCRIPTION_ROTATION_BATCH_SIZE: "250"
  OPTIONS_SUBSCRIPTION_ROTATION_MIN_INTERVAL_SEC: "30"
  OPTIONS_PROVIDER_CAP_BOOTSTRAP: "500"
  OPTIONS_SLO_DISCOVERY_FRESHNESS_SEC: "300"
  OPTIONS_SLO_HOT_SNAPSHOT_FRESHNESS_SEC: "30"
