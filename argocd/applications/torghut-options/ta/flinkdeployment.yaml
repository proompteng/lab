apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: torghut-options-ta
  namespace: torghut
  labels:
    app: torghut-options-ta
spec:
  image: registry.ide-newton.ts.net/lab/torghut-ta@sha256:e5b1aa4d6f2333c0eeab80f35623f5b9798346ed27e8c90c6aed0d6324aed742
  imagePullPolicy: IfNotPresent
  restartNonce: 38
  flinkVersion: v2_0
  serviceAccount: torghut-runtime
  flinkConfiguration:
    state.checkpoints.dir: s3a://flink-checkpoints/torghut/options-technical-analysis/checkpoints
    state.savepoints.dir: s3a://flink-checkpoints/torghut/options-technical-analysis/savepoints
    execution.checkpointing.mode: EXACTLY_ONCE
    execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
    taskmanager.numberOfTaskSlots: "2"
    restart-strategy.type: exponential-delay
    restart-strategy.exponential-delay.initial-backoff: 10 s
    restart-strategy.exponential-delay.max-backoff: 1 min
    restart-strategy.exponential-delay.backoff-multiplier: "2.0"
    restart-strategy.exponential-delay.reset-backoff-threshold: 1 h
    restart-strategy.exponential-delay.jitter-factor: "0.1"
    execution.checkpointing.unaligned: "true"
    execution.checkpointing.tolerable-failed-checkpoints: "3"
    metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
    metrics.reporter.prom.port: "9249"
    fs.s3a.endpoint: http://rook-ceph-rgw-objectstore.rook-ceph.svc:80
    fs.s3a.connection.ssl.enabled: "false"
    fs.s3a.path.style.access: "true"
  podTemplate:
    apiVersion: v1
    kind: Pod
    metadata:
      labels:
        app: torghut-options-ta
    spec:
      serviceAccountName: torghut-runtime
      containers:
        - name: flink-main-container
          envFrom:
            - configMapRef:
                name: torghut-options-ta-config
          env:
            - name: TA_KAFKA_DELIVERY_GUARANTEE
              value: AT_LEAST_ONCE
            - name: OPTIONS_TA_STATUS_KAFKA_DELIVERY_GUARANTEE
              value: AT_LEAST_ONCE
            - name: TA_KAFKA_USERNAME
              value: torghut-options
            - name: TA_KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-options
                  key: password
            - name: TA_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-clickhouse-auth
                  key: torghut_password
            - name: TA_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flink-checkpoints
                  key: AWS_ACCESS_KEY_ID
            - name: TA_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flink-checkpoints
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: flink-checkpoints
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flink-checkpoints
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flink-checkpoints
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flink-checkpoints
                  key: AWS_SECRET_ACCESS_KEY
            - name: TORGHUT_TA_VERSION
              value: sha-314c93ab0289304193a287697665d6da9b409ba0
            - name: TORGHUT_TA_COMMIT
              value: 314c93ab0289304193a287697665d6da9b409ba0
          ports:
            - containerPort: 9249
              name: metrics
  jobManager:
    resource:
      cpu: 0.5
      memory: 2048m
    podTemplate:
      metadata:
        labels:
          app: torghut-options-ta
    replicas: 1
  taskManager:
    resource:
      cpu: 1
      memory: 3072m
    podTemplate:
      metadata:
        labels:
          app: torghut-options-ta
    replicas: 2
  job:
    entryClass: ai.proompteng.dorvud.ta.flink.OptionsTechnicalAnalysisJobKt
    jarURI: local:///opt/flink/usrlib/app.jar
    parallelism: 4
    upgradeMode: last-state
    state: running
