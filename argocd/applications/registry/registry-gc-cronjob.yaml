apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc
  namespace: registry
spec:
  schedule: "0 3 * * 0"
  timeZone: America/Los_Angeles
  suspend: true
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: registry-gc
          restartPolicy: Never
          containers:
            - name: gc
              image: alpine:3.20
              env:
                - name: KUBECTL_VERSION
                  value: v1.33.0
                - name: REGISTRY_GC_WAIT_TIMEOUT
                  value: 2h
                - name: REGISTRY_GC_ACTIVE_DEADLINE_SECONDS
                  value: "7200"
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  apk add --no-cache ca-certificates curl
                  arch="$(uname -m)"
                  case "${arch}" in
                    aarch64) kubectl_arch="arm64" ;;
                    x86_64) kubectl_arch="amd64" ;;
                    *) echo "unsupported arch: ${arch}" >&2; exit 1 ;;
                  esac
                  curl -L --retry 5 --retry-delay 3 -o /usr/local/bin/kubectl \
                    "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${kubectl_arch}/kubectl"
                  chmod +x /usr/local/bin/kubectl

                  desired_replicas="$(kubectl -n registry get deployment/registry -o jsonpath='{.spec.replicas}' || echo '1')"
                  if [ -z "${desired_replicas}" ] || [ "${desired_replicas}" = "0" ]; then
                    desired_replicas="1"
                  fi

                  registry_pod="$(kubectl -n registry get pod -l app=registry -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
                  registry_node=""
                  if [ -n "${registry_pod}" ]; then
                    registry_node="$(kubectl -n registry get pod "${registry_pod}" -o jsonpath='{.spec.nodeName}' 2>/dev/null || true)"
                  fi

                  gc_job=""

                  cleanup_gc_job() {
                    if [ -z "${gc_job}" ]; then
                      return
                    fi
                    if ! kubectl -n registry get job "${gc_job}" >/dev/null 2>&1; then
                      return
                    fi
                    echo "Deleting registry GC worker job ${gc_job} before restoring registry service..."
                    kubectl -n registry delete job "${gc_job}" --wait=true --timeout=10m || true
                    if kubectl -n registry get pod -l job-name="${gc_job}" -o name | grep -q .; then
                      kubectl -n registry wait --for=delete pod -l job-name="${gc_job}" --timeout=10m || true
                    fi
                  }

                  scale_up() {
                    echo "Scaling registry back up to ${desired_replicas}..."
                    kubectl -n registry scale deployment/registry --replicas="${desired_replicas}" || true
                    kubectl -n registry rollout status deployment/registry --timeout=5m || true
                  }

                  restore_registry() {
                    cleanup_gc_job
                    scale_up
                  }
                  trap restore_registry EXIT

                  gc_job="registry-gc-${HOSTNAME}-$(date +%s)"

                  kubectl -n registry scale deployment/registry --replicas=0
                  kubectl -n registry rollout status deployment/registry --timeout=5m
                  if kubectl -n registry get pod -l app=registry -o name | grep -q .; then
                    kubectl -n registry wait --for=delete pod -l app=registry --timeout=5m
                  fi

                  node_name_line=""
                  if [ -n "${registry_node}" ]; then
                    node_name_line="nodeName: ${registry_node}"
                  fi

                  cat <<JOB | kubectl -n registry apply -f -
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: ${gc_job}
                  spec:
                    activeDeadlineSeconds: ${REGISTRY_GC_ACTIVE_DEADLINE_SECONDS}
                    backoffLimit: 0
                    ttlSecondsAfterFinished: 3600
                    template:
                      spec:
                        ${node_name_line}
                        restartPolicy: Never
                        containers:
                          - name: gc
                            image: registry:3
                            command:
                              - /bin/registry
                              - garbage-collect
                              - /etc/docker/registry/config.yml
                            volumeMounts:
                              - name: registry-data
                                mountPath: /var/lib/registry
                              - name: registry-config
                                mountPath: /etc/docker/registry
                        volumes:
                          - name: registry-data
                            persistentVolumeClaim:
                              claimName: registry-data
                          - name: registry-config
                            configMap:
                              name: registry-config
                  JOB

                  kubectl -n registry wait --for=condition=complete job/${gc_job} --timeout="${REGISTRY_GC_WAIT_TIMEOUT}"
                  kubectl -n registry logs job/${gc_job}
                  kubectl -n registry delete job/${gc_job} --wait=true --timeout=10m
                  if kubectl -n registry get pod -l job-name="${gc_job}" -o name | grep -q .; then
                    kubectl -n registry wait --for=delete pod -l job-name="${gc_job}" --timeout=10m || true
                  fi
                  gc_job=""
