apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: user1
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    strimzi.io/cluster: kafka-next
spec:
  authentication:
    type: scram-sha-512
    password:
      valueFrom:
        secretKeyRef:
          name: user1-source
          key: password
---
