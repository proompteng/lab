apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-next
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.3.0
    metadataVersion: "4.2-IV1"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
      - name: plain2
        port: 9093
        type: internal
        tls: false
      - name: phingest
        port: 9094
        type: internal
        tls: true
    config:
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.min.isr: 2
      transaction.state.log.replication.factor: 3
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: controllers
  labels:
    strimzi.io/cluster: kafka-next
spec:
  replicas: 3
  roles:
    - controller
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: kafka-next
                  strimzi.io/pool-name: controllers
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              strimzi.io/cluster: kafka-next
              strimzi.io/pool-name: controllers
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
  resources:
    requests:
      cpu: "2000m"
      memory: 4Gi
  storage:
    type: persistent-claim
    class: local-path
    size: 30Gi
    deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: brokers
  labels:
    strimzi.io/cluster: kafka-next
spec:
  replicas: 3
  roles:
    - broker
  template:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: kafka-next
                  strimzi.io/pool-name: brokers
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - labelSelector:
            matchLabels:
              strimzi.io/cluster: kafka-next
              strimzi.io/pool-name: brokers
          maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
  resources:
    requests:
      cpu: "2000m"
      memory: 4Gi
  storage:
    type: persistent-claim
    class: rook-ceph-block
    size: 200Gi
    deleteClaim: false
