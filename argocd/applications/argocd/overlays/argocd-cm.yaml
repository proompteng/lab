apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  labels:
    app.kubernetes.io/part-of: argocd
data:
  url: https://argocd.proompteng.ai
  kustomize.buildOptions: --enable-helm
  application.resourceTrackingMethod: annotation
  timeout.reconciliation: 180s
  resource.customizations.health.bitnami.com_SealedSecret: |
    hs = {}
    hs.status = "Healthy"
    hs.message = "SealedSecret health is ignored; decryption is handled by the sealed-secrets controller."
    return hs
  resource.customizations.health.flink.apache.org_FlinkDeployment: |
    hs = {}
    local spec = obj.spec or {}
    local status = obj.status or {}
    local jobSpec = spec.job or {}
    local jobStatus = status.jobStatus or {}
    local reconciliation = status.reconciliationStatus or {}
    local desiredState = jobSpec.state or ""
    local jobManagerStatus = status.jobManagerDeploymentStatus or ""
    local lifecycleState = status.lifecycleState or ""
    local reconciliationState = reconciliation.state or ""
    local currentJobState = jobStatus.state or ""

    if desiredState == "suspended" then
      local suspendedJobReady = currentJobState == "" or currentJobState == "CANCELED" or currentJobState == "FINISHED" or currentJobState == "SUSPENDED"
      local suspendedLifecycleReady = lifecycleState == "" or lifecycleState == "STABLE" or lifecycleState == "UPGRADING" or lifecycleState == "SUSPENDED"
      local suspendedReconciliationReady = reconciliationState == "" or reconciliationState == "DEPLOYED" or reconciliationState == "UPGRADING"
      local suspendedJobManagerReady = jobManagerStatus == "READY" or jobManagerStatus == "MISSING"

      if suspendedJobManagerReady and suspendedJobReady and suspendedLifecycleReady and suspendedReconciliationReady then
        hs.status = "Healthy"
        hs.message = "FlinkDeployment is intentionally suspended and ready for activation."
        return hs
      end

      hs.status = "Progressing"
      hs.message = "FlinkDeployment is converging on the suspended state."
      return hs
    end

    if jobManagerStatus == "READY" and currentJobState == "RUNNING" and (lifecycleState == "STABLE" or lifecycleState == "DEPLOYED" or reconciliationState == "DEPLOYED") then
      hs.status = "Healthy"
      hs.message = "FlinkDeployment is running."
      return hs
    end

    if lifecycleState == "FAILED" or reconciliationState == "FAILED" or currentJobState == "FAILED" then
      hs.status = "Degraded"
      hs.message = "FlinkDeployment reported a failed state."
      return hs
    end

    hs.status = "Progressing"
    hs.message = "FlinkDeployment is reconciling."
    return hs
  users.session.duration: "168h"
  dex.config: |
    issuer: https://argocd.proompteng.ai/api/dex
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    telemetry:
      http: 0.0.0.0:5558
    grpc:
      addr: 0.0.0.0:5557
    enablePasswordDB: true
    connectors: []
    staticClients:
      - id: argo-workflows-sso
        name: Argo Workflows
        redirectURIs:
          - https://workflows.proompteng.ai/oauth2/callback
        secretEnv: ARGO_WORKFLOWS_SSO_CLIENT_SECRET
    staticPasswords:
      - email: admin@proompteng.ai
        hash: "$2b$10$ra1qX8LB233SZ/rgZ08n4eHlPfOpc5FMYAXYVN5csb6LPgg7VFUHq"
        username: admin
        userID: 86c47abf-4b23-4818-9b4c-76a2d17e7c98
