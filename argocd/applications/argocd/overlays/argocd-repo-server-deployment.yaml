apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  replicas: 2
  strategy:
    rollingUpdate:
      # During two-node recovery, delete first so old hard anti-affinity pods can be replaced in place.
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  template:
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: argocd-repo-server
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
