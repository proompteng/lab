apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kubevirt

resources:
  - https://github.com/kubevirt/kubevirt/releases/download/v1.8.2/kubevirt-operator.yaml
  - https://github.com/kubevirt/kubevirt/releases/download/v1.8.2/kubevirt-cr.yaml
patches:
  - target:
      kind: Namespace
      name: kubevirt
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: kubevirt
      $patch: delete
  - target:
      kind: KubeVirt
      name: kubevirt
    patch: |-
      apiVersion: kubevirt.io/v1
      kind: KubeVirt
      metadata:
        name: kubevirt
        annotations:
          argocd.argoproj.io/sync-wave: "1"
          argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
      spec:
        customizeComponents:
          patches:
            - resourceType: DaemonSet
              resourceName: virt-handler
              type: strategic
              patch: '{"spec":{"template":{"spec":{"tolerations":[{"key":"CriticalAddonsOnly","operator":"Exists"},{"key":"node-role.kubernetes.io/control-plane","operator":"Exists","effect":"NoSchedule"}]}}}}'
        configuration:
          developerConfiguration:
            featureGates:
              - GPU
              - MultiArchitecture
          permittedHostDevices:
            pciHostDevices:
              - pciVendorSelector: "10DE:2204"
                resourceName: "nvidia.com/GA102_GEFORCE_RTX_3090"
                # On ARM Talos nodes, NVIDIA's KubeVirt sandbox device plugin isn't available.
                # KubeVirt's built-in device-plugin exposes this resource instead.
                externalResourceProvider: false
