apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: linear-webhook-events
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  topicName: linear.webhook.events
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000 # 30 days for audited delivery replay
    segment.bytes: 1073741824
