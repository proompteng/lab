apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nack
helmCharts:
  - name: nack
    repo: https://nats-io.github.io/k8s/helm/charts
    version: 0.34.0
    releaseName: nack
    namespace: nack
    includeCRDs: true
    valuesFile: ./values.yaml

images:
  - name: natsio/jetstream-controller
    newName: mirror.gcr.io/natsio/jetstream-controller
    newTag: 0.23.0
