apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: torghut
nameSuffix: -torghut
labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: symphony-torghut
      app.kubernetes.io/part-of: lab
configMapGenerator:
  - name: symphony-workflow
    files:
      - WORKFLOW.md
resources:
  - ../symphony-base
  - codex-auth-sealedsecret.yaml
  - github-token-sealedsecret.yaml
  - linear-api-key-sealedsecret.yaml
  - posthog-sealedsecret.yaml
  - target-argocd-role.yaml
  - target-argocd-rolebinding.yaml
patches:
  - path: deployment.patch.yaml
images:
  - name: registry.ide-newton.ts.net/lab/symphony
    newName: registry.ide-newton.ts.net/lab/symphony
    newTag: "1495ba8b"
    digest: sha256:8d91887c5740c173b33eade1d8e01e5f210dde82df2d895394ba295da94982eb
