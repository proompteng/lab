apiVersion: apps/v1
kind: Deployment
metadata:
  name: symphony
spec:
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-03-19T07:05:38Z"
    spec:
      serviceAccountName: symphony-torghut
      containers:
        - name: symphony
          env:
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-linear-api-key-torghut
                  key: LINEAR_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token-torghut
                  key: token
                  optional: true
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token-torghut
                  key: token
                  optional: true
            - name: POSTHOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-posthog-torghut
                  key: POSTHOG_API_KEY
            - name: POSTHOG_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: symphony-posthog-torghut
                  key: POSTHOG_PROJECT_ID
            - name: SYMPHONY_LEADER_ELECTION_LEASE_NAME
              value: symphony-torghut-leader
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: symphony-workspace-torghut
        - name: workflow
          configMap:
            name: symphony-workflow-torghut
        - name: codex-auth
          secret:
            secretName: codex-auth-torghut
