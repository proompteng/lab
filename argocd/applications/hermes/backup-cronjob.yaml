apiVersion: batch/v1
kind: CronJob
metadata:
  name: hermes-backup
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: backup
spec:
  schedule: "17 9 * * *"
  suspend: false
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
        app.kubernetes.io/component: backup
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 3600
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: hermes
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: hermes
          automountServiceAccountToken: false
          enableServiceLinks: false
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/arch: amd64
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: hermes
                      app.kubernetes.io/component: gateway
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            fsGroup: 10000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: registry.ide-newton.ts.net/lab/hermes-agent@sha256:3db34ce19adfa080736a2a3feb0316dbcccc588faa9afe7fd8ae1c03b4f1a53a
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /opt/bootstrap/backup-once.sh
              env:
                - name: HERMES_HOME
                  value: /opt/data
                - name: HOME
                  value: /tmp/home
                - name: XDG_CACHE_HOME
                  value: /tmp/home/.cache
                - name: HERMES_BACKUP_DIR
                  value: /opt/backups
                - name: HERMES_BACKUP_RETENTION_COUNT
                  value: "14"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                  ephemeral-storage: 64Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
                  ephemeral-storage: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10000
                runAsGroup: 10000
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: data
                  mountPath: /opt/data
                  # SQLite read-only WAL connections still create or update shared-memory sidecars.
                  readOnly: false
                - name: backups
                  mountPath: /opt/backups
                - name: bootstrap
                  mountPath: /opt/bootstrap
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: data-hermes-0
                readOnly: false
            - name: backups
              persistentVolumeClaim:
                claimName: backups-hermes-0
            - name: bootstrap
              configMap:
                name: hermes-bootstrap
                defaultMode: 0444
            - name: tmp
              emptyDir:
                sizeLimit: 1Gi
