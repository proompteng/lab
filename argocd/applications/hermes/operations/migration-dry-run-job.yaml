apiVersion: batch/v1
kind: Job
metadata:
  generateName: hermes-openclaw-migration-dry-run-
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: migration
spec:
  activeDeadlineSeconds: 600
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: hermes
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: registry.ide-newton.ts.net/lab/hermes-agent@sha256:3db34ce19adfa080736a2a3feb0316dbcccc588faa9afe7fd8ae1c03b4f1a53a
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if migration_output=$(
                /opt/hermes/.venv/bin/hermes claw migrate \
                  --source /opt/data/migration/source \
                  --preset user-data \
                  --workspace-target /opt/data/workspace/tuslagch \
                  --skill-conflict skip \
                  --dry-run 2>&1
              ); then
                :
              else
                migration_status=$?
                printf '%s\n' "$migration_output" >&2
                exit "$migration_status"
              fi
              printf '%s\n' "$migration_output"
              case "$migration_output" in
                *"Secrets:     no"*) ;;
                *) echo 'migration preview did not prove that secret migration is disabled' >&2; exit 1 ;;
              esac
              case "$migration_output" in
                *"Conflicts ("*|*" conflict(s)"*|*"Refusing to apply"*|*"Migration preview failed"*|*"directory not found"*)
                  echo 'migration preview contains a conflict or refusal' >&2
                  exit 1
                  ;;
              esac
              case "$migration_output" in
                *"user-profile"*) ;;
                *) echo 'migration preview is missing the audited user profile' >&2; exit 1 ;;
              esac
              case "$migration_output" in
                *"daily-memory"*) ;;
                *) echo 'migration preview is missing the audited daily memory' >&2; exit 1 ;;
              esac
              printf '%s\n' 'migration_preview_verified=true conflicts=0 secrets=false'
          env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HOME
              value: /opt/data/home
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: "2"
              memory: 2Gi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-hermes-0
        - name: config
          configMap:
            name: hermes-operation-config
            defaultMode: 0444
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
