apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-egress-proxy
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: egress-proxy
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
      app.kubernetes.io/component: egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
        app.kubernetes.io/component: egress-proxy
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 13
        runAsGroup: 13
        fsGroup: 13
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: squid
          image: docker.io/ubuntu/squid@sha256:8a3baed477e2c282ab8aa5edad442f69873246964f225c5c2ae8364b6610963c
          imagePullPolicy: IfNotPresent
          command:
            - /usr/sbin/squid
          args:
            - -f
            - /etc/squid/squid.conf
            - -NYC
          ports:
            - name: proxy
              containerPort: 3128
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
              ephemeral-storage: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 13
            runAsGroup: 13
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: proxy
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
            - name: logs
              mountPath: /var/log/squid
            - name: spool
              mountPath: /var/spool/squid
            - name: run
              mountPath: /run/squid
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: hermes-egress-proxy
            defaultMode: 0444
        - name: logs
          emptyDir:
            sizeLimit: 128Mi
        - name: spool
          emptyDir:
            sizeLimit: 64Mi
        - name: run
          emptyDir:
            sizeLimit: 8Mi
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-egress-proxy
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: egress-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: egress-proxy
  ports:
    - name: proxy
      port: 3128
      targetPort: proxy
      protocol: TCP
