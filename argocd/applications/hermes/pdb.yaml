apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/component: gateway
spec:
  minAvailable: 1
  unhealthyPodEvictionPolicy: IfHealthyBudget
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
      app.kubernetes.io/component: gateway
