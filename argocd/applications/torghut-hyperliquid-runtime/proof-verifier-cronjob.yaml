apiVersion: batch/v1
kind: CronJob
metadata:
  name: torghut-hyperliquid-runtime-proof-verifier
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 0
      activeDeadlineSeconds: 180
      template:
        metadata:
          labels:
            app: torghut-hyperliquid-runtime-proof-verifier
        spec:
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: verify
              image: registry.ide-newton.ts.net/lab/torghut@sha256:b8e20cf955c07939b0e31610bbcce2c9a9c37212145c8bd51f75bc4d0db79792
              imagePullPolicy: Always
              command:
                - /opt/venv/bin/python
                - scripts/verify_multifactor_machine.py
              args:
                - --status-url
                - http://torghut.torghut.svc.cluster.local/trading/loop/status
                - --min-fills
                - "3"
                - --required-passes
                - "3"
                - --interval-seconds
                - "15"
                - --max-attempts
                - "6"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
