apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-hyperliquid-runtime-config
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  APP_ENV: prod
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  HYPERLIQUID_EXECUTION_ENABLED: "true"
  HYPERLIQUID_EXECUTION_TRADING_ENABLED: "true"
  HYPERLIQUID_EXECUTION_ALLOW_SHORT_ENTRIES: "true"
  HYPERLIQUID_EXECUTION_MARKET_DATA_NETWORK: mainnet
  HYPERLIQUID_EXECUTION_EXECUTION_NETWORK: testnet
  HYPERLIQUID_EXECUTION_EXCHANGE_API_URL: https://api.hyperliquid-testnet.xyz
  HYPERLIQUID_EXECUTION_POLL_INTERVAL_SECONDS: "15"
  HYPERLIQUID_EXECUTION_DEPENDENCY_STALENESS_SECONDS: "180"
  HYPERLIQUID_EXECUTION_SIGNAL_STALENESS_SECONDS: "180"
  HYPERLIQUID_EXECUTION_EXCHANGE_STALENESS_SECONDS: "120"
  HYPERLIQUID_EXECUTION_CLICKHOUSE_HTTP_URL: http://torghut-clickhouse.torghut.svc.cluster.local:8123
  HYPERLIQUID_EXECUTION_CLICKHOUSE_DATABASE: torghut
  HYPERLIQUID_EXECUTION_CLICKHOUSE_USERNAME: torghut
  HYPERLIQUID_EXECUTION_CLICKHOUSE_TIMEOUT_SECONDS: "10"
  HYPERLIQUID_EXECUTION_TRADE_COINS: BTC,ETH,HYPE,SOL,xyz:SKHX,xyz:MU,xyz:XYZ100,xyz:CL,xyz:SNDK,xyz:MSTR,xyz:SILVER,xyz:GOLD
  HYPERLIQUID_EXECUTION_EXCLUDED_COINS: SPX
  HYPERLIQUID_EXECUTION_MIN_DAY_NOTIONAL_VOLUME_USD: "0"
  HYPERLIQUID_EXECUTION_MAX_MARKETS_PER_CYCLE: "20"
  HYPERLIQUID_EXECUTION_MAX_ORDER_NOTIONAL_USD: "10"
  HYPERLIQUID_EXECUTION_MIN_ORDER_NOTIONAL_USD: "10"
  HYPERLIQUID_EXECUTION_MAX_SYMBOL_EXPOSURE_USD: "50"
  HYPERLIQUID_EXECUTION_MAX_GROSS_EXPOSURE_USD: "250"
  HYPERLIQUID_EXECUTION_MAX_DAILY_LOSS_USD: "25"
  HYPERLIQUID_EXECUTION_ORDER_POLICY: marketable_ioc
  HYPERLIQUID_EXECUTION_MAKER_TIF: Ioc
  HYPERLIQUID_EXECUTION_MAKER_TTL_SECONDS: "10"
  HYPERLIQUID_EXECUTION_MAX_OPEN_ORDERS_PER_SYMBOL: "1"
  HYPERLIQUID_EXECUTION_REJECT_COOLDOWN_THRESHOLD: "3"
  HYPERLIQUID_EXECUTION_REJECT_COOLDOWN_WINDOW_SECONDS: "1800"
  HYPERLIQUID_EXECUTION_REJECT_COOLDOWN_SECONDS: "900"
  HYPERLIQUID_EXECUTION_MIN_ORDER_SIZE: "0.0001"
  HYPERLIQUID_EXECUTION_MIN_EDGE_BPS: "3"
  HYPERLIQUID_EXECUTION_COST_BUFFER_BPS: "2"
  HYPERLIQUID_EXECUTION_MAINTENANCE_REDUCE_ONLY_CLOSE_ENABLED: "true"
  HYPERLIQUID_EXECUTION_METRICS_NAMESPACE: torghut_hyperliquid_execution
