apiVersion: v1
kind: ConfigMap
metadata:
  name: torghut-hyperliquid-runtime-config
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  APP_ENV: prod
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  HYPERLIQUID_RUNTIME_ENABLED: "true"
  # Testnet-only execution is enabled after the ExternalSecret is ready and the dedicated account is funded.
  HYPERLIQUID_RUNTIME_TRADING_ENABLED: "true"
  HYPERLIQUID_RUNTIME_EXECUTION_NETWORK: testnet
  HYPERLIQUID_RUNTIME_MARKET_DATA_NETWORK: mainnet
  HYPERLIQUID_RUNTIME_EXCHANGE_API_URL: https://api.hyperliquid-testnet.xyz
  HYPERLIQUID_RUNTIME_POLL_INTERVAL_SECONDS: "15"
  HYPERLIQUID_RUNTIME_DEPENDENCY_STALENESS_SECONDS: "180"
  HYPERLIQUID_RUNTIME_SIGNAL_STALENESS_SECONDS: "120"
  HYPERLIQUID_RUNTIME_EXCHANGE_STALENESS_SECONDS: "120"
  HYPERLIQUID_RUNTIME_CLICKHOUSE_HTTP_URL: http://torghut-clickhouse.torghut.svc.cluster.local:8123
  HYPERLIQUID_RUNTIME_CLICKHOUSE_DATABASE: torghut
  HYPERLIQUID_RUNTIME_CLICKHOUSE_USERNAME: torghut
  HYPERLIQUID_RUNTIME_CLICKHOUSE_TIMEOUT_SECONDS: "10"
  HYPERLIQUID_RUNTIME_ALLOWED_ASSET_CLASSES: stocks,indices,preipo
  HYPERLIQUID_RUNTIME_MIN_DAY_NOTIONAL_VOLUME_USD: "100000"
  HYPERLIQUID_RUNTIME_MAX_MARKETS_PER_CYCLE: "100"
  HYPERLIQUID_RUNTIME_MAX_ORDER_NOTIONAL_USD: "25"
  HYPERLIQUID_RUNTIME_MIN_ORDER_NOTIONAL_USD: "12"
  HYPERLIQUID_RUNTIME_MAX_GROSS_EXPOSURE_USD: "100"
  HYPERLIQUID_RUNTIME_MAX_DAILY_LOSS_USD: "25"
  HYPERLIQUID_RUNTIME_MAX_SLIPPAGE_BPS: "15"
  HYPERLIQUID_RUNTIME_MIN_ORDER_SIZE: "0.0001"
  HYPERLIQUID_RUNTIME_STRATEGY_PARAMETER_VERSION: hl-equity-momentum-v1
  HYPERLIQUID_RUNTIME_OPTIMIZER_ENABLED: "true"
  HYPERLIQUID_RUNTIME_OPTIMIZER_INTERVAL_SECONDS: "3600"
  HYPERLIQUID_RUNTIME_OPTIMIZER_MIN_TRADES: "40"
  HYPERLIQUID_RUNTIME_OPTIMIZER_MAX_DRAWDOWN_USD: "20"
  HYPERLIQUID_RUNTIME_OPTIMIZER_MIN_NET_PNL_USD: "1"
  HYPERLIQUID_RUNTIME_METRICS_NAMESPACE: torghut_hyperliquid_runtime
  TORGHUT_TIGERBEETLE_ENABLED: "true"
  TORGHUT_TIGERBEETLE_REQUIRED: "true"
  TORGHUT_TIGERBEETLE_CLUSTER_ID: "2001"
  TORGHUT_TIGERBEETLE_REPLICA_ADDRESSES: torghut-tigerbeetle.torghut.svc.cluster.local:3000
  TORGHUT_TIGERBEETLE_RPC_TIMEOUT_SECONDS: "10"
  TORGHUT_TIGERBEETLE_JOURNAL_ENABLED: "true"
