apiVersion: apps/v1
kind: Deployment
metadata:
  name: torghut-hyperliquid-runtime
  namespace: torghut
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: torghut-hyperliquid-runtime
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: torghut-hyperliquid-runtime
  template:
    metadata:
      annotations:
        proompteng.ai/config-revision: hyperliquid-testnet-loss-cap-20260705a
      labels:
        app: torghut-hyperliquid-runtime
    spec:
      serviceAccountName: torghut-runtime
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: torghut-hyperliquid-runtime
          image: registry.ide-newton.ts.net/lab/torghut@sha256:e5738a2d8fe80e8535ef55f7c36f3e4382fc5a3031b3f19783c7ce0f16e8ce27
          imagePullPolicy: Always
          command:
            - uvicorn
            - app.hyperliquid_execution.api:app
            - --host
            - 0.0.0.0
            - --port
            - "8182"
          envFrom:
            - configMapRef:
                name: torghut-hyperliquid-runtime-config
          env:
            - name: TORGHUT_COMMIT
              value: bcb1cae16891860263048c084167811307506ba6
            - name: TORGHUT_IMAGE_DIGEST
              value: sha256:e5738a2d8fe80e8535ef55f7c36f3e4382fc5a3031b3f19783c7ce0f16e8ce27
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
            - name: HYPERLIQUID_EXECUTION_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: torghut-clickhouse-auth
                  key: torghut_password
            - name: HYPERLIQUID_EXECUTION_ACCOUNT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: torghut-hyperliquid-testnet
                  key: account-address
                  optional: true
            - name: HYPERLIQUID_EXECUTION_API_WALLET_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: torghut-hyperliquid-testnet
                  key: api-wallet-private-key
                  optional: true
          ports:
            - name: http
              containerPort: 8182
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
