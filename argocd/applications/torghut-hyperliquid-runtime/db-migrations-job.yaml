apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-hyperliquid-runtime-db-migrations
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: torghut-hyperliquid-runtime-db-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: migrate
          image: registry.ide-newton.ts.net/lab/torghut@sha256:2d9a2103d03be625422c0678b75f9a3d28f78c39e04a084f4083ca3b433d0771
          imagePullPolicy: Always
          workingDir: /app
          command:
            - /bin/sh
            - -ec
          args:
            - |
              deadline=$((SECONDS + 300))
              until python - <<'PY'
              import os
              from sqlalchemy import create_engine, text

              dsn = os.environ["DB_DSN"]
              if dsn.startswith("postgresql://"):
                  dsn = "postgresql+psycopg://" + dsn[len("postgresql://"):]
              engine = create_engine(dsn, pool_pre_ping=True)
              with engine.connect() as connection:
                  connection.execute(text("select 1"))
              PY
              do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "Postgres did not become ready in time" >&2
                  exit 1
                fi
                sleep 5
              done
              alembic -c /app/alembic.ini upgrade heads
          env:
            - name: TORGHUT_COMMIT
              value: 9c5095bb7590833309b1c9dd439b637cc31f3482
            - name: TORGHUT_IMAGE_DIGEST
              value: sha256:2d9a2103d03be625422c0678b75f9a3d28f78c39e04a084f4083ca3b433d0771
            - name: PYTHONPATH
              value: /app
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
