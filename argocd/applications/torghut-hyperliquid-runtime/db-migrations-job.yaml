apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-hyperliquid-runtime-db-migrations
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 6
  # This hook runs the same migration heads as the core Torghut hook. Keep the
  # deadline above the 45-minute concurrent index-build statement timeout.
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: torghut-hyperliquid-runtime-db-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: migrate
          image: registry.ide-newton.ts.net/lab/torghut@sha256:2f1e6f7aa522d8a6f0adf4cde6050ea9565ed7488b75465f8d2cfd55a60692d3
          imagePullPolicy: Always
          workingDir: /app
          command:
            - /bin/sh
            - -ec
          args:
            - |
              deadline=$((SECONDS + 300))
              until python - <<'PY'
              import os
              from sqlalchemy import create_engine, text

              dsn = os.environ["DB_DSN"]
              if dsn.startswith("postgresql://"):
                  dsn = "postgresql+psycopg://" + dsn[len("postgresql://"):]
              engine = create_engine(dsn, pool_pre_ping=True)
              with engine.connect() as connection:
                  connection.execute(text("select 1"))
              PY
              do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "Postgres did not become ready in time" >&2
                  exit 1
                fi
                sleep 5
              done
              alembic -c /app/alembic.ini upgrade heads
          env:
            - name: TORGHUT_COMMIT
              value: bc616e2db4e51787e3b565a50bbd794a0be88318
            - name: TORGHUT_IMAGE_DIGEST
              value: sha256:2f1e6f7aa522d8a6f0adf4cde6050ea9565ed7488b75465f8d2cfd55a60692d3
            - name: PYTHONPATH
              value: /app
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
