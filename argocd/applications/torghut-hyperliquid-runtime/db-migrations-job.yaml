apiVersion: batch/v1
kind: Job
metadata:
  name: torghut-hyperliquid-runtime-db-migrations
  namespace: torghut
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 6
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: torghut-hyperliquid-runtime-db-migrations
    spec:
      restartPolicy: OnFailure
      serviceAccountName: torghut-runtime
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: migrate
          image: registry.ide-newton.ts.net/lab/torghut@sha256:769144ce6f6fda7c356bcf8b717711d4943eb02a07458eb18dc3b15f73f72738
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -ec
          args:
            - |
              deadline=$((SECONDS + 300))
              until /opt/venv/bin/python - <<'PY'
              import os
              from sqlalchemy import create_engine, text

              dsn = os.environ["DB_DSN"]
              if dsn.startswith("postgresql://"):
                  dsn = "postgresql+psycopg://" + dsn[len("postgresql://"):]
              engine = create_engine(dsn, pool_pre_ping=True)
              with engine.connect() as connection:
                  connection.execute(text("select 1"))
              PY
              do
                if [ "${SECONDS}" -ge "${deadline}" ]; then
                  echo "Postgres did not become ready in time" >&2
                  exit 1
                fi
                sleep 5
              done
              /opt/venv/bin/alembic -c /app/alembic.ini upgrade heads
          env:
            - name: TORGHUT_COMMIT
              value: a7d3caca5a87410321f3b9b2ae8a606fca336b32
            - name: TORGHUT_IMAGE_DIGEST
              value: sha256:769144ce6f6fda7c356bcf8b717711d4943eb02a07458eb18dc3b15f73f72738
            - name: DB_DSN
              valueFrom:
                secretKeyRef:
                  name: torghut-db-app
                  key: uri
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
