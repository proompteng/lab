apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentRun
metadata:
  name: autonomous-trader-scorecard-readback-template
  namespace: synthesis
  annotations:
    agents.proompteng.ai/template: "true"
  labels:
    app.kubernetes.io/part-of: synthesis
    app.kubernetes.io/component: autonomous-trader
spec:
  agentRef:
    name: autonomous-trader-agent
  implementationSpecRef:
    name: autonomous-trader-v1
  goal:
    objective: Prove the next autonomous-trader AgentRun reads finalized Synthesis scorecards before candidate grading, without broker mutations.
  vcsRef:
    name: github
  vcsPolicy:
    required: true
    mode: read-only
  runtime:
    type: job
    config:
      serviceAccountName: agents-sa
      backoffLimit: 0
      logRetentionSeconds: 604800
  ttlSecondsAfterFinished: 86400
  parameters:
    repository: proompteng/lab
    base: main
    head: codex/synthesis-autonomous-trader-scorecard-readback
    mode: scorecard-readback
    synthesisSessionMode: scorecard_readback
    brokerMutationEnabled: "false"
    accountType: paper
    targetEquityUsd: "500000"
    marketOpenTimezone: America/New_York
  secrets:
    - autonomous-trader-alpaca-mcp
    - agents-artifacts
    - codex-auth
    - github-token
    - synthesis-env
  workload:
    volumes:
      - type: secret
        name: synthesis-env
        secretName: synthesis-env
        mountPath: /var/run/synthesis
        readOnly: true
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
        ephemeral-storage: 2Gi
      limits:
        memory: 8Gi
        ephemeral-storage: 12Gi
