apiVersion: agents.proompteng.ai/v1alpha1
kind: AgentProvider
metadata:
  name: autonomous-trader-codex
  namespace: synthesis
  labels:
    app.kubernetes.io/part-of: synthesis
    app.kubernetes.io/component: autonomous-trader
spec:
  binary: /usr/local/bin/agent-runner
  adapter:
    type: codex-app-server
    codex:
      model: gpt-5.5
      effort: xhigh
      sandbox: danger-full-access
      approval: never
      cwd: /workspace/lab
      threadConfig:
        mcp_servers:
          alpaca:
            command: /usr/bin/python3
            args:
              - -u
              - /root/alpaca-mcp-stdio-bridge.py
            env:
              ALPACA_API_KEY: "{{ env.ALPACA_API_KEY }}"
              ALPACA_SECRET_KEY: "{{ env.ALPACA_SECRET_KEY }}"
              ALPACA_PAPER_TRADE: "{{ env.ALPACA_PAPER_TRADE }}"
              FASTMCP_SHOW_SERVER_BANNER: "false"
              FASTMCP_LOG_LEVEL: "ERROR"
            startup_timeout_sec: 60
        web_search: live
  argsTemplate: []
  secretEnv:
    - name: APCA_API_KEY_ID
      secretName: alpaca-mcp
      key: APCA_API_KEY_ID
    - name: APCA_API_SECRET_KEY
      secretName: alpaca-mcp
      key: APCA_API_SECRET_KEY
    - name: APCA_API_BASE_URL
      secretName: alpaca-mcp
      key: APCA_API_BASE_URL
    - name: ALPACA_API_KEY
      secretName: alpaca-mcp
      key: ALPACA_API_KEY
    - name: ALPACA_API_KEY_ID
      secretName: alpaca-mcp
      key: ALPACA_API_KEY_ID
    - name: ALPACA_SECRET_KEY
      secretName: alpaca-mcp
      key: ALPACA_SECRET_KEY
    - name: AGENTS_ARTIFACTS_ACCESS_KEY_ID
      secretName: agents-artifacts
      key: AWS_ACCESS_KEY_ID
    - name: AGENTS_ARTIFACTS_SECRET_ACCESS_KEY
      secretName: agents-artifacts
      key: AWS_SECRET_ACCESS_KEY
  envTemplate:
    AGENT_RUN_NAME: "{{agentRun.name}}"
    AGENT_RUN_NAMESPACE: "{{agentRun.namespace}}"
    AGENTS_ARTIFACTS_BUCKET: agents-artifacts
    AGENTS_ARTIFACTS_ENDPOINT: http://rook-ceph-rgw-objectstore.rook-ceph.svc:80
    AGENTS_ARTIFACTS_SECURE: "false"
    ALPACA_PAPER_TRADE: "true"
    ANALYSIS_REPO_URL: https://github.com/gregkonush/analysis.git
    ANALYSIS_REQUIRED_COMMIT: b187dcf3e71999c04c3a019ec5861413551ceda1
    AUTONOMOUS_TRADER_ARTIFACT_DIR: /workspace/.agentrun/autonomous-trader
    CODEX_CONFIG: /root/.codex/config.toml
    CODEX_LOG_LEVEL: info
    CODEX_MARKET_CONTEXT_ATTEMPT_TIMEOUT_SECONDS: "900"
    CODEX_MARKET_CONTEXT_OVERALL_TIMEOUT_SECONDS: "21600"
    CODEX_MAX_SESSION_ATTEMPTS: "1"
    CODEX_MODEL: gpt-5.5
    FASTMCP_LOG_LEVEL: "ERROR"
    FASTMCP_SHOW_SERVER_BANNER: "false"
    HOME: /root
  inputFiles:
    - path: /root/.codex/config.toml
      content: |-
        model = "gpt-5.5"
        model_reasoning_summary = "detailed"
        model_reasoning_effort = "xhigh"
        model_verbosity = "medium"
        approval_policy = "never"
        sandbox_mode = "danger-full-access"
        web_search = "live"
        suppress_unstable_features_warning = true

        [features]
        undo = true
        enable_request_compression = true
        apply_patch_freeform = true
        unified_exec = true
        shell_snapshot = true
        steer = true
        multi_agent = true
        child_agents_md = true
        collaboration_modes = true
        responses_websockets = false
        goals = true

        [shell_environment_policy]
        ignore_default_excludes = true

        [projects."/workspace/lab"]
        trust_level = "trusted"

        [projects."/workspace/analysis"]
        trust_level = "trusted"

        [projects."/root"]
        trust_level = "trusted"

        [mcp_servers.alpaca]
        command = "/usr/bin/python3"
        args = ["-u", "/root/alpaca-mcp-stdio-bridge.py"]
        startup_timeout_sec = 60.0
        env = { FASTMCP_SHOW_SERVER_BANNER = "false", FASTMCP_LOG_LEVEL = "ERROR" }
    - path: /root/bootstrap-analysis-daytrading.sh
      content: |-
        #!/usr/bin/env bash
        set -euo pipefail

        artifact_dir="${AUTONOMOUS_TRADER_ARTIFACT_DIR:-/workspace/.agentrun/autonomous-trader}"
        analysis_dir="${ANALYSIS_REPO_DIR:-/workspace/analysis}"
        analysis_repo_url="${ANALYSIS_REPO_URL:-https://github.com/gregkonush/analysis.git}"
        required_commit="${ANALYSIS_REQUIRED_COMMIT:-b187dcf3e71999c04c3a019ec5861413551ceda1}"
        python_bin="${PYTHON_BIN:-python3}"

        mkdir -p "${artifact_dir}"

        git_auth=()
        git_token="${GITHUB_TOKEN:-}"
        if [ -z "${git_token}" ]; then
          git_token="${GH_TOKEN:-}"
        fi
        if [ -n "${git_token}" ]; then
          git_auth=(-c "http.https://github.com/.extraheader=Authorization: Bearer ${git_token}")
        fi

        git_with_auth() {
          if [ "${#git_auth[@]}" -gt 0 ]; then
            git "${git_auth[@]}" "$@"
          else
            git "$@"
          fi
        }

        if [ -d "${analysis_dir}/.git" ]; then
          git_with_auth -C "${analysis_dir}" fetch origin main
        else
          rm -rf "${analysis_dir}"
          git_with_auth clone "${analysis_repo_url}" "${analysis_dir}"
        fi

        git_with_auth -C "${analysis_dir}" fetch origin main
        git -C "${analysis_dir}" checkout --detach origin/main
        git -C "${analysis_dir}" remote set-url origin "${analysis_repo_url}"

        analysis_head="$(git -C "${analysis_dir}" rev-parse HEAD)"
        if ! git -C "${analysis_dir}" merge-base --is-ancestor "${required_commit}" HEAD; then
          printf '{"ok":false,"reason":"analysis_repo_stale","analysis_head":"%s","required_commit":"%s"}\n' \
            "${analysis_head}" "${required_commit}" > "${artifact_dir}/analysis-bootstrap.json"
          exit 42
        fi

        "${python_bin}" -m venv "${artifact_dir}/analysis-venv"
        # shellcheck disable=SC1091
        source "${artifact_dir}/analysis-venv/bin/activate"
        python -m pip install --upgrade pip
        python -m pip install -e "${analysis_dir}[daytrading]"

        (
          cd "${analysis_dir}"
          PYTHONPATH=src python -m stock_analysis audit
        )
        PYTHONPATH="${analysis_dir}/src" python -m stock_analysis daytrading-import-smoke
        PYTHONPATH="${analysis_dir}/src" python -m stock_analysis daytrading-context \
          --repo-root "${analysis_dir}" \
          --output "${artifact_dir}/analysis-context.json"
        PYTHONPATH="${analysis_dir}/src" python -m stock_analysis daytrading-validate-context \
          "${artifact_dir}/analysis-context.json"

        printf '{"ok":true,"analysis_head":"%s","required_commit":"%s","context_path":"%s"}\n' \
          "${analysis_head}" "${required_commit}" "${artifact_dir}/analysis-context.json" \
          > "${artifact_dir}/analysis-bootstrap.json"
    - path: /root/alpaca-mcp-stdio-bridge.py
      content: |-
        import os
        import subprocess
        import sys
        import threading

        child_env = dict(os.environ)
        child_env["FASTMCP_SHOW_SERVER_BANNER"] = "false"
        child_env["FASTMCP_LOG_LEVEL"] = "ERROR"

        child = subprocess.Popen(
            ["/usr/local/bin/alpaca-mcp-server", "--transport", "stdio"],
            stdin=subprocess.PIPE,
            stdout=subprocess.PIPE,
            stderr=sys.stderr,
            env=child_env,
        )

        mode_lock = threading.Lock()
        output_mode = "line"

        def set_output_mode(mode):
            global output_mode
            with mode_lock:
                output_mode = mode

        def get_output_mode():
            with mode_lock:
                return output_mode

        def read_client_message():
            line = sys.stdin.buffer.readline()
            if not line:
                return None
            if line.lower().startswith(b"content-length:"):
                set_output_mode("framed")
                length = int(line.split(b":", 1)[1].strip())
                while True:
                    header = sys.stdin.buffer.readline()
                    if header in (b"\r\n", b"\n", b""):
                        break
                return sys.stdin.buffer.read(length)
            set_output_mode("line")
            return line.rstrip(b"\r\n")

        def client_to_child():
            assert child.stdin is not None
            while True:
                message = read_client_message()
                if message is None:
                    break
                if not message:
                    continue
                child.stdin.write(message + b"\n")
                child.stdin.flush()
            child.stdin.close()

        def child_to_client():
            assert child.stdout is not None
            for line in child.stdout:
                payload = line.rstrip(b"\r\n")
                if not payload:
                    continue
                if get_output_mode() == "framed":
                    sys.stdout.buffer.write(b"Content-Length: " + str(len(payload)).encode("ascii") + b"\r\n\r\n")
                    sys.stdout.buffer.write(payload)
                else:
                    sys.stdout.buffer.write(payload + b"\n")
                sys.stdout.buffer.flush()

        threads = [
            threading.Thread(target=client_to_child, daemon=True),
            threading.Thread(target=child_to_client, daemon=True),
        ]
        for thread in threads:
            thread.start()

        exit_code = child.wait()
        sys.exit(exit_code)
  outputArtifacts:
    - name: autonomous-trader-report
      path: /workspace/.agentrun/autonomous-trader/report.md
      key: synthesis/autonomous-trader/{{ agentRun.name }}/report.md
    - name: autonomous-trader-ledger
      path: /workspace/.agentrun/autonomous-trader/decision-ledger.jsonl
      key: synthesis/autonomous-trader/{{ agentRun.name }}/decision-ledger.jsonl
    - name: autonomous-trader-preflight
      path: /workspace/.agentrun/autonomous-trader/preflight.json
      key: synthesis/autonomous-trader/{{ agentRun.name }}/preflight.json
    - name: autonomous-trader-analysis-bootstrap
      path: /workspace/.agentrun/autonomous-trader/analysis-bootstrap.json
      key: synthesis/autonomous-trader/{{ agentRun.name }}/analysis-bootstrap.json
    - name: autonomous-trader-analysis-context
      path: /workspace/.agentrun/autonomous-trader/analysis-context.json
      key: synthesis/autonomous-trader/{{ agentRun.name }}/analysis-context.json
    - name: runner-log
      path: /workspace/.agent/runner.log
    - name: runner-status
      path: /workspace/.agent/status.json
