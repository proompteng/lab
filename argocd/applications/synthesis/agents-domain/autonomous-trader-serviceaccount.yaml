apiVersion: v1
kind: ServiceAccount
metadata:
  name: agents-sa
  namespace: synthesis
  labels:
    app.kubernetes.io/part-of: synthesis
    app.kubernetes.io/component: autonomous-trader
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: synthesis-agents-sa
  namespace: synthesis
  labels:
    app.kubernetes.io/part-of: synthesis
    app.kubernetes.io/component: autonomous-trader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agents
subjects:
  - kind: ServiceAccount
    name: agents-sa
    namespace: synthesis
