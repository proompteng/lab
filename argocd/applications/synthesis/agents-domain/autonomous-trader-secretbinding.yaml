  namespace: synthesis
  labels:
    app.kubernetes.io/part-of: synthesis
    app.kubernetes.io/component: autonomous-trader
spec:
  subjects:
    - kind: Agent
      name: autonomous-trader-agent
  allowedSecrets:
    - alpaca-mcp
    - agents-artifacts
    - codex-auth
    - github-token
    - synthesis-env
