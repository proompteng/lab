replicaCount: 1

image:
  repository: registry.ide-newton.ts.net/lab/agents-control-plane
  tag: latest
  digest: ''
  pullPolicy: IfNotPresent

controllers:
  image:
    repository: registry.ide-newton.ts.net/lab/agents-controller

runner:
  image:
    repository: registry.ide-newton.ts.net/lab/agents-codex-runner

namespaceOverride: agents-ci

grpc:
  enabled: false

rbac:
  clusterScoped: true
  extraRules:
    - apiGroups:
        - apiextensions.k8s.io
      resources:
        - customresourcedefinitions
      verbs:
        - get
        - list
        - watch

# The CI control-plane image should stay on the published registry.ide-newton release image and
# continues to use `/health` for readiness to avoid rollout stalls during smoke tests.
readinessProbe:
  path: /health

env:
  vars:
    # CI runs with a fresh Postgres, so we must run migrations to create schema
    # (otherwise controllers will fail to reconcile AgentRuns).
    AGENTS_MIGRATIONS: 'auto'

resources:
  requests:
    cpu: 100m
    memory: 256Mi

controller:
  namespaces:
    - agents-ci
  vcsProviders:
    enabled: false

orchestrationController:
  namespaces:
    - agents-ci

supportingController:
  namespaces:
    - agents-ci

agentComms:
  enabled: false
