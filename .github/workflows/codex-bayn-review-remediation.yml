name: Codex Bayn review remediation

on:
  push:
    branches:
      - codex/resolve-bayn-review-findings-20260719
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  remediate:
    if: github.event_name == 'push' || github.head_ref == 'codex/resolve-bayn-review-findings-20260719'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Apply remediation
        run: python scripts/codex-bayn-review-remediation.py
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate Bayn
        run: |
          bunx oxfmt --check services/bayn/src/ledger.ts services/bayn/src/ledger.test.ts services/bayn/src/strategy.ts services/bayn/src/strategy.test.ts
          bun run --cwd services/bayn tsc
          bun run --cwd services/bayn lint:oxlint
          bun run --cwd services/bayn lint:oxlint:type
          bun run --cwd services/bayn test
          bun run --cwd services/bayn build
      - name: Commit remediation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(bayn): address merged Codex findings"
          git push origin HEAD:${TARGET_BRANCH}
