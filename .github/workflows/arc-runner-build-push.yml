name: arc-runner-build-push

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'nix/images/arc-runner.nix'
      - 'flake.lock'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'nix/oci-doctor.sh'
      - 'nix/toolchain-doctor.sh'
      - '.github/actions/setup-nix-toolchain/**'
      - '.github/workflows/nix-oci-build-common.yml'
      - '.github/workflows/arc-runner-build-push.yml'
  push:
    branches:
      - main
    paths:
      - 'nix/images/arc-runner.nix'
      - 'flake.lock'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'nix/oci-doctor.sh'
      - 'nix/toolchain-doctor.sh'
      - '.github/actions/setup-nix-toolchain/**'
      - '.github/workflows/nix-oci-build-common.yml'
      - '.github/workflows/arc-runner-build-push.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  nix-image:
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: arc-runner
      package_attr: arc-runner-image
      tag: sha-${{ github.sha }}
      latest: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
      publish_on_dispatch: true
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'arc-runner-release-contract' || '' }}
    secrets: inherit
