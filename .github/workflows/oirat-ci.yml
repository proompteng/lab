name: oirat

on:
  push:
    branches:
      - main
    paths:
      - 'services/oirat/**'
      - 'packages/scripts/src/oirat/**'
      - 'argocd/applications/oirat/**'
      - '.github/workflows/oirat-ci.yml'
      - '.github/workflows/nix-oci-build-common.yml'
      - '.github/workflows/enabled-simple-nix-release.yml'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/images/oirat.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    paths:
      - 'services/oirat/**'
      - 'packages/scripts/src/oirat/**'
      - 'argocd/applications/oirat/**'
      - '.github/workflows/oirat-ci.yml'
      - '.github/workflows/nix-oci-build-common.yml'
      - '.github/workflows/enabled-simple-nix-release.yml'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/images/oirat.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'package.json'
      - 'bun.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/oirat --filter @proompteng/discord && bun run --filter @proompteng/discord build
      lint-command: bunx oxfmt --check services/oirat packages/scripts/src/oirat
      oxlint-command: bun run --cwd services/oirat lint:oxlint
      oxlint-type-command: bun run --cwd services/oirat lint:oxlint:type
      test-command: bun run --filter @proompteng/oirat test
    secrets: inherit

  nix-image:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: oirat
      package_attr: oirat-image
      tag: sha-${{ github.sha }}
      latest: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      release_artifact_name: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'oirat-release-contract' || '' }}
    secrets: inherit
