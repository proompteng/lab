name: headlamp

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'services/headlamp/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/images/headlamp.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
  push:
    branches:
      - main
    paths:
      - 'services/headlamp/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/images/headlamp.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-manifests:
    if: github.event_name == 'pull_request'
    runs-on: arc-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Render Headlamp manifests
        run: nix run .#render-headlamp

      - name: Run upstream multiplexer regression tests
        run: sh services/headlamp/scripts/test-upstream.sh

  nix-image:
    if: >-
      ${{
        github.event_name == 'pull_request' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message || '', 'automated release PR')
        )
      }}
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: headlamp
      package_attr: headlamp-image
      tag: sha-${{ github.sha }}
      latest: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'headlamp-release-contract' || '' }}
      image_build_timeout: 20m
    secrets: inherit
