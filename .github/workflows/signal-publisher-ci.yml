name: signal-publisher

on:
  pull_request:
    paths:
      - 'services/signal-publisher/**'
      - 'packages/scripts/src/signal/**'
      - 'argocd/applications/torghut/clickhouse/**'
      - 'nix/images/signal-publisher.nix'
      - 'flake.nix'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/signal-publisher-*.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/signal-publisher --filter @proompteng/scripts
      lint-command: bunx oxfmt --check services/signal-publisher packages/scripts/src/signal argocd/applications/torghut/clickhouse
      oxlint-command: bun run --cwd services/signal-publisher lint:oxlint
      oxlint-type-command: bun run --cwd services/signal-publisher lint:oxlint:type
      test-command: bun run --cwd services/signal-publisher tsc && bun run --cwd services/signal-publisher test && bun test packages/scripts/src/signal
      build-command: bun run --cwd services/signal-publisher build
    secrets: inherit
