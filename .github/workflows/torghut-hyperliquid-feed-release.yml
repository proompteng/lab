name: torghut-hyperliquid-feed-release

on:
  workflow_run:
    workflows:
      - torghut-hyperliquid-feed-build-push
    types:
      - completed
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to promote (defaults to current main HEAD)
        required: false
        type: string
      image_tag:
        description: Image tag to promote (defaults to source short SHA)
        required: false
        type: string
      image_digest:
        description: Image digest override (sha256:...)
        required: false
        type: string

concurrency:
  group: torghut-hyperliquid-feed-release-${{ github.event.workflow_run.head_sha || inputs.commit_sha || github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
      }}
    runs-on: arc-arm64
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download release contract artifact from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: torghut-hyperliquid-feed-release-contract
          path: .artifacts/torghut-hyperliquid-feed
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_SHA_INPUT: ${{ inputs.commit_sha }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          MAIN_HEAD="$(git rev-parse origin/main)"
          IMAGE='registry.ide-newton.ts.net/lab/torghut-hyperliquid-feed'
          SOURCE_SHA=''
          TAG=''
          CONTRACT_DIGEST=''
          PROMOTE='true'

          if [ "${EVENT_NAME}" = 'workflow_run' ]; then
            CONTRACT_PATH='.artifacts/torghut-hyperliquid-feed/torghut-hyperliquid-feed-release-contract.json'
            if [ ! -f "${CONTRACT_PATH}" ]; then
              echo "Release contract artifact is missing at ${CONTRACT_PATH}"
              exit 1
            fi

            SOURCE_SHA="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field sourceSha)"
            TAG="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field tag)"
            CONTRACT_DIGEST="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field digest)"
            CONTRACT_IMAGE="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field image)"

            if [ "${CONTRACT_IMAGE}" != "${IMAGE}" ]; then
              echo "Release contract image mismatch: expected ${IMAGE}, got ${CONTRACT_IMAGE}"
              exit 1
            fi

            if [ "${SOURCE_SHA}" != "${WORKFLOW_RUN_HEAD_SHA}" ]; then
              echo "Release contract source SHA ${SOURCE_SHA} does not match workflow_run head ${WORKFLOW_RUN_HEAD_SHA}"
              exit 1
            fi

            if [ "${SOURCE_SHA}" != "${MAIN_HEAD}" ]; then
              if ! git merge-base --is-ancestor "${SOURCE_SHA}" "${MAIN_HEAD}"; then
                echo "Skipping stale workflow_run promotion for ${SOURCE_SHA}; latest main ${MAIN_HEAD} is not a descendant."
                PROMOTE='false'
              else
                FEED_CHANGES="$(
                  git diff --name-only "${SOURCE_SHA}..${MAIN_HEAD}" -- \
                    services/dorvud/gradle \
                    services/dorvud/gradlew \
                    services/dorvud/gradle.properties \
                    services/dorvud/settings.gradle.kts \
                    services/dorvud/build.gradle.kts \
                    services/dorvud/platform \
                    services/dorvud/hyperliquid-feed \
                    packages/scripts/src/torghut/release-contract.ts \
                    packages/scripts/src/torghut/update-hyperliquid-feed-manifest.ts \
                    packages/scripts/src/shared/cli.ts \
                    packages/scripts/src/shared/docker.ts \
                    packages/scripts/src/shared/git.ts \
                    .github/workflows/torghut-hyperliquid-feed-build-push.yaml \
                    .github/workflows/torghut-hyperliquid-feed-release.yml
                )"
                if [ -n "${FEED_CHANGES}" ]; then
                  echo "Skipping stale workflow_run promotion for ${SOURCE_SHA}; newer Hyperliquid feed build inputs changed:"
                  printf '%s\n' "${FEED_CHANGES}"
                  PROMOTE='false'
                else
                  echo "Promoting ${SOURCE_SHA}; newer main ${MAIN_HEAD} contains only unrelated changes."
                fi
              fi
            fi
          else
            if [ -n "${COMMIT_SHA_INPUT}" ]; then
              SOURCE_SHA="$(git rev-parse "${COMMIT_SHA_INPUT}^{commit}")"
            else
              SOURCE_SHA="${MAIN_HEAD}"
            fi

            if [ -n "${IMAGE_TAG_INPUT}" ]; then
              TAG="${IMAGE_TAG_INPUT}"
            else
              TAG="$(git rev-parse --short=8 "${SOURCE_SHA}")"
            fi
          fi

          if [ "${PROMOTE}" = 'true' ] && ! git cat-file -e "${SOURCE_SHA}^{commit}" >/dev/null 2>&1; then
            echo "Source SHA ${SOURCE_SHA} is not present in local git history"
            exit 1
          fi

          {
            echo "source_sha=${SOURCE_SHA}"
            echo "tag=${TAG}"
            echo "contract_digest=${CONTRACT_DIGEST}"
            echo "image=${IMAGE}"
            echo "promote=${PROMOTE}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout source revision
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.meta.outputs.source_sha }}"

      - name: Resolve image digest
        if: steps.meta.outputs.promote == 'true'
        id: digest
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          CONTRACT_DIGEST: ${{ steps.meta.outputs.contract_digest }}
          DIGEST_INPUT: ${{ inputs.image_digest }}
        run: |
          set -euo pipefail

          if [ -n "${DIGEST_INPUT}" ]; then
            DIGEST="${DIGEST_INPUT}"
          elif [ -n "${CONTRACT_DIGEST}" ]; then
            DIGEST="${CONTRACT_DIGEST}"
          else
            DIGEST="$(
              bun --eval "
                import { inspectImageDigest } from './packages/scripts/src/shared/docker.ts'
                const image = process.env.IMAGE_NAME + ':' + process.env.IMAGE_TAG
                const repoDigest = inspectImageDigest(image)
                const digest = repoDigest.includes('@') ? repoDigest.split('@')[1] : repoDigest
                console.log(digest)
              "
            )"
          fi

          DIGEST="${DIGEST#*@}"
          if ! printf '%s' "${DIGEST}" | grep -Eiq '^sha256:[0-9a-f]{64}$'; then
            echo "Resolved digest '${DIGEST}' is invalid"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Verify promoted image platform contract
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}@${IMAGE_DIGEST}"
          MANIFEST_JSON="$(docker buildx imagetools inspect --format '{{json .}}' "${IMAGE_REF}")"
          for platform in linux/amd64 linux/arm64; do
            platform_digest="$(
              jq -r --arg platform "${platform}" \
                '.manifest.manifests[]? | select(((.platform.os // "") + "/" + (.platform.architecture // "")) == $platform) | .digest' \
                <<< "${MANIFEST_JSON}" | head -n 1
            )"
            if ! printf '%s' "${platform_digest}" | grep -Eiq '^sha256:[0-9a-f]{64}$'; then
              echo "Promoted image ${IMAGE_REF} is missing required platform ${platform}"
              docker buildx imagetools inspect "${IMAGE_REF}"
              exit 1
            fi
          done

      - name: Update torghut hyperliquid feed manifest
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        env:
          TORGHUT_HYPERLIQUID_FEED_IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          TORGHUT_HYPERLIQUID_FEED_IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
          TORGHUT_HYPERLIQUID_FEED_COMMIT: ${{ steps.meta.outputs.source_sha }}
        run: |
          set -euo pipefail
          bun run packages/scripts/src/torghut/update-hyperliquid-feed-manifest.ts \
            --tag "${TORGHUT_HYPERLIQUID_FEED_IMAGE_TAG}" \
            --digest "${TORGHUT_HYPERLIQUID_FEED_IMAGE_DIGEST}" \
            --commit "${TORGHUT_HYPERLIQUID_FEED_COMMIT}" \
            --version "main-${TORGHUT_HYPERLIQUID_FEED_IMAGE_TAG}"

      - name: Check for manifest changes
        if: steps.meta.outputs.promote == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- argocd/applications/torghut-hyperliquid-feed/deployment.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deploy pull request
        if: >-
          ${{
            steps.meta.outputs.promote == 'true' &&
            steps.changes.outputs.changed == 'true'
          }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/torghut-hyperliquid-feed-release-${{ steps.meta.outputs.tag }}
          base: main
          title: 'chore(torghut): promote hyperliquid feed image ${{ steps.meta.outputs.tag }}'
          commit-message: 'chore(torghut): promote hyperliquid feed image ${{ steps.meta.outputs.tag }}'
          delete-branch: true
          add-paths: |
            argocd/applications/torghut-hyperliquid-feed/deployment.yaml
          body: |
            ## Summary
            Promote the Torghut Hyperliquid feed image into GitOps manifests.

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Image tag: `${{ steps.meta.outputs.tag }}`
            - Image digest: `${{ steps.digest.outputs.digest }}`
            - Manifest: Hyperliquid feed Deployment

      - name: No manifest changes detected
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed != 'true'
        run: echo 'No torghut hyperliquid feed manifest changes detected.'

      - name: Promotion skipped (stale workflow_run)
        if: steps.meta.outputs.promote != 'true'
        run: echo 'Skipping stale workflow_run promotion because source SHA is not current main.'
