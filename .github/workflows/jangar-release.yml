name: jangar-release

on:
  workflow_run:
    workflows:
      - jangar-build-push
    types:
      - completed
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to promote (defaults to current HEAD)
        required: false
        type: string
      image_tag:
        description: Image tag to promote (defaults to short SHA)
        required: false
        type: string
      image_digest:
        description: Image digest override (sha256:...)
        required: false
        type: string

concurrency:
  group: jangar-release-${{ github.event.workflow_run.head_sha || inputs.commit_sha || github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
      }}
    runs-on: arc-arm64
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}
            fallback = true

      - name: Download release contract artifact from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: jangar-release-contract
          path: .artifacts/jangar
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_SHA_INPUT: ${{ inputs.commit_sha }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bun run packages/scripts/src/jangar/resolve-release-metadata.ts \
            --event-name "${EVENT_NAME}" \
            --workflow-run-head-sha "${WORKFLOW_RUN_HEAD_SHA}" \
            --commit-sha-input "${COMMIT_SHA_INPUT}" \
            --image-tag-input "${IMAGE_TAG_INPUT}" \
            --output "${GITHUB_OUTPUT}"

      - name: Checkout source revision
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.meta.outputs.source_sha }}"

      - name: Resolve image digest
        if: steps.meta.outputs.promote == 'true'
        id: digest
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          CONTRACT_DIGEST: ${{ steps.meta.outputs.contract_digest }}
          DIGEST_INPUT: ${{ inputs.image_digest }}
        run: |
          set -euo pipefail

          if [ -n "${DIGEST_INPUT}" ]; then
            DIGEST="${DIGEST_INPUT}"
          elif [ -n "${CONTRACT_DIGEST}" ]; then
            DIGEST="${CONTRACT_DIGEST}"
          else
            DIGEST="$(crane digest "${IMAGE_NAME}:${IMAGE_TAG}")"
          fi

          DIGEST="${DIGEST#*@}"
          if [ -z "${DIGEST}" ]; then
            echo "Resolved digest is empty"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Verify image digest and platforms
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          if ! [[ "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid Jangar digest: ${DIGEST}" >&2
            exit 2
          fi
          nix run .#assert-oci-platforms -- "${IMAGE}@${DIGEST}" linux/amd64 linux/arm64

      - name: Update Jangar manifests
        if: steps.meta.outputs.promote == 'true'
        env:
          JANGAR_IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          JANGAR_IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
          JANGAR_SOURCE_HEAD_SHA: ${{ steps.meta.outputs.source_sha }}
          JANGAR_GITOPS_REVISION: ${{ steps.meta.outputs.source_sha }}
          JANGAR_SOURCE_CI_RUN_ID: ${{ github.event.workflow_run.id }}
          JANGAR_SOURCE_CI_CONCLUSION: success
          JANGAR_MANIFEST_IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
          JANGAR_SERVING_BUILD_COMMIT: ${{ steps.meta.outputs.source_sha }}
          JANGAR_SERVING_IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          bun run packages/scripts/src/jangar/update-manifests.ts \
            --tag "${JANGAR_IMAGE_TAG}" \
            --digest "${JANGAR_IMAGE_DIGEST}" \
            --source-head-sha "${JANGAR_SOURCE_HEAD_SHA}" \
            --gitops-revision "${JANGAR_GITOPS_REVISION}" \
            --source-ci-run-id "${JANGAR_SOURCE_CI_RUN_ID}" \
            --source-ci-conclusion "${JANGAR_SOURCE_CI_CONCLUSION}" \
            --manifest-image-digest "${JANGAR_MANIFEST_IMAGE_DIGEST}" \
            --serving-build-commit "${JANGAR_SERVING_BUILD_COMMIT}" \
            --serving-image-digest "${JANGAR_SERVING_IMAGE_DIGEST}" \
            --rollout-timestamp "${TIMESTAMP}"

      - name: Check for manifest changes
        if: steps.meta.outputs.promote == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- \
            argocd/applications/jangar/kustomization.yaml \
            argocd/applications/jangar/deployment.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deploy pull request
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/jangar-release-${{ steps.meta.outputs.tag }}
          base: main
          title: 'chore(jangar): promote image ${{ steps.meta.outputs.tag }}'
          commit-message: 'chore(jangar): promote image ${{ steps.meta.outputs.tag }}'
          delete-branch: true
          add-paths: |
            argocd/applications/jangar/kustomization.yaml
            argocd/applications/jangar/deployment.yaml
          body: |
            ## Summary
            Promote Jangar image into GitOps manifests.

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Image tag: `${{ steps.meta.outputs.tag }}`
            - Image digest: `${{ steps.digest.outputs.digest }}`
            - Source CI run: `${{ github.event.workflow_run.id }}`
            - Updated API rollout annotation
            - Published source-serving proof env for revenue repair custody gates

      - name: No manifest changes detected
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed != 'true'
        run: echo 'No Jangar manifest changes detected.'

      - name: Promotion skipped (stale workflow_run)
        if: steps.meta.outputs.promote != 'true'
        run: echo 'Skipping stale workflow_run promotion because source SHA is not current main.'
