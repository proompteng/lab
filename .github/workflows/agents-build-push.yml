name: agents-build-push

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'packages/agent-contracts/**'
      - 'packages/codex/**'
      - 'packages/cx-tools/**'
      - 'packages/otel/**'
      - 'packages/scripts/src/agents/update-values.ts'
      - 'packages/scripts/src/shared/cli.ts'
      - 'packages/scripts/src/shared/git.ts'
      - 'packages/temporal-bun-sdk/**'
      - 'services/agents/**'
      - 'charts/agents/crds/**'
      - 'bun.lock'
      - 'tsconfig.base.json'
      - 'flake.lock'
      - 'nix/images/agents.nix'
      - 'nix/images/openai-codex-cli.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
  push:
    branches:
      - main
    paths:
      - 'packages/agent-contracts/**'
      - 'packages/codex/**'
      - 'packages/cx-tools/**'
      - 'packages/otel/**'
      - 'packages/scripts/src/agents/update-values.ts'
      - 'packages/scripts/src/shared/cli.ts'
      - 'packages/scripts/src/shared/git.ts'
      - 'packages/temporal-bun-sdk/**'
      - 'services/agents/**'
      - 'charts/agents/crds/**'
      - 'bun.lock'
      - 'tsconfig.base.json'
      - 'flake.lock'
      - 'nix/images/agents.nix'
      - 'nix/images/openai-codex-cli.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
  workflow_dispatch:

concurrency:
  group: agents-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controller-image:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: agents-controller
      package_attr: agents-controller-image
      tag: sha-${{ github.sha }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'agents-controller-release-contract' || '' }}
    secrets: inherit

  control-plane-image:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: agents-control-plane
      package_attr: agents-control-plane-image
      tag: sha-${{ github.sha }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'agents-control-plane-release-contract' || '' }}
    secrets: inherit

  agents-shell-image:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: agents-shell
      package_attr: agents-shell-image
      tag: sha-${{ github.sha }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'agents-shell-release-contract' || '' }}
    secrets: inherit

  runner-image:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: agents-codex-runner
      package_attr: agents-codex-runner-image
      tag: sha-${{ github.sha }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'agents-codex-runner-release-contract' || '' }}
    secrets: inherit

  write-values:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs:
      - controller-image
      - control-plane-image
      - agents-shell-image
      - runner-image
    runs-on: arc-arm64
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Write rendered Agents values
        env:
          TAG: sha-${{ github.sha }}
          CONTROLLER_DIGEST: ${{ needs.controller-image.outputs.digest }}
          CONTROL_PLANE_DIGEST: ${{ needs.control-plane-image.outputs.digest }}
          AGENTS_SHELL_DIGEST: ${{ needs.agents-shell-image.outputs.digest }}
          RUNNER_DIGEST: ${{ needs.runner-image.outputs.digest }}
        run: |
          set -euo pipefail
          test -n "${RUNNER_DIGEST}"
          bun run packages/scripts/src/agents/update-values.ts \
            --values argocd/applications/agents/values.yaml \
            --tag "${TAG}" \
            --controller-repository registry.ide-newton.ts.net/lab/agents-controller \
            --controller-digest "${CONTROLLER_DIGEST}" \
            --control-plane-repository registry.ide-newton.ts.net/lab/agents-control-plane \
            --control-plane-digest "${CONTROL_PLANE_DIGEST}" \
            --agents-shell-repository registry.ide-newton.ts.net/lab/agents-shell \
            --agents-shell-digest "${AGENTS_SHELL_DIGEST}" \
            --runner-repository registry.ide-newton.ts.net/lab/agents-codex-runner \
            --runner-tag "${TAG}" \
            --runner-digest "${RUNNER_DIGEST}" \
            --source-sha "${GITHUB_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --ci-conclusion success

      - name: Upload rendered Agents values
        uses: actions/upload-artifact@v6
        with:
          name: agents-values
          path: argocd/applications/agents/values.yaml
          if-no-files-found: error
          retention-days: 3
