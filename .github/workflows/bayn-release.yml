name: bayn-release

on:
  workflow_run:
    workflows:
      - bayn-build-push
    types:
      - completed

concurrency:
  group: >-
    bayn-release-${{
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      (
        github.event.workflow_run.event == 'push' ||
        github.event.workflow_run.event == 'workflow_dispatch'
      ) &&
      'current' ||
      github.event.workflow_run.id
    }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        (
          github.event.workflow_run.event == 'push' ||
          github.event.workflow_run.event == 'workflow_dispatch'
        )
      }}
    runs-on: arc-arm64
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Download release contract
        uses: actions/download-artifact@v4
        with:
          name: bayn-release-contract
          path: .artifacts/bayn
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release contract
        id: release
        shell: bash
        env:
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          contract=.artifacts/bayn/release-contract.json
          test "$(jq -r '.service' "$contract")" = bayn
          test "$(jq -r '.image' "$contract")" = registry.ide-newton.ts.net/lab/bayn
          test "$(jq -r '.packageAttr' "$contract")" = bayn-image
          source_sha="$(jq -r '.sourceSha' "$contract")"
          tag="$(jq -r '.tag' "$contract")"
          digest="$(jq -r '.digest' "$contract")"
          test "$source_sha" = "$WORKFLOW_SHA"
          git merge-base --is-ancestor "$source_sha" HEAD
          git diff --quiet "$source_sha..HEAD" -- \
            services/bayn \
            nix/images/bayn.nix \
            nix/images/bun-workspace-service.nix \
            flake.nix \
            flake.lock \
            package.json \
            bun.lock
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          {
            echo "source_sha=$source_sha"
            echo "tag=$tag"
            echo "digest=$digest"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Verify image and decide promotion
        id: promotion
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
          IMAGE_TAG: ${{ steps.release.outputs.tag }}
          IMAGE_DIGEST: ${{ steps.release.outputs.digest }}
        run: |
          set -euo pipefail
          image_label() {
            local config="$1"
            local name="$2"
            jq -er --arg name "$name" '.config.Labels[$name] | select(type == "string" and length > 0)' <<< "$config"
          }

          candidate_reference="registry.ide-newton.ts.net/lab/bayn@${IMAGE_DIGEST}"
          nix run .#assert-oci-platforms -- "$candidate_reference" linux/amd64 linux/arm64
          config_amd64="$(crane config --platform linux/amd64 "$candidate_reference")"
          config_arm64="$(crane config --platform linux/arm64 "$candidate_reference")"
          source_revision="$(image_label "$config_amd64" org.opencontainers.image.revision)"
          strategy_behavior_hash="$(image_label "$config_amd64" proompteng.ai/bayn.strategy-behavior-hash)"
          strategy_parameter_hash="$(image_label "$config_amd64" proompteng.ai/bayn.strategy-parameter-hash)"
          test "$source_revision" = "$SOURCE_SHA"
          test "$(image_label "$config_arm64" org.opencontainers.image.revision)" = "$source_revision"
          test "$(image_label "$config_arm64" proompteng.ai/bayn.strategy-behavior-hash)" = "$strategy_behavior_hash"
          test "$(image_label "$config_arm64" proompteng.ai/bayn.strategy-parameter-hash)" = "$strategy_parameter_hash"
          promotion="$(
            bun packages/scripts/src/bayn/update-manifests.ts \
              --source-sha "$SOURCE_SHA" \
              --tag "$IMAGE_TAG" \
              --digest "$IMAGE_DIGEST" \
              --strategy-behavior-hash "$strategy_behavior_hash" \
              --strategy-parameter-hash "$strategy_parameter_hash" \
              --rollout-timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          )"
          jq -e '(.promotionAction == "promote" or .promotionAction == "hold") and (.qualificationMode == "preserve" or .qualificationMode == "replace" or .qualificationMode == "install")' <<< "$promotion"
          {
            echo "promotion_action=$(jq -r '.promotionAction' <<< "$promotion")"
            echo "promotion_reason=$(jq -r '.promotionReason' <<< "$promotion")"
            echo "qualification_mode=$(jq -r '.qualificationMode' <<< "$promotion")"
            echo "had_qualification_pin=$(jq -r '.hadQualificationPin' <<< "$promotion")"
            echo "qualification_bindings_match=$(jq -r '.qualificationBindingsMatch' <<< "$promotion")"
            echo "snapshot_changed=$(jq -r '.snapshotChanged' <<< "$promotion")"
            echo "deployed_snapshot_id=$(jq -r '.deployedSnapshotId' <<< "$promotion")"
            echo "candidate_snapshot_id=$(jq -r '.candidateSnapshotId' <<< "$promotion")"
            echo "deployed_source=$(jq -r '.deployedSourceSha' <<< "$promotion")"
            echo "deployed_behavior_hash=$(jq -r '.deployedBehaviorHash' <<< "$promotion")"
            echo "deployed_parameter_hash=$(jq -r '.deployedParameterHash' <<< "$promotion")"
            echo "candidate_behavior_hash=$(jq -r '.candidateBehaviorHash' <<< "$promotion")"
            echo "candidate_parameter_hash=$(jq -r '.candidateParameterHash' <<< "$promotion")"
          } >> "$GITHUB_OUTPUT"

      - name: Record held candidate
        if: steps.promotion.outputs.promotion_action == 'hold'
        shell: bash
        env:
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
          IMAGE_DIGEST: ${{ steps.release.outputs.digest }}
          PROMOTION_REASON: ${{ steps.promotion.outputs.promotion_reason }}
        run: |
          set -euo pipefail
          git diff --exit-code -- \
            argocd/applications/bayn/kustomization.yaml \
            argocd/applications/bayn/deployment.yaml \
            argocd/applicationsets/product.yaml
          {
            echo '## Bayn candidate image held'
            echo
            echo "- Source commit: \`${SOURCE_SHA}\`"
            echo "- Image digest: \`${IMAGE_DIGEST}\`"
            echo "- Reason: \`${PROMOTION_REASON}\`"
            echo '- GitOps remained unchanged; no deployment pull request was created.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create deploy pull request
        if: steps.promotion.outputs.promotion_action == 'promote'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/bayn-release-current
          base: main
          delete-branch: true
          title: 'chore(bayn): promote image ${{ steps.release.outputs.tag }}'
          commit-message: 'chore(bayn): promote image ${{ steps.release.outputs.tag }}'
          add-paths: |
            argocd/applications/bayn/kustomization.yaml
            argocd/applications/bayn/deployment.yaml
            argocd/applicationsets/product.yaml
          body: |
            ## Summary

            Promote the immutable Bayn image against the current Signal snapshot and dedicated Bayn TigerBeetle
            ledger. Qualification-pin handling is selected from the verified compiled behavior identity.

            - Source commit: `${{ steps.release.outputs.source_sha }}`
            - Image tag: `${{ steps.release.outputs.tag }}`
            - Image digest: `${{ steps.release.outputs.digest }}`
            - Qualification mode: `${{ steps.promotion.outputs.qualification_mode }}`
            - Existing pin: `${{ steps.promotion.outputs.had_qualification_pin }}`
            - Qualification identity bindings match: `${{ steps.promotion.outputs.qualification_bindings_match }}`
            - Snapshot changed: `${{ steps.promotion.outputs.snapshot_changed }}`
            - Deployed snapshot: `${{ steps.promotion.outputs.deployed_snapshot_id }}`
            - Candidate snapshot: `${{ steps.promotion.outputs.candidate_snapshot_id }}`
            - Deployed behavior hash: `${{ steps.promotion.outputs.deployed_behavior_hash }}`
            - Candidate behavior hash: `${{ steps.promotion.outputs.candidate_behavior_hash }}`
            - Deployed parameter hash: `${{ steps.promotion.outputs.deployed_parameter_hash }}`
            - Candidate parameter hash: `${{ steps.promotion.outputs.candidate_parameter_hash }}`

            ## Related Issues

            PROOMPT-400

            ## Testing

            - OCI index contains `linux/amd64` and `linux/arm64`.

            ## Screenshots (if applicable)

            N/A

            ## Breaking Changes

            This is a one-way current-contract runtime release. Databases with the old migration tracker are rejected;
            there is no schema fallback or automatic rename. `preserve` keeps the terminal run only when compiled
            behavior, protocol parameters, Signal inputs, TigerBeetle cluster ID, and TigerBeetle ledger all match.
            Replica addresses are transport and an explicit candidate may change them without relabeling qualification
            evidence. `replace` removes an existing incompatible pin only for a fresh Signal snapshot. `install` is
            available only to a controlled invocation that supplies the complete reviewed candidate runtime and exact
            independently accepted terminal run ID; automatic image promotion supplies neither and therefore never
            creates a pin. Installation can pin only the source already deployed for that unpinned snapshot. A
            different source revision remains rejected until the terminal run is installed in a separate change or
            the snapshot advances.

            ## Checklist

            - [x] Testing section documents exact validation.
            - [x] Runtime source revision and image digest are immutable.
            - [x] No broker or capital-promotion authority is introduced.
