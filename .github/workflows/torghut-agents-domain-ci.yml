name: torghut-agents-domain-ci

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'argocd/applications/torghut/agents-domain/**'
      - 'packages/scripts/src/torghut/__tests__/agents-domain-smoke.test.ts'
      - 'scripts/torghut/validate-agents-domain.sh'
      - '.github/workflows/torghut-agents-domain-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'argocd/applications/torghut/agents-domain/**'
      - 'packages/scripts/src/torghut/__tests__/agents-domain-smoke.test.ts'
      - 'scripts/torghut/validate-agents-domain.sh'
      - '.github/workflows/torghut-agents-domain-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/scripts

      - name: Validate Torghut Agents domain manifests
        run: scripts/torghut/validate-agents-domain.sh
