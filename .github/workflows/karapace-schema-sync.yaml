name: karapace schema sync

on:
  push:
    branches:
      - main
    paths:
      - 'proto/**'
      - 'proto/schema-subjects.json'
      - 'scripts/karapace/**'
      - '.github/workflows/karapace-schema-sync.yaml'
  pull_request:
    paths:
      - 'proto/**'
      - 'proto/schema-subjects.json'
      - 'scripts/karapace/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: arc-arm64
    env:
      KARAPACE_URL: ${{ secrets.KARAPACE_URL }}
      KARAPACE_USER: ${{ secrets.KARAPACE_USER }}
      KARAPACE_PASSWORD: ${{ secrets.KARAPACE_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.47.2
          github_token: ${{ github.token }}

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y make g++

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source

      - name: Validate protos compile
        run: buf build proto

      - name: Dry run schema sync
        if: ${{ github.event_name == 'pull_request' }}
        run: bun run scripts/karapace/sync-protos.ts --dry-run

      - name: Check Karapace configuration
        if: ${{ github.event_name != 'pull_request' }}
        id: karapace-config
        shell: bash
        run: |
          if [[ -z "${KARAPACE_URL}" ]]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping Karapace schema sync because KARAPACE_URL is not configured."
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Sync schemas to Karapace
        if: ${{ github.event_name != 'pull_request' && steps.karapace-config.outputs.configured == 'true' }}
        run: bun run scripts/karapace/sync-protos.ts
