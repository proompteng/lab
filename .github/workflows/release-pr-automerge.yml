name: release-pr-automerge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
    paths:
      - 'argocd/applications/khoshut/kustomization.yaml'
      - 'argocd/applications/analysis/kustomization.yaml'
      - 'argocd/applications/bilig/kustomization.yaml'
      - 'argocd/applications/arc/application.yaml'
      - 'argocd/applications/app/kustomization.yaml'
      - 'argocd/applications/attic/deployment.yaml'
      - 'argocd/applications/attic/gc-cronjob.yaml'
      - 'argocd/applications/bumba/deployment.yaml'
      - 'argocd/applications/bumba/kustomization.yaml'
      - 'argocd/applications/docs/kustomization.yaml'
      - 'argocd/applications/froussard/knative-service.yaml'
      - 'argocd/applications/headlamp/values.yaml'
      - 'argocd/applications/oirat/kustomization.yaml'
      - 'argocd/applications/proompteng/kustomization.yaml'
      - 'argocd/applications/synthesis/kustomization.yaml'
      - '.github/workflows/release-pr-automerge.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to evaluate for auto-merge'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr-automerge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  enable:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.pull_request.base.ref == 'main' &&
          (
            startsWith(github.event.pull_request.head.ref, 'release/') ||
            (
              startsWith(github.event.pull_request.head.ref, 'codex/') &&
              (
                contains(github.event.pull_request.head.ref, '-nix-release-') ||
                contains(github.event.pull_request.head.ref, '-release-')
              )
            )
          ) &&
          github.event.pull_request.draft == false
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate automerge eligibility
        id: gates
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          set_output() {
            printf '%s\n' "$1" >> "$GITHUB_OUTPUT"
          }

          set_output "eligible=false"
          set_output "reason=not-evaluated"

          if [[ -z "${PR_NUMBER}" ]] || ! [[ "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            set_output "reason=invalid-pr-number"
            exit 0
          fi

          bot_authors=("app/github-actions" "github-actions[bot]")
          legacy_release_paths=(
            "argocd/applications/khoshut/kustomization.yaml"
            "argocd/applications/analysis/kustomization.yaml"
            "argocd/applications/bilig/kustomization.yaml"
          )
          nix_oci_release_paths=(
            "argocd/applications/arc/application.yaml"
            "argocd/applications/app/kustomization.yaml"
            "argocd/applications/attic/deployment.yaml"
            "argocd/applications/attic/gc-cronjob.yaml"
            "argocd/applications/bumba/deployment.yaml"
            "argocd/applications/bumba/kustomization.yaml"
            "argocd/applications/docs/kustomization.yaml"
            "argocd/applications/froussard/knative-service.yaml"
            "argocd/applications/headlamp/values.yaml"
            "argocd/applications/oirat/kustomization.yaml"
            "argocd/applications/proompteng/kustomization.yaml"
            "argocd/applications/synthesis/kustomization.yaml"
          )

          contains() {
            local needle="$1"
            shift
            for item in "$@"; do
              if [[ "$item" == "$needle" ]]; then
                return 0
              fi
            done
            return 1
          }

          if ! pr_json="$(gh api "repos/$GH_REPO/pulls/$PR_NUMBER")"; then
            set_output "reason=pr-not-found"
            exit 0
          fi

          PR_STATE="$(jq -r '.state // ""' <<< "$pr_json")"
          PR_AUTHOR="$(jq -r '.user.login // ""' <<< "$pr_json")"
          PR_HEAD_REF="$(jq -r '.head.ref // ""' <<< "$pr_json")"
          PR_HEAD_SHA="$(jq -r '.head.sha // ""' <<< "$pr_json")"
          PR_BASE_REF="$(jq -r '.base.ref // ""' <<< "$pr_json")"
          PR_HEAD_REPO="$(jq -r '.head.repo.full_name // ""' <<< "$pr_json")"
          PR_IS_DRAFT="$(jq -r '.draft // false' <<< "$pr_json")"

          if [[ "$PR_STATE" != "open" ]]; then
            set_output "reason=pr-not-open"
            exit 0
          fi

          if [[ "$PR_BASE_REF" != "main" ]]; then
            set_output "reason=base-not-main"
            exit 0
          fi

          release_kind=""
          if [[ "$PR_HEAD_REF" == release/* ]]; then
            release_kind="legacy-release"
          elif [[ "$PR_HEAD_REF" =~ ^codex/(attic|arc-runner)-release-sha-[0-9a-f]{40}$ ]] ||
            [[ "$PR_HEAD_REF" =~ ^codex/(headlamp|oirat|bumba|froussard)-nix-release-sha-[0-9a-f]{40}$ ]] ||
            [[ "$PR_HEAD_REF" =~ ^codex/product-nix-release-[0-9a-f]{40}$ ]]; then
            release_kind="nix-oci-release"
          else
            set_output "reason=head-not-release-branch"
            exit 0
          fi

          if [[ "$PR_IS_DRAFT" == "true" ]]; then
            set_output "reason=pr-is-draft"
            exit 0
          fi

          if [[ "$PR_HEAD_REPO" != "$GH_REPO" ]]; then
            set_output "reason=head-not-from-same-repo"
            exit 0
          fi

          if ! [[ "$PR_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            set_output "reason=invalid-head-sha"
            exit 0
          fi

          if ! contains "$PR_AUTHOR" "${bot_authors[@]}"; then
            if [[ "$PR_AUTHOR" != "gregkonush" ]]; then
              set_output "reason=author-not-allowlisted"
              exit 0
            fi

            commit_json="$(gh api "repos/$GH_REPO/commits/$PR_HEAD_SHA")"
            commit_committer_login="$(jq -r '.committer.login // ""' <<< "$commit_json")"
            commit_committer_email="$(jq -r '.commit.committer.email // ""' <<< "$commit_json")"
            if [[ "$commit_committer_login" != "github-actions[bot]" ]] ||
              [[ "$commit_committer_email" != "41898282+github-actions[bot]@users.noreply.github.com" ]]; then
              set_output "reason=human-authored-release-pr"
              exit 0
            fi
          fi

          has_opt_out_label=$(
            gh pr view "$PR_NUMBER" \
              -R "$GH_REPO" \
              --json labels \
              --jq 'any(.labels[]?; .name == "do-not-automerge")'
          )

          if [[ "$has_opt_out_label" == "true" ]]; then
            set_output "reason=opt-out-label-present"
            exit 0
          fi

          if [[ "$release_kind" == "nix-oci-release" ]]; then
            for required_label in automated-pr nix-oci; do
              has_required_label=$(
                gh pr view "$PR_NUMBER" \
                  -R "$GH_REPO" \
                  --json labels \
                  --jq 'any(.labels[]?; .name == "'"$required_label"'")'
              )

              if [[ "$has_required_label" != "true" ]]; then
                set_output "reason=missing-required-label:${required_label}"
                exit 0
              fi
            done
          fi

          changed_files=()
          for attempt in 1 2 3; do
            mapfile -t changed_files < <(
              gh api "repos/$GH_REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename'
            )

            if [[ "${#changed_files[@]}" -gt 0 ]]; then
              break
            fi

            if [[ "$attempt" -lt 3 ]]; then
              sleep 2
            fi
          done

          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            set_output "reason=no-files-changed"
            exit 0
          fi

          for path in "${changed_files[@]}"; do
            if [[ "$release_kind" == "legacy-release" ]]; then
              if ! contains "$path" "${legacy_release_paths[@]}"; then
                set_output "reason=changed-file-not-allowlisted:$path"
                exit 0
              fi
            else
              if ! contains "$path" "${nix_oci_release_paths[@]}"; then
                set_output "reason=changed-file-not-allowlisted:$path"
                exit 0
              fi
            fi
          done

          set_output "eligible=true"
          set_output "head_sha=${PR_HEAD_SHA}"
          set_output "reason=eligible:${release_kind}"

      - name: Eligibility summary
        shell: bash
        run: |
          set -euo pipefail
          echo "eligible=${{ steps.gates.outputs.eligible }}"
          echo "reason=${{ steps.gates.outputs.reason }}"

      - name: Enable squash auto-merge
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.gates.outputs.head_sha }}
        run: |
          set -euo pipefail

          auto_merge_enabled="$(
            gh pr view "$PR_NUMBER" \
              -R "$GH_REPO" \
              --json autoMergeRequest \
              --jq '.autoMergeRequest != null'
          )"

          if [[ "$auto_merge_enabled" == "true" ]]; then
            echo "Auto-merge already enabled for PR #$PR_NUMBER"
            exit 0
          fi

          gh pr merge "$PR_NUMBER" -R "$GH_REPO" --auto --squash --match-head-commit "$PR_HEAD_SHA"
