name: enabled-product-nix-release

on:
  workflow_run:
    workflows:
      - product-nix-images
    types:
      - completed
  workflow_dispatch:
    inputs:
      service:
        description: Enabled product app to promote
        required: true
        type: choice
        options:
          - proompteng
          - app
          - synthesis
          - docs
      commit_sha:
        description: Commit SHA to promote
        required: true
        type: string
      image_digest:
        description: Image digest to promote (sha256:...)
        required: true
        type: string
      image_tag:
        description: Image tag to promote
        required: false
        type: string

concurrency:
  group: enabled-product-nix-release-${{ github.event.workflow_run.id || inputs.service }}-${{ github.event.workflow_run.head_sha || inputs.commit_sha }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
      }}
    runs-on: arc-arm64
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Download release contracts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          pattern: '*-release-contract'
          path: .artifacts/product-release-contracts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write manual release contract
        if: github.event_name == 'workflow_dispatch'
        env:
          SERVICE: ${{ inputs.service }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          mkdir -p ".artifacts/product-release-contracts/${SERVICE}-release-contract"
          jq -n \
            --arg service "${SERVICE}" \
            --arg image "registry.ide-newton.ts.net/lab/${SERVICE}" \
            --arg tag "${IMAGE_TAG:-sha-${COMMIT_SHA}}" \
            --arg digest "${IMAGE_DIGEST}" \
            --arg sourceSha "${COMMIT_SHA}" \
            --arg packageAttr "${SERVICE}-image" \
            '{service:$service,image:$image,tag:$tag,digest:$digest,sourceSha:$sourceSha,packageAttr:$packageAttr,builder:"nix-dockerTools-skopeo"}' \
            > ".artifacts/product-release-contracts/${SERVICE}-release-contract/release-contract.json"

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Promote digest-pinned manifests
        id: promote
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          contract_paths=(.artifacts/product-release-contracts/*/release-contract.json)
          if [[ "${#contract_paths[@]}" -eq 0 ]]; then
            echo "No release contracts found."
            echo "promoted=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          promoted_services=()
          promoted_lines=()

          for contract_path in "${contract_paths[@]}"; do
            service="$(jq -r '.service' "${contract_path}")"
            image="$(jq -r '.image' "${contract_path}")"
            digest="$(jq -r '.digest' "${contract_path}")"
            source_sha="$(jq -r '.sourceSha' "${contract_path}")"
            package_attr="$(jq -r '.packageAttr' "${contract_path}")"

            case "${service}" in
              proompteng)
                manifest_path="argocd/applications/proompteng/kustomization.yaml"
                input_paths=(apps/landing packages/backend packages/design nix/images/proompteng.nix nix/images/bun-workspace-service.nix nix/packages.nix nix/cache-push.sh nix/ci-nix-oci-summary.sh nix/ci-run-timed.sh nix/oci-inspect-archive.sh nix/oci-push.sh flake.lock bun.lock)
                ;;
              app)
                manifest_path="argocd/applications/app/kustomization.yaml"
                input_paths=(apps/app packages/design nix/images/app.nix nix/images/bun-workspace-service.nix nix/packages.nix nix/cache-push.sh nix/ci-nix-oci-summary.sh nix/oci-inspect-archive.sh nix/oci-push.sh flake.lock bun.lock)
                ;;
              synthesis)
                manifest_path="argocd/applications/synthesis/kustomization.yaml"
                input_paths=(apps/synthesis packages/design nix/images/synthesis.nix nix/images/bun-workspace-service.nix nix/packages.nix nix/cache-push.sh nix/ci-nix-oci-summary.sh nix/oci-inspect-archive.sh nix/oci-push.sh flake.lock bun.lock)
                ;;
              docs)
                manifest_path="argocd/applications/docs/kustomization.yaml"
                input_paths=(apps/docs packages/design nix/images/docs.nix nix/images/bun-workspace-service.nix nix/packages.nix nix/cache-push.sh nix/ci-nix-oci-summary.sh nix/oci-inspect-archive.sh nix/oci-push.sh flake.lock bun.lock)
                ;;
              *)
                echo "Unsupported service in release contract: ${service}" >&2
                exit 2
                ;;
            esac

            if ! [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Invalid digest for ${service}: ${digest}" >&2
              exit 2
            fi
            if [[ "${image}" != "registry.ide-newton.ts.net/lab/${service}" ]]; then
              echo "Unexpected image for ${service}: ${image}" >&2
              exit 2
            fi
            if [[ "${package_attr}" != "${service}-image" ]]; then
              echo "Unexpected package attr for ${service}: ${package_attr}" >&2
              exit 2
            fi
            if ! git merge-base --is-ancestor "${source_sha}" HEAD; then
              echo "Skipping ${service}: source commit is not an ancestor of main."
              continue
            fi
            if ! git diff --quiet "${source_sha}..HEAD" -- "${input_paths[@]}"; then
              echo "Skipping ${service}: service build inputs changed after ${source_sha}."
              continue
            fi

            nix run .#assert-oci-platforms -- "${image}@${digest}" linux/amd64 linux/arm64

            perl -0pi -e 's#(-\s*name:\s+registry\.ide-newton\.ts\.net/lab/'"${service}"'\s*\n\s*)(?:newTag|digest):\s*.*#$1digest: '"${digest}"'#g' "${manifest_path}"
            grep -F "digest: ${digest}" "${manifest_path}"

            promoted_services+=("${service}")
            promoted_lines+=("- \`${service}\`: \`${image}@${digest}\` from \`${source_sha}\`")
          done

          if [[ "${#promoted_services[@]}" -eq 0 ]]; then
            echo "promoted=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "promoted=true"
            echo "services=${promoted_services[*]}"
            echo "body<<EOF"
            printf '%s\n' "${promoted_lines[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create release pull request
        if: steps.promote.outputs.promoted == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/product-nix-release-${{ github.event.workflow_run.head_sha || inputs.commit_sha }}
          title: 'chore(product): promote nix product images'
          commit-message: 'chore(product): promote nix product images'
          body: |
            ## Summary

            - Promote enabled product app image digests built by the shared Nix OCI workflow.
            ${{ steps.promote.outputs.body }}

            ## Related Issues

            N/A

            ## Testing

            - `nix run .#assert-oci-platforms -- <image>@<digest> linux/amd64 linux/arm64` for each promoted image.

            ## Screenshots (if applicable)

            N/A

            ## Breaking Changes

            None

            ## Checklist

            - [x] Testing section documents the exact validation performed (or `N/A` with justification).
            - [x] Screenshots and Breaking Changes sections are handled appropriately (removed or filled in).
            - [x] Documentation, release notes, and follow-ups are updated or tracked.
          labels: |
            automated-pr
            nix-oci
            product
          add-paths: |
            argocd/applications/proompteng/kustomization.yaml
            argocd/applications/app/kustomization.yaml
            argocd/applications/synthesis/kustomization.yaml
            argocd/applications/docs/kustomization.yaml

      - name: Promotion skipped
        if: steps.promote.outputs.promoted != 'true'
        run: echo "No product image manifest promotion was needed."
