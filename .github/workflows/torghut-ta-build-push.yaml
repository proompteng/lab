name: torghut-ta-build-push

permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - dorvud-ci
    types:
      - completed

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: arc-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Resolve image tag
        id: meta
        run: echo "tag=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push torghut-ta image
        uses: docker/build-push-action@v6
        with:
          context: services/dorvud
          file: services/dorvud/technical-analysis-flink/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            registry.ide-newton.ts.net/lab/torghut-ta:${{ steps.meta.outputs.tag }}
            registry.ide-newton.ts.net/lab/torghut-ta:latest
          cache-from: type=registry,ref=registry.ide-newton.ts.net/lab/torghut-ta:latest
          cache-to: type=inline

      - name: Resolve pushed image digest
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          IMAGE='registry.ide-newton.ts.net/lab/torghut-ta'
          TAG='${{ steps.meta.outputs.tag }}'
          DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" | awk '/^Digest:/ { print $2; exit }')"
          if [ -z "${DIGEST}" ]; then
            echo "Failed to resolve digest for ${IMAGE}:${TAG}"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Write release contract artifact
        shell: bash
        run: |
          set -euo pipefail
          bun run packages/scripts/src/torghut/release-contract.ts write \
            --path torghut-ta-release-contract.json \
            --source-sha "${GITHUB_SHA}" \
            --tag "${{ steps.meta.outputs.tag }}" \
            --digest "${{ steps.digest.outputs.digest }}" \
            --image 'registry.ide-newton.ts.net/lab/torghut-ta'

      - name: Upload release contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: torghut-ta-release-contract
          path: torghut-ta-release-contract.json
          if-no-files-found: error
          retention-days: 3
