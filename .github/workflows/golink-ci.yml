name: golink

on:
  push:
    branches:
      - main
    paths:
      - 'services/golink/**'
      - 'packages/scripts/src/golink/**'
      - 'argocd/applications/golink/**'
      - '.github/workflows/golink-ci.yml'
  pull_request:
    paths:
      - 'services/golink/**'
      - 'packages/scripts/src/golink/**'
      - 'argocd/applications/golink/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/common-monorepo.yml
    with:
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/golink --filter @proompteng/design
      lint-command: bunx oxfmt --check services/golink
      oxlint-command: bun run --cwd services/golink lint:oxlint
      oxlint-type-command: bun run --cwd services/golink lint:oxlint:type
      test-command: bun run test:golink
      build-command: bun run build:golink
    secrets: inherit
