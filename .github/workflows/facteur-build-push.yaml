name: Facteur Docker Build and Push

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'services/facteur/**'
      - '.github/workflows/facteur-build-push.yaml'
  workflow_dispatch:

jobs:
  meta:
    runs-on: arc-arm64
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: meta
    uses: ./.github/workflows/oci-native-build-common.yml
    with:
      image_name: facteur
      dockerfile: services/facteur/Dockerfile
      context: .
      tag: ${{ needs.meta.outputs.tag }}
      latest: ${{ github.ref == 'refs/heads/main' }}
      build_args_json: >-
        {"FACTEUR_VERSION":"${{ needs.meta.outputs.tag }}","FACTEUR_COMMIT":"${{ github.sha }}"}
    secrets: inherit
