name: nix-toolchain

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - '.envrc.example'
      - 'README.md'
      - 'AGENTS.md'
      - 'kubernetes/coder/README.md'
      - 'scripts/kubeconform.sh'
      - 'scripts/argo-lint.sh'
      - 'packages/scripts/src/shared/oci.ts'
      - 'packages/scripts/src/shared/__tests__/oci.test.ts'
      - 'argocd/**/*.yaml'
      - '.github/workflows/nix-toolchain.yml'
      - '.github/workflows/nix-cache-smoke.yml'
      - '.github/workflows/oci-native-build-common.yml'
      - '.github/workflows/oci-builder-benchmark.yml'
      - '.github/workflows/kubeconform.yml'
      - '.github/workflows/khoshut-ci.yml'
      - '.github/workflows/headlamp-ci.yml'
      - '.github/workflows/argo-lint.yml'
      - '.github/workflows/facteur-build-push.yaml'
  push:
    branches:
      - main
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - '.envrc.example'
      - 'README.md'
      - 'AGENTS.md'
      - 'kubernetes/coder/README.md'
      - 'scripts/kubeconform.sh'
      - 'scripts/argo-lint.sh'
      - 'packages/scripts/src/shared/oci.ts'
      - 'packages/scripts/src/shared/__tests__/oci.test.ts'
      - 'argocd/**/*.yaml'
      - '.github/workflows/nix-toolchain.yml'
      - '.github/workflows/nix-cache-smoke.yml'
      - '.github/workflows/oci-native-build-common.yml'
      - '.github/workflows/oci-builder-benchmark.yml'
      - '.github/workflows/kubeconform.yml'
      - '.github/workflows/khoshut-ci.yml'
      - '.github/workflows/headlamp-ci.yml'
      - '.github/workflows/argo-lint.yml'
      - '.github/workflows/facteur-build-push.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: arc-arm64
    env:
      ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
      ATTIC_PUBLIC_KEY: ${{ vars.ATTIC_PUBLIC_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Ensure Attic public key is configured
        run: test -n "${ATTIC_PUBLIC_KEY}"

      - name: Install xz for Nix installer
        run: |
          if command -v xz >/dev/null 2>&1; then
            exit 0
          fi

          if command -v apk >/dev/null 2>&1; then
            sudo apk add --no-cache xz
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y xz-utils
          else
            echo "No supported package manager found to install xz." >&2
            exit 1
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-substituters = http://attic.attic.svc.cluster.local/lab
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Verify toolchain
        run: nix develop -c toolchain-doctor

      - name: Verify OCI toolchain
        run: nix develop -c oci-doctor

      - name: Validate Argo CD manifests
        run: nix run .#lint-argocd

      - name: Render Headlamp manifests
        run: nix run .#render-headlamp

      - name: Lint Argo Workflow manifests
        run: nix run .#lint-argo-workflows

      - name: Resolve warm cache store paths
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          nix build --no-link --print-out-paths \
            .#cacheSmoke \
            .#toolchainDoctor \
            .#ociDoctor \
            .#lintArgocd \
            .#renderHeadlamp \
            .#lintArgoWorkflows \
            .#cachePush \
            .#createOciIndex \
            .#inspectOciImage \
            .#assertOciPlatforms \
            > /tmp/attic-warm-cache-paths
          echo "Resolved $(wc -l < /tmp/attic-warm-cache-paths) store path(s)."

      - name: Push warm cache closures
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          mapfile -t paths < /tmp/attic-warm-cache-paths
          nix run .#cache-push -- "${paths[@]}"
