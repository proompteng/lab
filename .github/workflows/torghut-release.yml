name: torghut-release

on:
  workflow_run:
    workflows:
      - torghut-build-push
    types:
      - completed
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to promote (defaults to current main HEAD)
        required: false
        type: string
      image_tag:
        description: Image tag to promote (defaults to sha-<full commit SHA>)
        required: false
        type: string
      image_digest:
        description: Image digest override (sha256:...)
        required: false
        type: string

concurrency:
  group: torghut-release-${{ github.event.workflow_run.head_sha || inputs.commit_sha || github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push'
        )
      }}
    runs-on: arc-arm64
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Download release contract artifact from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: torghut-release-contract
          path: .artifacts/torghut
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_SHA_INPUT: ${{ inputs.commit_sha }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          MAIN_HEAD="$(git rev-parse origin/main)"
          IMAGE='registry.ide-newton.ts.net/lab/torghut'
          SOURCE_SHA=''
          TAG=''
          CONTRACT_DIGEST=''
          PROMOTE='true'

          if [ "${EVENT_NAME}" = 'workflow_run' ]; then
            CONTRACT_PATH='.artifacts/torghut/release-contract.json'
            if [ -f "${CONTRACT_PATH}" ]; then
              SOURCE_SHA="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field sourceSha)"
              TAG="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field tag)"
              CONTRACT_DIGEST="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field digest)"
              CONTRACT_IMAGE="$(bun run packages/scripts/src/torghut/release-contract.ts get --path "${CONTRACT_PATH}" --field image)"

              if [ "${CONTRACT_IMAGE}" != "${IMAGE}" ]; then
                echo "Release contract image mismatch: expected ${IMAGE}, got ${CONTRACT_IMAGE}"
                exit 1
              fi
            else
              echo "Release contract artifact is missing at ${CONTRACT_PATH}"
              exit 1
            fi

            if [ "${SOURCE_SHA}" != "${WORKFLOW_RUN_HEAD_SHA}" ]; then
              echo "Release contract source SHA ${SOURCE_SHA} does not match workflow_run head ${WORKFLOW_RUN_HEAD_SHA}"
              exit 1
            fi

            if [ "${SOURCE_SHA}" != "${MAIN_HEAD}" ]; then
              if ! git merge-base --is-ancestor "${SOURCE_SHA}" "${MAIN_HEAD}"; then
                echo "Skipping stale workflow_run promotion for ${SOURCE_SHA}; latest main ${MAIN_HEAD} is not a descendant."
                PROMOTE='false'
              else
                TORGHUT_CHANGES="$(
                  git diff --name-only "${SOURCE_SHA}..${MAIN_HEAD}" -- \
                    services/torghut \
                    packages/scripts/src/torghut \
                    ':(glob,exclude)packages/scripts/src/torghut/__tests__/**' \
                    ':(glob,exclude)packages/scripts/src/torghut/**/*.test.ts' \
                    packages/scripts/src/shared/cli.ts \
                    packages/scripts/src/shared/git.ts \
                    nix/images/torghut.nix \
                    nix/cache-push.sh \
                    nix/ci-nix-oci-summary.sh \
                    nix/ci-run-timed.sh \
                    nix/oci-inspect-archive.sh \
                    nix/oci-push.sh \
                    flake.nix \
                    flake.lock \
                    services/torghut/uv.lock
                )"
                if [ -n "${TORGHUT_CHANGES}" ]; then
                  echo "Skipping stale workflow_run promotion for ${SOURCE_SHA}; newer Torghut build inputs changed:"
                  printf '%s\n' "${TORGHUT_CHANGES}"
                  PROMOTE='false'
                else
                  echo "Promoting ${SOURCE_SHA}; newer main ${MAIN_HEAD} contains only unrelated changes."
                fi
              fi
            fi
          else
            if [ -n "${COMMIT_SHA_INPUT}" ]; then
              SOURCE_SHA="$(git rev-parse "${COMMIT_SHA_INPUT}^{commit}")"
            else
              SOURCE_SHA="${MAIN_HEAD}"
            fi

            if [ -n "${IMAGE_TAG_INPUT}" ]; then
              TAG="${IMAGE_TAG_INPUT}"
            else
              TAG="sha-${SOURCE_SHA}"
            fi
          fi

          if [ "${PROMOTE}" = 'true' ] && ! git cat-file -e "${SOURCE_SHA}^{commit}" >/dev/null 2>&1; then
            echo "Source SHA ${SOURCE_SHA} is not present in local git history"
            exit 1
          fi

          {
            echo "main_head=${MAIN_HEAD}"
            echo "source_sha=${SOURCE_SHA}"
            echo "tag=${TAG}"
            echo "contract_digest=${CONTRACT_DIGEST}"
            echo "image=${IMAGE}"
            echo "promote=${PROMOTE}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve currently promoted Torghut source
        if: steps.meta.outputs.promote == 'true'
        id: promoted
        shell: bash
        run: |
          set -euo pipefail
          PROMOTED_SOURCE_SHA="$(
            git show origin/main:argocd/applications/torghut/knative-service.yaml |
              sed -n '/- name: TORGHUT_COMMIT/{n;s/^[[:space:]]*value:[[:space:]]*//;s/"//g;p;q;}'
          )" || true
          PROMOTED_SOURCE_VERIFIED='true'
          if ! printf '%s' "${PROMOTED_SOURCE_SHA}" | grep -Eiq '^[0-9a-f]{40}$'; then
            echo "Unable to resolve the currently promoted Torghut source from origin/main; manual approval will be required"
            PROMOTED_SOURCE_SHA=''
            PROMOTED_SOURCE_VERIFIED='false'
          fi
          echo "source_sha=${PROMOTED_SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "verified=${PROMOTED_SOURCE_VERIFIED}" >> "$GITHUB_OUTPUT"

      - name: Checkout source revision
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.meta.outputs.source_sha }}"

      - name: Resolve image digest
        if: steps.meta.outputs.promote == 'true'
        id: digest
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          CONTRACT_DIGEST: ${{ steps.meta.outputs.contract_digest }}
          DIGEST_INPUT: ${{ inputs.image_digest }}
        run: |
          set -euo pipefail

          if [ -n "${DIGEST_INPUT}" ]; then
            DIGEST="${DIGEST_INPUT}"
          elif [ -n "${CONTRACT_DIGEST}" ]; then
            DIGEST="${CONTRACT_DIGEST}"
          else
            DIGEST="$(crane digest "${IMAGE_NAME}:${IMAGE_TAG}")"
          fi

          DIGEST="${DIGEST#*@}"
          if ! printf '%s' "${DIGEST}" | grep -Eiq '^sha256:[0-9a-f]{64}$'; then
            echo "Resolved digest '${DIGEST}' is invalid"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Verify promoted image platform contract
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          IMAGE_REF="${IMAGE_NAME}@${IMAGE_DIGEST}"
          nix run .#assert-oci-platforms -- "${IMAGE_REF}" linux/amd64 linux/arm64

      - name: Evaluate migration safety gate
        if: steps.meta.outputs.promote == 'true'
        id: migration
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_SHA='${{ steps.meta.outputs.source_sha }}'
          PROMOTED_SOURCE_SHA='${{ steps.promoted.outputs.source_sha }}'
          PROMOTED_SOURCE_VERIFIED='${{ steps.promoted.outputs.verified }}'
          REQUIRES_APPROVAL='false'

          if [ "${PROMOTED_SOURCE_VERIFIED}" != 'true' ]; then
            echo "Currently promoted Torghut source could not be parsed from origin/main"
            REQUIRES_APPROVAL='true'
          elif ! git cat-file -e "${PROMOTED_SOURCE_SHA}^{commit}" >/dev/null 2>&1; then
            echo "Currently promoted Torghut source ${PROMOTED_SOURCE_SHA} is not present in git history"
            REQUIRES_APPROVAL='true'
          elif ! git merge-base --is-ancestor "${PROMOTED_SOURCE_SHA}" "${SOURCE_SHA}"; then
            echo "Currently promoted Torghut source ${PROMOTED_SOURCE_SHA} is not an ancestor of ${SOURCE_SHA}"
            REQUIRES_APPROVAL='true'
          else
            CHANGED_MIGRATIONS="$(
              git diff --name-only "${PROMOTED_SOURCE_SHA}..${SOURCE_SHA}" -- \
                services/torghut/migrations/
            )"
            if [ -n "${CHANGED_MIGRATIONS}" ]; then
              echo "Migration changes detected since promoted source ${PROMOTED_SOURCE_SHA}:"
              printf '%s\n' "${CHANGED_MIGRATIONS}"
              REQUIRES_APPROVAL='true'
            fi
          fi

          if [ "${REQUIRES_APPROVAL}" = 'true' ]; then
            {
              echo "requires_approval=true"
              echo "label=do-not-automerge"
              echo "draft=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "requires_approval=false"
              echo "label="
              echo "draft=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Update Torghut manifests
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        env:
          TORGHUT_IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          TORGHUT_IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
          TORGHUT_COMMIT: ${{ steps.meta.outputs.source_sha }}
          TORGHUT_INCLUDE_OPTIONS_MANIFESTS: 'true'
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          bun run packages/scripts/src/torghut/update-manifests.ts \
            --tag "${TORGHUT_IMAGE_TAG}" \
            --digest "${TORGHUT_IMAGE_DIGEST}" \
            --commit "${TORGHUT_COMMIT}" \
            --rollout-timestamp "${TIMESTAMP}"

      - name: Check for manifest changes
        if: steps.meta.outputs.promote == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- \
            argocd/applications/torghut/knative-service.yaml \
            argocd/applications/torghut/scheduler-deployment.yaml \
            argocd/applications/torghut/knative-service-sim.yaml \
            argocd/applications/torghut/db-migrations-job.yaml \
            argocd/applications/torghut/historical-simulation-workflowtemplate.yaml \
            argocd/applications/torghut/analysis-template-runtime-ready.yaml \
            argocd/applications/torghut/analysis-template-activity.yaml \
            argocd/applications/torghut/analysis-template-teardown-clean.yaml \
            argocd/applications/torghut/analysis-template-artifact-bundle.yaml \
            argocd/applications/torghut/generated-resource-retention-cronjob.yaml \
            argocd/applications/torghut/broker-economic-ledger-reconciliation-cronjob.yaml \
            argocd/applications/torghut/tigerbeetle-smoke-job.yaml \
            argocd/applications/torghut-hyperliquid-runtime/deployment.yaml \
            argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml \
            argocd/applications/torghut-options/archive/deployment.yaml \
            argocd/applications/torghut-options/catalog/deployment.yaml \
            argocd/applications/torghut-options/enricher/deployment.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deploy pull request (manual approval required)
        if: >-
          ${{
            steps.meta.outputs.promote == 'true' &&
            steps.changes.outputs.changed == 'true' &&
            steps.migration.outputs.requires_approval == 'true'
          }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/torghut-release-${{ steps.meta.outputs.tag }}
          base: main
          title: 'chore(torghut): promote image ${{ steps.meta.outputs.tag }}'
          commit-message: 'chore(torghut): promote image ${{ steps.meta.outputs.tag }}'
          delete-branch: true
          labels: do-not-automerge
          draft: true
          add-paths: |
            argocd/applications/torghut/knative-service.yaml
            argocd/applications/torghut/scheduler-deployment.yaml
            argocd/applications/torghut/knative-service-sim.yaml
            argocd/applications/torghut/db-migrations-job.yaml
            argocd/applications/torghut/historical-simulation-workflowtemplate.yaml
            argocd/applications/torghut/analysis-template-runtime-ready.yaml
            argocd/applications/torghut/analysis-template-activity.yaml
            argocd/applications/torghut/analysis-template-teardown-clean.yaml
            argocd/applications/torghut/analysis-template-artifact-bundle.yaml
            argocd/applications/torghut/generated-resource-retention-cronjob.yaml
            argocd/applications/torghut/broker-economic-ledger-reconciliation-cronjob.yaml
            argocd/applications/torghut/tigerbeetle-smoke-job.yaml
            argocd/applications/torghut-hyperliquid-runtime/deployment.yaml
            argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml
            argocd/applications/torghut-options/archive/deployment.yaml
            argocd/applications/torghut-options/catalog/deployment.yaml
            argocd/applications/torghut-options/enricher/deployment.yaml
          body: |
            ## Summary
            Promote Torghut image into GitOps manifests.

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Image tag: `${{ steps.meta.outputs.tag }}`
            - Image digest: `${{ steps.digest.outputs.digest }}`
            - Migration change detected under `services/torghut/migrations/**`
            - Manifests: core Torghut, simulation, jobs/workflows, Hyperliquid runtime, options catalog, options enricher
            - Added `do-not-automerge`; manual DB migration approval required before merge

      - name: Create deploy pull request (auto-merge eligible)
        if: >-
          ${{
            steps.meta.outputs.promote == 'true' &&
            steps.changes.outputs.changed == 'true' &&
            steps.migration.outputs.requires_approval != 'true'
          }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/torghut-release-${{ steps.meta.outputs.tag }}
          base: main
          title: 'chore(torghut): promote image ${{ steps.meta.outputs.tag }}'
          commit-message: 'chore(torghut): promote image ${{ steps.meta.outputs.tag }}'
          delete-branch: true
          add-paths: |
            argocd/applications/torghut/knative-service.yaml
            argocd/applications/torghut/scheduler-deployment.yaml
            argocd/applications/torghut/knative-service-sim.yaml
            argocd/applications/torghut/db-migrations-job.yaml
            argocd/applications/torghut/historical-simulation-workflowtemplate.yaml
            argocd/applications/torghut/analysis-template-runtime-ready.yaml
            argocd/applications/torghut/analysis-template-activity.yaml
            argocd/applications/torghut/analysis-template-teardown-clean.yaml
            argocd/applications/torghut/analysis-template-artifact-bundle.yaml
            argocd/applications/torghut/generated-resource-retention-cronjob.yaml
            argocd/applications/torghut/broker-economic-ledger-reconciliation-cronjob.yaml
            argocd/applications/torghut/tigerbeetle-smoke-job.yaml
            argocd/applications/torghut-hyperliquid-runtime/deployment.yaml
            argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml
            argocd/applications/torghut-options/archive/deployment.yaml
            argocd/applications/torghut-options/catalog/deployment.yaml
            argocd/applications/torghut-options/enricher/deployment.yaml
          body: |
            ## Summary
            Promote Torghut image into GitOps manifests.

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Image tag: `${{ steps.meta.outputs.tag }}`
            - Image digest: `${{ steps.digest.outputs.digest }}`
            - Manifests: core Torghut, simulation, jobs/workflows, Hyperliquid runtime, options catalog, options enricher

      - name: No manifest changes detected
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed != 'true'
        run: echo 'No Torghut manifest changes detected.'

      - name: Promotion skipped (stale workflow_run)
        if: steps.meta.outputs.promote != 'true'
        run: echo 'Skipping stale workflow_run promotion because source SHA is not current main.'
