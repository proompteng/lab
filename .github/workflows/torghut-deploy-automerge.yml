name: torghut-deploy-automerge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
    paths:
      - 'argocd/applications/torghut/knative-service.yaml'
      - 'argocd/applications/torghut/knative-service-sim.yaml'
      - 'argocd/applications/torghut/db-migrations-job.yaml'
      - 'argocd/applications/torghut/historical-simulation-workflowtemplate.yaml'
      - 'argocd/applications/torghut/empirical-promotion-workflowtemplate.yaml'
      - 'argocd/applications/torghut/empirical-promotion-renewal-cronjob.yaml'
      - 'argocd/applications/torghut/whitepaper-autoresearch-workflowtemplate.yaml'
      - 'argocd/applications/torghut/analysis-template-runtime-ready.yaml'
      - 'argocd/applications/torghut/analysis-template-activity.yaml'
      - 'argocd/applications/torghut/analysis-template-teardown-clean.yaml'
      - 'argocd/applications/torghut/analysis-template-artifact-bundle.yaml'
      - 'argocd/applications/torghut/empirical-jobs-backfill-job.yaml'
      - 'argocd/applications/torghut/execution-tca-refresh-cronjob.yaml'
      - 'argocd/applications/torghut/order-feed-source-window-repair-cronjob.yaml'
      - 'argocd/applications/torghut/zero-notional-drift-repair-cronjob.yaml'
      - 'argocd/applications/torghut/paper-account-flatten-cronjob.yaml'
      - 'argocd/applications/torghut/whitepaper-semantic-backfill-job.yaml'
      - 'argocd/applications/torghut/tigerbeetle-smoke-job.yaml'
      - 'argocd/applications/torghut/ta/flinkdeployment.yaml'
      - 'argocd/applications/torghut/ta-sim/flinkdeployment.yaml'
      - 'argocd/applications/torghut/ws/deployment.yaml'
      - 'argocd/applications/torghut-hyperliquid-feed/deployment.yaml'
      - 'argocd/applications/torghut-hyperliquid-runtime/deployment.yaml'
      - 'argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml'
      - 'argocd/applications/torghut-options/catalog/deployment.yaml'
      - 'argocd/applications/torghut-options/enricher/deployment.yaml'
      - 'argocd/applications/torghut-options/ta/flinkdeployment.yaml'
      - 'argocd/applications/torghut-options/ws/deployment.yaml'
      - '.github/workflows/torghut-deploy-automerge.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: torghut-deploy-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable:
    if: >-
      ${{
        (
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-release-') ||
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-ta-release-') ||
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-ws-release-') ||
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-hyperliquid-feed-release-')
        ) &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate automerge eligibility
        id: gates
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          echo "eligible=false" >> "$GITHUB_OUTPUT"
          echo "reason=not-evaluated" >> "$GITHUB_OUTPUT"
          release_lane='torghut'
          if [[ "${PR_HEAD_REF}" == codex/torghut-hyperliquid-feed-release-* ]]; then
            release_lane='hyperliquid-feed'
          fi
          echo "release_lane=${release_lane}" >> "$GITHUB_OUTPUT"

          allowed_paths=(
            'argocd/applications/torghut/knative-service.yaml'
            'argocd/applications/torghut/knative-service-sim.yaml'
            'argocd/applications/torghut/db-migrations-job.yaml'
            'argocd/applications/torghut/historical-simulation-workflowtemplate.yaml'
            'argocd/applications/torghut/empirical-promotion-workflowtemplate.yaml'
            'argocd/applications/torghut/empirical-promotion-renewal-cronjob.yaml'
            'argocd/applications/torghut/whitepaper-autoresearch-workflowtemplate.yaml'
            'argocd/applications/torghut/analysis-template-runtime-ready.yaml'
            'argocd/applications/torghut/analysis-template-activity.yaml'
            'argocd/applications/torghut/analysis-template-teardown-clean.yaml'
            'argocd/applications/torghut/analysis-template-artifact-bundle.yaml'
            'argocd/applications/torghut/empirical-jobs-backfill-job.yaml'
            'argocd/applications/torghut/execution-tca-refresh-cronjob.yaml'
            'argocd/applications/torghut/order-feed-source-window-repair-cronjob.yaml'
            'argocd/applications/torghut/zero-notional-drift-repair-cronjob.yaml'
            'argocd/applications/torghut/paper-account-flatten-cronjob.yaml'
            'argocd/applications/torghut/whitepaper-semantic-backfill-job.yaml'
            'argocd/applications/torghut/tigerbeetle-smoke-job.yaml'
            'argocd/applications/torghut/ta/flinkdeployment.yaml'
            'argocd/applications/torghut/ta-sim/flinkdeployment.yaml'
            'argocd/applications/torghut/ws/deployment.yaml'
            'argocd/applications/torghut-hyperliquid-runtime/deployment.yaml'
            'argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml'
            'argocd/applications/torghut-options/catalog/deployment.yaml'
            'argocd/applications/torghut-options/enricher/deployment.yaml'
            'argocd/applications/torghut-options/ta/flinkdeployment.yaml'
            'argocd/applications/torghut-options/ws/deployment.yaml'
          )
          feed_allowed_paths=(
            'argocd/applications/torghut-hyperliquid-feed/deployment.yaml'
          )

          if [ "${release_lane}" = 'hyperliquid-feed' ]; then
            active_allowed_paths=("${feed_allowed_paths[@]}")
          else
            active_allowed_paths=("${allowed_paths[@]}")
          fi

          contains() {
            local needle="$1"
            shift
            for item in "$@"; do
              if [ "${item}" = "${needle}" ]; then
                return 0
              fi
            done
            return 1
          }

          if [ "${PR_HEAD_REPO}" != "${GH_REPO}" ]; then
            echo "reason=head-not-from-same-repo" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! has_opt_out_label="$(
            gh pr view "${PR_NUMBER}" \
              -R "${GH_REPO}" \
              --json labels \
              --jq 'any(.labels[]?; .name == "do-not-automerge")'
          )"; then
            echo "reason=labels-api-error" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${has_opt_out_label}" = 'true' ]; then
            echo "reason=opt-out-label-present" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files_output="$(mktemp)"
          if ! gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[].filename' > "${changed_files_output}"; then
            echo "reason=changed-files-api-error" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t changed_files < "${changed_files_output}"

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "reason=no-files-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for path in "${changed_files[@]}"; do
            if ! contains "${path}" "${active_allowed_paths[@]}"; then
              echo "reason=changed-file-not-allowlisted:${path}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "reason=eligible" >> "$GITHUB_OUTPUT"

      - name: Eligibility summary
        shell: bash
        env:
          ELIGIBLE: ${{ steps.gates.outputs.eligible }}
          REASON: ${{ steps.gates.outputs.reason }}
        run: |
          set -euo pipefail
          printf 'eligible=%s\n' "${ELIGIBLE}"
          printf 'reason=%s\n' "${REASON}"

      - name: Verify source image build contract
        if: steps.gates.outputs.eligible == 'true' && steps.gates.outputs.release_lane != 'hyperliquid-feed'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          case "${PR_HEAD_REF}" in
            codex/torghut-release-*)
              source_manifest='argocd/applications/torghut/knative-service.yaml'
              source_env_name='TORGHUT_COMMIT'
              build_workflow='torghut-build-push.yaml'
              build_label='Torghut'
              ;;
            codex/torghut-ta-release-*)
              source_manifest='argocd/applications/torghut/ta/flinkdeployment.yaml'
              source_env_name='TORGHUT_TA_COMMIT'
              build_workflow='torghut-ta-build-push.yaml'
              build_label='Torghut TA'
              ;;
            codex/torghut-ws-release-*)
              source_manifest='argocd/applications/torghut/ws/deployment.yaml'
              source_env_name='TORGHUT_WS_COMMIT'
              build_workflow='torghut-ws-build-push.yaml'
              build_label='Torghut WS'
              ;;
            *)
              echo "Unsupported Torghut release branch: ${PR_HEAD_REF}"
              exit 1
              ;;
          esac

          manifest="$(
            gh api \
              -H 'Accept: application/vnd.github.raw' \
              "repos/${GH_REPO}/contents/${source_manifest}?ref=${PR_HEAD_SHA}"
          )"
          source_sha="$(
            printf '%s\n' "${manifest}" |
              awk -v env_name="${source_env_name}" '
                $0 ~ "^[[:space:]]*- name:[[:space:]]*" env_name "[[:space:]]*$" { found = 1; next }
                found && /^[[:space:]]*value:/ {
                  sub(/^[[:space:]]*value:[[:space:]]*/, "")
                  gsub(/"/, "")
                  print
                  exit
                }
              '
          )"
          if ! printf '%s' "${source_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Unable to resolve ${source_env_name} from ${source_manifest}"
            exit 1
          fi

          required_build_jobs=(
            'build-platform (linux/amd64, amd64, arc-amd64)'
            'build-platform (linux/arm64, arm64, arc-arm64)'
            'publish-index'
          )

          assert_required_build_jobs() {
            local run_id="$1"
            local job_lines
            job_lines="$(
              gh run view "${run_id}" \
                -R "${GH_REPO}" \
                --json jobs \
                --jq '.jobs[] | [.name, (.conclusion // ""), (.status // "")] | @tsv'
            )"

            for required_job in "${required_build_jobs[@]}"; do
              state="$(
                printf '%s\n' "${job_lines}" |
                  awk -F '\t' \
                    -v name="${required_job}" \
                    '$1 == name { print ($2 == "" ? "PENDING" : $2) "\t" $3; found = 1; exit } END { if (!found) print "MISSING\t" }'
              )"
              IFS=$'\t' read -r conclusion status <<< "${state}"
              case "${conclusion}" in
                success)
                  ;;
                MISSING)
                  echo "Required build-push job is missing from run ${run_id}: ${required_job}"
                  exit 1
                  ;;
                PENDING)
                  echo "Required build-push job did not complete in successful run ${run_id}: ${required_job} (${status:-unknown})"
                  exit 1
                  ;;
                failure | cancelled | skipped | timed_out | action_required | startup_failure)
                  echo "Required build-push job failed in run ${run_id}: ${required_job} -> ${conclusion}"
                  exit 1
                  ;;
                *)
                  echo "Required build-push job has unexpected conclusion in run ${run_id}: ${required_job} -> ${conclusion}"
                  exit 1
                  ;;
              esac
            done
          }

          deadline=$((SECONDS + 900))
          while true; do
            run_line="$(
              gh run list \
                -R "${GH_REPO}" \
                --workflow "${build_workflow}" \
                --commit "${source_sha}" \
                --json databaseId,status,conclusion,url,createdAt \
                --jq 'sort_by(.createdAt) | reverse | .[0] // {} | [.databaseId // "", .status // "", .conclusion // "", .url // ""] | @tsv'
            )"
            IFS=$'\t' read -r run_id run_status run_conclusion run_url <<< "${run_line}"

            if [ -n "${run_id}" ] && [ "${run_status}" = 'completed' ] && [ "${run_conclusion}" = 'success' ]; then
              assert_required_build_jobs "${run_id}"
              echo "${build_label} build-push passed required image contract jobs for ${source_sha}: ${run_url}"
              break
            fi

            if [ -n "${run_id}" ] && [ "${run_status}" = 'completed' ]; then
              echo "${build_label} build-push did not pass for ${source_sha}: ${run_conclusion}"
              echo "${run_url}"
              exit 1
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for ${build_label} build-push for ${source_sha}"
              if [ -n "${run_url}" ]; then
                echo "${run_url}"
              fi
              exit 1
            fi

            if [ -z "${run_id}" ]; then
              echo "Waiting for ${build_label} build-push to appear for ${source_sha}"
            else
              echo "Waiting for ${build_label} build-push: status=${run_status} conclusion=${run_conclusion:-pending}"
            fi
            sleep 10
          done

      - name: Verify source Hyperliquid feed image build contract
        if: steps.gates.outputs.eligible == 'true' && steps.gates.outputs.release_lane == 'hyperliquid-feed'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          manifest="$(
            gh api \
              -H 'Accept: application/vnd.github.raw' \
              "repos/${GH_REPO}/contents/argocd/applications/torghut-hyperliquid-feed/deployment.yaml?ref=${PR_HEAD_SHA}"
          )"
          source_sha="$(
            printf '%s\n' "${manifest}" |
              awk '
                /^[[:space:]]*- name:[[:space:]]*TORGHUT_HYPERLIQUID_FEED_COMMIT[[:space:]]*$/ { found = 1; next }
                found && /^[[:space:]]*value:/ {
                  sub(/^[[:space:]]*value:[[:space:]]*/, "")
                  gsub(/"/, "")
                  print
                  exit
                }
              '
          )"
          if ! printf '%s' "${source_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Unable to resolve TORGHUT_HYPERLIQUID_FEED_COMMIT from release manifest"
            exit 1
          fi

          required_build_jobs=(
            'build-platform (linux/amd64, amd64, arc-amd64)'
            'build-platform (linux/arm64, arm64, arc-arm64)'
            'publish-index'
          )

          assert_required_build_jobs() {
            local run_id="$1"
            local job_lines
            job_lines="$(
              gh run view "${run_id}" \
                -R "${GH_REPO}" \
                --json jobs \
                --jq '.jobs[] | [.name, (.conclusion // ""), (.status // "")] | @tsv'
            )"

            for required_job in "${required_build_jobs[@]}"; do
              state="$(
                printf '%s\n' "${job_lines}" |
                  awk -F '\t' \
                    -v name="${required_job}" \
                    '$1 == name { print ($2 == "" ? "PENDING" : $2) "\t" $3; found = 1; exit } END { if (!found) print "MISSING\t" }'
              )"
              IFS=$'\t' read -r conclusion status <<< "${state}"
              case "${conclusion}" in
                success)
                  ;;
                MISSING)
                  echo "Required Hyperliquid feed build-push job is missing from run ${run_id}: ${required_job}"
                  exit 1
                  ;;
                PENDING)
                  echo "Required Hyperliquid feed build-push job did not complete in successful run ${run_id}: ${required_job} (${status:-unknown})"
                  exit 1
                  ;;
                failure | cancelled | skipped | timed_out | action_required | startup_failure)
                  echo "Required Hyperliquid feed build-push job failed in run ${run_id}: ${required_job} -> ${conclusion}"
                  exit 1
                  ;;
                *)
                  echo "Required Hyperliquid feed build-push job has unexpected conclusion in run ${run_id}: ${required_job} -> ${conclusion}"
                  exit 1
                  ;;
              esac
            done
          }

          deadline=$((SECONDS + 900))
          while true; do
            run_line="$(
              gh run list \
                -R "${GH_REPO}" \
                --workflow torghut-hyperliquid-feed-build-push.yaml \
                --commit "${source_sha}" \
                --json databaseId,status,conclusion,url,createdAt \
                --jq 'sort_by(.createdAt) | reverse | .[0] // {} | [.databaseId // "", .status // "", .conclusion // "", .url // ""] | @tsv'
            )"
            IFS=$'\t' read -r run_id run_status run_conclusion run_url <<< "${run_line}"

            if [ -n "${run_id}" ] && [ "${run_status}" = 'completed' ] && [ "${run_conclusion}" = 'success' ]; then
              assert_required_build_jobs "${run_id}"
              echo "Hyperliquid feed build-push passed required image contract jobs for ${source_sha}: ${run_url}"
              break
            fi

            if [ -n "${run_id}" ] && [ "${run_status}" = 'completed' ]; then
              echo "Source commit Hyperliquid feed build did not pass for ${source_sha}: ${run_conclusion}"
              echo "${run_url}"
              exit 1
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for source commit Hyperliquid feed build for ${source_sha}"
              if [ -n "${run_url}" ]; then
                echo "${run_url}"
              fi
              exit 1
            fi

            if [ -z "${run_id}" ]; then
              echo "Waiting for Hyperliquid feed build-push to appear for ${source_sha}"
            else
              echo "Waiting for Hyperliquid feed build-push: status=${run_status} conclusion=${run_conclusion:-pending}"
            fi
            sleep 10
          done

      - name: Wait for required release checks
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          required_checks=(
            'Semantic Commits|Lint commit messages'
            'Semantic Pull Request|Validate PR title'
            'argo-lint|lint'
            'kubeconform|validate'
          )

          deadline=$((SECONDS + 2700))
          while true; do
            check_lines="$(
              gh pr checks "${PR_NUMBER}" \
                -R "${GH_REPO}" \
                --json name,state,workflow \
                --jq '.[] | [.workflow, .name, .state] | @tsv'
            )"

            pending=()
            for check in "${required_checks[@]}"; do
              IFS='|' read -r workflow name <<< "${check}"
              state="$(
                printf '%s\n' "${check_lines}" |
                  awk -F '\t' \
                    -v workflow="${workflow}" \
                    -v name="${name}" \
                    '$1 == workflow && $2 == name { print $3; found = 1; exit } END { if (!found) print "MISSING" }'
              )"

              case "${state}" in
                SUCCESS)
                  ;;
                FAILURE | ERROR | CANCELLED | SKIPPED | TIMED_OUT | ACTION_REQUIRED | STARTUP_FAILURE)
                  echo "Required check failed: ${workflow} / ${name} -> ${state}"
                  exit 1
                  ;;
                *)
                  pending+=("${workflow} / ${name} -> ${state}")
                  ;;
              esac
            done

            if [ "${#pending[@]}" -eq 0 ]; then
              echo "All required Torghut release checks passed."
              break
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for required release checks:"
              printf '%s\n' "${pending[@]}"
              exit 1
            fi

            echo "Waiting for required release checks:"
            printf '%s\n' "${pending[@]}"
            sleep 15
          done

      - name: Enable squash auto-merge
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          auto_merge_enabled="$(
            gh pr view "${PR_NUMBER}" \
              -R "${GH_REPO}" \
              --json autoMergeRequest \
              --jq '.autoMergeRequest != null'
          )"
          if [ "${auto_merge_enabled}" = 'true' ]; then
            echo "Auto-merge already enabled for PR #${PR_NUMBER}"
            exit 0
          fi
          gh pr merge "${PR_NUMBER}" -R "${GH_REPO}" --auto --squash
