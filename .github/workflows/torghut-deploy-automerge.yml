name: torghut-deploy-automerge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled
    paths:
      - 'argocd/applications/torghut/knative-service.yaml'
      - 'argocd/applications/torghut/scheduler-deployment.yaml'
      - 'argocd/applications/torghut/knative-service-sim.yaml'
      - 'argocd/applications/torghut/db-migrations-job.yaml'
      - 'argocd/applications/torghut/historical-simulation-workflowtemplate.yaml'
      - 'argocd/applications/torghut/analysis-template-runtime-ready.yaml'
      - 'argocd/applications/torghut/analysis-template-activity.yaml'
      - 'argocd/applications/torghut/analysis-template-teardown-clean.yaml'
      - 'argocd/applications/torghut/analysis-template-artifact-bundle.yaml'
      - 'argocd/applications/torghut/empirical-jobs-backfill-job.yaml'
      - 'argocd/applications/torghut/generated-resource-retention-cronjob.yaml'
      - 'argocd/applications/torghut/broker-economic-ledger-reconciliation-cronjob.yaml'
      - 'argocd/applications/torghut/order-lineage-reconciliation-cronjob.yaml'
      - 'argocd/applications/torghut/whitepaper-semantic-backfill-job.yaml'
      - 'argocd/applications/torghut/tigerbeetle-smoke-job.yaml'
      - 'argocd/applications/torghut/ta/flinkdeployment.yaml'
      - 'argocd/applications/torghut/ta-sim/flinkdeployment.yaml'
      - 'argocd/applications/torghut/ws/deployment.yaml'
      - 'argocd/applications/torghut-hyperliquid-feed/deployment.yaml'
      - 'argocd/applications/torghut-hyperliquid-runtime/deployment.yaml'
      - 'argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml'
      - 'argocd/applications/torghut-options/archive/deployment.yaml'
      - 'argocd/applications/torghut-options/catalog/deployment.yaml'
      - 'argocd/applications/torghut-options/enricher/deployment.yaml'
      - 'argocd/applications/torghut-options/ta/flinkdeployment.yaml'
      - 'argocd/applications/torghut-options/ws/deployment.yaml'
      - '.github/workflows/torghut-deploy-automerge.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: torghut-deploy-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable:
    if: >-
      ${{
        (
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-release-') ||
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-ta-release-') ||
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-ws-release-') ||
          startsWith(github.event.pull_request.head.ref, 'codex/torghut-hyperliquid-feed-release-')
        ) &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.draft == false
      }}
    # The private registry is only reachable from the ARC runners on the lab network.
    # This pull_request_target job checks out trusted base code only, never pull request code.
    runs-on: arc-amd64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate automerge eligibility
        id: gates
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          echo "eligible=false" >> "$GITHUB_OUTPUT"
          echo "reason=not-evaluated" >> "$GITHUB_OUTPUT"
          release_lane='torghut'
          if [[ "${PR_HEAD_REF}" == codex/torghut-hyperliquid-feed-release-* ]]; then
            release_lane='hyperliquid-feed'
          fi
          echo "release_lane=${release_lane}" >> "$GITHUB_OUTPUT"

          allowed_paths=(
            'argocd/applications/torghut/knative-service.yaml'
            'argocd/applications/torghut/scheduler-deployment.yaml'
            'argocd/applications/torghut/knative-service-sim.yaml'
            'argocd/applications/torghut/db-migrations-job.yaml'
            'argocd/applications/torghut/historical-simulation-workflowtemplate.yaml'
            'argocd/applications/torghut/analysis-template-runtime-ready.yaml'
            'argocd/applications/torghut/analysis-template-activity.yaml'
            'argocd/applications/torghut/analysis-template-teardown-clean.yaml'
            'argocd/applications/torghut/analysis-template-artifact-bundle.yaml'
            'argocd/applications/torghut/empirical-jobs-backfill-job.yaml'
            'argocd/applications/torghut/generated-resource-retention-cronjob.yaml'
            'argocd/applications/torghut/broker-economic-ledger-reconciliation-cronjob.yaml'
            'argocd/applications/torghut/order-lineage-reconciliation-cronjob.yaml'
            'argocd/applications/torghut/whitepaper-semantic-backfill-job.yaml'
            'argocd/applications/torghut/tigerbeetle-smoke-job.yaml'
            'argocd/applications/torghut/ta/flinkdeployment.yaml'
            'argocd/applications/torghut/ta-sim/flinkdeployment.yaml'
            'argocd/applications/torghut/ws/deployment.yaml'
            'argocd/applications/torghut-hyperliquid-runtime/deployment.yaml'
            'argocd/applications/torghut-hyperliquid-runtime/db-migrations-job.yaml'
            'argocd/applications/torghut-options/archive/deployment.yaml'
            'argocd/applications/torghut-options/catalog/deployment.yaml'
            'argocd/applications/torghut-options/enricher/deployment.yaml'
            'argocd/applications/torghut-options/ta/flinkdeployment.yaml'
            'argocd/applications/torghut-options/ws/deployment.yaml'
          )
          feed_allowed_paths=(
            'argocd/applications/torghut-hyperliquid-feed/deployment.yaml'
          )

          if [ "${release_lane}" = 'hyperliquid-feed' ]; then
            active_allowed_paths=("${feed_allowed_paths[@]}")
          else
            active_allowed_paths=("${allowed_paths[@]}")
          fi

          contains() {
            local needle="$1"
            shift
            for item in "$@"; do
              if [ "${item}" = "${needle}" ]; then
                return 0
              fi
            done
            return 1
          }

          if [ "${PR_HEAD_REPO}" != "${GH_REPO}" ]; then
            echo "reason=head-not-from-same-repo" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! has_opt_out_label="$(
            gh pr view "${PR_NUMBER}" \
              -R "${GH_REPO}" \
              --json labels \
              --jq 'any(.labels[]?; .name == "do-not-automerge")'
          )"; then
            echo "reason=labels-api-error" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${has_opt_out_label}" = 'true' ]; then
            echo "reason=opt-out-label-present" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files_output="$(mktemp)"
          if ! gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[].filename' > "${changed_files_output}"; then
            echo "reason=changed-files-api-error" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t changed_files < "${changed_files_output}"

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "reason=no-files-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for path in "${changed_files[@]}"; do
            if ! contains "${path}" "${active_allowed_paths[@]}"; then
              echo "reason=changed-file-not-allowlisted:${path}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "reason=eligible" >> "$GITHUB_OUTPUT"

      - name: Eligibility summary
        shell: bash
        env:
          ELIGIBLE: ${{ steps.gates.outputs.eligible }}
          REASON: ${{ steps.gates.outputs.reason }}
        run: |
          set -euo pipefail
          printf 'eligible=%s\n' "${ELIGIBLE}"
          printf 'reason=%s\n' "${REASON}"

      - name: Checkout trusted base
        if: steps.gates.outputs.eligible == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Set up Nix toolchain
        if: steps.gates.outputs.eligible == 'true'
        uses: ./.github/actions/setup-nix-toolchain
        with:
          require-preinstalled: 'true'

      - name: Verify source image digest contract
        if: steps.gates.outputs.eligible == 'true' && steps.gates.outputs.release_lane != 'hyperliquid-feed'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          case "${PR_HEAD_REF}" in
            codex/torghut-release-*)
              source_manifest='argocd/applications/torghut/knative-service.yaml'
              source_env_name='TORGHUT_COMMIT'
              expected_image='registry.ide-newton.ts.net/lab/torghut'
              build_label='Torghut'
              ;;
            codex/torghut-ta-release-*)
              source_manifest='argocd/applications/torghut/ta/flinkdeployment.yaml'
              source_env_name='TORGHUT_TA_COMMIT'
              expected_image='registry.ide-newton.ts.net/lab/torghut-ta'
              build_label='Torghut TA'
              ;;
            codex/torghut-ws-release-*)
              source_manifest='argocd/applications/torghut/ws/deployment.yaml'
              source_env_name='TORGHUT_WS_COMMIT'
              expected_image='registry.ide-newton.ts.net/lab/torghut-ws'
              build_label='Torghut WS'
              ;;
            *)
              echo "Unsupported Torghut release branch: ${PR_HEAD_REF}"
              exit 1
              ;;
          esac

          manifest="$(
            gh api \
              -H 'Accept: application/vnd.github.raw' \
              "repos/${GH_REPO}/contents/${source_manifest}?ref=${PR_HEAD_SHA}"
          )"

          resolve_env_value() {
            local env_name="$1"
            printf '%s\n' "${manifest}" |
              awk -v env_name="${env_name}" '
                $0 ~ "^[[:space:]]*- name:[[:space:]]*" env_name "[[:space:]]*$" { found = 1; next }
                found && /^[[:space:]]*value:/ {
                  sub(/^[[:space:]]*value:[[:space:]]*/, "")
                  gsub(/"/, "")
                  print
                  exit
                }
              '
          }

          resolve_image_ref() {
            local image_name="$1"
            printf '%s\n' "${manifest}" |
              awk -v expected="${image_name}" '
                /^[[:space:]]*image:[[:space:]]*/ {
                  sub(/^[[:space:]]*image:[[:space:]]*/, "")
                  gsub(/"/, "")
                  if (index($0, expected "@sha256:") == 1) {
                    print
                    exit
                  }
                }
              '
          }

          assert_multi_arch_image() {
            local image_ref="$1"
            local image_digest

            image_digest="${image_ref#*@}"
            if [ "${image_digest}" = "${image_ref}" ] || ! printf '%s' "${image_digest}" | grep -Eiq '^sha256:[0-9a-f]{64}$'; then
              echo "Release manifest image is not digest pinned: ${image_ref}"
              exit 1
            fi

            nix run .#assert-oci-platforms -- "${image_ref}" linux/amd64 linux/arm64
          }

          source_sha="$(resolve_env_value "${source_env_name}")"
          if ! printf '%s' "${source_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Unable to resolve ${source_env_name} from ${source_manifest}"
            exit 1
          fi

          image_ref="$(resolve_image_ref "${expected_image}")"
          if [ -z "${image_ref}" ]; then
            echo "Unable to resolve digest-pinned ${expected_image} image from ${source_manifest}"
            exit 1
          fi

          assert_multi_arch_image "${image_ref}"
          echo "${build_label} release manifest pins a multi-arch image digest for ${source_sha}: ${image_ref}"

      - name: Verify source Hyperliquid feed image digest contract
        if: steps.gates.outputs.eligible == 'true' && steps.gates.outputs.release_lane == 'hyperliquid-feed'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          manifest="$(
            gh api \
              -H 'Accept: application/vnd.github.raw' \
              "repos/${GH_REPO}/contents/argocd/applications/torghut-hyperliquid-feed/deployment.yaml?ref=${PR_HEAD_SHA}"
          )"

          source_sha="$(
            printf '%s\n' "${manifest}" |
              awk '
                /^[[:space:]]*- name:[[:space:]]*TORGHUT_HYPERLIQUID_FEED_COMMIT[[:space:]]*$/ { found = 1; next }
                found && /^[[:space:]]*value:/ {
                  sub(/^[[:space:]]*value:[[:space:]]*/, "")
                  gsub(/"/, "")
                  print
                  exit
                }
              '
          )"
          if ! printf '%s' "${source_sha}" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Unable to resolve TORGHUT_HYPERLIQUID_FEED_COMMIT from release manifest"
            exit 1
          fi

          image_ref="$(
            printf '%s\n' "${manifest}" |
              awk '
                /^[[:space:]]*image:[[:space:]]*/ {
                  sub(/^[[:space:]]*image:[[:space:]]*/, "")
                  gsub(/"/, "")
                  if (index($0, "registry.ide-newton.ts.net/lab/torghut-hyperliquid-feed@sha256:") == 1) {
                    print
                    exit
                  }
                }
              '
          )"
          image_digest="${image_ref#*@}"
          if [ -z "${image_ref}" ] || [ "${image_digest}" = "${image_ref}" ] || ! printf '%s' "${image_digest}" | grep -Eiq '^sha256:[0-9a-f]{64}$'; then
            echo "Unable to resolve digest-pinned Hyperliquid feed image from release manifest"
            exit 1
          fi

          nix run .#assert-oci-platforms -- "${image_ref}" linux/amd64 linux/arm64

          echo "Hyperliquid feed release manifest pins a multi-arch image digest for ${source_sha}: ${image_ref}"

      - name: Wait for required release checks
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RELEASE_LANE: ${{ steps.gates.outputs.release_lane }}
        run: |
          set -euo pipefail

          required_checks=(
            'Semantic Commits|Lint commit messages'
            'Semantic Pull Request|Validate PR title'
            'CI|PR validation (argo-lint)'
            'CI|PR validation (kubeconform)'
          )
          if [ "${RELEASE_LANE}" != 'hyperliquid-feed' ]; then
            required_checks+=('torghut-ci|Release manifest changes')
          fi

          deadline=$((SECONDS + 600))
          while true; do
            check_lines="$(
              gh pr checks "${PR_NUMBER}" \
                -R "${GH_REPO}" \
                --json name,state,workflow \
                --jq '.[] | [.workflow, .name, .state] | @tsv'
            )"

            pending=()
            for check in "${required_checks[@]}"; do
              IFS='|' read -r workflow name <<< "${check}"
              state="$(
                printf '%s\n' "${check_lines}" |
                  awk -F '\t' \
                    -v workflow="${workflow}" \
                    -v name="${name}" \
                    '$1 == workflow && $2 == name { print $3; found = 1; exit } END { if (!found) print "MISSING" }'
              )"

              case "${state}" in
                SUCCESS)
                  ;;
                FAILURE | ERROR | CANCELLED | SKIPPED | TIMED_OUT | ACTION_REQUIRED | STARTUP_FAILURE)
                  echo "Required check failed: ${workflow} / ${name} -> ${state}"
                  exit 1
                  ;;
                *)
                  pending+=("${workflow} / ${name} -> ${state}")
                  ;;
              esac
            done

            if [ "${#pending[@]}" -eq 0 ]; then
              echo "All required Torghut release checks passed."
              break
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for required release checks:"
              printf '%s\n' "${pending[@]}"
              exit 1
            fi

            echo "Waiting for required release checks:"
            printf '%s\n' "${pending[@]}"
            sleep 10
          done

      - name: Squash merge release PR
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          MERGE_ATTEMPTS=4
          for merge_attempt in $(seq 1 "${MERGE_ATTEMPTS}"); do
            pr_state="$(
              gh pr view "${PR_NUMBER}" \
                -R "${GH_REPO}" \
                --json state,mergeStateStatus,isDraft,headRefOid \
                --jq '[.state, .mergeStateStatus, (.isDraft|tostring), .headRefOid] | @tsv'
            )"
            IFS=$'\t' read -r state merge_state is_draft current_head_sha <<< "${pr_state}"

            if [ "${state}" != 'OPEN' ]; then
              echo "PR #${PR_NUMBER} is not open: ${state}"
              exit 0
            fi
            if [ "${is_draft}" = 'true' ]; then
              echo "PR #${PR_NUMBER} is draft; skipping merge."
              exit 0
            fi
            if [ "${current_head_sha}" != "${PR_HEAD_SHA}" ]; then
              echo "PR #${PR_NUMBER} head changed from ${PR_HEAD_SHA} to ${current_head_sha}; refusing stale merge."
              exit 1
            fi
            case "${merge_state}" in
              CLEAN | UNSTABLE | BEHIND)
                ;;
              UNKNOWN)
                if [ "${merge_attempt}" -lt "${MERGE_ATTEMPTS}" ]; then
                  sleep $((merge_attempt * 5))
                  continue
                fi
                ;;
              *)
                echo "PR #${PR_NUMBER} is not mergeable after required checks passed: ${merge_state}"
                exit 1
                ;;
            esac

            set +e
            merge_output="$(
              gh pr merge "${PR_NUMBER}" -R "${GH_REPO}" --squash --match-head-commit "${PR_HEAD_SHA}" 2>&1
            )"
            merge_status=$?
            set -e
            if [ "${merge_status}" -eq 0 ]; then
              printf '%s\n' "${merge_output}"
              exit 0
            fi
            if grep -Fq 'Base branch was modified' <<< "${merge_output}" &&
              [ "${merge_attempt}" -lt "${MERGE_ATTEMPTS}" ]; then
              echo "Base moved during merge attempt ${merge_attempt}; refreshing PR state before retry."
              sleep $((merge_attempt * 5))
              continue
            fi
            printf '%s\n' "${merge_output}" >&2
            exit "${merge_status}"
          done

          echo "PR #${PR_NUMBER} did not reach a mergeable state after ${MERGE_ATTEMPTS} attempts."
          exit 1
