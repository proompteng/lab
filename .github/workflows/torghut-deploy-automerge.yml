name: torghut-deploy-automerge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: torghut-deploy-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable:
    if: >-
      ${{
        startsWith(github.event.pull_request.head.ref, 'codex/torghut-release-') &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.draft == false
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Evaluate automerge eligibility
        id: gates
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          echo "eligible=false" >> "$GITHUB_OUTPUT"
          echo "reason=not-evaluated" >> "$GITHUB_OUTPUT"

          allowed_paths=(
            'argocd/applications/torghut/knative-service.yaml'
            'argocd/applications/torghut/knative-service-sim.yaml'
            'argocd/applications/torghut/db-migrations-job.yaml'
            'argocd/applications/torghut/historical-simulation-workflowtemplate.yaml'
            'argocd/applications/torghut/empirical-promotion-workflowtemplate.yaml'
            'argocd/applications/torghut/whitepaper-autoresearch-workflowtemplate.yaml'
            'argocd/applications/torghut/analysis-template-runtime-ready.yaml'
            'argocd/applications/torghut/analysis-template-activity.yaml'
            'argocd/applications/torghut/analysis-template-teardown-clean.yaml'
            'argocd/applications/torghut/analysis-template-artifact-bundle.yaml'
            'argocd/applications/torghut/empirical-jobs-backfill-job.yaml'
            'argocd/applications/torghut/whitepaper-semantic-backfill-job.yaml'
            'argocd/applications/torghut-options/catalog/deployment.yaml'
            'argocd/applications/torghut-options/enricher/deployment.yaml'
          )

          contains() {
            local needle="$1"
            shift
            for item in "$@"; do
              if [ "${item}" = "${needle}" ]; then
                return 0
              fi
            done
            return 1
          }

          if [ "${PR_HEAD_REPO}" != "${GH_REPO}" ]; then
            echo "reason=head-not-from-same-repo" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          has_opt_out_label="$(
            gh pr view "${PR_NUMBER}" \
              -R "${GH_REPO}" \
              --json labels \
              --jq 'any(.labels[]?; .name == "do-not-automerge")'
          )"

          if [ "${has_opt_out_label}" = 'true' ]; then
            echo "reason=opt-out-label-present" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(
            gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename'
          )

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "reason=no-files-changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for path in "${changed_files[@]}"; do
            if ! contains "${path}" "${allowed_paths[@]}"; then
              echo "reason=changed-file-not-allowlisted:${path}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "reason=eligible" >> "$GITHUB_OUTPUT"

      - name: Eligibility summary
        shell: bash
        run: |
          set -euo pipefail
          echo "eligible=${{ steps.gates.outputs.eligible }}"
          echo "reason=${{ steps.gates.outputs.reason }}"

      - name: Wait for required release checks
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          required_checks=(
            'Semantic Commits|Lint commit messages'
            'Semantic Pull Request|Validate PR title'
            'argo-lint|lint'
            'kubeconform|validate'
            'torghut-ci|Pyright'
            'torghut-ci|Bytecode + lint + migration guard'
            'torghut-ci|Pytest shard 0'
            'torghut-ci|Pytest shard 1'
            'torghut-ci|Pytest shard 2'
            'torghut-ci|Pytest shard 3'
            'torghut-ci|Bytecode + pytest + coverage'
          )

          deadline=$((SECONDS + 2700))
          while true; do
            check_lines="$(
              gh pr checks "${PR_NUMBER}" \
                -R "${GH_REPO}" \
                --json name,state,workflow \
                --jq '.[] | [.workflow, .name, .state] | @tsv'
            )"

            pending=()
            for check in "${required_checks[@]}"; do
              IFS='|' read -r workflow name <<< "${check}"
              state="$(
                printf '%s\n' "${check_lines}" |
                  awk -F '\t' \
                    -v workflow="${workflow}" \
                    -v name="${name}" \
                    '$1 == workflow && $2 == name { print $3; found = 1; exit } END { if (!found) print "MISSING" }'
              )"

              case "${state}" in
                SUCCESS)
                  ;;
                FAILURE | ERROR | CANCELLED | SKIPPED | TIMED_OUT | ACTION_REQUIRED | STARTUP_FAILURE)
                  echo "Required check failed: ${workflow} / ${name} -> ${state}"
                  exit 1
                  ;;
                *)
                  pending+=("${workflow} / ${name} -> ${state}")
                  ;;
              esac
            done

            if [ "${#pending[@]}" -eq 0 ]; then
              echo "All required Torghut release checks passed."
              break
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for required release checks:"
              printf '%s\n' "${pending[@]}"
              exit 1
            fi

            echo "Waiting for required release checks:"
            printf '%s\n' "${pending[@]}"
            sleep 15
          done

      - name: Enable squash auto-merge
        if: steps.gates.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          auto_merge_enabled="$(
            gh pr view "${PR_NUMBER}" \
              -R "${GH_REPO}" \
              --json autoMergeRequest \
              --jq '.autoMergeRequest != null'
          )"
          if [ "${auto_merge_enabled}" = 'true' ]; then
            echo "Auto-merge already enabled for PR #${PR_NUMBER}"
            exit 0
          fi
          gh pr merge "${PR_NUMBER}" -R "${GH_REPO}" --auto --squash
