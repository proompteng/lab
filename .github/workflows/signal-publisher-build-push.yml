name: signal-publisher-build-push

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'services/signal-publisher/**'
      - 'nix/images/signal-publisher.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'flake.nix'
      - 'flake.lock'
      - 'bun.lock'
      - 'package.json'
  pull_request:
    paths:
      - 'services/signal-publisher/**'
      - 'nix/images/signal-publisher.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'flake.nix'
      - 'flake.lock'
      - 'bun.lock'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  image:
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: signal-publisher
      package_attr: signal-publisher-image
      tag: sha-${{ github.event.pull_request.head.sha || github.sha }}
      pr_number: ''
      latest: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      publish_on_dispatch: true
      release_artifact_name: ${{ github.event_name != 'pull_request' && 'signal-publisher-release-contract' || '' }}
    secrets: inherit
