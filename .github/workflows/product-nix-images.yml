name: product-nix-images

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'apps/app/**'
      - 'apps/docs/**'
      - 'apps/landing/**'
      - 'apps/olden/**'
      - 'apps/synthesis/**'
      - 'packages/backend/**'
      - 'packages/design/**'
      - 'nix/images/app.nix'
      - 'nix/images/docs.nix'
      - 'nix/images/olden.nix'
      - 'nix/images/proompteng.nix'
      - 'nix/images/synthesis.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'flake.lock'
      - 'bun.lock'
      - 'package.json'
  push:
    branches:
      - main
    paths:
      - 'apps/app/**'
      - 'apps/docs/**'
      - 'apps/landing/**'
      - 'apps/olden/**'
      - 'apps/synthesis/**'
      - 'packages/backend/**'
      - 'packages/design/**'
      - 'nix/images/app.nix'
      - 'nix/images/docs.nix'
      - 'nix/images/olden.nix'
      - 'nix/images/proompteng.nix'
      - 'nix/images/synthesis.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'flake.lock'
      - 'bun.lock'
      - 'package.json'
  workflow_dispatch:
    inputs:
      build_proompteng:
        description: Build and publish apps/landing image
        required: false
        type: boolean
        default: true
      build_app:
        description: Build and publish apps/app image
        required: false
        type: boolean
        default: true
      build_synthesis:
        description: Build and publish apps/synthesis image
        required: false
        type: boolean
        default: true
      build_docs:
        description: Build and publish apps/docs image
        required: false
        type: boolean
        default: true
      build_olden:
        description: Build and publish apps/olden image
        required: false
        type: boolean
        default: true

concurrency:
  group: product-nix-images-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: arc-amd64
    permissions:
      contents: read
    outputs:
      proompteng: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.proompteng || steps.filter.outputs.proompteng }}
      app: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.app || steps.filter.outputs.app }}
      synthesis: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.synthesis || steps.filter.outputs.synthesis }}
      docs: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.docs || steps.filter.outputs.docs }}
      olden: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.olden || steps.filter.outputs.olden }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for product image input changes
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            proompteng:
              - 'apps/landing/**'
              - 'packages/backend/**'
              - 'packages/design/**'
              - 'nix/images/proompteng.nix'
              - 'nix/images/bun-workspace-service.nix'
              - 'nix/packages.nix'
              - 'nix/cache-push.sh'
              - 'nix/oci-*.sh'
              - 'nix/ci-*.sh'
              - 'flake.lock'
              - 'bun.lock'
              - 'package.json'
            app:
              - 'apps/app/**'
              - 'packages/design/**'
              - 'nix/images/app.nix'
              - 'nix/images/bun-workspace-service.nix'
              - 'nix/packages.nix'
              - 'nix/cache-push.sh'
              - 'nix/oci-*.sh'
              - 'nix/ci-*.sh'
              - 'flake.lock'
              - 'bun.lock'
              - 'package.json'
            synthesis:
              - 'apps/synthesis/**'
              - 'packages/design/**'
              - 'nix/images/synthesis.nix'
              - 'nix/images/bun-workspace-service.nix'
              - 'nix/packages.nix'
              - 'nix/cache-push.sh'
              - 'nix/oci-*.sh'
              - 'nix/ci-*.sh'
              - 'flake.lock'
              - 'bun.lock'
              - 'package.json'
            docs:
              - 'apps/docs/**'
              - 'packages/design/**'
              - 'nix/images/docs.nix'
              - 'nix/images/bun-workspace-service.nix'
              - 'nix/packages.nix'
              - 'nix/cache-push.sh'
              - 'nix/oci-*.sh'
              - 'nix/ci-*.sh'
              - 'flake.lock'
              - 'bun.lock'
              - 'package.json'
            olden:
              - 'apps/olden/**'
              - 'packages/design/**'
              - 'nix/images/olden.nix'
              - 'nix/images/bun-workspace-service.nix'
              - 'nix/packages.nix'
              - 'nix/cache-push.sh'
              - 'nix/oci-*.sh'
              - 'nix/ci-*.sh'
              - 'flake.lock'
              - 'bun.lock'
              - 'package.json'

      - name: Manual build selection
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "proompteng=${{ github.event.inputs.build_proompteng }}"
            echo "app=${{ github.event.inputs.build_app }}"
            echo "synthesis=${{ github.event.inputs.build_synthesis }}"
            echo "docs=${{ github.event.inputs.build_docs }}"
            echo "olden=${{ github.event.inputs.build_olden }}"
          } >> "$GITHUB_OUTPUT"

  build-proompteng:
    needs: changes
    if: needs.changes.outputs.proompteng == 'true'
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: proompteng
      package_attr: proompteng-image
      tag: sha-${{ github.sha }}
      latest: true
      release_artifact_name: proompteng-release-contract
    secrets: inherit

  build-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: app
      package_attr: app-image
      tag: sha-${{ github.sha }}
      latest: true
      release_artifact_name: app-release-contract
    secrets: inherit

  build-synthesis:
    needs: changes
    if: needs.changes.outputs.synthesis == 'true'
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: synthesis
      package_attr: synthesis-image
      tag: sha-${{ github.sha }}
      latest: true
      release_artifact_name: synthesis-release-contract
    secrets: inherit

  build-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: docs
      package_attr: docs-image
      tag: sha-${{ github.sha }}
      latest: true
      release_artifact_name: docs-release-contract
    secrets: inherit

  build-olden:
    needs: changes
    if: needs.changes.outputs.olden == 'true'
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: olden
      package_attr: olden-image
      tag: sha-${{ github.sha }}
      latest: true
      release_artifact_name: olden-release-contract
    secrets: inherit
