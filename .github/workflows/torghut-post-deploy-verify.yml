name: torghut-post-deploy-verify

on:
  push:
    branches:
      - main
    paths:
      - 'argocd/applications/torghut/**'
      - 'argocd/applications/torghut-forecast/**'
  workflow_dispatch:
    inputs:
      expected_revision:
        description: Optional full commit SHA expected in Argo sync revision
        required: false
        type: string
      inspect_mode:
        description: Run the March 18 30-minute inspection/replay path instead of normal post-deploy verification
        required: false
        default: 'false'
        type: string
      trading_day:
        description: Trading day to replay when inspect_mode=true
        required: false
        default: '2026-03-18'
        type: string
      start_utc:
        description: Inclusive replay window start UTC when inspect_mode=true
        required: false
        default: '2026-03-18T13:30:00Z'
        type: string
      end_utc:
        description: Exclusive replay window end UTC when inspect_mode=true
        required: false
        default: '2026-03-18T14:00:00Z'
        type: string

concurrency:
  group: torghut-post-deploy-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.inspect_mode != 'true' }}
    runs-on: arc-arm64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.2

      - name: Configure in-cluster kubeconfig when context is missing
        shell: bash
        run: |
          set -euo pipefail

          if kubectl config current-context >/dev/null 2>&1; then
            echo "Kubectl context already configured"
            exit 0
          fi

          if [ -z "${KUBERNETES_SERVICE_HOST:-}" ] || [ -z "${KUBERNETES_SERVICE_PORT:-}" ]; then
            echo "KUBERNETES_SERVICE_HOST/PORT are not set and no kubectl context exists"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
            echo "Service account token is missing"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/ca.crt ]; then
            echo "Service account CA cert is missing"
            exit 1
          fi

          KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"

          kubectl config set-cluster in-cluster \
            --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            --embed-certs=true \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-credentials gha-runner \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-context in-cluster \
            --cluster=in-cluster \
            --user=gha-runner \
            --namespace=torghut \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config use-context in-cluster --kubeconfig="${KUBECONFIG_PATH}"

      - name: Validate kubectl context
        shell: bash
        run: |
          set -euo pipefail
          kubectl config current-context

      - name: Verify Argo applications, workloads, and health endpoints
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_REVISION_INPUT: ${{ inputs.expected_revision || '' }}
        run: |
          set -euo pipefail

          EXPECTED_REVISION=''
          if [ "${EVENT_NAME}" = "push" ]; then
            EXPECTED_REVISION="${GITHUB_SHA}"
          elif [ -n "${EXPECTED_REVISION_INPUT}" ]; then
            EXPECTED_REVISION="${EXPECTED_REVISION_INPUT}"
          fi

          for app in torghut torghut-forecast; do
            for attempt in $(seq 1 90); do
              STATUS="$(kubectl get application "${app}" -n argocd -o jsonpath='{.status.sync.status} {.status.health.status} {.status.sync.revision}')"
              SYNC_STATUS="$(echo "${STATUS}" | awk '{print $1}')"
              HEALTH_STATUS="$(echo "${STATUS}" | awk '{print $2}')"
              REVISION="$(echo "${STATUS}" | awk '{print $3}')"

              REVISION_OK='true'
              if [ -n "${EXPECTED_REVISION}" ]; then
                if [ "${REVISION}" = "${EXPECTED_REVISION}" ]; then
                  REVISION_OK='true'
                elif git merge-base --is-ancestor "${EXPECTED_REVISION}" "${REVISION}" >/dev/null 2>&1; then
                  REVISION_OK='true'
                else
                  REVISION_OK='false'
                fi
              fi

              if [ "${SYNC_STATUS}" = 'Synced' ] && [ "${HEALTH_STATUS}" = 'Healthy' ] && [ "${REVISION_OK}" = 'true' ]; then
                break
              fi

              if [ "${attempt}" -eq 90 ]; then
                echo "Argo application ${app} did not become Synced/Healthy with expected revision"
                exit 1
              fi
              sleep 10
            done
          done

          kubectl rollout status deployment/torghut-ws -n torghut --timeout=10m
          kubectl rollout status deployment/torghut-forecast -n torghut --timeout=10m

          set +e
          KNSVC_READY="$(kubectl get ksvc torghut -n torghut -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}' 2> /tmp/torghut-ksvc-ready.err)"
          KNSVC_READY_STATUS=$?
          set -e
          if [ "${KNSVC_READY_STATUS}" -ne 0 ]; then
            if grep -qi 'forbidden' /tmp/torghut-ksvc-ready.err; then
              echo "Skipping Knative Service readiness check: runner lacks permission to read services.serving.knative.dev/ksvc"
            elif grep -qi 'not found' /tmp/torghut-ksvc-ready.err; then
              echo "Knative Service torghut was not found"
              cat /tmp/torghut-ksvc-ready.err
              exit 1
            else
              echo "Failed to read Knative Service torghut"
              cat /tmp/torghut-ksvc-ready.err
              exit 1
            fi
          elif [ "${KNSVC_READY}" != 'True' ]; then
            echo "Knative Service torghut is not Ready"
            exit 1
          fi

          curl -fsS http://torghut.torghut.svc.cluster.local/trading/status >/tmp/torghut-status.json
          curl -fsS http://torghut-ws.torghut.svc.cluster.local/readyz >/tmp/torghut-ws-ready.json
          curl -fsS http://torghut-forecast.torghut.svc.cluster.local:8089/readyz >/tmp/torghut-forecast-ready.json

  inspect-and-replay:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.inspect_mode == 'true' }}
    runs-on: arc-arm64
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.2

      - name: Configure in-cluster kubeconfig when context is missing
        shell: bash
        run: |
          set -euo pipefail

          if kubectl config current-context >/dev/null 2>&1; then
            echo "Kubectl context already configured"
            exit 0
          fi

          if [ -z "${KUBERNETES_SERVICE_HOST:-}" ] || [ -z "${KUBERNETES_SERVICE_PORT:-}" ]; then
            echo "KUBERNETES_SERVICE_HOST/PORT are not set and no kubectl context exists"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
            echo "Service account token is missing"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/ca.crt ]; then
            echo "Service account CA cert is missing"
            exit 1
          fi

          KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"

          kubectl config set-cluster in-cluster \
            --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            --embed-certs=true \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-credentials gha-runner \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-context in-cluster \
            --cluster=in-cluster \
            --user=gha-runner \
            --namespace=torghut \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config use-context in-cluster --kubeconfig="${KUBECONFIG_PATH}"

      - name: Snapshot current system state
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/state
          mkdir -p artifacts/state/http

          fetch_json() {
            local url="$1"
            local body_path="$2"
            local status_path="$3"
            local http_code

            http_code="$(curl -sS -o "${body_path}" -w '%{http_code}' "${url}" || true)"
            printf '%s\n' "${http_code}" > "${status_path}"
          }

          kubectl get application torghut -n argocd -o json > artifacts/state/argocd-torghut.json
          kubectl get application torghut-forecast -n argocd -o json > artifacts/state/argocd-torghut-forecast.json
          kubectl get application jangar -n argocd -o json > artifacts/state/argocd-jangar.json

          fetch_json \
            http://torghut.torghut.svc.cluster.local/trading/status \
            artifacts/state/http/torghut-trading-status.json \
            artifacts/state/http/torghut-trading-status.status
          fetch_json \
            http://torghut.torghut.svc.cluster.local/readyz \
            artifacts/state/http/torghut-readyz.json \
            artifacts/state/http/torghut-readyz.status
          fetch_json \
            http://torghut.torghut.svc.cluster.local/trading/health \
            artifacts/state/http/torghut-trading-health.json \
            artifacts/state/http/torghut-trading-health.status
          fetch_json \
            http://torghut.torghut.svc.cluster.local/trading/empirical-jobs \
            artifacts/state/http/torghut-empirical-jobs.json \
            artifacts/state/http/torghut-empirical-jobs.status
          fetch_json \
            'http://jangar.jangar.svc.cluster.local:8080/api/agents/control-plane/status?namespace=agents' \
            artifacts/state/http/jangar-agents-status.json \
            artifacts/state/http/jangar-agents-status.status
          fetch_json \
            'http://jangar.jangar.svc.cluster.local:8080/api/torghut/trading/control-plane/quant/health?account=paper&window=1d' \
            artifacts/state/http/jangar-quant-health.json \
            artifacts/state/http/jangar-quant-health.status

      - name: Build March 18 open-30 manifest
        id: manifest
        shell: bash
        env:
          TRADING_DAY: ${{ inputs.trading_day }}
          START_UTC: ${{ inputs.start_utc }}
          END_UTC: ${{ inputs.end_utc }}
        run: |
          set -euo pipefail

          RUN_ID="sim-2026-03-18-open30-${GITHUB_RUN_ID}"
          MANIFEST_PATH="${RUNNER_TEMP}/torghut-mar18-open30.yaml"
          TORGHUT_DIGEST="$(python - <<'PY'
          from pathlib import Path
          import re
          text = Path('argocd/applications/torghut/knative-service.yaml').read_text()
          match = re.search(r'image:\s*registry\.ide-newton\.ts\.net/lab/torghut@(sha256:[0-9a-f]{64})', text)
          if not match:
              raise SystemExit('torghut image digest not found')
          print(match.group(1))
          PY
          )"
          FORECAST_DIGEST="$(python - <<'PY'
          from pathlib import Path
          import re
          text = Path('argocd/applications/torghut-forecast/deployment.yaml').read_text()
          match = re.search(r'image:\s*registry\.ide-newton\.ts\.net/lab/torghut@(sha256:[0-9a-f]{64})', text)
          if not match:
              raise SystemExit('forecast image digest not found')
          print(match.group(1))
          PY
          )"

          cat > "${MANIFEST_PATH}" <<EOF
          dataset_id: torghut-open30-${TRADING_DAY//-/}
          dataset_snapshot_ref: torghut-open30-${TRADING_DAY//-/}
          candidate_id: intraday_tsmom_v1@prod
          baseline_candidate_id: intraday_tsmom_v1@baseline
          strategy_spec_ref: strategy-specs/intraday_tsmom_v1@1.1.0.json
          model_refs:
            - rules/intraday_tsmom_v1
          runtime_version_refs:
            - services/torghut@${TORGHUT_DIGEST}
            - services/torghut-forecast@${FORECAST_DIGEST}
          cachePolicy: refresh
          performance:
            replayProfile: open_30m
            dumpFormat: jsonl.zst
          ta_restore:
            mode: required
          window:
            profile: us_equities_regular
            trading_day: '${TRADING_DAY}'
            timezone: America/New_York
            start: '${START_UTC}'
            end: '${END_UTC}'
            min_coverage_minutes: 30
            strict_coverage_ratio: 0.95
          kafka:
            bootstrap_servers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
            runtime_bootstrap_servers: kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
            security_protocol: SASL_PLAINTEXT
            sasl_mechanism: SCRAM-SHA-512
            sasl_username: kafka-codex-credentials
            sasl_password_env: TORGHUT_SIM_KAFKA_PASSWORD
            runtime_security_protocol: SASL_PLAINTEXT
            runtime_sasl_mechanism: SCRAM-SHA-512
            runtime_sasl_username: kafka-codex-credentials
            runtime_sasl_password_env: TORGHUT_SIM_KAFKA_PASSWORD
            default_partitions: 8
            replication_factor: 1
          clickhouse:
            http_url: http://torghut-clickhouse.torghut.svc.cluster.local:8123
            username: torghut
            password_env: TORGHUT_CLICKHOUSE_PASSWORD
            password_secret_name: torghut-clickhouse-auth
            password_secret_key: torghut_password
            secret_namespace: torghut
            simulation_database: torghut_sim_2026_03_18_open30_${GITHUB_RUN_ID}
          postgres:
            admin_dsn: postgresql://postgres@torghut-db-rw.torghut.svc.cluster.local:5432/postgres
            admin_dsn_password_env: TORGHUT_POSTGRES_ADMIN_PASSWORD
            simulation_dsn: postgresql://torghut_app@torghut-db-rw.torghut.svc.cluster.local:5432/torghut_sim_2026_03_18_open30_${GITHUB_RUN_ID}
            simulation_dsn_password_env: TORGHUT_POSTGRES_PASSWORD
            runtime_simulation_dsn: postgresql://torghut_app@torghut-db-rw.torghut.svc.cluster.local:5432/torghut_sim_2026_03_18_open30_${GITHUB_RUN_ID}
            runtime_simulation_dsn_password_env: TORGHUT_POSTGRES_PASSWORD
            migrations_command: /opt/venv/bin/alembic upgrade heads
          runtime:
            target_mode: dedicated_service
            namespace: torghut
            ta_configmap: torghut-ta-sim-config
            ta_deployment: torghut-ta-sim
            torghut_service: torghut-sim
            torghut_forecast_service: torghut-forecast-sim
            output_root: artifacts/torghut/simulations
          rollouts:
            enabled: true
            namespace: torghut
            runtime_template: torghut-simulation-runtime-ready
            activity_template: torghut-simulation-activity
            teardown_template: torghut-simulation-teardown-clean
            artifact_template: torghut-simulation-artifact-bundle
          replay:
            pace_mode: max_throughput
            acceleration: 1
            max_sleep_seconds: 0
            auto_offset_reset: earliest
            flush_every_records: 50000
            flush_timeout_seconds: 60
            final_flush_timeout_seconds: 180
            status_update_every_records: 25000
            status_update_every_seconds: 15
          monitor:
            timeout_seconds: 7200
            poll_seconds: 15
            min_trade_decisions: 1
            min_executions: 1
            min_execution_tca_metrics: 1
            min_execution_order_events: 1
            cursor_grace_seconds: 120
          argocd:
            manage_automation: true
            applicationset_name: product
            applicationset_namespace: argocd
            app_name: torghut
            desired_mode_during_run: manual
            restore_mode_after_run: previous
            verify_timeout_seconds: 900
          reporting:
            commission_bps: '0'
            per_trade_fee: '0'
          EOF

          {
            echo "run_id=${RUN_ID}"
            echo "manifest_path=${MANIFEST_PATH}"
          } >> "${GITHUB_OUTPUT}"

      - name: Submit historical replay via Jangar control plane
        id: submit
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/replay
          REQUEST_BODY="${RUNNER_TEMP}/simulation-run-request.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import yaml

          manifest_path = Path(os.environ['MANIFEST_PATH'])
          manifest = yaml.safe_load(manifest_path.read_text(encoding='utf-8'))
          payload = {
              'runId': os.environ['RUN_ID'],
              'manifest': manifest,
              'forceReplay': False,
              'forceDump': True,
              'outputRoot': f"artifacts/torghut/simulations/open30-{os.environ['GITHUB_RUN_ID']}",
              'metadata': {
                  'submittedFrom': 'github-actions',
                  'githubRunId': os.environ['GITHUB_RUN_ID'],
                  'githubRunAttempt': os.environ['GITHUB_RUN_ATTEMPT'],
              },
          }
          Path(os.environ['REQUEST_BODY']).write_text(json.dumps(payload), encoding='utf-8')
          PY

          ACCEPTED='false'
          for attempt in $(seq 1 24); do
            HTTP_CODE="$(
              curl -sS \
                -o artifacts/replay/submit-response.json \
                -w '%{http_code}' \
                -X POST \
                -H 'content-type: application/json' \
                -H 'x-user: github-actions' \
                --data @"${REQUEST_BODY}" \
                http://jangar.jangar.svc.cluster.local:8080/api/torghut/simulation/runs || true
            )"
            printf '%s\n' "${HTTP_CODE}" > artifacts/replay/submit-response.status
            if [ "${HTTP_CODE}" = '202' ]; then
              ACCEPTED='true'
              break
            fi
            if [ "${HTTP_CODE}" = '503' ]; then
              sleep 5
              continue
            fi
            cat artifacts/replay/submit-response.json
            exit 1
          done

          if [ "${ACCEPTED}" != 'true' ]; then
            echo 'Timed out waiting for the Jangar leader to accept simulation submission'
            cat artifacts/replay/submit-response.json
            exit 1
          fi

          RUN_ID="$(jq -r '.run.runId' artifacts/replay/submit-response.json)"
          STATUS_PATH="$(jq -r '.status_url' artifacts/replay/submit-response.json)"
          ARTIFACTS_PATH="$(jq -r '.artifacts_url' artifacts/replay/submit-response.json)"
          STREAM_PATH="$(jq -r '.stream_url' artifacts/replay/submit-response.json)"
          WORKFLOW_NAME="$(jq -r '.run.workflowName // empty' artifacts/replay/submit-response.json)"
          {
            echo "run_id=${RUN_ID}"
            echo "status_path=${STATUS_PATH}"
            echo "artifacts_path=${ARTIFACTS_PATH}"
            echo "stream_path=${STREAM_PATH}"
            echo "workflow_name=${WORKFLOW_NAME}"
          } >> "${GITHUB_OUTPUT}"
        env:
          MANIFEST_PATH: ${{ steps.manifest.outputs.manifest_path }}
          REQUEST_BODY: ${{ runner.temp }}/simulation-run-request.json
          RUN_ID: ${{ steps.manifest.outputs.run_id }}

      - name: Wait for replay completion via Jangar control plane
        shell: bash
        run: |
          set -euo pipefail

          STATUS_URL="http://jangar.jangar.svc.cluster.local:8080${{ steps.submit.outputs.status_path }}"
          mkdir -p artifacts/replay/history
          for attempt in $(seq 1 480); do
            HTTP_CODE="$(curl -sS -o artifacts/replay/run-status.json -w '%{http_code}' "${STATUS_URL}" || true)"
            printf '%s\n' "${HTTP_CODE}" > artifacts/replay/run-status.status
            if [ "${HTTP_CODE}" != '200' ]; then
              cat artifacts/replay/run-status.json
              exit 1
            fi

            cp artifacts/replay/run-status.json "artifacts/replay/history/run-status-${attempt}.json"
            STATUS="$(jq -r '.run.status // empty' artifacts/replay/run-status.json)"
            WORKFLOW_PHASE="$(jq -r '.run.workflowPhase // empty' artifacts/replay/run-status.json)"
            echo "run=${{ steps.submit.outputs.run_id }} status=${STATUS} workflow_phase=${WORKFLOW_PHASE} attempt=${attempt}"
            if [ "${STATUS}" = "succeeded" ]; then
              exit 0
            fi
            if [ "${STATUS}" = "failed" ] || [ "${STATUS}" = "cancelled" ]; then
              cat artifacts/replay/run-status.json
              exit 1
            fi
            sleep 15
          done

          echo "Replay workflow timed out"
          exit 1

      - name: Collect workflow status and artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/replay
          if [ -n "${{ steps.submit.outputs.status_path }}" ]; then
            curl -sS \
              "http://jangar.jangar.svc.cluster.local:8080${{ steps.submit.outputs.status_path }}" \
              > artifacts/replay/run-status-final.json || true
          fi
          if [ -n "${{ steps.submit.outputs.artifacts_path }}" ]; then
            curl -sS \
              "http://jangar.jangar.svc.cluster.local:8080${{ steps.submit.outputs.artifacts_path }}" \
              > artifacts/replay/run-artifacts.json || true
          fi

      - name: Assert non-zero execution proof
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          REPORT_SOURCE='artifacts/replay/run-status-final.json'
          if [ ! -f "${REPORT_SOURCE}" ]; then
            REPORT_SOURCE='artifacts/replay/run-status.json'
          fi

          jq '.run.finalVerdict | {status,decisions,executions,executionTcaMetrics,executionOrderEvents,activityClassification,legacyPathCount,imageDigest}' \
            "${REPORT_SOURCE}" | tee artifacts/replay/final-snapshot.json
          jq '.run | {runId,status,workflowName,workflowPhase,cacheStatus,laneId,artifactRoot,outputRoot}' \
            "${REPORT_SOURCE}" | tee artifacts/replay/run-summary.json

          EXECUTIONS="$(jq -r '.run.finalVerdict.executions // 0' "${REPORT_SOURCE}")"
          DECISIONS="$(jq -r '.run.finalVerdict.decisions // 0' "${REPORT_SOURCE}")"
          LEGACY_PATHS="$(jq -r '.run.finalVerdict.legacyPathCount // 0' "${REPORT_SOURCE}")"
          if [ "${DECISIONS}" -lt 1 ] || [ "${EXECUTIONS}" -lt 1 ]; then
            echo "Replay did not produce non-zero decisions/executions"
            exit 1
          fi
          if [ "${LEGACY_PATHS}" != "0" ]; then
            echo "Legacy path count is non-zero: ${LEGACY_PATHS}"
            exit 1
          fi

      - name: Upload inspection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: torghut-mar18-open30-inspection
          path: artifacts
          if-no-files-found: error
          retention-days: 7

      - name: Prepare rollback manifests
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: rollback
        shell: bash
        run: |
          set -euo pipefail

          HEAD_MESSAGE="$(git log -1 --pretty=%s)"
          if [[ "${HEAD_MESSAGE}" == rollback\(torghut\):* ]]; then
            echo "Skipping rollback PR because current commit is already a rollback"
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "No parent commit available for rollback"
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout --quiet HEAD^ -- \
            argocd/applications/torghut \
            argocd/applications/torghut-forecast

          if git diff --quiet -- \
            argocd/applications/torghut \
            argocd/applications/torghut-forecast; then
            echo "No rollback diff detected"
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_rollback=true" >> "$GITHUB_OUTPUT"

      - name: Open rollback pull request
        if: failure() && steps.rollback.outputs.should_rollback == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/torghut-rollback-${{ github.run_id }}-${{ github.run_attempt }}
          base: main
          title: 'rollback(torghut): revert failed promotion ${{ github.sha }}'
          commit-message: 'rollback(torghut): revert failed promotion ${{ github.sha }}'
          delete-branch: true
          add-paths: |
            argocd/applications/torghut
            argocd/applications/torghut-forecast
          body: |
            ## Summary
            Automatic rollback created because `torghut-post-deploy-verify` failed on `main`.

            - Failed commit: `${{ github.sha }}`
            - Workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            - Rollback source: `HEAD^` manifests from the failed run checkout
