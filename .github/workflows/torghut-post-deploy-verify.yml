name: torghut-post-deploy-verify

on:
  push:
    branches:
      - main
    paths:
      - "argocd/applications/torghut/**"
      - "argocd/applications/torghut-options/**"
  workflow_dispatch:
    inputs:
      expected_revision:
        description: Optional full commit SHA expected in Argo sync revision
        required: false
        type: string

concurrency:
  group: torghut-post-deploy-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: arc-arm64
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.2

      - name: Configure in-cluster kubeconfig when context is missing
        shell: bash
        run: |
          set -euo pipefail

          if kubectl config current-context >/dev/null 2>&1; then
            echo "Kubectl context already configured"
            exit 0
          fi

          if [ -z "${KUBERNETES_SERVICE_HOST:-}" ] || [ -z "${KUBERNETES_SERVICE_PORT:-}" ]; then
            echo "KUBERNETES_SERVICE_HOST/PORT are not set and no kubectl context exists"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
            echo "Service account token is missing"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/ca.crt ]; then
            echo "Service account CA cert is missing"
            exit 1
          fi

          KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"

          kubectl config set-cluster in-cluster \
            --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            --embed-certs=true \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-credentials gha-runner \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-context in-cluster \
            --cluster=in-cluster \
            --user=gha-runner \
            --namespace=torghut \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config use-context in-cluster --kubeconfig="${KUBECONFIG_PATH}"

      - name: Validate kubectl context
        shell: bash
        run: |
          set -euo pipefail
          kubectl config current-context

      - name: Verify Argo applications, workloads, and health endpoints
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_REVISION_INPUT: ${{ inputs.expected_revision || '' }}
        run: |
          set -euo pipefail

          EXPECTED_REVISION=''
          if [ "${EVENT_NAME}" = "push" ]; then
            EXPECTED_REVISION="${GITHUB_SHA}"
          elif [ -n "${EXPECTED_REVISION_INPUT}" ]; then
            EXPECTED_REVISION="${EXPECTED_REVISION_INPUT}"
          fi
          if [ -n "${EXPECTED_REVISION}" ]; then
            git fetch --no-tags --depth=200 origin main
          fi

          ensure_revision_known() {
            local revision="$1"
            if [ -z "${revision}" ]; then
              return 1
            fi
            if git cat-file -e "${revision}^{commit}" >/dev/null 2>&1; then
              return 0
            fi
            git fetch --no-tags --depth=200 origin main >/dev/null 2>&1 || true
            git cat-file -e "${revision}^{commit}" >/dev/null 2>&1
          }

          for app in torghut torghut-options; do
            for attempt in $(seq 1 90); do
              STATUS="$(kubectl get application "${app}" -n argocd -o jsonpath='{.status.sync.status} {.status.health.status} {.status.sync.revision} {.status.operationState.phase} {.status.operationState.syncResult.revision} {.status.history[-1].revision}')"
              SYNC_STATUS="$(echo "${STATUS}" | awk '{print $1}')"
              HEALTH_STATUS="$(echo "${STATUS}" | awk '{print $2}')"
              DESIRED_REVISION="$(echo "${STATUS}" | awk '{print $3}')"
              OPERATION_PHASE="$(echo "${STATUS}" | awk '{print $4}')"
              SYNC_RESULT_REVISION="$(echo "${STATUS}" | awk '{print $5}')"
              HISTORY_REVISION="$(echo "${STATUS}" | awk '{print $6}')"
              REVISION="${DESIRED_REVISION}"
              REVISION_OK='true'

              if [ -n "${EXPECTED_REVISION}" ]; then
                REVISION_OK='false'
                for candidate in "${DESIRED_REVISION}" "${SYNC_RESULT_REVISION}" "${HISTORY_REVISION}"; do
                  if [ -z "${candidate}" ]; then
                    continue
                  fi
                  if [ "${candidate}" = "${EXPECTED_REVISION}" ]; then
                    REVISION="${candidate}"
                    REVISION_OK='true'
                    break
                  fi
                  if ensure_revision_known "${candidate}" &&
                    git merge-base --is-ancestor "${EXPECTED_REVISION}" "${candidate}" >/dev/null 2>&1; then
                    REVISION="${candidate}"
                    REVISION_OK='true'
                    break
                  fi
                done
                if [ "${REVISION_OK}" != 'true' ]; then
                  if [ -n "${SYNC_RESULT_REVISION}" ]; then
                    REVISION="${SYNC_RESULT_REVISION}"
                  elif [ -n "${HISTORY_REVISION}" ]; then
                    REVISION="${HISTORY_REVISION}"
                  fi
                fi
              elif [ "${OPERATION_PHASE}" = 'Succeeded' ] && [ -n "${SYNC_RESULT_REVISION}" ]; then
                REVISION="${SYNC_RESULT_REVISION}"
              elif [ -z "${REVISION}" ] && [ -n "${HISTORY_REVISION}" ]; then
                REVISION="${HISTORY_REVISION}"
              fi

              if [ "${SYNC_STATUS}" = 'Synced' ] && [ "${HEALTH_STATUS}" = 'Healthy' ] && [ "${REVISION_OK}" = 'true' ]; then
                break
              fi

              if [ "${attempt}" -eq 90 ]; then
                echo "Argo application ${app} did not become Synced/Healthy with expected revision"
                exit 1
              fi
              echo "Attempt ${attempt}: ${app} sync=${SYNC_STATUS} health=${HEALTH_STATUS} revision=${REVISION} desired=${DESIRED_REVISION} operation=${OPERATION_PHASE} syncResult=${SYNC_RESULT_REVISION} history=${HISTORY_REVISION}"
              sleep 10
            done
          done

          kubectl rollout status deployment/torghut-ws -n torghut --timeout=10m

          set +e
          KNSVC_READY="$(kubectl get ksvc torghut -n torghut -o jsonpath='{.status.conditions[?(@.type==\"Ready\")].status}' 2> /tmp/torghut-ksvc-ready.err)"
          KNSVC_READY_STATUS=$?
          set -e
          if [ "${KNSVC_READY_STATUS}" -ne 0 ]; then
            if grep -qi 'forbidden' /tmp/torghut-ksvc-ready.err; then
              echo "Skipping Knative Service readiness check: runner lacks permission to read services.serving.knative.dev/ksvc"
            elif grep -qi 'not found' /tmp/torghut-ksvc-ready.err; then
              echo "Knative Service torghut was not found"
              cat /tmp/torghut-ksvc-ready.err
              exit 1
            else
              echo "Failed to read Knative Service torghut"
              cat /tmp/torghut-ksvc-ready.err
              exit 1
            fi
          elif [ "${KNSVC_READY}" != 'True' ]; then
            echo "Knative Service torghut is not Ready"
            exit 1
          fi

          EVIDENCE_DIR="${RUNNER_TEMP}/torghut-post-deploy"
          mkdir -p "${EVIDENCE_DIR}"

          TORGHUT_READYZ_HTTP_STATUS="$(
            curl -sS -o "${EVIDENCE_DIR}/torghut-readyz.json" -w '%{http_code}' \
              http://torghut.torghut.svc.cluster.local/readyz || true
          )"
          if [ -z "${TORGHUT_READYZ_HTTP_STATUS}" ] || [ "${TORGHUT_READYZ_HTTP_STATUS}" = '000' ]; then
            echo "Torghut /readyz did not return an HTTP response"
            exit 1
          fi
          echo "Torghut /readyz HTTP ${TORGHUT_READYZ_HTTP_STATUS}"

          curl -fsS http://torghut.torghut.svc.cluster.local/trading/status \
            >"${EVIDENCE_DIR}/torghut-status.json"
          curl -fsS http://torghut.torghut.svc.cluster.local/trading/revenue-repair \
            >"${EVIDENCE_DIR}/torghut-revenue-repair-digest.json"
          curl -fsS http://torghut-ws.torghut.svc.cluster.local/readyz \
            >"${EVIDENCE_DIR}/torghut-ws-ready.json"

          export TORGHUT_REVENUE_REPAIR_DIGEST="${EVIDENCE_DIR}/torghut-revenue-repair-digest.json"
          export TORGHUT_STATUS_PAYLOAD="${EVIDENCE_DIR}/torghut-status.json"
          bun run - <<'JS'
          const fs = require('node:fs')

          const ROUTE_BOARD_SCHEMA_VERSION = 'torghut.route-reacquisition-board.v1'

          const digestPath = process.env.TORGHUT_REVENUE_REPAIR_DIGEST
          const statusPath = process.env.TORGHUT_STATUS_PAYLOAD
          const summaryPath = process.env.GITHUB_STEP_SUMMARY
          if (!digestPath) {
            throw new Error('TORGHUT_REVENUE_REPAIR_DIGEST is unset')
          }
          if (!statusPath) {
            throw new Error('TORGHUT_STATUS_PAYLOAD is unset')
          }
          if (!summaryPath) {
            throw new Error('GITHUB_STEP_SUMMARY is unset')
          }

          const requireObject = (value, label) => {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
              throw new Error(`${label} must be an object`)
            }
            return value
          }

          const requireNonNegativeInteger = (value, label) => {
            const normalized = typeof value === 'number' ? value : Number(value)
            if (!Number.isInteger(normalized) || normalized < 0) {
              throw new Error(`${label} must be a non-negative integer`)
            }
            return normalized
          }

          const digest = JSON.parse(fs.readFileSync(digestPath, 'utf8'))
          const status = requireObject(JSON.parse(fs.readFileSync(statusPath, 'utf8')), 'torghut status payload')
          const repairQueue = digest.repair_queue
          if (!Array.isArray(repairQueue)) {
            throw new Error('torghut revenue repair digest missing repair_queue')
          }

          const routeBoard = requireObject(
            status.route_reacquisition_board,
            'torghut status route_reacquisition_board',
          )
          if (routeBoard.schema_version !== ROUTE_BOARD_SCHEMA_VERSION) {
            throw new Error(
              `torghut route board schema mismatch: expected ${ROUTE_BOARD_SCHEMA_VERSION}, got ${routeBoard.schema_version ?? 'missing'}`,
            )
          }
          const routeBoardSummary = requireObject(routeBoard.summary, 'torghut route board summary')
          const routeBoardRows = routeBoard.rows
          if (!Array.isArray(routeBoardRows)) {
            throw new Error('torghut route board rows must be an array')
          }
          const routeBoardRowCount = requireNonNegativeInteger(
            routeBoardSummary.row_count,
            'torghut route board summary.row_count',
          )
          if (routeBoardRows.length !== routeBoardRowCount) {
            throw new Error(
              `torghut route board row_count mismatch: summary=${routeBoardRowCount}, rows=${routeBoardRows.length}`,
            )
          }
          const zeroNotionalRowCount = requireNonNegativeInteger(
            routeBoardSummary.zero_notional_row_count,
            'torghut route board summary.zero_notional_row_count',
          )
          const expectedUnblockValue = requireNonNegativeInteger(
            routeBoardSummary.expected_unblock_value,
            'torghut route board summary.expected_unblock_value',
          )
          const capitalEligibleSymbolCount = requireNonNegativeInteger(
            routeBoardSummary.capital_eligible_symbol_count,
            'torghut route board summary.capital_eligible_symbol_count',
          )
          const stateCounts = requireObject(routeBoardSummary.state_counts, 'torghut route board summary.state_counts')
          const stateCountText = Object.entries(stateCounts)
            .map(([state, count]) => `${state}:${count}`)
            .join(', ')
          const topRepairSymbols = Array.isArray(routeBoardSummary.top_repair_symbols)
            ? routeBoardSummary.top_repair_symbols.map((symbol) => String(symbol)).filter(Boolean)
            : []

          const topRepairs = repairQueue
            .slice(0, 5)
            .filter((item) => item && typeof item === 'object' && !Array.isArray(item))
            .map((item) => {
              const code = item.code ?? 'unknown'
              const reason = item.reason ?? 'unknown'
              const dimension = item.dimension ?? 'unknown'
              return `- \`${code}\`: \`${reason}\` (${dimension})`
            })

          const capital = digest.capital && typeof digest.capital === 'object' && !Array.isArray(digest.capital)
            ? digest.capital
            : {}
          const blockers = Array.isArray(digest.blockers) ? digest.blockers : []
          const blockerReasons = blockers
            .filter((blocker) => blocker && typeof blocker === 'object' && !Array.isArray(blocker) && blocker.reason)
            .map((blocker) => String(blocker.reason))

          const lines = [
            '## Torghut Revenue Repair Digest',
            '',
            `- Business state: \`${digest.business_state ?? 'unknown'}\``,
            `- Revenue ready: \`${digest.revenue_ready ?? false}\``,
            `- Capital state: \`${capital.capital_state ?? 'unknown'}\``,
            `- Max notional: \`${capital.max_notional ?? 'unknown'}\``,
          ]
          if (blockerReasons.length > 0) {
            lines.push(`- Blockers: ${blockerReasons.map((reason) => `\`${reason}\``).join(', ')}`)
          }
          if (topRepairs.length > 0) {
            lines.push('', 'Top repair queue:', ...topRepairs)
          }
          lines.push(
            '',
            '## Torghut Route Reacquisition Board',
            '',
            `- Schema: \`${routeBoard.schema_version}\``,
            `- Board state: \`${routeBoard.state ?? 'unknown'}\``,
            `- Capital state: \`${routeBoard.capital_state ?? 'unknown'}\``,
            `- Rows: \`${routeBoardRowCount}\``,
            `- Zero-notional rows: \`${zeroNotionalRowCount}\``,
            `- Capital-eligible symbols: \`${capitalEligibleSymbolCount}\``,
            `- Expected unblock value: \`${expectedUnblockValue}\``,
            `- State counts: \`${stateCountText || 'none'}\``,
          )
          if (topRepairSymbols.length > 0) {
            lines.push(`- Top repair symbols: ${topRepairSymbols.map((symbol) => `\`${symbol}\``).join(', ')}`)
          }
          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`, 'utf8')
          JS

      - name: Prepare rollback manifests
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: rollback
        shell: bash
        run: |
          set -euo pipefail

          HEAD_MESSAGE="$(git log -1 --pretty=%s)"
          if [[ "${HEAD_MESSAGE}" == rollback\(torghut\):* || "${HEAD_MESSAGE}" == revert\(torghut\):* ]]; then
            echo "Skipping rollback PR because current commit is already a rollback"
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "No parent commit available for rollback"
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout --quiet HEAD^ -- \
            argocd/applications/torghut \
            argocd/applications/torghut-options

          if git diff --quiet HEAD -- \
            argocd/applications/torghut \
            argocd/applications/torghut-options; then
            echo "No rollback diff detected"
            echo "should_rollback=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_rollback=true" >> "$GITHUB_OUTPUT"

      - name: Open rollback pull request
        if: failure() && steps.rollback.outputs.should_rollback == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/torghut-rollback-${{ github.run_id }}-${{ github.run_attempt }}
          base: main
          title: "revert(torghut): rollback failed promotion ${{ github.sha }}"
          commit-message: "revert(torghut): rollback failed promotion ${{ github.sha }}"
          delete-branch: true
          add-paths: |
            argocd/applications/torghut
            argocd/applications/torghut-options
          body: |
            ## Summary
            Automatic rollback created because `torghut-post-deploy-verify` failed on `main`.

            - Failed commit: `${{ github.sha }}`
            - Workflow run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            - Rollback source: `HEAD^` manifests from the failed run checkout

      - name: Upload revenue repair evidence
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: torghut-revenue-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/torghut-post-deploy/*.json
          if-no-files-found: ignore
