name: torghut-post-deploy-verify

on:
  push:
    branches:
      - main
    paths:
      - 'argocd/applications/torghut/**'
      - 'argocd/applications/torghut-options/**'
  workflow_dispatch:
    inputs:
      expected_revision:
        description: Optional full commit SHA expected in Argo sync revision
        required: false
        type: string

concurrency:
  group: torghut-post-deploy-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: arc-arm64
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.2

      - name: Configure in-cluster kubeconfig when context is missing
        shell: bash
        run: |
          set -euo pipefail

          if kubectl config current-context >/dev/null 2>&1; then
            echo "Kubectl context already configured"
            exit 0
          fi

          if [ -z "${KUBERNETES_SERVICE_HOST:-}" ] || [ -z "${KUBERNETES_SERVICE_PORT:-}" ]; then
            echo "KUBERNETES_SERVICE_HOST/PORT are not set and no kubectl context exists"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
            echo "Service account token is missing"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/ca.crt ]; then
            echo "Service account CA cert is missing"
            exit 1
          fi

          KUBECONFIG_PATH="${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${KUBECONFIG_PATH}" >> "${GITHUB_ENV}"

          kubectl config set-cluster in-cluster \
            --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
            --embed-certs=true \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-credentials gha-runner \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config set-context in-cluster \
            --cluster=in-cluster \
            --user=gha-runner \
            --namespace=torghut \
            --kubeconfig="${KUBECONFIG_PATH}"

          kubectl config use-context in-cluster --kubeconfig="${KUBECONFIG_PATH}"

      - name: Validate kubectl context
        shell: bash
        run: |
          set -euo pipefail
          kubectl config current-context

      - name: Verify Argo applications, workloads, and health endpoints
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_REVISION_INPUT: ${{ inputs.expected_revision || '' }}
        run: |
          set -euo pipefail

          EXPECTED_REVISION=''
          if [ "${EVENT_NAME}" = "push" ]; then
            EXPECTED_REVISION="${GITHUB_SHA}"
          elif [ -n "${EXPECTED_REVISION_INPUT}" ]; then
            EXPECTED_REVISION="${EXPECTED_REVISION_INPUT}"
          fi
          if [ -n "${EXPECTED_REVISION}" ]; then
            git fetch --no-tags --depth=200 origin main
          fi

          ensure_revision_known() {
            local revision="$1"
            if [ -z "${revision}" ]; then
              return 1
            fi
            if git cat-file -e "${revision}^{commit}" >/dev/null 2>&1; then
              return 0
            fi
            git fetch --no-tags --depth=200 origin main >/dev/null 2>&1 || true
            git cat-file -e "${revision}^{commit}" >/dev/null 2>&1
          }

          request_argocd_sync() {
            local app="$1"
            local revision="$2"
            local active_operation
            local payload

            kubectl annotate application "${app}" -n argocd argocd.argoproj.io/refresh=hard --overwrite

            active_operation="$(kubectl get application "${app}" -n argocd -o jsonpath='{.operation.sync.revision}' 2>/dev/null || true)"
            if [ -n "${active_operation}" ]; then
              echo "Argo application ${app} already has a sync operation for revision ${active_operation}"
              return
            fi

            payload="$(
              SYNC_REVISION="${revision}" python3 - <<'PY'
          import json
          import os

          sync = {"prune": True}
          revision = os.environ.get("SYNC_REVISION", "")
          if revision:
              sync["revision"] = revision
          print(json.dumps({"operation": {"sync": sync}}))
          PY
            )"
            kubectl patch application "${app}" -n argocd --type merge -p "${payload}"
          }

          dump_argocd_app_diagnostics() {
            local app="$1"

            echo "Argo application ${app} status:"
            kubectl get application "${app}" -n argocd -o jsonpath='{.status.sync.status} {.status.health.status} {.status.sync.revision} {.status.operationState.phase} {.status.operationState.message}{"\n"}' || true
            echo "Argo application ${app} OutOfSync resources:"
            kubectl get application "${app}" -n argocd -o jsonpath='{range .status.resources[?(@.status=="OutOfSync")]}{.kind}{"/"}{.namespace}{"/"}{.name}{"\t"}{.status}{"\t"}{.health.status}{"\n"}{end}' || true
          }

          for app in torghut torghut-options; do
            request_argocd_sync "${app}" "${EXPECTED_REVISION}"
          done

          ARGO_SYNC_POLL_ATTEMPTS=150
          ARGO_SYNC_POLL_INTERVAL_SECONDS=2

          for app in torghut torghut-options; do
            for attempt in $(seq 1 "${ARGO_SYNC_POLL_ATTEMPTS}"); do
              STATUS="$(kubectl get application "${app}" -n argocd -o jsonpath='{.status.sync.status} {.status.health.status} {.status.sync.revision} {.status.operationState.phase} {.status.operationState.syncResult.revision} {.status.history[-1].revision}')"
              SYNC_STATUS="$(echo "${STATUS}" | awk '{print $1}')"
              HEALTH_STATUS="$(echo "${STATUS}" | awk '{print $2}')"
              DESIRED_REVISION="$(echo "${STATUS}" | awk '{print $3}')"
              OPERATION_PHASE="$(echo "${STATUS}" | awk '{print $4}')"
              SYNC_RESULT_REVISION="$(echo "${STATUS}" | awk '{print $5}')"
              HISTORY_REVISION="$(echo "${STATUS}" | awk '{print $6}')"
              REVISION="${DESIRED_REVISION}"
              REVISION_OK='true'

              if [ -n "${EXPECTED_REVISION}" ]; then
                REVISION_OK='false'
                for candidate in "${DESIRED_REVISION}" "${SYNC_RESULT_REVISION}" "${HISTORY_REVISION}"; do
                  if [ -z "${candidate}" ]; then
                    continue
                  fi
                  if [ "${candidate}" = "${EXPECTED_REVISION}" ]; then
                    REVISION="${candidate}"
                    REVISION_OK='true'
                    break
                  fi
                  if ensure_revision_known "${candidate}" &&
                    git merge-base --is-ancestor "${EXPECTED_REVISION}" "${candidate}" >/dev/null 2>&1; then
                    REVISION="${candidate}"
                    REVISION_OK='true'
                    break
                  fi
                done
                if [ "${REVISION_OK}" != 'true' ]; then
                  if [ -n "${SYNC_RESULT_REVISION}" ]; then
                    REVISION="${SYNC_RESULT_REVISION}"
                  elif [ -n "${HISTORY_REVISION}" ]; then
                    REVISION="${HISTORY_REVISION}"
                  fi
                fi
              elif [ "${OPERATION_PHASE}" = 'Succeeded' ] && [ -n "${SYNC_RESULT_REVISION}" ]; then
                REVISION="${SYNC_RESULT_REVISION}"
              elif [ -z "${REVISION}" ] && [ -n "${HISTORY_REVISION}" ]; then
                REVISION="${HISTORY_REVISION}"
              fi

              if [ "${SYNC_STATUS}" = 'Synced' ] && [ "${REVISION_OK}" = 'true' ]; then
                if [ "${HEALTH_STATUS}" = 'Healthy' ]; then
                  break
                fi
                if [ "${HEALTH_STATUS}" = 'Progressing' ] && [ "${OPERATION_PHASE}" = 'Succeeded' ]; then
                  echo "Argo application ${app} sync operation succeeded while health is Progressing; runtime checks will verify readiness"
                  break
                fi
                if [ "${app}" = 'torghut' ] && [ "${HEALTH_STATUS}" = 'Degraded' ] && [ "${OPERATION_PHASE}" = 'Succeeded' ]; then
                  echo "Torghut Argo health is Degraded after sync; continuing to runtime safety checks"
                  break
                fi
              fi

              if [ "${attempt}" -eq "${ARGO_SYNC_POLL_ATTEMPTS}" ]; then
                echo "Argo application ${app} did not become Synced/Healthy with expected revision"
                dump_argocd_app_diagnostics "${app}"
                exit 1
              fi
              echo "Attempt ${attempt}: ${app} sync=${SYNC_STATUS} health=${HEALTH_STATUS} revision=${REVISION} desired=${DESIRED_REVISION} operation=${OPERATION_PHASE} syncResult=${SYNC_RESULT_REVISION} history=${HISTORY_REVISION}"
              sleep "${ARGO_SYNC_POLL_INTERVAL_SECONDS}"
            done
          done

          KNSVC_READY_ATTEMPTS=60
          KNSVC_READY_INTERVAL_SECONDS=2

          wait_knative_service_ready() {
            local service="$1"
            local attempt
            local status
            local ready
            local latest_ready
            local latest_created
            local output
            local error_path="/tmp/${service}-ksvc-ready.err"

            for attempt in $(seq 1 "${KNSVC_READY_ATTEMPTS}"); do
              set +e
              output="$(
                kubectl get ksvc "${service}" -n torghut \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].status} {.status.latestReadyRevisionName} {.status.latestCreatedRevisionName}' \
                  2> "${error_path}"
              )"
              status=$?
              set -e

              if [ "${status}" -ne 0 ]; then
                if grep -qi 'not found' "${error_path}"; then
                  echo "Knative Service ${service} was not found"
                  cat "${error_path}"
                  exit 1
                fi
                echo "Failed to read Knative Service ${service}"
                cat "${error_path}"
                exit 1
              fi

              ready="$(echo "${output}" | awk '{print $1}')"
              latest_ready="$(echo "${output}" | awk '{print $2}')"
              latest_created="$(echo "${output}" | awk '{print $3}')"
              if [ "${ready}" = 'True' ]; then
                return 0
              fi

              if [ "${attempt}" -eq "${KNSVC_READY_ATTEMPTS}" ]; then
                echo "Knative Service ${service} did not become Ready after bounded retry window"
                kubectl get ksvc "${service}" -n torghut -o yaml || true
                exit 1
              fi

              echo "Attempt ${attempt}: Knative Service ${service} ready=${ready:-empty} latestReady=${latest_ready:-empty} latestCreated=${latest_created:-empty}"
              sleep "${KNSVC_READY_INTERVAL_SECONDS}"
            done
          }

          wait_knative_service_ready torghut
          wait_knative_service_ready torghut-sim

          for deployment in \
            torghut-options-catalog \
            torghut-options-enricher \
            torghut-options-ta \
            torghut-ta \
            torghut-ta-sim \
            torghut-ws \
            torghut-ws-options; do
            kubectl rollout status "deployment/${deployment}" -n torghut --timeout=10m
          done

          pull_failures="$(
            kubectl get pods -n torghut -o json |
              jq -r '
                .items[] as $pod
                | (($pod.status.initContainerStatuses // []) + ($pod.status.containerStatuses // []))[]?
                | select(((.state.waiting.reason // "") == "ImagePullBackOff") or ((.state.waiting.reason // "") == "ErrImagePull"))
                | select(.image | startswith("registry.ide-newton.ts.net/lab/torghut"))
                | [$pod.metadata.name, .name, .image, .state.waiting.reason] | @tsv
              '
          )"
          if [ -n "${pull_failures}" ]; then
            echo "Torghut-managed image pull failures remain after deploy:"
            printf '%s\n' "${pull_failures}"
            exit 1
          fi

          EVIDENCE_DIR="${RUNNER_TEMP}/torghut-post-deploy"
          mkdir -p "${EVIDENCE_DIR}"
          HTTP_CONNECT_TIMEOUT_SECONDS=5
          HTTP_MAX_TIME_SECONDS=15
          JSON_EVIDENCE_ATTEMPTS=3
          READYZ_EVIDENCE_ATTEMPTS=12
          PAPER_ROUTE_EVIDENCE_ATTEMPTS=1
          PAPER_ROUTE_HTTP_MAX_TIME_SECONDS=8
          EVIDENCE_RETRY_INTERVAL_SECONDS=2
          SIM_MIRROR_ATTEMPTS=12
          SIM_MIRROR_RETRY_INTERVAL_SECONDS=5

          fetch_json() {
            local url="$1"
            local output_path="$2"
            local label="$3"
            local status

            for attempt in $(seq 1 "${JSON_EVIDENCE_ATTEMPTS}"); do
              status="$(
                curl -sS --connect-timeout "${HTTP_CONNECT_TIMEOUT_SECONDS}" --max-time "${HTTP_MAX_TIME_SECONDS}" \
                  -o "${output_path}" -w '%{http_code}' "${url}" || true
              )"
              if [[ "${status}" =~ ^[0-9]{3}$ ]] &&
                [ "${status}" != '000' ] &&
                python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                printf '%s' "${status}"
                return 0
              fi

              if [ "${attempt}" -eq "${JSON_EVIDENCE_ATTEMPTS}" ]; then
                echo "${label} did not return a parseable JSON HTTP response; status=${status:-empty}" >&2
                head -c 1000 "${output_path}" >&2 || true
                echo >&2
                return 1
              fi

              echo "Attempt ${attempt}: ${label} status=${status:-empty} not usable JSON yet; retrying" >&2
              sleep "${EVIDENCE_RETRY_INTERVAL_SECONDS}"
            done
          }

          fetch_readyz_json() {
            local url="$1"
            local output_path="$2"
            local label="$3"
            local status
            local decision

            for attempt in $(seq 1 "${READYZ_EVIDENCE_ATTEMPTS}"); do
              status="$(
                curl -sS --connect-timeout "${HTTP_CONNECT_TIMEOUT_SECONDS}" --max-time "${HTTP_MAX_TIME_SECONDS}" \
                  -o "${output_path}" -w '%{http_code}' "${url}" || true
              )"
              if [[ "${status}" =~ ^[0-9]{3}$ ]] &&
                [ "${status}" != '000' ] &&
                python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                decision="$(
                  bun run packages/scripts/src/torghut/readyz-contract.ts \
                    --status "${status}" \
                    --readyz-json "${output_path}"
                )"
                case "${decision}" in
                  acceptable)
                    printf '%s' "${status}"
                    return 0
                    ;;
                  retryable_database_timeout)
                    if [ "${attempt}" -eq "${READYZ_EVIDENCE_ATTEMPTS}" ]; then
                      echo "${label} still reports a retryable database-readiness timeout after ${attempt} attempts" >&2
                      printf '%s' "${status}"
                      return 0
                    fi
                    echo "Attempt ${attempt}: ${label} database readiness timed out; retrying until readyz contract is acceptable" >&2
                    sleep "${EVIDENCE_RETRY_INTERVAL_SECONDS}"
                    continue
                    ;;
                  *)
                    printf '%s' "${status}"
                    return 0
                    ;;
                esac
              fi

              if [ "${attempt}" -eq "${READYZ_EVIDENCE_ATTEMPTS}" ]; then
                if [[ "${status}" =~ ^[0-9]{3}$ ]] &&
                  [ "${status}" != '000' ] &&
                  python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                  echo "${label} returned HTTP ${status} without an acceptable readyz contract" >&2
                else
                  echo "${label} did not return a parseable JSON HTTP response; status=${status:-empty}" >&2
                fi
                head -c 1000 "${output_path}" >&2 || true
                echo >&2
                return 1
              fi

              if [[ "${status}" =~ ^[0-9]{3}$ ]] &&
                [ "${status}" != '000' ] &&
                python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                echo "Attempt ${attempt}: ${label} returned HTTP ${status} without an acceptable readyz contract; retrying" >&2
              else
                echo "Attempt ${attempt}: ${label} status=${status:-empty} not usable JSON yet; retrying" >&2
              fi
              sleep "${EVIDENCE_RETRY_INTERVAL_SECONDS}"
            done
          }

          fetch_json_2xx() {
            local url="$1"
            local output_path="$2"
            local label="$3"
            local status

            for attempt in $(seq 1 "${JSON_EVIDENCE_ATTEMPTS}"); do
              status="$(
                curl -sS --connect-timeout "${HTTP_CONNECT_TIMEOUT_SECONDS}" --max-time "${HTTP_MAX_TIME_SECONDS}" \
                  -o "${output_path}" -w '%{http_code}' "${url}" || true
              )"
              if [[ "${status}" =~ ^2[0-9][0-9]$ ]] &&
                python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                return 0
              fi

              if [ "${attempt}" -eq "${JSON_EVIDENCE_ATTEMPTS}" ]; then
                if [[ "${status}" =~ ^[0-9]{3}$ ]] &&
                  [ "${status}" != '000' ] &&
                  python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                  echo "${label} returned HTTP ${status}; expected 2xx" >&2
                else
                  echo "${label} did not return a parseable JSON HTTP 2xx response; status=${status:-empty}" >&2
                fi
                head -c 1000 "${output_path}" >&2 || true
                echo >&2
                return 1
              fi

              if [[ "${status}" =~ ^[0-9]{3}$ ]] &&
                [ "${status}" != '000' ] &&
                python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                echo "Attempt ${attempt}: ${label} returned HTTP ${status}; expected 2xx; retrying" >&2
              else
                echo "Attempt ${attempt}: ${label} status=${status:-empty} not usable JSON 2xx yet; retrying" >&2
              fi
              sleep "${EVIDENCE_RETRY_INTERVAL_SECONDS}"
            done
          }

          fetch_json_2xx_optional() {
            local url="$1"
            local output_path="$2"
            local label="$3"
            local status

            for attempt in $(seq 1 "${PAPER_ROUTE_EVIDENCE_ATTEMPTS}"); do
              status="$(
                curl -sS --connect-timeout "${HTTP_CONNECT_TIMEOUT_SECONDS}" --max-time "${PAPER_ROUTE_HTTP_MAX_TIME_SECONDS}" \
                  -o "${output_path}" -w '%{http_code}' "${url}" || true
              )"
              if [[ "${status}" =~ ^2[0-9][0-9]$ ]] &&
                python3 -m json.tool "${output_path}" >/dev/null 2>&1; then
                return 0
              fi

              if [ "${attempt}" -lt "${PAPER_ROUTE_EVIDENCE_ATTEMPTS}" ]; then
                echo "Attempt ${attempt}: ${label} status=${status:-empty} not usable optional JSON 2xx yet; retrying"
                sleep "${EVIDENCE_RETRY_INTERVAL_SECONDS}"
              fi
            done

            echo "${label} unavailable after bounded optional evidence retry; status=${status:-empty}; skipping paper-route mirror-only validation"
            rm -f "${output_path}"
            return 1
          }

          TORGHUT_READYZ_HTTP_STATUS="$(
            fetch_readyz_json \
              http://torghut.torghut.svc.cluster.local/readyz \
              "${EVIDENCE_DIR}/torghut-readyz.json" \
              "Torghut /readyz"
          )"
          if [ -z "${TORGHUT_READYZ_HTTP_STATUS}" ] || [ "${TORGHUT_READYZ_HTTP_STATUS}" = '000' ]; then
            echo "Torghut /readyz did not return an HTTP response"
            exit 1
          fi
          if ! [[ "${TORGHUT_READYZ_HTTP_STATUS}" =~ ^[0-9]{3}$ ]]; then
            echo "Torghut /readyz returned invalid HTTP status ${TORGHUT_READYZ_HTTP_STATUS}"
            exit 1
          fi
          echo "Torghut /readyz HTTP ${TORGHUT_READYZ_HTTP_STATUS}"

          fetch_json_2xx \
            http://torghut.torghut.svc.cluster.local/trading/status \
            "${EVIDENCE_DIR}/torghut-status.json" \
            "Torghut /trading/status"
          fetch_json_2xx \
            http://torghut.torghut.svc.cluster.local/trading/revenue-repair \
            "${EVIDENCE_DIR}/torghut-revenue-repair-digest.json" \
            "Torghut /trading/revenue-repair"
          export TORGHUT_REVENUE_REPAIR_DIGEST="${EVIDENCE_DIR}/torghut-revenue-repair-digest.json"
          export TORGHUT_STATUS_PAYLOAD="${EVIDENCE_DIR}/torghut-status.json"
          export TORGHUT_READYZ_HTTP_STATUS
          export TORGHUT_READYZ_PAYLOAD="${EVIDENCE_DIR}/torghut-readyz.json"

          capture_paper_route_mirror_evidence() {
            local live_ok='false'
            local sim_ok='false'

            unset TORGHUT_PAPER_ROUTE_EVIDENCE
            unset TORGHUT_SIM_PAPER_ROUTE_EVIDENCE

            if fetch_json_2xx_optional \
              'http://torghut.torghut.svc.cluster.local/trading/proofs?kind=runtime_window&window=next&limit=20' \
              "${EVIDENCE_DIR}/torghut-proofs.json" \
              "Torghut /trading/proofs"; then
              live_ok='true'
            fi
            if fetch_json_2xx_optional \
              'http://torghut-sim.torghut.svc.cluster.local/trading/proofs?kind=runtime_window&window=next&limit=20' \
              "${EVIDENCE_DIR}/torghut-sim-proofs.json" \
              "Torghut sim /trading/proofs"; then
              sim_ok='true'
            fi

            if [ "${live_ok}" = 'true' ] && [ "${sim_ok}" = 'true' ]; then
              export TORGHUT_PAPER_ROUTE_EVIDENCE="${EVIDENCE_DIR}/torghut-proofs.json"
              export TORGHUT_SIM_PAPER_ROUTE_EVIDENCE="${EVIDENCE_DIR}/torghut-sim-proofs.json"
              return 0
            fi

            echo \
              "Paper-route mirror evidence unavailable; hard rollout, image-pull, readyz, status, and revenue-repair gates passed"
            return 1
          }

          run_post_deploy_evidence_validator() {
            bun run packages/scripts/src/torghut/post-deploy-evidence.ts
          }

          validate_post_deploy_evidence_with_mirror_retry() {
            local attempt
            local status
            local output_path="${EVIDENCE_DIR}/post-deploy-evidence-validator.out"

            for attempt in $(seq 1 "${SIM_MIRROR_ATTEMPTS}"); do
              set +e
              run_post_deploy_evidence_validator > "${output_path}" 2>&1
              status=$?
              set -e

              if [ "${status}" -eq 0 ]; then
                cat "${output_path}"
                return 0
              fi

              if ! grep -Eq 'torghut-sim paper-route target plan (is empty while live torghut exposes targets|missing live target)' "${output_path}"; then
                cat "${output_path}" >&2
                return "${status}"
              fi

              if [ "${attempt}" -eq "${SIM_MIRROR_ATTEMPTS}" ]; then
                echo "Torghut sim paper-route target mirror did not materialize after bounded retry window" >&2
                cat "${output_path}" >&2
                return "${status}"
              fi

              echo "Attempt ${attempt}: Torghut sim paper-route target mirror not materialized yet; refreshing evidence payloads" >&2
              if ! capture_paper_route_mirror_evidence; then
                run_post_deploy_evidence_validator
                return 0
              fi
              sleep "${SIM_MIRROR_RETRY_INTERVAL_SECONDS}"
            done
          }

          if capture_paper_route_mirror_evidence; then
            validate_post_deploy_evidence_with_mirror_retry
          else
            run_post_deploy_evidence_validator
          fi

      - name: Verify market-data freshness
        shell: bash
        env:
          MARKET_DATA_FRESHNESS_MODE: auto
          MARKET_DATA_MAX_LAG_SECONDS: '300'
          MARKET_DATA_ACCEPTED_MAX_LAG_SECONDS: '300'
          MARKET_DATA_HOLIDAYS: '2026-01-01,2026-01-19,2026-02-16,2026-04-03,2026-05-25,2026-06-19,2026-07-03,2026-09-07,2026-11-26,2026-12-25'
          KAFKA_TOPIC_PARTITIONS: '0,1,2'
        run: |
          set -euo pipefail
          bun run smoke:torghut-market-data

      - name: Upload revenue repair evidence
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: torghut-revenue-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/torghut-post-deploy/*.json
          if-no-files-found: ignore
