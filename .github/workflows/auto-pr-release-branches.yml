name: Auto PR for release branches

on:
  push:
    branches:
      - 'release/**'
    paths:
      - 'argocd/applications/*/kustomization.yaml'
      - 'argocd/applications/headlamp/values.yaml'
      - 'argocd/sag/kustomization.yaml'
  workflow_dispatch:
    inputs:
      head_branch:
        description: 'Branch to create the PR from (for manual runs, provide value like release/<sha256>)'
        required: false

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: auto-pr-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pr:
    permissions:
      actions: write
      contents: write
      pull-requests: write
    # Run automatically for image-updater commits or manually via workflow_dispatch
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, 'automatic update'))
    runs-on: ubuntu-latest
    steps:
      - name: Determine release branch context
        id: release_branch
        env:
          HEAD_BRANCH_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.head_branch || '' }}
        run: |
          set -euo pipefail
          if [ -n "${HEAD_BRANCH_INPUT}" ]; then
            HEAD_BRANCH="${HEAD_BRANCH_INPUT}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Head branch must be provided when running manually"
            exit 1
          else
            HEAD_BRANCH="${GITHUB_REF_NAME}"
          fi
          if [[ "${HEAD_BRANCH}" =~ ^release/([0-9a-f]{64})$ ]]; then
            sha="${BASH_REMATCH[1]}"
            short_name="release/${sha:0:7}"
          else
            short_name="${HEAD_BRANCH}"
          fi
          echo "head_branch=${HEAD_BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "short_name=${short_name}" >> "${GITHUB_OUTPUT}"

      - name: Ensure GitHub CLI is available
        run: gh --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Evaluate release PR creation eligibility
        id: release_pr_guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ steps.release_branch.outputs.head_branch }}
        run: |
          set -euo pipefail

          create_pr="true"
          reason="eligible"

          is_release_image_tag() {
            [[ "$1" =~ ^[0-9]+(\.[0-9]+){1,3}([-.][A-Za-z0-9_.-]+)?$ ]]
          }

          extract_synthesis_image_tag() {
            awk '
              $0 ~ /name:[[:space:]]*registry\.ide-newton\.ts\.net\/lab\/synthesis/ { in_image = 1; next }
              in_image && $1 == "newTag:" {
                tag = $2
                gsub(/^"|"$/, "", tag)
                print tag
                exit
              }
            '
          }

          read_repo_file_at_ref() {
            local path="$1"
            local ref="$2"
            gh api "repos/$GH_REPO/contents/$path?ref=$ref" --jq '.content' | tr -d '\n' | base64 -d
          }

          changed_files=()
          mapfile -t changed_files < <(
            gh api "repos/$GH_REPO/compare/main...$HEAD_BRANCH" --jq '.files[].filename'
          )

          migrated_nix_image_paths=(
            "argocd/applications/app/kustomization.yaml"
            "argocd/applications/bumba/kustomization.yaml"
            "argocd/applications/docs/kustomization.yaml"
            "argocd/applications/headlamp/values.yaml"
            "argocd/applications/oirat/kustomization.yaml"
            "argocd/applications/proompteng/kustomization.yaml"
            "argocd/sag/kustomization.yaml"
            "argocd/applications/symphony/kustomization.yaml"
            "argocd/applications/symphony-jangar/kustomization.yaml"
            "argocd/applications/symphony-torghut/kustomization.yaml"
            "argocd/applications/synthesis/kustomization.yaml"
          )

          disabled_image_paths=(
            "argocd/applications/olden/kustomization.yaml"
          )

          for path in "${changed_files[@]}"; do
            for disabled_path in "${disabled_image_paths[@]}"; do
              if [[ "$path" == "$disabled_path" ]]; then
                create_pr="false"
                reason="disabled-image-app:${path}"
                break 2
              fi
            done
          done

          for path in "${changed_files[@]}"; do
            for migrated_path in "${migrated_nix_image_paths[@]}"; do
              if [[ "$path" == "$migrated_path" ]]; then
                create_pr="false"
                reason="migrated-nix-image-app:${path}"
                break 2
              fi
            done
          done

          base_file=""
          head_file=""
          if [[ "$create_pr" == "true" ]] &&
            base_file="$(read_repo_file_at_ref "argocd/applications/synthesis/kustomization.yaml" "main")" &&
            head_file="$(read_repo_file_at_ref "argocd/applications/synthesis/kustomization.yaml" "$HEAD_BRANCH")"; then
            base_tag="$(extract_synthesis_image_tag <<< "$base_file")"
            head_tag="$(extract_synthesis_image_tag <<< "$head_file")"

            if [[ -n "$base_tag" ]] && [[ -n "$head_tag" ]] && [[ "$base_tag" != "$head_tag" ]] &&
              ! is_release_image_tag "$base_tag" &&
              is_release_image_tag "$head_tag"; then
              create_pr="false"
              reason="synthesis-custom-pin-overwrite:${base_tag}-to-${head_tag}"
            fi
          fi

          echo "create_pr=$create_pr" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "create_pr=$create_pr"
          echo "reason=$reason"

      - name: Skip release PR creation
        if: steps.release_pr_guard.outputs.create_pr != 'true'
        run: |
          set -euo pipefail
          echo "Skipped release PR creation: ${{ steps.release_pr_guard.outputs.reason }}"

      - name: Create PR if not exists
        id: create_pr
        if: steps.release_pr_guard.outputs.create_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ steps.release_branch.outputs.head_branch }}
          SHORT_NAME: ${{ steps.release_branch.outputs.short_name }}
        run: |
          set -euo pipefail
          BASE_BRANCH="main"
          pr_number=""

          existing_pr_number=$(gh pr list \
            -R "$GH_REPO" \
            --head "$HEAD_BRANCH" \
            --base "$BASE_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty' || true)

          if [ -n "${existing_pr_number:-}" ]; then
            echo "Open PR already exists: #$existing_pr_number"
            pr_number="$existing_pr_number"
          else
            # Derive a concise title from the branch name
            pr_title="chore(${SHORT_NAME}): automated release PR"
            pr_body="Automated PR created on push to ${HEAD_BRANCH}. Contains Argo CD Image Updater changes for ${SHORT_NAME}."

            response_file=$(mktemp)
            err_file=$(mktemp)
            if gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GH_REPO}/pulls" \
              -f base="$BASE_BRANCH" \
              -f head="$HEAD_BRANCH" \
              -f title="$pr_title" \
              -f body="$pr_body" \
              --jq '.number' > "$response_file" 2>"$err_file"; then
              pr_number=$(cat "$response_file")
              echo "Created PR #$pr_number"
            else
              status=$?
              err_output=$(cat "$err_file")
              if echo "$err_output" | grep -qi 'already exists'; then
                # Handle a race where the PR was created between list and create.
                pr_number=$(gh pr list \
                  -R "$GH_REPO" \
                  --head "$HEAD_BRANCH" \
                  --base "$BASE_BRANCH" \
                  --state open \
                  --json number \
                  --jq '.[0].number // empty' || true)

                if [ -z "${pr_number:-}" ]; then
                  echo "PR already exists but the open PR number could not be resolved."
                  echo "$err_output"
                  exit 1
                fi

                echo "Open PR already exists: #$pr_number"
              else
                echo "$err_output"
                exit $status
              fi
            fi
            rm -f "$response_file" "$err_file"
          fi

          if [ -z "${pr_number:-}" ]; then
            echo "Could not resolve a PR number for ${HEAD_BRANCH}."
            exit 1
          fi

          echo "pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"

      - name: Trigger release auto-merge evaluation
        if: ${{ steps.release_pr_guard.outputs.create_pr == 'true' && steps.create_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pr_number }}
        run: |
          set -euo pipefail

          gh workflow run release-pr-automerge.yml \
            -R "$GH_REPO" \
            -f pr_number="$PR_NUMBER"

          echo "Dispatched release-pr-automerge for PR #$PR_NUMBER"
