name: agents-ci

permissions:
  actions: read
  contents: read

on:
  pull_request:
    paths:
      - 'bun.lock'
      - 'package.json'
      - 'charts/agents/**'
      - 'packages/bumba/**'
      - 'packages/codex/**'
      - 'packages/cx-tools/**'
      - 'packages/design/**'
      - 'packages/discord/**'
      - 'packages/otel/**'
      - 'packages/scripts/src/agents/**'
      - 'packages/scripts/src/jangar/**'
      - 'packages/scripts/src/shared/**'
      - 'packages/temporal-bun-sdk/**'
      - 'services/bumba/**'
      - 'services/jangar/**'
      - 'scripts/agents/**'
      - 'scripts/download_crd_schema.py'
      - '.github/workflows/agents-ci.yml'
      - '.github/workflows/jangar-build-push.yaml'
  push:
    branches:
      - main
    paths:
      - 'bun.lock'
      - 'package.json'
      - 'charts/agents/**'
      - 'packages/bumba/**'
      - 'packages/codex/**'
      - 'packages/cx-tools/**'
      - 'packages/design/**'
      - 'packages/discord/**'
      - 'packages/otel/**'
      - 'packages/scripts/src/agents/**'
      - 'packages/scripts/src/jangar/**'
      - 'packages/scripts/src/shared/**'
      - 'packages/temporal-bun-sdk/**'
      - 'services/bumba/**'
      - 'services/jangar/**'
      - 'scripts/agents/**'
      - 'scripts/download_crd_schema.py'
      - '.github/workflows/agents-ci.yml'
      - '.github/workflows/jangar-build-push.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION="5.8.0"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          TARBALL="kustomize_v${KUSTOMIZE_VERSION}_${OS}_${ARCH}.tar.gz"
          URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/${TARBALL}"
          curl -fsSL -o kustomize.tar.gz "${URL}"
          tar -xzf kustomize.tar.gz kustomize
          chmod +x kustomize
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.7.0"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          TARBALL="kubeconform-${OS}-${ARCH}.tar.gz"
          URL="https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/${TARBALL}"
          curl -fsSL -o kubeconform.tar.gz "${URL}"
          tar -xzf kubeconform.tar.gz kubeconform
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Agents chart and CRDs
        run: scripts/agents/validate-agents.sh

  integration:
    runs-on: arc-arm64
    needs: validate
    env:
      # ARC runners run with hostNetwork=true; a shared "kind" docker bridge subnet can collide across pods.
      # Use a per-run docker network for kind to keep routing deterministic.
      KIND_DOCKER_NETWORK_NAME: kind-${{ github.run_id }}-${{ github.run_attempt }}
      KIND_CLUSTER_NAME: agents-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="v1.29.4"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          curl -fsSL -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl
          if command -v sudo >/dev/null 2>&1; then
            sudo mv kubectl /usr/local/bin/
          else
            mv kubectl /usr/local/bin/
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Classify Jangar image mode
        id: jangar_image_mode
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(mktemp)"
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            git ls-files > "${CHANGED_FILES}"
          else
            git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" > "${CHANGED_FILES}"
          fi

          echo "Changed files for image classification:"
          cat "${CHANGED_FILES}"
          bun packages/scripts/src/agents/resolve-jangar-image-mode.ts < "${CHANGED_FILES}" >> "${GITHUB_OUTPUT}"

          echo "Selected Jangar image mode:"
          cat "${GITHUB_OUTPUT}" | tail -n 3

      - name: Build agentctl binary
        run: bun run --filter @proompteng/agentctl build:bin

      - name: Ensure kind Docker network
        run: scripts/agents/ensure-kind-network.sh

      - name: Create kind cluster
        uses: helm/kind-action@v1
        env:
          KIND_EXPERIMENTAL_DOCKER_NETWORK: ${{ env.KIND_DOCKER_NETWORK_NAME }}
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          version: v0.31.0
          node_image: kindest/node:v1.29.4
          kubectl_version: v1.29.4
          wait: 180s

      - name: Resolve latest successful Jangar build
        if: steps.jangar_image_mode.outputs.NEEDS_LOCAL_JANGAR_IMAGE != 'true'
        id: latest_jangar_build
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate('GET /repos/{owner}/{repo}/actions/workflows/{workflow_id}/runs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'jangar-build-push.yaml',
              branch: 'main',
              status: 'completed',
              per_page: 100,
            });
            const run = runs.find((candidate) => candidate.conclusion === 'success' && candidate.event === 'push');
            if (!run) {
              core.setFailed('No successful mainline jangar-build-push run found.');
              return;
            }
            core.info(`Selected jangar-build-push run ${run.id} from ${run.head_sha} (${run.html_url})`);
            core.setOutput('run_id', String(run.id));
            core.setOutput('head_sha', run.head_sha);
            core.setOutput('html_url', run.html_url);

      - name: Download Jangar release contract
        if: steps.jangar_image_mode.outputs.NEEDS_LOCAL_JANGAR_IMAGE != 'true'
        uses: actions/download-artifact@v4
        with:
          name: jangar-release-contract
          path: .artifacts/jangar
          run-id: ${{ steps.latest_jangar_build.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Resolve published Jangar image from release contract
        if: steps.jangar_image_mode.outputs.NEEDS_LOCAL_JANGAR_IMAGE != 'true'
        id: published_jangar_image
        run: |
          set -euo pipefail
          bun run packages/scripts/src/agents/resolve-published-jangar-image.ts \
            --contract-path .artifacts/jangar/jangar-release-contract.json \
            --output "${GITHUB_OUTPUT}"

      - name: Resolve published Jangar image digest from tag
        if: steps.jangar_image_mode.outputs.NEEDS_LOCAL_JANGAR_IMAGE != 'true' && steps.published_jangar_image.outputs.image_digest == ''
        id: published_jangar_image_digest
        env:
          IMAGE_NAME: ${{ steps.published_jangar_image.outputs.image_repository }}
          IMAGE_TAG: ${{ steps.published_jangar_image.outputs.image_tag }}
        run: |
          set -euo pipefail
          DIGEST="$(
            bun --eval "
              import { inspectImageDigest } from './packages/scripts/src/shared/docker.ts'
              const image = process.env.IMAGE_NAME + ':' + process.env.IMAGE_TAG
              const repoDigest = inspectImageDigest(image)
              const digest = repoDigest.includes('@') ? repoDigest.split('@')[1] : repoDigest
              console.log(digest)
            "
          )"

          DIGEST="${DIGEST#*@}"
          if [ -z "${DIGEST}" ]; then
            echo "Resolved digest is empty for ${IMAGE_NAME}:${IMAGE_TAG}"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Select published Jangar image
        if: steps.jangar_image_mode.outputs.NEEDS_LOCAL_JANGAR_IMAGE != 'true'
        run: |
          set -euo pipefail
          IMAGE_REPOSITORY="${{ steps.published_jangar_image.outputs.image_repository }}"
          IMAGE_TAG="${{ steps.published_jangar_image.outputs.image_tag }}"
          IMAGE_DIGEST="${{ steps.published_jangar_image.outputs.image_digest }}"
          IMAGE_SOURCE_SHA="${{ steps.published_jangar_image.outputs.source_sha }}"

          if [ -z "${IMAGE_DIGEST}" ]; then
            IMAGE_DIGEST="${{ steps.published_jangar_image_digest.outputs.digest }}"
          fi
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "Published Jangar image digest is empty."
            exit 1
          fi

          echo "Using published Jangar image ${IMAGE_REPOSITORY}@${IMAGE_DIGEST} (tag ${IMAGE_TAG}, source ${IMAGE_SOURCE_SHA})"
          echo "Resolved from run ${{ steps.latest_jangar_build.outputs.run_id }}: ${{ steps.latest_jangar_build.outputs.html_url }}"
          {
            echo "BUILT_JANGAR_IMAGE_REPOSITORY=${IMAGE_REPOSITORY}"
            echo "BUILT_JANGAR_IMAGE_TAG=${IMAGE_TAG}"
            echo "BUILT_JANGAR_IMAGE_DIGEST=${IMAGE_DIGEST}"
            echo "BUILT_JANGAR_IMAGE_SOURCE_SHA=${IMAGE_SOURCE_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Build and preload local Jangar control-plane image into kind
        if: steps.jangar_image_mode.outputs.NEEDS_LOCAL_JANGAR_IMAGE == 'true'
        run: |
          set -euxo pipefail

          WORKSPACE="${GITHUB_WORKSPACE}"
          IMAGE_REPOSITORY="${AGENTS_IMAGE_REPOSITORY:-jangar-local}"
          DEFAULT_IMAGE_TAG_SUFFIX="${GITHUB_SHA:-unknown}"
          IMAGE_TAG="${AGENTS_IMAGE_TAG:-ci-$DEFAULT_IMAGE_TAG_SUFFIX}"
          PRUNE_DIR="$(mktemp -d /tmp/jangar-prune-XXXXXX)"
          KIND_IMAGE_TAR="${RUNNER_TEMP:-/tmp}/jangar-${GITHUB_RUN_ID:-0}-${GITHUB_RUN_ATTEMPT:-0}-${IMAGE_TAG}.tar"
          BUILD_HEARTBEAT_PID=0
          KIND_HEARTBEAT_PID=0
          cleanup_preload_resources() {
            if [ "${BUILD_HEARTBEAT_PID}" != "0" ]; then
              kill "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
            fi
            if [ "${KIND_HEARTBEAT_PID}" != "0" ]; then
              kill "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
            fi
            if [ -f "${KIND_IMAGE_TAR}" ]; then
              rm -f "${KIND_IMAGE_TAR}"
            fi
            rm -rf "${PRUNE_DIR}"
          }
          trap cleanup_preload_resources EXIT

          run_with_progress() {
            local phase="$1"
            local timeout_minutes="$2"
            shift 2

            local heartbeat_pid
            local timeout_status=0
            local status=0

            (
              while :; do
                echo "[progress] ${phase} for ${IMAGE} at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                sleep 120
              done
            ) &
            heartbeat_pid=$!

            if [ "${phase}" = "Docker build" ]; then
              BUILD_HEARTBEAT_PID="${heartbeat_pid}"
            else
              KIND_HEARTBEAT_PID="${heartbeat_pid}"
            fi

            if timeout -k 30s "${timeout_minutes}m" "$@"; then
              status=0
            else
              status=$?
              timeout_status="$status"
            fi

            if [ "${phase}" = "Docker build" ]; then
              kill "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
              BUILD_HEARTBEAT_PID=0
            else
              kill "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
              KIND_HEARTBEAT_PID=0
            fi

            if [ "${status}" -ne 0 ]; then
              echo "::error::${phase} failed with exit code ${status} for ${IMAGE}."
              if [ "${timeout_status}" -eq 124 ]; then
                echo "::error::${phase} exceeded ${timeout_minutes}m timeout for ${IMAGE}."
              fi
            fi

            return "${status}"
          }

          run_step_failure() {
            local message="$1"
            local code="$2"
            echo "${message}; exit code=${code}." >&2
            echo "${message}" >&2
            exit 1
          }

          run_kind_load_with_fallback() {
            if ! run_with_progress "docker save image archive" "${KIND_LOAD_TIMEOUT_MINUTES}" docker save --output "${KIND_IMAGE_TAR}" "${IMAGE}"; then
              echo "Failed to save local image archive ${KIND_IMAGE_TAR}."
              return 1
            fi

            echo "Saved image archive ${KIND_IMAGE_TAR}."

            if run_with_progress "kind load image-archive" "${KIND_LOAD_TIMEOUT_MINUTES}" kind load image-archive "${KIND_IMAGE_TAR}" --name "${KIND_CLUSTER_NAME}"; then
              echo "Loaded local image archive ${KIND_IMAGE_TAR} into kind cluster ${KIND_CLUSTER_NAME}."
              return 0
            fi

            echo "kind load image-archive failed; retrying with docker-image path."
            if run_with_progress "kind load docker-image" "${KIND_LOAD_TIMEOUT_MINUTES}" kind load docker-image "${IMAGE}" --name "${KIND_CLUSTER_NAME}"; then
              echo "Loaded local image ${IMAGE} into kind cluster ${KIND_CLUSTER_NAME}."
              return 0
            fi
            return 1
          }

          run_step() {
            local label="$1"
            shift
            echo "::group::${label}"
            "$@"
            echo "::endgroup::"
          }

          PREP_TIMEOUT_MINUTES=25
          echo "Pruning jangar build context to ${PRUNE_DIR}"
          run_step "Prune turbo context" timeout "${PREP_TIMEOUT_MINUTES}m" bunx turbo prune --scope=@proompteng/jangar --docker --out-dir="${PRUNE_DIR}"
          cp "${WORKSPACE}/tsconfig.base.json" "${PRUNE_DIR}/tsconfig.base.json"
          if [ -d "${WORKSPACE}/skills" ]; then
            mkdir -p "${PRUNE_DIR}/skills"
            cp -R "${WORKSPACE}/skills/." "${PRUNE_DIR}/skills/"
          fi
          if [ -d "${WORKSPACE}/services/jangar/agentctl" ]; then
            mkdir -p "${PRUNE_DIR}/full/services/jangar" "${PRUNE_DIR}/json/services/jangar"
            cp -R "${WORKSPACE}/services/jangar/agentctl/." "${PRUNE_DIR}/full/services/jangar/agentctl/"
            cp -R "${WORKSPACE}/services/jangar/agentctl/." "${PRUNE_DIR}/json/services/jangar/agentctl/"
          fi
          if [ -d "${WORKSPACE}/packages/cx-tools" ]; then
            mkdir -p "${PRUNE_DIR}/full/packages" "${PRUNE_DIR}/json/packages"
            cp -R "${WORKSPACE}/packages/cx-tools/." "${PRUNE_DIR}/full/packages/cx-tools/"
            cp -R "${WORKSPACE}/packages/cx-tools/." "${PRUNE_DIR}/json/packages/cx-tools/"
          fi

          find "${PRUNE_DIR}/full" "${PRUNE_DIR}/json" \
            -type d -name node_modules -prune -exec rm -rf {} +

          copy_pruned_workspace_dist() {
            local pkg_dir
            local rel_path
            local src_dir

            shopt -s nullglob
            for pkg_dir in "${PRUNE_DIR}/full/packages/"* "${PRUNE_DIR}/full/services/"*; do
              [ -d "${pkg_dir}" ] || continue
              rel_path="${pkg_dir#"${PRUNE_DIR}/full/"}"
              src_dir="${WORKSPACE}/${rel_path}"

              if [ ! -d "${src_dir}/dist" ]; then
                continue
              fi

              cp -R "${src_dir}/dist" "${pkg_dir}"
              mkdir -p "${PRUNE_DIR}/json/${rel_path}"
              cp -R "${src_dir}/dist" "${PRUNE_DIR}/json/${rel_path}"
            done
            shopt -u nullglob
          }
          copy_pruned_workspace_dist

          JANGAR_VERSION="$(git -C "${WORKSPACE}" rev-parse --short HEAD)"
          JANGAR_COMMIT="$(git -C "${WORKSPACE}" rev-parse HEAD)"
          IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          # Use docker.io for Bun base image in CI builds to avoid mirror image metadata drift.
          # Local image rebuilds are best-effort in CI; fall back to the public image on timeout.
          # ARC arm64 runners can spend well over 18 minutes in the pruned control-plane docker
          # build while still making forward progress, so give the local image build enough headroom
          # to complete instead of terminating a healthy build.
          BUILD_TIMEOUT_MINUTES=30
          KIND_LOAD_TIMEOUT_MINUTES=20

          if run_with_progress "Docker build" "${BUILD_TIMEOUT_MINUTES}" env DOCKER_BUILDKIT=1 docker build \
            -f "${WORKSPACE}/services/jangar/Dockerfile" \
            --target control-plane \
            --network=host \
            -t "${IMAGE}" \
            --build-arg "JANGAR_VERSION=${JANGAR_VERSION}" \
            --build-arg "JANGAR_COMMIT=${JANGAR_COMMIT}" \
            --build-arg "JANGAR_BUILD_CI=true" \
            --build-arg "JANGAR_BUILD_SOURCEMAP=0" \
            --build-arg "JANGAR_BUILD_LOG_LEVEL=warn" \
            --build-arg "BUN_BASE_IMAGE=docker.io/oven/bun" \
            --progress=plain \
            "${PRUNE_DIR}"; then
            echo "Built local image ${IMAGE}."
          else
            run_step_failure "Failed to build local image ${IMAGE}" "$?"
          fi

          if ! run_kind_load_with_fallback; then
            run_step_failure "Failed to preload local image ${IMAGE} into kind cluster ${KIND_CLUSTER_NAME}" "$?"
          fi

          {
            echo "BUILT_JANGAR_IMAGE_REPOSITORY=${IMAGE_REPOSITORY}"
            echo "BUILT_JANGAR_IMAGE_TAG=${IMAGE_TAG}"
            echo "BUILT_JANGAR_IMAGE_DIGEST="
            echo "BUILT_JANGAR_IMAGE_SOURCE_SHA=${GITHUB_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Run agents integration smoke test
        env:
          AGENTS_NAMESPACE: agents-ci
          AGENTS_RELEASE_NAME: agents-ci
          AGENTS_VALUES_FILE: scripts/agents/values-ci.yaml
          AGENTS_CREATE_NAMESPACE: 'true'
          AGENTS_DB_BOOTSTRAP: 'true'
          AGENTS_TIMEOUT: 15m
          AGENTS_IMAGE_REPOSITORY: ${{ env.BUILT_JANGAR_IMAGE_REPOSITORY }}
          AGENTS_IMAGE_TAG: ${{ env.BUILT_JANGAR_IMAGE_TAG }}
          AGENTS_IMAGE_DIGEST: ${{ env.BUILT_JANGAR_IMAGE_DIGEST }}
          AGENTCTL_BIN: services/jangar/agentctl/dist/agentctl
        run: bun run packages/scripts/src/agents/smoke-agents.ts

      - name: Cleanup agents integration release
        if: always()
        run: |
          set -euo pipefail
          # Kind cluster is ephemeral; prefer cleanup that does not depend on kubectl connectivity.
          if command -v docker >/dev/null 2>&1; then
            docker rm -f "${KIND_CLUSTER_NAME}-control-plane" >/dev/null 2>&1 || true
            docker network rm "${KIND_DOCKER_NETWORK_NAME}" >/dev/null 2>&1 || true
          fi
