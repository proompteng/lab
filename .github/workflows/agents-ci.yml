name: agents-ci

on:
  pull_request:
    paths:
      - 'bun.lock'
      - 'charts/agents/**'
      - 'services/jangar/**'
      - 'scripts/agents/**'
      - 'scripts/download_crd_schema.py'
      - '.github/workflows/agents-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'bun.lock'
      - 'charts/agents/**'
      - 'services/jangar/**'
      - 'scripts/agents/**'
      - 'scripts/download_crd_schema.py'
      - '.github/workflows/agents-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION="5.8.0"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          TARBALL="kustomize_v${KUSTOMIZE_VERSION}_${OS}_${ARCH}.tar.gz"
          URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/${TARBALL}"
          curl -fsSL -o kustomize.tar.gz "${URL}"
          tar -xzf kustomize.tar.gz kustomize
          chmod +x kustomize
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.7.0"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          TARBALL="kubeconform-${OS}-${ARCH}.tar.gz"
          URL="https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/${TARBALL}"
          curl -fsSL -o kubeconform.tar.gz "${URL}"
          tar -xzf kubeconform.tar.gz kubeconform
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Agents chart and CRDs
        run: scripts/agents/validate-agents.sh

  integration:
    runs-on: ubuntu-latest
    needs: validate
    env:
      # ARC runners run with hostNetwork=true; a shared "kind" docker bridge subnet can collide across pods.
      # Use a per-run docker network for kind to keep routing deterministic.
      KIND_DOCKER_NETWORK_NAME: kind-${{ github.run_id }}-${{ github.run_attempt }}
      KIND_CLUSTER_NAME: agents-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="v1.29.4"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          curl -fsSL -o kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl
          if command -v sudo >/dev/null 2>&1; then
            sudo mv kubectl /usr/local/bin/
          else
            mv kubectl /usr/local/bin/
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build agentctl binary
        run: bun run --filter @proompteng/agentctl build:bin

      - name: Ensure kind Docker network
        run: scripts/agents/ensure-kind-network.sh

      - name: Create kind cluster
        uses: helm/kind-action@v1
        env:
          KIND_EXPERIMENTAL_DOCKER_NETWORK: ${{ env.KIND_DOCKER_NETWORK_NAME }}
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          version: v0.31.0
          node_image: kindest/node:v1.29.4
          kubectl_version: v1.29.4
          wait: 180s

      - name: Build and preload local Jangar control-plane image into kind
        run: |
          set -euo pipefail

          WORKSPACE="${GITHUB_WORKSPACE}"
          IMAGE_REPOSITORY="${AGENTS_IMAGE_REPOSITORY:-jangar-local}"
          IMAGE_TAG="${AGENTS_IMAGE_TAG:-ci-${GITHUB_SHA:-unknown}}"
          PRUNE_DIR="$(mktemp -d /tmp/jangar-prune-XXXXXX)"
          trap 'rm -rf "${PRUNE_DIR}"' EXIT

          OUTPUT_ENTRY="${WORKSPACE}/services/jangar/.output/server/index.mjs"
          OUTPUT_PROTO="${WORKSPACE}/services/jangar/.output/server/proto/proompteng/jangar/v1/agentctl.proto"
          BUILD_OUTPUT=0
          if [ ! -f "${OUTPUT_ENTRY}" ] || [ ! -f "${OUTPUT_PROTO}" ]; then
            BUILD_OUTPUT=1
          fi
          if [ "${CI:-false}" = "true" ]; then
            BUILD_OUTPUT=0
            echo "CI run detected; skipping prebuild step and relying on Dockerfile build."
          fi

          echo "Pruning jangar build context to ${PRUNE_DIR}"
          bunx turbo prune --scope=@proompteng/jangar --docker --out-dir="${PRUNE_DIR}"
          cp "${WORKSPACE}/tsconfig.base.json" "${PRUNE_DIR}/tsconfig.base.json"
          if [ -d "${WORKSPACE}/skills" ]; then
            mkdir -p "${PRUNE_DIR}/skills"
            cp -R "${WORKSPACE}/skills/." "${PRUNE_DIR}/skills/"
          fi
          if [ -d "${WORKSPACE}/services/jangar/agentctl" ]; then
            mkdir -p "${PRUNE_DIR}/full/services/jangar" "${PRUNE_DIR}/json/services/jangar"
            cp -R "${WORKSPACE}/services/jangar/agentctl/." "${PRUNE_DIR}/full/services/jangar/agentctl/"
            cp -R "${WORKSPACE}/services/jangar/agentctl/." "${PRUNE_DIR}/json/services/jangar/agentctl/"
          fi
          if [ -d "${WORKSPACE}/packages/cx-tools" ]; then
            mkdir -p "${PRUNE_DIR}/full/packages" "${PRUNE_DIR}/json/packages"
            cp -R "${WORKSPACE}/packages/cx-tools/." "${PRUNE_DIR}/full/packages/cx-tools/"
            cp -R "${WORKSPACE}/packages/cx-tools/." "${PRUNE_DIR}/json/packages/cx-tools/"
          fi

          find "${PRUNE_DIR}/full" "${PRUNE_DIR}/json" \
            -type d -name node_modules -prune -exec rm -rf {} +

          copy_pruned_workspace_dist() {
            local pkg_dir
            local rel_path
            local src_dir

            shopt -s nullglob
            for pkg_dir in "${PRUNE_DIR}/full/packages/"* "${PRUNE_DIR}/full/services/"*; do
              [ -d "${pkg_dir}" ] || continue
              rel_path="${pkg_dir#${PRUNE_DIR}/full/}"
              src_dir="${WORKSPACE}/${rel_path}"

              if [ ! -d "${src_dir}/dist" ]; then
                continue
              fi

              cp -R "${src_dir}/dist" "${pkg_dir}"
              mkdir -p "${PRUNE_DIR}/json/${rel_path}"
              cp -R "${src_dir}/dist" "${PRUNE_DIR}/json/${rel_path}"
            done
            shopt -u nullglob
          }
          copy_pruned_workspace_dist

          if [ "${BUILD_OUTPUT}" = "1" ]; then
            echo "Building services/jangar .output in pruned context"
            BUILD_DIR="${PRUNE_DIR}/full"
            cp "${PRUNE_DIR}/tsconfig.base.json" "${BUILD_DIR}/tsconfig.base.json"
            if [ -f "${PRUNE_DIR}/bun.lock" ]; then
              cp "${PRUNE_DIR}/bun.lock" "${BUILD_DIR}/bun.lock"
            fi
            bun install --cwd "${BUILD_DIR}" --ignore-scripts --filter @proompteng/otel --filter @proompteng/temporal-bun-sdk --filter @proompteng/jangar
            bun run --cwd "${BUILD_DIR}" --filter @proompteng/otel build
            bun run --cwd "${BUILD_DIR}" --filter @proompteng/temporal-bun-sdk build
            if timeout 8m bun --cwd "${BUILD_DIR}/services/jangar" --bun vite build --logLevel warn; then
              bun --cwd "${BUILD_DIR}/services/jangar" run copy:grpc-proto
            else
              echo "Prebuild failed or timed out; cleaning partial .output and continuing with Docker image build."
              rm -rf "${BUILD_DIR}/services/jangar/.output"
            fi
          elif [ -f "${OUTPUT_ENTRY}" ] && [ -f "${OUTPUT_PROTO}" ]; then
            echo "Using local services/jangar .output from workspace"
            mkdir -p "${PRUNE_DIR}/full/services/jangar"
            cp -R "${WORKSPACE}/services/jangar/.output" "${PRUNE_DIR}/full/services/jangar/.output"
          elif [ -d "${WORKSPACE}/services/jangar/.output" ]; then
            echo "Skipping prebuilt .output reuse: missing generated index/proto artifacts"
          fi

          JANGAR_VERSION="$(git -C "${WORKSPACE}" rev-parse --short HEAD)"
          JANGAR_COMMIT="$(git -C "${WORKSPACE}" rev-parse HEAD)"
          IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          # Use docker.io for Bun base image in CI builds to avoid mirror image metadata drift.
          DOCKER_BUILDKIT=1 docker build \
            -f "${WORKSPACE}/services/jangar/Dockerfile" \
            --target control-plane \
            -t "${IMAGE}" \
            --build-arg "JANGAR_VERSION=${JANGAR_VERSION}" \
            --build-arg "JANGAR_COMMIT=${JANGAR_COMMIT}" \
            --build-arg "BUN_BASE_IMAGE=docker.io/oven/bun" \
            "${PRUNE_DIR}"
          kind load docker-image "${IMAGE}" --name "${KIND_CLUSTER_NAME}"

      - name: Run agents integration smoke test
        env:
          AGENTS_NAMESPACE: agents-ci
          AGENTS_RELEASE_NAME: agents-ci
          AGENTS_VALUES_FILE: charts/agents/values-ci.yaml
          AGENTS_CREATE_NAMESPACE: 'true'
          AGENTS_DB_BOOTSTRAP: 'true'
          AGENTS_TIMEOUT: 15m
          AGENTS_IMAGE_REPOSITORY: jangar-local
          AGENTS_IMAGE_TAG: ci-${{ github.sha }}
          AGENTS_IMAGE_DIGEST: ''
          AGENTCTL_BIN: services/jangar/agentctl/dist/agentctl
        run: bun run packages/scripts/src/agents/smoke-agents.ts

      - name: Cleanup agents integration release
        if: always()
        run: |
          set -euo pipefail
          # Kind cluster is ephemeral; prefer cleanup that does not depend on kubectl connectivity.
          if command -v docker >/dev/null 2>&1; then
            docker rm -f "${KIND_CLUSTER_NAME}-control-plane" >/dev/null 2>&1 || true
            docker network rm "${KIND_DOCKER_NETWORK_NAME}" >/dev/null 2>&1 || true
          fi
