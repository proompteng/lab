name: agents-ci

permissions:
  actions: read
  contents: read

on:
  pull_request:
    paths:
      - 'apps/froussard/src/**'
      - 'bun.lock'
      - 'package.json'
      - 'argocd/applications/argo-workflows/**'
      - 'argocd/applications/agents/**'
      - 'argocd/applications/facteur/**'
      - 'argocd/applications/froussard/**'
      - 'argocd/applications/graf/**'
      - 'argocd/applications/traefik/values.yaml'
      - 'argocd/applications/torghut/**'
      - 'charts/agents/**'
      - 'docs/agents/**'
      - 'docs/autonomous-codex-design.md'
      - 'docs/graf-codex-research.md'
      - 'docs/runbooks/codex-docker.md'
      - 'docs/runbooks/kafka-broker-storage-recovery.md'
      - 'docs/torghut/whitepaper-research-workflow.md'
      - 'docs/torghut/design-system/v5/12-dspy-framework-adoption-for-quant-llm-autonomous-trading-2026-02-25.md'
      - 'packages/bumba/**'
      - 'packages/agent-contracts/**'
      - 'packages/codex/**'
      - 'packages/cx-tools/**'
      - 'packages/design/**'
      - 'packages/discord/**'
      - 'packages/otel/**'
      - 'packages/scripts/src/agents/**'
      - 'packages/scripts/src/shared/**'
      - 'packages/temporal-bun-sdk/**'
      - 'proto/proompteng/facteur/v1/contract.proto'
      - 'services/agents/**'
      - 'services/bumba/**'
      - 'services/facteur/README.md'
      - 'services/facteur/cmd/**'
      - 'services/facteur/config/**'
      - 'services/facteur/internal/**'
      - 'services/graf/src/main/kotlin/**'
      - 'services/graf/src/test/kotlin/**'
      - 'services/graf/README.md'
      - 'services/graf/build.gradle.kts'
      - 'services/torghut/app/main.py'
      - 'services/torghut/app/config.py'
      - 'services/torghut/app/trading/llm/**'
      - 'services/torghut/app/whitepapers/**'
      - 'services/torghut/scripts/run_dspy_workflow.py'
      - 'services/torghut/tests/test_live_config_manifest_contract.py'
      - 'services/torghut/tests/test_llm_dspy_workflow.py'
      - 'services/torghut/tests/test_run_dspy_workflow.py'
      - 'services/torghut/tests/test_whitepaper_api.py'
      - 'services/torghut/tests/test_whitepaper_workflow.py'
      - 'scripts/agents/**'
      - 'scripts/download_crd_schema.py'
      - '.github/workflows/agents-build-push.yml'
      - '.github/workflows/agents-ci.yml'
      - '.github/workflows/agents-deploy-automerge.yml'
      - '.github/workflows/agents-release.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/froussard/src/**'
      - 'bun.lock'
      - 'package.json'
      - 'argocd/applications/argo-workflows/**'
      - 'argocd/applications/agents/**'
      - 'argocd/applications/facteur/**'
      - 'argocd/applications/froussard/**'
      - 'argocd/applications/graf/**'
      - 'argocd/applications/traefik/values.yaml'
      - 'argocd/applications/torghut/**'
      - 'charts/agents/**'
      - 'docs/agents/**'
      - 'docs/autonomous-codex-design.md'
      - 'docs/graf-codex-research.md'
      - 'docs/runbooks/codex-docker.md'
      - 'docs/runbooks/kafka-broker-storage-recovery.md'
      - 'docs/torghut/whitepaper-research-workflow.md'
      - 'docs/torghut/design-system/v5/12-dspy-framework-adoption-for-quant-llm-autonomous-trading-2026-02-25.md'
      - 'packages/bumba/**'
      - 'packages/agent-contracts/**'
      - 'packages/codex/**'
      - 'packages/cx-tools/**'
      - 'packages/design/**'
      - 'packages/discord/**'
      - 'packages/otel/**'
      - 'packages/scripts/src/agents/**'
      - 'packages/scripts/src/shared/**'
      - 'packages/temporal-bun-sdk/**'
      - 'proto/proompteng/facteur/v1/contract.proto'
      - 'services/agents/**'
      - 'services/bumba/**'
      - 'services/facteur/README.md'
      - 'services/facteur/cmd/**'
      - 'services/facteur/config/**'
      - 'services/facteur/internal/**'
      - 'services/graf/src/main/kotlin/**'
      - 'services/graf/src/test/kotlin/**'
      - 'services/graf/README.md'
      - 'services/graf/build.gradle.kts'
      - 'services/torghut/app/main.py'
      - 'services/torghut/app/config.py'
      - 'services/torghut/app/trading/llm/**'
      - 'services/torghut/app/whitepapers/**'
      - 'services/torghut/scripts/run_dspy_workflow.py'
      - 'services/torghut/tests/test_live_config_manifest_contract.py'
      - 'services/torghut/tests/test_llm_dspy_workflow.py'
      - 'services/torghut/tests/test_run_dspy_workflow.py'
      - 'services/torghut/tests/test_whitepaper_api.py'
      - 'services/torghut/tests/test_whitepaper_workflow.py'
      - 'scripts/agents/**'
      - 'scripts/download_crd_schema.py'
      - '.github/workflows/agents-build-push.yml'
      - '.github/workflows/agents-ci.yml'
      - '.github/workflows/agents-deploy-automerge.yml'
      - '.github/workflows/agents-release.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install kustomize
        run: |
          KUSTOMIZE_VERSION="5.8.0"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          TARBALL="kustomize_v${KUSTOMIZE_VERSION}_${OS}_${ARCH}.tar.gz"
          URL="https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v${KUSTOMIZE_VERSION}/${TARBALL}"
          curl -fsSL -o kustomize.tar.gz "${URL}"
          tar -xzf kustomize.tar.gz kustomize
          chmod +x kustomize
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="v0.7.0"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          TARBALL="kubeconform-${OS}-${ARCH}.tar.gz"
          URL="https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/${TARBALL}"
          curl -fsSL -o kubeconform.tar.gz "${URL}"
          tar -xzf kubeconform.tar.gz kubeconform
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Validate Agents chart and CRDs
        run: scripts/agents/validate-agents.sh

  integration:
    runs-on: arc-arm64
    env:
      # ARC runners run with hostNetwork=true; a shared "kind" docker bridge subnet can collide across pods.
      # Use a per-run docker network for kind to keep routing deterministic.
      KIND_DOCKER_NETWORK_NAME: kind-${{ github.run_id }}-${{ github.run_attempt }}
      KIND_CLUSTER_NAME: agents-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install kubectl
        run: |
          KUBECTL_VERSION="v1.29.4"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64|amd64) ARCH="amd64" ;;
            aarch64|arm64) ARCH="arm64" ;;
            *)
              echo "Unsupported architecture: ${ARCH}" >&2
              exit 1
              ;;
          esac
          curl \
            --connect-timeout 20 \
            --max-time 120 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 5 \
            -fsSL \
            -o kubectl \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}/kubectl"
          chmod +x kubectl
          install_dir="${RUNNER_TEMP:-/tmp}/agents-ci-bin"
          mkdir -p "${install_dir}"
          mv kubectl "${install_dir}/kubectl"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install dependencies
        run: >-
          bun install --frozen-lockfile --ignore-scripts
          --filter @proompteng/source
          --filter @proompteng/agentctl
          --filter @proompteng/bumba
          --filter @proompteng/codex
          --filter @proompteng/cx-tools
          --filter @proompteng/design
          --filter @proompteng/discord
          --filter @proompteng/agents
          --filter @proompteng/otel
          --filter @proompteng/scripts
          --filter @proompteng/temporal-bun-sdk

      - name: Run Agents script unit tests
        run: |
          bun test \
            packages/scripts/src/agents/__tests__/build-image.test.ts \
            packages/scripts/src/agents/__tests__/resolve-agents-image-mode.test.ts \
            packages/scripts/src/agents/__tests__/resolve-published-agents-images.test.ts \
            packages/scripts/src/agents/__tests__/agentrun-ingestion-mitigation.test.ts \
            packages/scripts/src/agents/__tests__/smoke-agents.test.ts \
            packages/scripts/src/agents/__tests__/deploy-service.test.ts \
            packages/scripts/src/shared/__tests__/docker.test.ts

      - name: Run Agents service unit tests
        run: |
          bun run --cwd services/agents tsc
          bun run --cwd services/agents test

      - name: Classify Agents image mode
        id: agents_image_mode
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(mktemp)"
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            git ls-files > "${CHANGED_FILES}"
          else
            git diff --name-only "${BASE_SHA}...${HEAD_SHA}" > "${CHANGED_FILES}"
          fi

          echo "Changed files for image classification:"
          cat "${CHANGED_FILES}"
          bun packages/scripts/src/agents/resolve-agents-image-mode.ts < "${CHANGED_FILES}" >> "${GITHUB_OUTPUT}"

          echo "Selected Agents image mode:"
          cat "${GITHUB_OUTPUT}" | tail -n 3

      - name: Build agentctl binary
        run: bun run --filter @proompteng/agentctl build:bin

      - name: Ensure kind Docker network
        run: scripts/agents/ensure-kind-network.sh

      - name: Create kind cluster
        uses: helm/kind-action@v1
        env:
          KIND_EXPERIMENTAL_DOCKER_NETWORK: ${{ env.KIND_DOCKER_NETWORK_NAME }}
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          version: v0.31.0
          node_image: mirror.gcr.io/kindest/node:v1.29.4
          kubectl_version: v1.29.4
          wait: 180s

      - name: Resolve published Agents images from GitOps values
        if: steps.agents_image_mode.outputs.NEEDS_LOCAL_AGENTS_IMAGE != 'true'
        id: published_agents_images
        run: |
          set -euo pipefail
          bun run packages/scripts/src/agents/resolve-published-agents-images.ts \
            --values-path argocd/applications/agents/values.yaml \
            --output "${GITHUB_OUTPUT}"

      - name: Select published Agents images
        if: steps.agents_image_mode.outputs.NEEDS_LOCAL_AGENTS_IMAGE != 'true'
        run: |
          set -euo pipefail
          CONTROL_PLANE_IMAGE_REPOSITORY="${{ steps.published_agents_images.outputs.control_plane_image_repository }}"
          CONTROL_PLANE_IMAGE_TAG="${{ steps.published_agents_images.outputs.control_plane_image_tag }}"
          CONTROL_PLANE_IMAGE_DIGEST="${{ steps.published_agents_images.outputs.control_plane_image_digest }}"
          CONTROLLER_IMAGE_REPOSITORY="${{ steps.published_agents_images.outputs.controller_image_repository }}"
          CONTROLLER_IMAGE_TAG="${{ steps.published_agents_images.outputs.controller_image_tag }}"
          CONTROLLER_IMAGE_DIGEST="${{ steps.published_agents_images.outputs.controller_image_digest }}"
          RUNNER_IMAGE_REPOSITORY="${{ steps.published_agents_images.outputs.runner_image_repository }}"
          RUNNER_IMAGE_TAG="${{ steps.published_agents_images.outputs.runner_image_tag }}"
          RUNNER_IMAGE_DIGEST="${{ steps.published_agents_images.outputs.runner_image_digest }}"
          IMAGE_SOURCE_SHA="${{ steps.published_agents_images.outputs.source_sha }}"

          if [ -z "${CONTROL_PLANE_IMAGE_DIGEST}" ] || [ -z "${CONTROLLER_IMAGE_DIGEST}" ] || [ -z "${RUNNER_IMAGE_DIGEST}" ]; then
            echo "Published Agents image digest is empty."
            exit 1
          fi

          echo "Using published Agents control-plane image ${CONTROL_PLANE_IMAGE_REPOSITORY}:${CONTROL_PLANE_IMAGE_TAG}@${CONTROL_PLANE_IMAGE_DIGEST}"
          echo "Using published Agents controller image ${CONTROLLER_IMAGE_REPOSITORY}:${CONTROLLER_IMAGE_TAG}@${CONTROLLER_IMAGE_DIGEST}"
          echo "Using published Agents runner image ${RUNNER_IMAGE_REPOSITORY}:${RUNNER_IMAGE_TAG}@${RUNNER_IMAGE_DIGEST}"
          {
            echo "BUILT_AGENTS_CONTROL_PLANE_IMAGE_REPOSITORY=${CONTROL_PLANE_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_CONTROL_PLANE_IMAGE_TAG=${CONTROL_PLANE_IMAGE_TAG}"
            echo "BUILT_AGENTS_CONTROL_PLANE_IMAGE_DIGEST=${CONTROL_PLANE_IMAGE_DIGEST}"
            echo "BUILT_AGENTS_CONTROLLER_IMAGE_REPOSITORY=${CONTROLLER_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_CONTROLLER_IMAGE_TAG=${CONTROLLER_IMAGE_TAG}"
            echo "BUILT_AGENTS_CONTROLLER_IMAGE_DIGEST=${CONTROLLER_IMAGE_DIGEST}"
            echo "BUILT_AGENTS_RUNNER_IMAGE_REPOSITORY=${RUNNER_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_RUNNER_IMAGE_TAG=${RUNNER_IMAGE_TAG}"
            echo "BUILT_AGENTS_RUNNER_IMAGE_DIGEST=${RUNNER_IMAGE_DIGEST}"
            echo "BUILT_AGENTS_IMAGE_SOURCE_SHA=${IMAGE_SOURCE_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Build and preload local Agents images into kind
        if: steps.agents_image_mode.outputs.NEEDS_LOCAL_AGENTS_IMAGE == 'true'
        run: |
          set -euxo pipefail

          WORKSPACE="${GITHUB_WORKSPACE}"
          CONTROL_PLANE_IMAGE_REPOSITORY="${AGENTS_CONTROL_PLANE_IMAGE_REPOSITORY:-${AGENTS_IMAGE_REPOSITORY:-agents-control-plane-local}}"
          CONTROLLER_IMAGE_REPOSITORY="${AGENTS_CONTROLLER_IMAGE_REPOSITORY:-agents-controller-local}"
          RUNNER_IMAGE_REPOSITORY="${AGENTS_RUNNER_IMAGE_REPOSITORY:-agents-codex-runner-local}"
          DEFAULT_IMAGE_TAG_SUFFIX="${GITHUB_SHA:-unknown}"
          IMAGE_TAG="${AGENTS_IMAGE_TAG:-ci-$DEFAULT_IMAGE_TAG_SUFFIX}"
          PRUNE_DIR="$(mktemp -d /tmp/agents-prune-XXXXXX)"
          KIND_IMAGE_TAR="${RUNNER_TEMP:-/tmp}/agents-${GITHUB_RUN_ID:-0}-${GITHUB_RUN_ATTEMPT:-0}-${IMAGE_TAG}.tar"
          BUILD_HEARTBEAT_PID=0
          KIND_HEARTBEAT_PID=0
          cleanup_preload_resources() {
            if [ "${BUILD_HEARTBEAT_PID}" != "0" ]; then
              kill "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
            fi
            if [ "${KIND_HEARTBEAT_PID}" != "0" ]; then
              kill "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
            fi
            if [ -f "${KIND_IMAGE_TAR}" ]; then
              rm -f "${KIND_IMAGE_TAR}"
            fi
            rm -rf "${PRUNE_DIR}"
          }
          trap cleanup_preload_resources EXIT

          run_with_progress() {
            local phase="$1"
            local timeout_minutes="$2"
            shift 2

            local heartbeat_pid
            local timeout_status=0
            local status=0

            (
              while :; do
                echo "[progress] ${phase} for ${IMAGE} at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
                sleep 120
              done
            ) &
            heartbeat_pid=$!

            if [ "${phase}" = "Docker build" ]; then
              BUILD_HEARTBEAT_PID="${heartbeat_pid}"
            else
              KIND_HEARTBEAT_PID="${heartbeat_pid}"
            fi

            if timeout -k 30s "${timeout_minutes}m" "$@"; then
              status=0
            else
              status=$?
              timeout_status="$status"
            fi

            if [ "${phase}" = "Docker build" ]; then
              kill "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${BUILD_HEARTBEAT_PID}" 2>/dev/null || true
              BUILD_HEARTBEAT_PID=0
            else
              kill "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
              wait "${KIND_HEARTBEAT_PID}" 2>/dev/null || true
              KIND_HEARTBEAT_PID=0
            fi

            if [ "${status}" -ne 0 ]; then
              echo "::error::${phase} failed with exit code ${status} for ${IMAGE}."
              if [ "${timeout_status}" -eq 124 ]; then
                echo "::error::${phase} exceeded ${timeout_minutes}m timeout for ${IMAGE}."
              fi
            fi

            return "${status}"
          }

          run_step_failure() {
            local message="$1"
            local code="$2"
            echo "${message}; exit code=${code}." >&2
            echo "${message}" >&2
            exit 1
          }

          run_kind_load_with_fallback() {
            if ! run_with_progress "docker save image archive" "${KIND_LOAD_TIMEOUT_MINUTES}" docker save --output "${KIND_IMAGE_TAR}" "${IMAGE}"; then
              echo "Failed to save local image archive ${KIND_IMAGE_TAR}."
              return 1
            fi

            echo "Saved image archive ${KIND_IMAGE_TAR}."

            if run_with_progress "kind load image-archive" "${KIND_LOAD_TIMEOUT_MINUTES}" kind load image-archive "${KIND_IMAGE_TAR}" --name "${KIND_CLUSTER_NAME}"; then
              echo "Loaded local image archive ${KIND_IMAGE_TAR} into kind cluster ${KIND_CLUSTER_NAME}."
              return 0
            fi

            echo "kind load image-archive failed; retrying with docker-image path."
            if run_with_progress "kind load docker-image" "${KIND_LOAD_TIMEOUT_MINUTES}" kind load docker-image "${IMAGE}" --name "${KIND_CLUSTER_NAME}"; then
              echo "Loaded local image ${IMAGE} into kind cluster ${KIND_CLUSTER_NAME}."
              return 0
            fi
            return 1
          }

          run_step() {
            local label="$1"
            shift
            echo "::group::${label}"
            "$@"
            echo "::endgroup::"
          }

          PREP_TIMEOUT_MINUTES=25
          echo "Pruning Agents image build context to ${PRUNE_DIR}"
          run_step "Prune turbo context" timeout "${PREP_TIMEOUT_MINUTES}m" bunx turbo prune \
            --scope=@proompteng/agents \
            --scope=@proompteng/agent-contracts \
            --scope=@proompteng/codex \
            --scope=@proompteng/otel \
            --scope=@proompteng/temporal-bun-sdk \
            --docker \
            --out-dir="${PRUNE_DIR}"
          cp "${WORKSPACE}/tsconfig.base.json" "${PRUNE_DIR}/tsconfig.base.json"
          # The runner Dockerfile is intentionally usable from the full repo root for release builds.
          # The kind integration job builds it from the pruned context, so materialize the same root
          # paths from Turbo's full workspace output.
          mkdir -p "${PRUNE_DIR}/services" "${PRUNE_DIR}/packages"
          cp -R "${PRUNE_DIR}/full/services/agents" "${PRUNE_DIR}/services/agents"
          cp -R "${PRUNE_DIR}/full/packages/codex" "${PRUNE_DIR}/packages/codex"
          if [ -d "${WORKSPACE}/skills" ]; then
            mkdir -p "${PRUNE_DIR}/skills"
            cp -R "${WORKSPACE}/skills/." "${PRUNE_DIR}/skills/"
          fi
          if [ -d "${WORKSPACE}/packages/cx-tools" ]; then
            mkdir -p "${PRUNE_DIR}/full/packages" "${PRUNE_DIR}/json/packages"
            cp -R "${WORKSPACE}/packages/cx-tools/." "${PRUNE_DIR}/full/packages/cx-tools/"
            cp -R "${WORKSPACE}/packages/cx-tools/." "${PRUNE_DIR}/json/packages/cx-tools/"
          fi

          find "${PRUNE_DIR}/full" "${PRUNE_DIR}/json" \
            -type d -name node_modules -prune -exec rm -rf {} +

          copy_pruned_workspace_dist() {
            local pkg_dir
            local rel_path
            local src_dir

            shopt -s nullglob
            for pkg_dir in "${PRUNE_DIR}/full/packages/"* "${PRUNE_DIR}/full/services/"*; do
              [ -d "${pkg_dir}" ] || continue
              rel_path="${pkg_dir#"${PRUNE_DIR}/full/"}"
              src_dir="${WORKSPACE}/${rel_path}"

              if [ ! -d "${src_dir}/dist" ]; then
                continue
              fi

              cp -R "${src_dir}/dist" "${pkg_dir}"
              mkdir -p "${PRUNE_DIR}/json/${rel_path}"
              cp -R "${src_dir}/dist" "${PRUNE_DIR}/json/${rel_path}"
            done
            shopt -u nullglob
          }
          copy_pruned_workspace_dist

          AGENTS_VERSION="$(git -C "${WORKSPACE}" rev-parse --short HEAD)"
          AGENTS_COMMIT="$(git -C "${WORKSPACE}" rev-parse HEAD)"
          CONTROL_PLANE_IMAGE="${CONTROL_PLANE_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          CONTROLLER_IMAGE="${CONTROLLER_IMAGE_REPOSITORY}:${IMAGE_TAG}"
          RUNNER_IMAGE="${RUNNER_IMAGE_REPOSITORY}:${IMAGE_TAG}"

          # Use the mirror.gcr.io Bun mirror in CI to avoid Docker Hub anonymous pull limits.
          # Local image rebuilds fail with explicit diagnostics on timeout.
          # ARC arm64 runners can spend well over 18 minutes in a pruned Agents docker
          # build while still making forward progress, so give the local image build enough headroom
          # to complete instead of terminating a healthy build.
          BUILD_TIMEOUT_MINUTES=30
          KIND_LOAD_TIMEOUT_MINUTES=20

          IMAGE="${CONTROL_PLANE_IMAGE}"
          if run_with_progress "Docker build" "${BUILD_TIMEOUT_MINUTES}" env DOCKER_BUILDKIT=1 docker build \
            -f "${WORKSPACE}/services/agents/Dockerfile" \
            --target control-plane \
            --network=host \
            -t "${CONTROL_PLANE_IMAGE}" \
            --build-arg "AGENTS_VERSION=${AGENTS_VERSION}" \
            --build-arg "AGENTS_COMMIT=${AGENTS_COMMIT}" \
            --build-arg "AGENTS_BUILD_CI=true" \
            --build-arg "AGENTS_BUILD_SOURCEMAP=0" \
            --build-arg "AGENTS_BUILD_LOG_LEVEL=warn" \
            --build-arg "BUN_BASE_IMAGE=mirror.gcr.io/oven/bun" \
            --progress=plain \
            "${PRUNE_DIR}"; then
            echo "Built local control-plane image ${CONTROL_PLANE_IMAGE}."
          else
            run_step_failure "Failed to build local image ${CONTROL_PLANE_IMAGE}" "$?"
          fi

          IMAGE="${CONTROLLER_IMAGE}"
          if run_with_progress "Docker build" "${BUILD_TIMEOUT_MINUTES}" env DOCKER_BUILDKIT=1 docker build \
            -f "${WORKSPACE}/services/agents/Dockerfile" \
            --target controller \
            --network=host \
            -t "${CONTROLLER_IMAGE}" \
            --build-arg "AGENTS_VERSION=${AGENTS_VERSION}" \
            --build-arg "AGENTS_COMMIT=${AGENTS_COMMIT}" \
            --build-arg "AGENTS_BUILD_CI=true" \
            --build-arg "AGENTS_BUILD_SOURCEMAP=0" \
            --build-arg "AGENTS_BUILD_LOG_LEVEL=warn" \
            --build-arg "BUN_BASE_IMAGE=mirror.gcr.io/oven/bun" \
            --progress=plain \
            "${PRUNE_DIR}"; then
            echo "Built local controller image ${CONTROLLER_IMAGE}."
          else
            run_step_failure "Failed to build local image ${CONTROLLER_IMAGE}" "$?"
          fi

          IMAGE="${RUNNER_IMAGE}"
          if run_with_progress "Runner Docker build" "${BUILD_TIMEOUT_MINUTES}" env DOCKER_BUILDKIT=1 docker build \
            -f "${WORKSPACE}/services/agents/Dockerfile.codex-runner" \
            --network=host \
            -t "${RUNNER_IMAGE}" \
            --build-arg "BUN_BASE_IMAGE=mirror.gcr.io/oven/bun" \
            --progress=plain \
            "${PRUNE_DIR}"; then
            echo "Built local runner image ${RUNNER_IMAGE}."
          else
            run_step_failure "Failed to build local image ${RUNNER_IMAGE}" "$?"
          fi

          RUNNER_SMOKE_SPEC_JSON="$(cat <<'JSON'
          {
            "schemaVersion": "agents.proompteng.ai/runner/v1",
            "provider": "runner-image-smoke",
            "providerSpec": {
              "binary": "/bin/sh",
              "argsTemplate": ["-c", "echo agents-runner-image-smoke"]
            },
            "adapter": {
              "type": "exec"
            }
          }
          JSON
          )"
          docker run --rm \
            -e AGENT_RUNNER_SPEC="${RUNNER_SMOKE_SPEC_JSON}" \
            "${RUNNER_IMAGE}" \
            agent-runner

          IMAGE="${CONTROL_PLANE_IMAGE}"
          if ! run_kind_load_with_fallback; then
            run_step_failure "Failed to preload local image ${CONTROL_PLANE_IMAGE} into kind cluster ${KIND_CLUSTER_NAME}" "$?"
          fi

          IMAGE="${CONTROLLER_IMAGE}"
          if ! run_kind_load_with_fallback; then
            run_step_failure "Failed to preload local image ${CONTROLLER_IMAGE} into kind cluster ${KIND_CLUSTER_NAME}" "$?"
          fi

          IMAGE="${RUNNER_IMAGE}"
          if ! run_kind_load_with_fallback; then
            run_step_failure "Failed to preload local image ${RUNNER_IMAGE} into kind cluster ${KIND_CLUSTER_NAME}" "$?"
          fi

          {
            echo "BUILT_AGENTS_IMAGE_REPOSITORY=${CONTROL_PLANE_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_IMAGE_TAG=${IMAGE_TAG}"
            echo "BUILT_AGENTS_IMAGE_DIGEST="
            echo "BUILT_AGENTS_CONTROL_PLANE_IMAGE_REPOSITORY=${CONTROL_PLANE_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_CONTROL_PLANE_IMAGE_TAG=${IMAGE_TAG}"
            echo "BUILT_AGENTS_CONTROL_PLANE_IMAGE_DIGEST="
            echo "BUILT_AGENTS_CONTROLLER_IMAGE_REPOSITORY=${CONTROLLER_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_CONTROLLER_IMAGE_TAG=${IMAGE_TAG}"
            echo "BUILT_AGENTS_CONTROLLER_IMAGE_DIGEST="
            echo "BUILT_AGENTS_RUNNER_IMAGE_REPOSITORY=${RUNNER_IMAGE_REPOSITORY}"
            echo "BUILT_AGENTS_RUNNER_IMAGE_TAG=${IMAGE_TAG}"
            echo "BUILT_AGENTS_RUNNER_IMAGE_DIGEST="
            echo "BUILT_AGENTS_IMAGE_SOURCE_SHA=${GITHUB_SHA}"
          } >> "${GITHUB_ENV}"

      - name: Run agents integration smoke test
        env:
          AGENTS_NAMESPACE: agents-ci
          AGENTS_RELEASE_NAME: agents-ci
          AGENTS_VALUES_FILE: scripts/agents/values-ci.yaml
          AGENTS_CREATE_NAMESPACE: 'true'
          AGENTS_DB_BOOTSTRAP: 'true'
          AGENTS_DB_IMAGE: mirror.gcr.io/pgvector/pgvector:pg16
          AGENTS_TIMEOUT: 15m
          AGENTS_IMAGE_REPOSITORY: ${{ env.BUILT_AGENTS_IMAGE_REPOSITORY }}
          AGENTS_IMAGE_TAG: ${{ env.BUILT_AGENTS_IMAGE_TAG }}
          AGENTS_IMAGE_DIGEST: ${{ env.BUILT_AGENTS_IMAGE_DIGEST }}
          AGENTS_CONTROL_PLANE_IMAGE_REPOSITORY: ${{ env.BUILT_AGENTS_CONTROL_PLANE_IMAGE_REPOSITORY }}
          AGENTS_CONTROL_PLANE_IMAGE_TAG: ${{ env.BUILT_AGENTS_CONTROL_PLANE_IMAGE_TAG }}
          AGENTS_CONTROL_PLANE_IMAGE_DIGEST: ${{ env.BUILT_AGENTS_CONTROL_PLANE_IMAGE_DIGEST }}
          AGENTS_CONTROLLER_IMAGE_REPOSITORY: ${{ env.BUILT_AGENTS_CONTROLLER_IMAGE_REPOSITORY }}
          AGENTS_CONTROLLER_IMAGE_TAG: ${{ env.BUILT_AGENTS_CONTROLLER_IMAGE_TAG }}
          AGENTS_CONTROLLER_IMAGE_DIGEST: ${{ env.BUILT_AGENTS_CONTROLLER_IMAGE_DIGEST }}
          AGENTS_RUNNER_IMAGE_REPOSITORY: ${{ env.BUILT_AGENTS_RUNNER_IMAGE_REPOSITORY }}
          AGENTS_RUNNER_IMAGE_TAG: ${{ env.BUILT_AGENTS_RUNNER_IMAGE_TAG }}
          AGENTS_RUNNER_IMAGE_DIGEST: ${{ env.BUILT_AGENTS_RUNNER_IMAGE_DIGEST }}
          AGENTCTL_BIN: services/agents/agentctl/dist/agentctl
        run: |
          set -euo pipefail
          timeout -k 30s "${AGENTS_TIMEOUT}" bun run packages/scripts/src/agents/smoke-agents.ts

      - name: Cleanup agents integration release
        if: always()
        run: |
          set -euo pipefail
          # Kind cluster is ephemeral; prefer cleanup that does not depend on kubectl connectivity.
          if command -v docker >/dev/null 2>&1; then
            docker rm -f "${KIND_CLUSTER_NAME}-control-plane" >/dev/null 2>&1 || true
            docker network rm "${KIND_DOCKER_NETWORK_NAME}" >/dev/null 2>&1 || true
          fi
