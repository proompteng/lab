name: symphony-release

on:
  workflow_run:
    workflows:
      - symphony-build-push
    types:
      - completed
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to promote (defaults to current main HEAD)
        required: false
        type: string
      image_tag:
        description: Image tag to promote (defaults to source short SHA)
        required: false
        type: string
      image_digest:
        description: Image digest override (sha256:...)
        required: false
        type: string

concurrency:
  group: symphony-release-${{ github.event.workflow_run.head_sha || inputs.commit_sha || github.ref }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
      }}
    runs-on: arc-arm64
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download release contract artifact from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: symphony-release-contract
          path: .artifacts/symphony
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_SHA_INPUT: ${{ inputs.commit_sha }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bun run packages/scripts/src/symphony/resolve-release-metadata.ts \
            --event-name "${EVENT_NAME}" \
            --workflow-run-head-sha "${WORKFLOW_RUN_HEAD_SHA}" \
            --commit-sha-input "${COMMIT_SHA_INPUT}" \
            --image-tag-input "${IMAGE_TAG_INPUT}" \
            --output "${GITHUB_OUTPUT}"

      - name: Checkout source revision
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git checkout --force "${{ steps.meta.outputs.source_sha }}"

      - name: Resolve image digest
        if: steps.meta.outputs.promote == 'true'
        id: digest
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          CONTRACT_DIGEST: ${{ steps.meta.outputs.contract_digest }}
          DIGEST_INPUT: ${{ inputs.image_digest }}
        run: |
          set -euo pipefail

          if [ -n "${DIGEST_INPUT}" ]; then
            DIGEST="${DIGEST_INPUT}"
          elif [ -n "${CONTRACT_DIGEST}" ]; then
            DIGEST="${CONTRACT_DIGEST}"
          else
            DIGEST="$(docker buildx imagetools inspect "${IMAGE_NAME}:${IMAGE_TAG}" | awk '/^Digest:/ { print $2; exit }')"
          fi

          DIGEST="${DIGEST#*@}"
          if ! printf '%s' "${DIGEST}" | grep -Eiq '^sha256:[0-9a-f]{64}$'; then
            echo "Resolved digest '${DIGEST}' is invalid"
            exit 1
          fi

          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Update Symphony manifests
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        env:
          SYMPHONY_IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          SYMPHONY_IMAGE_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          bun run packages/scripts/src/symphony/update-manifests.ts \
            --tag "${SYMPHONY_IMAGE_TAG}" \
            --digest "${SYMPHONY_IMAGE_DIGEST}" \
            --rollout-timestamp "${TIMESTAMP}"

      - name: Check for manifest changes
        if: steps.meta.outputs.promote == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- \
            argocd/applications/symphony/kustomization.yaml \
            argocd/applications/symphony/deployment.patch.yaml \
            argocd/applications/symphony-jangar/kustomization.yaml \
            argocd/applications/symphony-jangar/deployment.patch.yaml \
            argocd/applications/symphony-torghut/kustomization.yaml \
            argocd/applications/symphony-torghut/deployment.patch.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create deploy pull request
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/symphony-release-${{ steps.meta.outputs.tag }}
          base: main
          title: 'chore(symphony): promote image ${{ steps.meta.outputs.tag }}'
          commit-message: 'chore(symphony): promote image ${{ steps.meta.outputs.tag }}'
          delete-branch: true
          add-paths: |
            argocd/applications/symphony/kustomization.yaml
            argocd/applications/symphony/deployment.patch.yaml
            argocd/applications/symphony-jangar/kustomization.yaml
            argocd/applications/symphony-jangar/deployment.patch.yaml
            argocd/applications/symphony-torghut/kustomization.yaml
            argocd/applications/symphony-torghut/deployment.patch.yaml
          body: |
            ## Summary
            Promote the Symphony fleet image into GitOps manifests.

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Image tag: `${{ steps.meta.outputs.tag }}`
            - Image digest: `${{ steps.digest.outputs.digest }}`

      - name: No manifest changes detected
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed != 'true'
        run: echo 'No Symphony manifest changes detected.'

      - name: Promotion skipped (stale workflow_run)
        if: steps.meta.outputs.promote != 'true'
        run: echo 'Skipping stale workflow_run promotion because source SHA is not current main.'
