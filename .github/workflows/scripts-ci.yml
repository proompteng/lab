name: packages-scripts

on:
  push:
    branches:
      - main
    paths:
      - 'packages/scripts/**'
      - 'argocd/root.yaml'
      - 'argocd/applications/argocd/**'
      - 'argocd/applications/observability/**'
      - 'argocd/applicationsets/**'
      - 'docs/torghut/ceph-migration.md'
      - 'docs/agents/designs/handoff-common.md'
      - 'docs/runbooks/rook-ceph-client-ops-performance.md'
      - 'docs/nix-enabled-app-build-performance-rollout-plan.md'
      - 'devices/altra/docs/cluster-bootstrap.md'
      - 'devices/ryzen/docs/cluster-bootstrap.md'
      - 'devices/turin/docs/nvidia-gpu-on-talos.md'
      - 'devices/turin/docs/cluster-join-plan.md'
      - 'devices/galactic/docs/add-control-plane-node.md'
      - 'devices/altra/manifests/network-mtu.patch.yaml'
      - 'devices/ryzen/manifests/network-mtu.patch.yaml'
      - 'devices/turin/manifests/network-mtu.patch.yaml'
      - '.github/workflows/scripts-ci.yml'
  pull_request:
    paths:
      - 'packages/scripts/**'
      - 'argocd/root.yaml'
      - 'argocd/applications/argocd/**'
      - 'argocd/applications/observability/**'
      - 'argocd/applicationsets/**'
      - 'docs/torghut/ceph-migration.md'
      - 'docs/agents/designs/handoff-common.md'
      - 'docs/runbooks/rook-ceph-client-ops-performance.md'
      - 'docs/nix-enabled-app-build-performance-rollout-plan.md'
      - 'devices/altra/docs/cluster-bootstrap.md'
      - 'devices/ryzen/docs/cluster-bootstrap.md'
      - 'devices/turin/docs/nvidia-gpu-on-talos.md'
      - 'devices/turin/docs/cluster-join-plan.md'
      - 'devices/galactic/docs/add-control-plane-node.md'
      - 'devices/altra/manifests/network-mtu.patch.yaml'
      - 'devices/ryzen/manifests/network-mtu.patch.yaml'
      - 'devices/turin/manifests/network-mtu.patch.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/scripts --filter @proompteng/bumba --filter @proompteng/temporal-bun-sdk && bun run --filter @proompteng/temporal-bun-sdk build
      lint-command: bun run --filter @proompteng/scripts lint
      oxlint-command: bun run --cwd packages/scripts lint:oxlint
      oxlint-type-command: bun run --cwd packages/scripts lint:oxlint:type
      test-command: bunx tsc --noEmit --project packages/scripts/tsconfig.atlas.json && bun test packages/scripts/src
