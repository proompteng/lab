name: packages-scripts

on:
  push:
    branches:
      - main
    paths:
      - 'packages/scripts/**'
      - 'argocd/root.yaml'
      - 'argocd/applicationsets/**'
      - 'docs/runbooks/rook-ceph-client-ops-performance.md'
      - 'docs/nix-enabled-app-build-performance-rollout-plan.md'
      - '.github/workflows/scripts-ci.yml'
  pull_request:
    paths:
      - 'packages/scripts/**'
      - 'argocd/root.yaml'
      - 'argocd/applicationsets/**'
      - 'docs/runbooks/rook-ceph-client-ops-performance.md'
      - 'docs/nix-enabled-app-build-performance-rollout-plan.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/scripts --filter @proompteng/temporal-bun-sdk
      lint-command: bun run --filter @proompteng/scripts lint
      oxlint-command: bun run --cwd packages/scripts lint:oxlint
      oxlint-type-command: bun run --cwd packages/scripts lint:oxlint:type
      test-command: bun test packages/scripts/src
