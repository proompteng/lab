          if-no-files-found: error
          include-hidden-files: true

  pytest-shards:
    name: Pytest shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
    if: ${{ needs.changes.outputs.service == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - name: Checkout
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git init "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            git fetch --no-tags --prune origin "+refs/pull/${PR_NUMBER}/merge:refs/remotes/origin/pull/${PR_NUMBER}/merge"
            git checkout --force "refs/remotes/origin/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --prune origin "+${GITHUB_REF}:refs/remotes/origin/workflow"
            git checkout --force "${GITHUB_SHA}" || git checkout --force refs/remotes/origin/workflow
          fi
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.11-torghut-uv-${{ hashFiles('services/torghut/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-torghut-uv-

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies (locked)
        working-directory: services/torghut
        run: uv sync --frozen --extra dev

      - name: Pytest shard coverage
        working-directory: services/torghut
        shell: bash
        env:
          COVERAGE_FILE: .coverage.${{ matrix.shard }}
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 8
        run: |
          set -euo pipefail
          collected_tests="$(mktemp)"
          uv run --frozen pytest --collect-only -q tests --ignore=tests/autoresearch_runner > "${collected_tests}"
          mapfile -t TEST_NODES < <(
            awk -v shard="${SHARD_INDEX}" -v total="${SHARD_TOTAL}" '
              /^tests\/.*::/ {
                collected += 1
                if (((collected - 1) % total) == shard) {
                  print
                }
              }
            ' "${collected_tests}"
          )
          printf 'Running %s test nodes in shard %s/%s\n' "${#TEST_NODES[@]}" "${SHARD_INDEX}" "${SHARD_TOTAL}"
          if [ "${#TEST_NODES[@]}" -eq 0 ]; then
            echo "No test nodes selected for shard ${SHARD_INDEX}"
            exit 1
          fi

          uv run --frozen pytest \
            -n auto \
            --dist=worksteal \
            --cov \
            --cov-branch \
            --cov-fail-under=0 \
            --cov-report= \
            "${TEST_NODES[@]}"

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: torghut-coverage-shard-${{ matrix.shard }}
          path: services/torghut/.coverage.${{ matrix.shard }}*
          if-no-files-found: error
          include-hidden-files: true

  pytest-autoresearch-runner:
    name: Pytest autoresearch runner ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
    if: ${{ needs.changes.outputs.service == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git init "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            git fetch --no-tags --prune origin "+refs/pull/${PR_NUMBER}/merge:refs/remotes/origin/pull/${PR_NUMBER}/merge"
            git checkout --force "refs/remotes/origin/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --prune origin "+${GITHUB_REF}:refs/remotes/origin/workflow"
            git checkout --force "${GITHUB_SHA}" || git checkout --force refs/remotes/origin/workflow
          fi
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.11-torghut-uv-${{ hashFiles('services/torghut/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-torghut-uv-

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies (locked)
        working-directory: services/torghut
        run: uv sync --frozen --extra dev

      - name: Pytest autoresearch runner coverage
        working-directory: services/torghut
        shell: bash
        env:
          COVERAGE_FILE: .coverage.autoresearch-runner-${{ matrix.shard }}
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4
        run: |
          set -euo pipefail
          collected_tests="$(mktemp)"
          uv run --frozen pytest --collect-only -q tests/autoresearch_runner > "${collected_tests}"
          mapfile -t TEST_NODES < <(
            awk -v shard="${SHARD_INDEX}" -v total="${SHARD_TOTAL}" '
              /^tests\/.*::/ {
                collected += 1
                if (((collected - 1) % total) == shard) {
                  print
                }
              }
              END {
                if (collected != 185) {
                  printf "EXPECTED_COUNT_MISMATCH:%d\n", collected
                }
              }
            ' "${collected_tests}"
          )
          last_index=$((${#TEST_NODES[@]} - 1))
          if [ "${#TEST_NODES[@]}" -gt 0 ] && [[ "${TEST_NODES[${last_index}]}" == EXPECTED_COUNT_MISMATCH:* ]]; then
            collected_count="${TEST_NODES[${last_index}]#EXPECTED_COUNT_MISMATCH:}"
            unset 'TEST_NODES[${last_index}]'
            echo "Expected 185 autoresearch runner tests after split, got ${collected_count}"
            exit 1
          fi
          printf 'Running %s autoresearch runner test nodes in shard %s/%s\n' \
            "${#TEST_NODES[@]}" "${SHARD_INDEX}" "${SHARD_TOTAL}"
          if [ "${#TEST_NODES[@]}" -eq 0 ]; then
            echo "No autoresearch runner test nodes selected for shard ${SHARD_INDEX}"
            exit 1
          fi

          uv run --frozen pytest \
            -n auto \
            --dist=worksteal \
            --cov \
            --cov-branch \
            --cov-fail-under=0 \
            --cov-report= \
            "${TEST_NODES[@]}"

      - name: Upload coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: torghut-coverage-autoresearch-runner-${{ matrix.shard }}
          path: services/torghut/.coverage.autoresearch-runner-${{ matrix.shard }}*
          if-no-files-found: error
          include-hidden-files: true

  lint-and-tests:
    name: Bytecode + pytest + coverage
    runs-on: ubuntu-latest
    needs:
      - changes
      - postgres-cas
      - static-guards
      - pytest-autoresearch-runner
      - pytest-shards
    if: ${{ always() && needs.changes.outputs.service == 'true' }}
    steps:
      - name: Check prerequisite jobs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ needs.static-guards.result }}" != "success" ]; then
            echo "Static guard job failed: ${{ needs.static-guards.result }}"
            exit 1
          fi
          if [ "${{ needs.postgres-cas.result }}" != "success" ]; then
            echo "PostgreSQL CAS job failed: ${{ needs.postgres-cas.result }}"
            exit 1
          fi
          if [ "${{ needs.pytest-shards.result }}" != "success" ]; then
            echo "Pytest shard job failed: ${{ needs.pytest-shards.result }}"
            exit 1
          fi
          if [ "${{ needs.pytest-autoresearch-runner.result }}" != "success" ]; then
            echo "Pytest autoresearch runner job failed: ${{ needs.pytest-autoresearch-runner.result }}"
            exit 1
          fi

      - name: Checkout
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git init "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            git fetch --no-tags --prune origin "+refs/pull/${PR_NUMBER}/merge:refs/remotes/origin/pull/${PR_NUMBER}/merge"
            git checkout --force "refs/remotes/origin/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --prune origin "+${GITHUB_REF}:refs/remotes/origin/workflow"
            git checkout --force "${GITHUB_SHA}" || git checkout --force refs/remotes/origin/workflow
          fi
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.11-torghut-uv-${{ hashFiles('services/torghut/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-torghut-uv-

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies (locked)
        working-directory: services/torghut
        run: uv sync --frozen --extra dev

      - name: Download shard coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: torghut-coverage-*
          path: services/torghut
          merge-multiple: true

      - name: Combine coverage data
        working-directory: services/torghut
        run: |
          set -euo pipefail
          coverage_files=(.coverage.*)
          if [ "${coverage_files[0]}" = ".coverage.*" ]; then
            echo "No shard coverage files were downloaded"
            exit 1
          fi
          uv run --frozen python -m coverage combine "${coverage_files[@]}"
          uv run --frozen python -m coverage report --fail-under=70
          uv run --frozen python -m coverage xml -o coverage.xml

      - name: Changed-file coverage
        working-directory: services/torghut
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: uv run --frozen python scripts/check_diff_coverage.py --coverage-xml coverage.xml --threshold 80

  quality-signals:
    name: Quality signals (complexity + security)
    runs-on: ubuntu-latest
    needs:
      - changes
    if: ${{ needs.changes.outputs.service == 'true' }}
    steps:
      - name: Checkout
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git init "${GITHUB_WORKSPACE}"
          cd "${GITHUB_WORKSPACE}"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --prune origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            git fetch --no-tags --prune origin "+refs/pull/${PR_NUMBER}/merge:refs/remotes/origin/pull/${PR_NUMBER}/merge"
            git checkout --force "refs/remotes/origin/pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --prune origin "+${GITHUB_REF}:refs/remotes/origin/workflow"
            git checkout --force "${GITHUB_SHA}" || git checkout --force refs/remotes/origin/workflow
          fi
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.11-torghut-uv-${{ hashFiles('services/torghut/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-torghut-uv-

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync dependencies (locked)
        working-directory: services/torghut
        run: uv sync --frozen --extra dev

      - name: Complexity scan (ruff C901, non-blocking)
        working-directory: services/torghut
        run: uv run --frozen ruff check app scripts migrations --select C901 --statistics --exit-zero

      - name: Security scan (ruff S, non-blocking)
        working-directory: services/torghut
        run: uv run --frozen ruff check app scripts migrations --select S --statistics --exit-zero

      - name: Dead-code scan (vulture)
        working-directory: services/torghut
        run: uv run --frozen vulture --config pyproject.toml
