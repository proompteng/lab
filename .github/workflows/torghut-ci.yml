      - name: Sync dependencies (locked)
        working-directory: services/torghut
        run: uv sync --frozen --extra dev

      - name: PostgreSQL mutation fencing integration
        working-directory: services/torghut
        shell: bash
        env:
          COVERAGE_FILE: .coverage.postgres-cas
          TORGHUT_TEST_POSTGRES_DSN: postgresql+psycopg://torghut:torghut@127.0.0.1:5432/torghut_test
        run: |
          set -euo pipefail
          : "${TORGHUT_TEST_POSTGRES_DSN:?TORGHUT_TEST_POSTGRES_DSN is required}"
          uv run --frozen pytest -q \
            --cov \
            --cov-branch \
            --cov-fail-under=0 \
            --cov-report= \
            tests/execution/test_decision_submission_claims_postgres.py \
            tests/execution/test_decision_submission_claim_identity_races_postgres.py \
            tests/execution/test_broker_mutation_receipts_postgres.py \
            tests/execution/test_broker_mutation_linked_receipts_postgres.py \
            tests/execution/test_broker_mutation_receipt_boundaries_postgres.py \
            tests/execution/test_broker_mutation_coordinator_postgres.py \
            tests/execution/test_broker_reduction_coordinator_postgres.py \
            tests/execution/test_broker_account_activities_postgres.py \
            tests/execution/test_broker_economic_ledger_postgres.py \
            tests/execution/test_validation_quarantine_postgres.py \
            tests/execution/test_linked_submission_terminal_postgres.py \
            tests/execution/test_validation_observation_timestamp_postgres.py \
            tests/trading/test_strategy_capital_authority_postgres.py

      - name: Upload PostgreSQL coverage data
        if: always()
