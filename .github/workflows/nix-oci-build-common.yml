name: Nix OCI Build Common

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      package_attr:
        required: true
        type: string
      tag:
        required: true
        type: string
      latest:
        required: false
        type: boolean
        default: false
      release_artifact_name:
        required: false
        type: string
        default: ''
    outputs:
      image:
        value: ${{ jobs.publish-index.outputs.image }}
      tag:
        value: ${{ jobs.publish-index.outputs.tag }}
      digest:
        value: ${{ jobs.publish-index.outputs.digest }}
      platform_digest_amd64:
        value: ${{ jobs.publish-index.outputs.platform_digest_amd64 }}
      platform_digest_arm64:
        value: ${{ jobs.publish-index.outputs.platform_digest_arm64 }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image_name }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: arc-amd64
          - platform: linux/arm64
            arch: arm64
            runner: arc-arm64
    runs-on: ${{ matrix.runner }}
    env:
      ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
      ATTIC_PUBLIC_KEY: ${{ vars.ATTIC_PUBLIC_KEY }}
      NIX_IMAGE_BUILD_ATTIC_TIMEOUT: 8m
      NIX_OCI_LOG_DIR: /tmp/nix-oci-logs-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.arch }}
    steps:
      - name: Start checkout timer
        run: |
          set -euo pipefail
          mkdir -p "${NIX_OCI_LOG_DIR}"
          date +%s > "${NIX_OCI_LOG_DIR}/checkout-start"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Record checkout timing
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          start="$(cat "${NIX_OCI_LOG_DIR}/checkout-start")"
          end="$(date +%s)"
          printf '%s\t%s\t%s\t%s\n' "checkout-${ARCH}" 0 "$((end - start))" "actions/checkout@v5" >> "${NIX_OCI_LOG_DIR}/timings.tsv"

      - name: Require Attic public key
        run: test -n "${ATTIC_PUBLIC_KEY}"

      - name: Start Nix setup timer
        run: |
          set -euo pipefail
          date +%s > "${NIX_OCI_LOG_DIR}/nix-setup-start"

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'false'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}
            fallback = true
            connect-timeout = 10
            stalled-download-timeout = 60
            download-attempts = 1

      - name: Record Nix setup timing
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          start="$(cat "${NIX_OCI_LOG_DIR}/nix-setup-start")"
          end="$(date +%s)"
          printf '%s\t%s\t%s\t%s\n' "nix-setup-${ARCH}" 0 "$((end - start))" ".github/actions/setup-nix-toolchain" >> "${NIX_OCI_LOG_DIR}/timings.tsv"

      - name: Build Nix image archive
        id: build
        env:
          PACKAGE_ATTR: ${{ inputs.package_attr }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          out_link="result-${ARCH}"
          build_args=(
            nix build ".#${PACKAGE_ATTR}"
            --print-build-logs
            --out-link "${out_link}"
            --option fallback true
            --option connect-timeout 10
            --option stalled-download-timeout 60
            --option download-attempts 1
          )
          set +e
          bash nix/ci-run-timed.sh "build-image-${ARCH}" "${NIX_OCI_LOG_DIR}/build-image-${ARCH}.log" \
            timeout --kill-after=30s "${NIX_IMAGE_BUILD_ATTIC_TIMEOUT}" "${build_args[@]}"
          build_status="$?"
          set -e
          if [[ "${build_status}" -ne 0 ]]; then
            rm -f "${out_link}"
            echo "::warning title=Nix image archive build retried without Attic::Attic substitution or build timed out/failed for ${PACKAGE_ATTR} on ${ARCH}; retrying with cache.nixos.org only so the runner does not hang on a final image archive copy."
            fallback_nix_config=$'experimental-features = nix-command flakes\nsubstituters = https://cache.nixos.org/\nfallback = true\nconnect-timeout = 10\nstalled-download-timeout = 60\ndownload-attempts = 1'
            env NIX_CONFIG="${fallback_nix_config}" \
              bash nix/ci-run-timed.sh "build-image-${ARCH}-cache-nixos-fallback" "${NIX_OCI_LOG_DIR}/build-image-${ARCH}-cache-nixos-fallback.log" \
              nix build ".#${PACKAGE_ATTR}" --print-build-logs --out-link "${out_link}"
          fi
          image_tar="$(readlink -f "${out_link}")"
          if [ ! -f "${image_tar}" ]; then
            echo "Nix image output is not a tar file: ${image_tar}" >&2
            exit 1
          fi
          printf '%s\n' "${image_tar}" > "${NIX_OCI_LOG_DIR}/image-paths-${ARCH}.txt"
          echo "image_tar=${image_tar}" >> "${GITHUB_OUTPUT}"
          echo "Built ${PACKAGE_ATTR} for ${{ matrix.platform }} at ${image_tar}."

      - name: Inspect Nix image archive
        env:
          IMAGE_TAR: ${{ steps.build.outputs.image_tar }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          bash nix/ci-run-timed.sh "inspect-image-${ARCH}" "${NIX_OCI_LOG_DIR}/inspect-image-${ARCH}.log" \
            bash nix/oci-inspect-archive.sh "${IMAGE_TAR}"

      - name: Push platform image without Docker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: push
        env:
          IMAGE: registry.ide-newton.ts.net/lab/${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
          ARCH: ${{ matrix.arch }}
          IMAGE_TAR: ${{ steps.build.outputs.image_tar }}
          LATEST: ${{ inputs.latest }}
        run: |
          set -euo pipefail
          args=(
            bash nix/oci-push.sh
            --image "${IMAGE}"
            --tag "${TAG}-${ARCH}"
            --tar "${IMAGE_TAR}"
          )
          if [ "${LATEST}" = "true" ]; then
            args+=(--latest-tag "latest-${ARCH}")
          fi
          bash nix/ci-run-timed.sh "push-platform-image-${ARCH}" "${NIX_OCI_LOG_DIR}/oci-push-${ARCH}.log" "${args[@]}"

      - name: Warm Nix image archive closure in Attic
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          test -n "${ATTIC_TOKEN}"
          mapfile -t image_paths < "${NIX_OCI_LOG_DIR}/image-paths-${ARCH}.txt"
          if [[ "${#image_paths[@]}" -eq 0 ]]; then
            echo "No Nix image closure paths were captured." >&2
            exit 2
          fi
          status_file="${NIX_OCI_LOG_DIR}/image-cache-push-status-${ARCH}.txt"
          set +e
          bash nix/ci-run-timed.sh "push-image-archive-closure-${ARCH}" "${NIX_OCI_LOG_DIR}/cache-push-image-${ARCH}.log" \
            bash nix/cache-push.sh "${image_paths[@]}"
          status="$?"
          set -e
          if [[ "${status}" -ne 0 ]]; then
            printf 'failed\t%s\n' "${status}" > "${status_file}"
            echo "::warning title=Attic image closure warm failed::Attic image closure push failed for ${ARCH}; registry image push remains authoritative. See cache-push-image-${ARCH}.log."
            exit 0
          fi
          printf 'succeeded\t0\n' > "${status_file}"

      - name: Summarize Nix OCI cache use
        if: always()
        run: bash nix/ci-nix-oci-summary.sh

  publish-index:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-platform
    runs-on: arc-arm64
    outputs:
      image: ${{ steps.oci.outputs.image }}
      tag: ${{ steps.oci.outputs.tag }}
      digest: ${{ steps.oci.outputs.digest }}
      platform_digest_amd64: ${{ steps.oci.outputs.platform_digest_amd64 }}
      platform_digest_arm64: ${{ steps.oci.outputs.platform_digest_arm64 }}
    env:
      ATTIC_PUBLIC_KEY: ${{ vars.ATTIC_PUBLIC_KEY }}
      ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
      NIX_OCI_LOG_DIR: /tmp/nix-oci-logs-${{ github.run_id }}-${{ github.run_attempt }}-publish-index
    steps:
      - name: Start checkout timer
        run: |
          set -euo pipefail
          mkdir -p "${NIX_OCI_LOG_DIR}"
          date +%s > "${NIX_OCI_LOG_DIR}/checkout-start"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Record checkout timing
        if: always()
        run: |
          set -euo pipefail
          start="$(cat "${NIX_OCI_LOG_DIR}/checkout-start")"
          end="$(date +%s)"
          printf '%s\t%s\t%s\t%s\n' "checkout-publish-index" 0 "$((end - start))" "actions/checkout@v5" >> "${NIX_OCI_LOG_DIR}/timings.tsv"

      - name: Require Attic public key
        run: test -n "${ATTIC_PUBLIC_KEY}"

      - name: Start Nix setup timer
        run: |
          set -euo pipefail
          date +%s > "${NIX_OCI_LOG_DIR}/nix-setup-start"

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          require-preinstalled: 'true'
          install-ci-toolchain: 'false'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}
            fallback = true
            connect-timeout = 10
            stalled-download-timeout = 60
            download-attempts = 1

      - name: Record Nix setup timing
        if: always()
        run: |
          set -euo pipefail
          start="$(cat "${NIX_OCI_LOG_DIR}/nix-setup-start")"
          end="$(date +%s)"
          printf '%s\t%s\t%s\t%s\n' "nix-setup-publish-index" 0 "$((end - start))" ".github/actions/setup-nix-toolchain" >> "${NIX_OCI_LOG_DIR}/timings.tsv"

      - name: Create OCI image index
        id: oci
        env:
          IMAGE: registry.ide-newton.ts.net/lab/${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
          LATEST: ${{ inputs.latest }}
        run: |
          set -euo pipefail
          args=(
            bun run packages/scripts/src/shared/oci.ts create-index
            --image "${IMAGE}"
            --tag "${TAG}"
            --arch-tag "linux/amd64=${TAG}-amd64"
            --arch-tag "linux/arm64=${TAG}-arm64"
          )
          if [ "${LATEST}" = "true" ]; then
            args+=(--latest)
          fi
          bash nix/ci-run-timed.sh "create-oci-index" "${NIX_OCI_LOG_DIR}/create-oci-index.log" "${args[@]}"

      - name: Verify OCI image index platforms
        env:
          IMAGE: registry.ide-newton.ts.net/lab/${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          bash nix/ci-run-timed.sh "assert-oci-platforms" "${NIX_OCI_LOG_DIR}/assert-oci-platforms.log" \
            bun run packages/scripts/src/shared/oci.ts assert "${IMAGE}:${TAG}" linux/amd64 linux/arm64

      - name: Write release contract
        if: inputs.release_artifact_name != ''
        env:
          SERVICE: ${{ inputs.image_name }}
          IMAGE: ${{ steps.oci.outputs.image }}
          TAG: ${{ steps.oci.outputs.tag }}
          DIGEST: ${{ steps.oci.outputs.digest }}
          REFERENCE: ${{ steps.oci.outputs.reference }}
          PACKAGE_ATTR: ${{ inputs.package_attr }}
          PLATFORMS: linux/amd64,linux/arm64
          PLATFORM_DIGEST_AMD64: ${{ steps.oci.outputs.platform_digest_amd64 }}
          PLATFORM_DIGEST_ARM64: ${{ steps.oci.outputs.platform_digest_arm64 }}
        run: |
          set -euo pipefail
          bash nix/ci-run-timed.sh "write-release-contract" "${NIX_OCI_LOG_DIR}/write-release-contract.log" \
            bash nix/oci-release-contract.sh .artifacts/${{ inputs.image_name }}/release-contract.json

      - name: Upload release contract
        if: inputs.release_artifact_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_artifact_name }}
          path: .artifacts/${{ inputs.image_name }}/release-contract.json

      - name: Summarize Nix OCI cache use
        if: always()
        run: bash nix/ci-nix-oci-summary.sh
