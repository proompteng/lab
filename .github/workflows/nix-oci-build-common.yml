name: Nix OCI Build Common

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      package_attr:
        required: true
        type: string
      tag:
        required: true
        type: string
      latest:
        required: false
        type: boolean
        default: false
      release_artifact_name:
        required: false
        type: string
        default: ''
    outputs:
      image:
        value: ${{ jobs.publish-index.outputs.image }}
      tag:
        value: ${{ jobs.publish-index.outputs.tag }}
      digest:
        value: ${{ jobs.publish-index.outputs.digest }}
      platform_digest_amd64:
        value: ${{ jobs.publish-index.outputs.platform_digest_amd64 }}
      platform_digest_arm64:
        value: ${{ jobs.publish-index.outputs.platform_digest_arm64 }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image_name }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: arc-amd64
          - platform: linux/arm64
            arch: arm64
            runner: arc-arm64
    runs-on: ${{ matrix.runner }}
    env:
      ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
      ATTIC_PUBLIC_KEY: ${{ vars.ATTIC_PUBLIC_KEY }}
      NIX_OCI_LOG_DIR: /tmp/nix-oci-logs-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Require Attic public key
        run: test -n "${ATTIC_PUBLIC_KEY}"

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Prime OCI helper closures
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p "${NIX_OCI_LOG_DIR}"
          helper_attrs=(.#inspectOciArchive)
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            helper_attrs+=(.#ociPush .#cachePush)
          fi
          bash nix/ci-run-timed.sh "prime-build-platform-helpers-${ARCH}" "${NIX_OCI_LOG_DIR}/prime-helpers-${ARCH}.log" \
            bash -lc 'set -euo pipefail; output_file="${NIX_OCI_LOG_DIR}/helper-paths-${ARCH}.txt"; nix build --print-build-logs --no-link --print-out-paths "$@" | tee "${output_file}"; test -s "${output_file}"' \
            bash "${helper_attrs[@]}"

      - name: Build Nix image archive
        id: build
        env:
          PACKAGE_ATTR: ${{ inputs.package_attr }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          out_link="result-${ARCH}"
          bash nix/ci-run-timed.sh "build-image-${ARCH}" "${NIX_OCI_LOG_DIR}/build-image-${ARCH}.log" \
            nix build ".#${PACKAGE_ATTR}" --print-build-logs --out-link "${out_link}"
          image_tar="$(readlink -f "${out_link}")"
          if [ ! -f "${image_tar}" ]; then
            echo "Nix image output is not a tar file: ${image_tar}" >&2
            exit 1
          fi
          echo "image_tar=${image_tar}" >> "${GITHUB_OUTPUT}"
          echo "Built ${PACKAGE_ATTR} for ${{ matrix.platform }} at ${image_tar}."

      - name: Inspect Nix image archive
        env:
          IMAGE_TAR: ${{ steps.build.outputs.image_tar }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          bash nix/ci-run-timed.sh "inspect-image-${ARCH}" "${NIX_OCI_LOG_DIR}/inspect-image-${ARCH}.log" \
            nix run .#inspect-oci-archive -- "${IMAGE_TAR}"

      - name: Push platform image without Docker
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: push
        env:
          IMAGE: registry.ide-newton.ts.net/lab/${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
          ARCH: ${{ matrix.arch }}
          IMAGE_TAR: ${{ steps.build.outputs.image_tar }}
          LATEST: ${{ inputs.latest }}
        run: |
          set -euo pipefail
          args=(
            nix run .#oci-push --
            --image "${IMAGE}"
            --tag "${TAG}-${ARCH}"
            --tar "${IMAGE_TAR}"
          )
          if [ "${LATEST}" = "true" ]; then
            args+=(--latest-tag "latest-${ARCH}")
          fi
          bash nix/ci-run-timed.sh "push-platform-image-${ARCH}" "${NIX_OCI_LOG_DIR}/oci-push-${ARCH}.log" "${args[@]}"

      - name: Push real image closure to Attic
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
          IMAGE_TAR: ${{ steps.build.outputs.image_tar }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          test -n "${ATTIC_TOKEN}"
          mapfile -t helper_paths < "${NIX_OCI_LOG_DIR}/helper-paths-${ARCH}.txt"
          if [[ "${#helper_paths[@]}" -eq 0 ]]; then
            echo "No build-platform helper closure paths were captured." >&2
            exit 2
          fi
          bash nix/ci-run-timed.sh "push-build-platform-closures-${ARCH}" "${NIX_OCI_LOG_DIR}/cache-push-${ARCH}.log" \
            nix run .#cache-push -- "${IMAGE_TAR}" "${helper_paths[@]}"

      - name: Summarize Nix OCI cache use
        if: always()
        run: bash nix/ci-nix-oci-summary.sh

  publish-index:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-platform
    runs-on: arc-arm64
    outputs:
      image: ${{ steps.oci.outputs.image }}
      tag: ${{ steps.oci.outputs.tag }}
      digest: ${{ steps.oci.outputs.digest }}
      platform_digest_amd64: ${{ steps.oci.outputs.platform_digest_amd64 }}
      platform_digest_arm64: ${{ steps.oci.outputs.platform_digest_arm64 }}
    env:
      ATTIC_PUBLIC_KEY: ${{ vars.ATTIC_PUBLIC_KEY }}
      ATTIC_CACHE_ENDPOINT: http://attic.attic.svc.cluster.local
      NIX_OCI_LOG_DIR: /tmp/nix-oci-logs-${{ github.run_id }}-${{ github.run_attempt }}-publish-index
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Require Attic public key
        run: test -n "${ATTIC_PUBLIC_KEY}"

      - name: Set up Nix toolchain
        uses: ./.github/actions/setup-nix-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-ci-toolchain: 'true'
          extra-nix-config: |
            experimental-features = nix-command flakes
            substituters = http://attic.attic.svc.cluster.local/lab https://cache.nixos.org/
            extra-trusted-public-keys = ${{ vars.ATTIC_PUBLIC_KEY }}

      - name: Prime OCI index helper closures
        run: |
          set -euo pipefail
          mkdir -p "${NIX_OCI_LOG_DIR}"
          helper_attrs=(.#createOciIndex .#assertOciPlatforms .#writeOciReleaseContract .#cachePush)
          bash nix/ci-run-timed.sh "prime-index-helpers" "${NIX_OCI_LOG_DIR}/prime-index-helpers.log" \
            bash -lc 'set -euo pipefail; output_file="${NIX_OCI_LOG_DIR}/index-helper-paths.txt"; nix build --print-build-logs --no-link --print-out-paths "$@" | tee "${output_file}"; test -s "${output_file}"' \
            bash "${helper_attrs[@]}"

      - name: Create OCI image index
        id: oci
        env:
          IMAGE: registry.ide-newton.ts.net/lab/${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
          LATEST: ${{ inputs.latest }}
        run: |
          set -euo pipefail
          args=(
            nix run .#create-oci-index --
            --image "${IMAGE}"
            --tag "${TAG}"
            --arch-tag "linux/amd64=${TAG}-amd64"
            --arch-tag "linux/arm64=${TAG}-arm64"
          )
          if [ "${LATEST}" = "true" ]; then
            args+=(--latest)
          fi
          bash nix/ci-run-timed.sh "create-oci-index" "${NIX_OCI_LOG_DIR}/create-oci-index.log" "${args[@]}"

      - name: Verify OCI image index platforms
        env:
          IMAGE: registry.ide-newton.ts.net/lab/${{ inputs.image_name }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          bash nix/ci-run-timed.sh "assert-oci-platforms" "${NIX_OCI_LOG_DIR}/assert-oci-platforms.log" \
            nix run .#assert-oci-platforms -- "${IMAGE}:${TAG}" linux/amd64 linux/arm64

      - name: Write release contract
        if: inputs.release_artifact_name != ''
        env:
          IMAGE: ${{ steps.oci.outputs.image }}
          TAG: ${{ steps.oci.outputs.tag }}
          DIGEST: ${{ steps.oci.outputs.digest }}
          REFERENCE: ${{ steps.oci.outputs.reference }}
          PACKAGE_ATTR: ${{ inputs.package_attr }}
        run: |
          set -euo pipefail
          bash nix/ci-run-timed.sh "write-release-contract" "${NIX_OCI_LOG_DIR}/write-release-contract.log" \
            nix run .#write-oci-release-contract -- .artifacts/${{ inputs.image_name }}/release-contract.json

      - name: Push OCI index helper closures to Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${ATTIC_TOKEN}"
          mapfile -t helper_paths < "${NIX_OCI_LOG_DIR}/index-helper-paths.txt"
          if [[ "${#helper_paths[@]}" -eq 0 ]]; then
            echo "No index helper closure paths were captured." >&2
            exit 2
          fi
          bash nix/ci-run-timed.sh "push-index-helper-closures" "${NIX_OCI_LOG_DIR}/cache-push-index-helpers.log" \
            nix run .#cache-push -- "${helper_paths[@]}"

      - name: Upload release contract
        if: inputs.release_artifact_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_artifact_name }}
          path: .artifacts/${{ inputs.image_name }}/release-contract.json

      - name: Summarize Nix OCI cache use
        if: always()
        run: bash nix/ci-nix-oci-summary.sh
