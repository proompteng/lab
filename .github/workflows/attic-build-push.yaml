name: attic-build-push

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'docs/nix-cache.md'
      - 'docs/nix-oci-real-image-build-adoption-plan.md'
      - '.github/workflows/attic-build-push.yaml'
      - '.github/workflows/attic-release.yml'
      - '.github/workflows/nix-oci-build-common.yml'
  push:
    branches:
      - main
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'docs/nix-cache.md'
      - 'docs/nix-oci-real-image-build-adoption-plan.md'
      - '.github/workflows/attic-build-push.yaml'
      - '.github/workflows/attic-release.yml'
      - '.github/workflows/nix-oci-build-common.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: attic
      package_attr: atticd-image
      tag: sha-${{ github.sha }}
      latest: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      release_artifact_name: attic-release-contract
    secrets: inherit
