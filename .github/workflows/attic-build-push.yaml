name: attic-build-push

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'nix/images/attic.nix'
      - 'docs/nix-cache.md'
      - 'docs/nix-oci-real-image-build-adoption-plan.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: attic
      package_attr: atticd-image
      tag: sha-${{ github.sha }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      latest: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
      release_artifact_name: attic-release-contract
    secrets: inherit
