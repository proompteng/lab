name: agents-release

on:
  workflow_run:
    workflows:
      - agents-build-push
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: 'agents-build-push run id that uploaded the agents-values artifact'
        required: true
      source_sha:
        description: '40-character source commit SHA built by the agents-build-push run'
        required: true

concurrency:
  group: agents-release-${{ github.event.workflow_run.head_sha || inputs.source_sha || github.run_id }}
  cancel-in-progress: true

jobs:
  promote:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve promotion metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          git fetch origin main
          CURRENT_MAIN="$(git rev-parse origin/main)"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            SOURCE_SHA="${INPUT_SOURCE_SHA}"
            RUN_ID="${INPUT_RUN_ID}"
            PROMOTE=true
            PROMOTION_SOURCE="manual_dispatch"
            if ! [[ "${SOURCE_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "source_sha must be a 40-character git SHA" >&2
              exit 1
            fi
            if ! [[ "${RUN_ID}" =~ ^[0-9]+$ ]]; then
              echo "run_id must be a numeric GitHub Actions run id" >&2
              exit 1
            fi
          else
            SOURCE_SHA="${WORKFLOW_RUN_HEAD_SHA}"
            RUN_ID="${WORKFLOW_RUN_ID}"
            PROMOTION_SOURCE="workflow_run"
            if [ "${SOURCE_SHA}" = "${CURRENT_MAIN}" ]; then
              PROMOTE=true
            else
              PROMOTE=false
            fi
          fi
          TAG="${SOURCE_SHA:0:8}"
          {
            echo "promote=${PROMOTE}"
            echo "source_sha=${SOURCE_SHA}"
            echo "tag=${TAG}"
            echo "run_id=${RUN_ID}"
            echo "promotion_source=${PROMOTION_SOURCE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download Agents values artifact
        if: steps.meta.outputs.promote == 'true'
        uses: actions/download-artifact@v7
        with:
          name: agents-values
          path: .artifacts/agents
          run-id: ${{ steps.meta.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage Agents values
        if: steps.meta.outputs.promote == 'true'
        shell: bash
        run: cp .artifacts/agents/values.yaml argocd/applications/agents/values.yaml

      - name: Check for manifest changes
        if: steps.meta.outputs.promote == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- argocd/applications/agents/values.yaml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create deploy pull request
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.AGENTS_SPLIT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: codex/agents-release-${{ steps.meta.outputs.tag }}
          base: main
          title: 'chore(agents): promote images ${{ steps.meta.outputs.tag }}'
          commit-message: 'chore(agents): promote images ${{ steps.meta.outputs.tag }}'
          delete-branch: true
          add-paths: argocd/applications/agents/values.yaml
          body: |
            ## Summary
            Promote Agents Nix-built service and runner images into GitOps manifests.

            - Source commit: `${{ steps.meta.outputs.source_sha }}`
            - Image tag: `${{ steps.meta.outputs.tag }}`
            - Agents build run: `${{ steps.meta.outputs.run_id }}`
            - Promotion source: `${{ steps.meta.outputs.promotion_source }}`
            - Service images: `agents-controller`, `agents-control-plane`, `agents-shell`
            - Runner image: `agents-codex-runner`

      - name: No manifest changes detected
        if: steps.meta.outputs.promote == 'true' && steps.changes.outputs.changed != 'true'
        run: echo 'No Agents manifest changes detected.'

      - name: Promotion skipped
        if: steps.meta.outputs.promote != 'true'
        run: echo 'Skipping stale agents-build-push workflow_run promotion because source SHA is not current main.'
