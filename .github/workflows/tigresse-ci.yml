name: Tigresse CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/tigresse/**'
      - '.github/workflows/tigresse-ci.yml'
  pull_request:
    paths:
      - 'services/tigresse/**'
      - '.github/workflows/tigresse-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/tigresse/go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('services/tigresse/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run unit tests
        working-directory: services/tigresse
        run: GOFLAGS=-buildvcs=false go test ./...

      - name: Build binaries
        working-directory: services/tigresse
        run: GOFLAGS=-buildvcs=false go build ./...
