name: bayn

on:
  push:
    branches:
      - main
    paths:
      - 'services/bayn/**'
      - '.github/workflows/bayn-ci.yml'
  pull_request:
    paths:
      - 'services/bayn/**'
      - '.github/workflows/bayn-ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/bayn
      lint-command: bunx oxfmt --check services/bayn .github/workflows/bayn-ci.yml
      oxlint-command: bun run --cwd services/bayn lint:oxlint
      oxlint-type-command: bun run --cwd services/bayn lint:oxlint:type
      test-command: bun run --cwd services/bayn tsc && bun run --cwd services/bayn test
      build-command: bun run build:bayn
    secrets: inherit
