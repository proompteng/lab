name: bayn

on:
  pull_request:
    paths:
      - 'services/bayn/**'
      - 'argocd/applications/bayn/**'
      - 'argocd/applications/torghut/clickhouse/**'
      - 'argocd/applicationsets/product.yaml'
      - 'nix/images/bayn.nix'
      - 'flake.nix'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/bayn-*.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/bayn --filter @proompteng/scripts
      lint-command: bunx oxfmt --check services/bayn argocd/applications/bayn argocd/applications/torghut/clickhouse/bayn-sealed-secret.yaml argocd/applications/torghut/clickhouse/clickhouse-cluster.yaml
      oxlint-command: bun run --cwd services/bayn lint:oxlint
      oxlint-type-command: bun run --cwd services/bayn lint:oxlint:type
      test-command: bun run --cwd services/bayn tsc && bun run --cwd services/bayn test && bun test packages/scripts/src/bayn
      build-command: bun run --cwd services/bayn build
    secrets: inherit

  postgres-integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: bayn
          POSTGRES_PASSWORD: bayn
          POSTGRES_DB: bayn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bayn -d bayn_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      BAYN_TEST_POSTGRES_URL: postgresql://bayn:bayn@127.0.0.1:5432/bayn_test
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install focused dependencies
        run: >-
          bun install --frozen-lockfile --ignore-scripts
          --filter @proompteng/source
          --filter @proompteng/bayn
      - name: Verify durable evidence on PostgreSQL 18
        run: |
          bun test services/bayn/src/db/evidence-store.integration.test.ts
          bun test services/bayn/src/db/paper-store.integration.test.ts
          bun test services/bayn/src/db/cycle-store.integration.test.ts
