name: symphony

on:
  push:
    branches:
      - main
    paths:
      - 'services/symphony/**'
      - 'packages/codex/**'
      - 'packages/scripts/src/symphony/**'
      - '.github/workflows/symphony-ci.yml'
      - '.github/workflows/docker-build-common.yaml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
  pull_request:
    paths:
      - 'services/symphony/**'
      - 'packages/codex/**'
      - 'packages/scripts/src/symphony/**'
      - 'argocd/applications/symphony/**'
      - 'argocd/applicationsets/product.yaml'
      - '.github/workflows/symphony-ci.yml'
      - '.github/workflows/docker-build-common.yaml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.10
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts && bun run --cwd packages/codex build
      lint-command: bunx oxfmt --check services/symphony packages/scripts/src/symphony argocd/applications/symphony
      oxlint-command: bun run --cwd services/symphony lint:oxlint
      oxlint-type-command: bun run --cwd services/symphony lint:oxlint:type && bun run --cwd packages/scripts lint:oxlint:type
      test-command: bun run --cwd services/symphony tsc && bun run --cwd services/symphony test
    secrets: inherit

  deploy-main:
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        !contains(github.event.head_commit.message || '', 'automated release PR')
      }}
    uses: ./.github/workflows/docker-build-common.yaml
    with:
      image_name: symphony
      dockerfile: ./services/symphony/Dockerfile
      context: .
      new_tag: ${{ github.sha }}
      bun_version: 1.3.10
    secrets: inherit
