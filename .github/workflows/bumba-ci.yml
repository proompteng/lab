name: bumba

on:
  push:
    branches:
      - main
    paths:
      - 'services/bumba/**'
      - 'packages/temporal-bun-sdk/**'
      - 'packages/scripts/src/bumba/**'
      - 'flake.lock'
      - 'nix/images/bumba.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
  pull_request:
    paths:
      - 'services/bumba/**'
      - 'packages/temporal-bun-sdk/**'
      - 'packages/scripts/src/bumba/**'
      - 'flake.lock'
      - 'nix/images/bumba.nix'
      - 'nix/images/bun-workspace-service.nix'
      - 'nix/packages.nix'
      - 'nix/cache-push.sh'
      - 'nix/ci-nix-oci-summary.sh'
      - 'nix/ci-run-timed.sh'
      - 'nix/oci-inspect-archive.sh'
      - 'nix/oci-push.sh'
      - 'nix/oci-release-contract.sh'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/bumba --filter @proompteng/temporal-bun-sdk && bun run --filter @proompteng/temporal-bun-sdk build
      lint-command: bunx oxfmt --check services/bumba packages/scripts/src/bumba argocd/applications/bumba
      oxlint-command: bun run --cwd services/bumba lint:oxlint
      oxlint-type-command: bun run --cwd services/bumba lint:oxlint:type
      test-command: bun run --cwd services/bumba tsc && bun run --cwd services/bumba test
    secrets: inherit

  nix-image:
    if: >-
      ${{
        github.event_name == 'pull_request' ||
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message || '', 'automated release PR')
        )
      }}
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: bumba
      package_attr: bumba-image
      tag: sha-${{ github.sha }}
      latest: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'bumba-release-contract' || '' }}
    secrets: inherit
