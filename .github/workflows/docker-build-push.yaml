name: Docker Build and Push

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'
  workflow_dispatch:
    inputs:
      build_proompteng:
        description: 'Build and publish apps/landing image'
        required: false
        type: boolean
        default: true
      build_app:
        description: 'Build and publish apps/app image'
        required: false
        type: boolean
        default: true
      build_synthesis:
        description: 'Build and publish apps/synthesis image'
        required: false
        type: boolean
        default: true
      build_docs:
        description: 'Build and publish apps/docs image'
        required: false
        type: boolean
        default: true
      build_olden:
        description: 'Build and publish apps/olden image'
        required: false
        type: boolean
        default: true

jobs:
  changes:
    runs-on: arc-arm64
    permissions:
      contents: read
    outputs:
      proompteng: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.proompteng || steps.filter.outputs.proompteng }}
      app: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.app || steps.filter.outputs.app }}
      synthesis: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.synthesis || steps.filter.outputs.synthesis }}
      docs: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.docs || steps.filter.outputs.docs }}
      olden: ${{ github.event_name == 'workflow_dispatch' && steps.manual.outputs.olden || steps.filter.outputs.olden }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for file changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proompteng:
              - 'apps/landing/**'
              - 'packages/design/**'
            app:
              - 'apps/app/**'
              - 'packages/design/**'
            synthesis:
              - 'apps/synthesis/**'
              - 'packages/design/**'
            docs:
              - 'apps/docs/**'
              - 'packages/design/**'
            olden:
              - 'apps/olden/**'
              - 'packages/design/**'

      - name: Manual build selection
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "proompteng=${{ github.event.inputs.build_proompteng }}"
            echo "app=${{ github.event.inputs.build_app }}"
            echo "synthesis=${{ github.event.inputs.build_synthesis }}"
            echo "docs=${{ github.event.inputs.build_docs }}"
            echo "olden=${{ github.event.inputs.build_olden }}"
          } >> "$GITHUB_OUTPUT"

  version:
    runs-on: arc-arm64
    permissions:
      contents: write
    needs: changes
    if: ${{ needs.changes.outputs.proompteng == 'true' || needs.changes.outputs.app == 'true' || needs.changes.outputs.synthesis == 'true' || needs.changes.outputs.docs == 'true' || needs.changes.outputs.olden == 'true' }}
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a GitHub release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

  build-proompteng:
    needs: [changes, version]
    if: ${{ needs.changes.outputs.proompteng == 'true' }}
    uses: ./.github/workflows/docker-build-common.yaml
    with:
      image_name: proompteng
      dockerfile: ./apps/landing/Dockerfile
      context: .
      new_tag: ${{ needs.version.outputs.new_tag }}

  build-app:
    needs: [changes, version]
    if: ${{ needs.changes.outputs.app == 'true' }}
    uses: ./.github/workflows/docker-build-common.yaml
    with:
      image_name: app
      dockerfile: ./apps/app/Dockerfile
      context: .
      new_tag: ${{ needs.version.outputs.new_tag }}

  build-synthesis:
    needs: [changes, version]
    if: ${{ needs.changes.outputs.synthesis == 'true' }}
    uses: ./.github/workflows/docker-build-common.yaml
    with:
      image_name: synthesis
      dockerfile: ./apps/synthesis/Dockerfile
      context: .
      new_tag: ${{ needs.version.outputs.new_tag }}

  build-docs:
    needs: [changes, version]
    if: ${{ needs.changes.outputs.docs == 'true' }}
    uses: ./.github/workflows/docker-build-common.yaml
    with:
      image_name: docs
      dockerfile: ./apps/docs/Dockerfile
      context: .
      new_tag: ${{ needs.version.outputs.new_tag }}

  build-olden:
    needs: [changes, version]
    if: ${{ needs.changes.outputs.olden == 'true' }}
    uses: ./.github/workflows/docker-build-common.yaml
    with:
      image_name: olden
      dockerfile: ./apps/olden/Dockerfile
      context: .
      new_tag: ${{ needs.version.outputs.new_tag }}

  cleanup-release:
    runs-on: arc-arm64
    permissions:
      contents: write
    needs: [version, build-proompteng, build-app, build-synthesis, build-docs, build-olden]
    if: failure()
    steps:
      - name: Delete release and tag if any build failed
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ needs.version.outputs.new_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            if (!tag) {
              core.info('No release tag was produced; nothing to clean up.');
              return;
            }

            const { owner, repo } = context.repo;

            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.data.id });
              core.info(`Deleted release ${tag}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`Release ${tag} was already absent.`);
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Deleted tag ${tag}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              core.info(`Tag ${tag} was already absent.`);
            }
