name: jangar-ci

on:
  pull_request:
    paths:
      - 'services/jangar/**'
      - 'packages/scripts/src/jangar/**'
      - 'argocd/applications/jangar/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    uses: ./.github/workflows/common-monorepo.yml
    with:
      bun-version: 1.3.14
      node-version: 24.11.1
      install-command: ELECTRON_SKIP_BINARY_DOWNLOAD=1 bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/jangar --filter @proompteng/bumba --filter @proompteng/codex --filter @proompteng/cx-tools --filter @proompteng/design --filter @proompteng/discord --filter @proompteng/otel --filter @proompteng/temporal-bun-sdk && bun run --filter @proompteng/temporal-bun-sdk build && cd services/jangar && bun install --frozen-lockfile --ignore-scripts
      lint-command: bunx oxfmt --check services/jangar packages/scripts/src/jangar argocd/applications/jangar
      oxlint-command: bun run --cwd services/jangar lint:oxlint
      oxlint-type-command: bun run --cwd services/jangar lint:oxlint:type
      test-command: cd services/jangar && bun run test && bunx tsc --noEmit --project tsconfig.paths.json && bun run docs:inventory:check && bun run check:module-sizes
      build-command: bun run --cwd services/jangar build

  atlas-search-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: mirror.gcr.io/pgvector/pgvector:pg16
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      ATLAS_INTEGRATION_DATABASE_URL: postgresql://atlas:atlas@127.0.0.1:5432/atlas_test?sslmode=disable
      ATLAS_REQUIRE_INTEGRATION_TESTS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/jangar --filter @proompteng/bumba --filter @proompteng/otel --filter @proompteng/temporal-bun-sdk
      - run: bun run --filter @proompteng/otel build
      - run: bun run --filter @proompteng/temporal-bun-sdk build
      - run: cd services/jangar && bunx vitest run --config vitest.config.ts src/server/__tests__/atlas-code-search.integration.test.ts
