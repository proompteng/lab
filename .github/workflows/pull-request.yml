name: CI

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'services/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_changed_files:
    runs-on: ubuntu-latest
    outputs:
      proompteng: ${{ steps.filter.outputs.proompteng }}
      app: ${{ steps.filter.outputs.app }}
      cms: ${{ steps.filter.outputs.cms }}
      docs: ${{ steps.filter.outputs.docs }}
      kitty-krew: ${{ steps.filter.outputs.kitty-krew }}
      reviseur: ${{ steps.filter.outputs.reviseur }}
      bonjour: ${{ steps.filter.outputs.bonjour }}
      codex: ${{ steps.filter.outputs.codex }}
      discord: ${{ steps.filter.outputs.discord }}
    steps:
      - name: Check changed files
        id: filter
        shell: bash
        env:
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          changed_files="$(mktemp)"
          page=1
          while true; do
            response="$(
              curl -fsSL \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2022-11-28' \
                "https://api.github.com/repos/${GH_REPO}/pulls/${PR_NUMBER}/files?per_page=100&page=${page}"
            )"
            count="$(jq 'length' <<< "${response}")"
            if [ "${count}" -eq 0 ]; then
              break
            fi
            jq -r '.[].filename' <<< "${response}" >> "${changed_files}"
            page=$((page + 1))
          done

          output_flag() {
            local name="$1"
            local regex="$2"
            local value=false
            if grep -Eq "${regex}" "${changed_files}"; then
              value=true
            fi
            echo "${name}=${value}" >> "$GITHUB_OUTPUT"
          }

          output_flag proompteng '^apps/landing/'
          output_flag app '^apps/app/'
          output_flag cms '^apps/cms/'
          output_flag bonjour '^services/bonjour/'
          output_flag docs '^apps/docs/'
          output_flag kitty-krew '^apps/kitty-krew/'
          output_flag reviseur '^apps/reviseur/'
          output_flag codex '^packages/codex/'
          output_flag discord '^packages/discord/'

  docs:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.docs == 'true' }}
    runs-on: arc-arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/apps/docs/.next/cache
          key: ${{ runner.os }}-nextjs-docs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/docs/**/*.[jt]s?(x)', 'packages/**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-docs-${{ hashFiles('**/bun.lock') }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter docs --filter @proompteng/design

      - name: Oxlint (non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/docs lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/docs lint:oxlint:type

      - run: bun run --filter docs build

  proompteng:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.proompteng == 'true' }}
    runs-on: arc-arm64
    env:
      CONVEX_SELF_HOSTED_URL: ${{ secrets.CONVEX_SELF_HOSTED_URL }}
      CONVEX_SELF_HOSTED_ADMIN_KEY: ${{ secrets.CONVEX_SELF_HOSTED_ADMIN_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/apps/landing/.next/cache
          key: ${{ runner.os }}-nextjs-landing-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/landing/**/*.[jt]s?(x)', 'packages/**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-landing-${{ hashFiles('**/bun.lock') }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter landing --filter @proompteng/backend --filter @proompteng/design

      - name: Oxlint (non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/landing lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/landing lint:oxlint:type

      - run: bun run --filter landing build

  cms:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.cms == 'true' }}
    runs-on: arc-arm64
    env:
      PAYLOAD_SECRET: ci-build-secret
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/apps/cms/.next/cache
          key: ${{ runner.os }}-nextjs-cms-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('apps/cms/**/*.[jt]s?(x)', 'packages/**/*.[jt]s?(x)') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-cms-${{ hashFiles('**/bun.lock') }}-

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter cms

      - name: Oxlint (non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/cms lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/cms lint:oxlint:type

      - run: bun run --filter cms build

  app:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.app == 'true' }}
    runs-on: arc-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter app --filter @proompteng/design

      - name: Oxlint (non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/app lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        run: bun run --cwd apps/app lint:oxlint:type

      - run: bun run --filter app build

  bonjour:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.bonjour == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/bonjour --filter @proompteng/otel

      - run: bun run --filter @proompteng/otel build

      - run: bun run --filter @proompteng/bonjour build

  codex:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.codex == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # codex CI handled by dedicated workflow (.github/workflows/codex-ci.yml)

  discord:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.discord == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter @proompteng/discord

      - name: Oxlint (non-blocking)
        continue-on-error: true
        run: bun run --cwd packages/discord lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        run: bun run --cwd packages/discord lint:oxlint:type

      - run: bun run --filter @proompteng/discord test

      - run: bun run --filter @proompteng/discord build

  kitty-krew:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.kitty-krew == 'true' }}
    runs-on: arc-arm64
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter tanstack-router-react-example-with-trpc-react-query

      - name: Oxlint (non-blocking)
        continue-on-error: true
        working-directory: apps/kitty-krew
        run: bun run lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        working-directory: apps/kitty-krew
        run: bun run lint:oxlint:type

      - name: Lint
        working-directory: apps/kitty-krew
        run: bun run lint:oxlint

      - name: Format check
        run: bunx oxfmt --check --no-error-on-unmatched-pattern "apps/kitty-krew/**/*.{js,jsx,mjs,cjs,ts,tsx}"

      - name: Type check
        working-directory: apps/kitty-krew
        run: bun tsc --noEmit

      - name: Build kitty-krew app
        working-directory: apps/kitty-krew
        run: bun run build

  reviseur:
    needs: check_changed_files
    if: ${{ needs.check_changed_files.outputs.reviseur == 'true' }}
    runs-on: arc-arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24.11.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.3.14-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.14-

      - run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/source --filter reviseur

      - name: Oxlint (non-blocking)
        continue-on-error: true
        working-directory: apps/reviseur
        run: bun run lint:oxlint

      - name: Oxlint (type-aware, non-blocking)
        continue-on-error: true
        working-directory: apps/reviseur
        run: bun run lint:oxlint:type

      - run: bun run build
        working-directory: apps/reviseur
