name: torghut-build-push

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'services/torghut/**'
      - 'packages/scripts/src/torghut/**'
      - '!packages/scripts/src/torghut/__tests__/**'
      - '!packages/scripts/src/torghut/**/*.test.ts'
      - 'packages/scripts/src/shared/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/torghut-build-push.yaml'
  workflow_dispatch:

concurrency:
  group: torghut-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: arc-arm64
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Resolve image tag
        id: meta
        run: echo "tag=$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for private registry
        shell: bash
        env:
          REGISTRY_URL: https://registry.ide-newton.ts.net/v2/
          REGISTRY_WAIT_TIMEOUT_SECONDS: 7200
          REGISTRY_WAIT_INTERVAL_SECONDS: 60
        run: |
          set -euo pipefail

          deadline=$((SECONDS + REGISTRY_WAIT_TIMEOUT_SECONDS))

          while true; do
            status="$(curl -sS -o /tmp/torghut-registry-health.txt -w '%{http_code}' "${REGISTRY_URL}" || true)"

            case "${status}" in
              200|401)
                echo "Registry is reachable at ${REGISTRY_URL} (HTTP ${status})."
                exit 0
                ;;
              502|503|504|000)
                if (( SECONDS >= deadline )); then
                  echo "Timed out waiting for ${REGISTRY_URL}; last HTTP status was ${status}."
                  exit 1
                fi

                echo "Registry is temporarily unavailable at ${REGISTRY_URL} (HTTP ${status}); retrying in ${REGISTRY_WAIT_INTERVAL_SECONDS}s."
                sleep "${REGISTRY_WAIT_INTERVAL_SECONDS}"
                ;;
              *)
                echo "Registry returned unexpected HTTP status ${status} for ${REGISTRY_URL}."
                exit 1
                ;;
            esac
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts --filter @proompteng/scripts

      - name: Build and push torghut image
        env:
          TORGHUT_IMAGE_TAG: ${{ steps.meta.outputs.tag }}
          TORGHUT_IMAGE_PLATFORMS: linux/arm64
          # Remote cache export has intermittently canceled after the image push,
          # before the release contract can be written. Keep the image contract
          # path authoritative and skip the cache until the exporter is stable.
          TORGHUT_IMAGE_CACHE_REF: none
        run: bun run packages/scripts/src/torghut/build-image.ts

      - name: Resolve pushed image digest
        id: digest
        shell: bash
        run: |
          set -euo pipefail
          IMAGE='registry.ide-newton.ts.net/lab/torghut'
          TAG='${{ steps.meta.outputs.tag }}'
          DIGEST="$(docker buildx imagetools inspect "${IMAGE}:${TAG}" | awk '/^Digest:/ { print $2; exit }')"
          if [ -z "${DIGEST}" ]; then
            echo "Failed to resolve digest for ${IMAGE}:${TAG}"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Write release contract artifact
        shell: bash
        run: |
          set -euo pipefail
          bun run packages/scripts/src/torghut/release-contract.ts write \
            --path torghut-release-contract.json \
            --source-sha "${GITHUB_SHA}" \
            --tag "${{ steps.meta.outputs.tag }}" \
            --digest "${{ steps.digest.outputs.digest }}" \
            --image 'registry.ide-newton.ts.net/lab/torghut'

      - name: Upload release contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: torghut-release-contract
          path: torghut-release-contract.json
          if-no-files-found: error
          retention-days: 3

      - name: Update latest tag (best effort)
        id: latest_tag
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          IMAGE='registry.ide-newton.ts.net/lab/torghut'
          TAG='${{ steps.meta.outputs.tag }}'
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${TAG}"
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
          docker buildx imagetools inspect "${IMAGE}:latest"

      - name: Warn on latest tag update failure
        if: steps.latest_tag.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          IMAGE='registry.ide-newton.ts.net/lab/torghut'
          echo "::warning::Non-blocking failure updating ${IMAGE}:latest; digest-tagged image and release artifact are still valid."
          {
            echo "### Latest tag update failed (non-blocking)"
            echo ""
            echo "- Registry alias update failed for \`registry.ide-newton.ts.net/lab/torghut:latest\`."
            echo "- Immutable release contract artifact was already produced and uploaded."
            echo "- \`torghut-release\` can proceed using the digest from the contract."
          } >> "$GITHUB_STEP_SUMMARY"
