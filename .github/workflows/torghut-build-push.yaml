name: torghut-build-push

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'services/torghut/**'
      - 'packages/scripts/src/torghut/**'
      - '!packages/scripts/src/torghut/__tests__/**'
      - '!packages/scripts/src/torghut/**/*.test.ts'
      - 'nix/images/torghut.nix'
      - 'services/torghut/uv.lock'
  workflow_dispatch:

concurrency:
  group: torghut-build-${{ github.ref }}
  # Finish the active registry publish; GitHub's single pending slot still
  # coalesces later pushes to the newest source revision.
  cancel-in-progress: false

jobs:
  nix-image:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/nix-oci-build-common.yml
    with:
      image_name: torghut
      package_attr: torghut-image
      tag: sha-${{ github.sha }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      latest: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
      release_artifact_name: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'torghut-release-contract' || '' }}
      publish_on_dispatch: true
    secrets: inherit
